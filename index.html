    if (!h || !a) return 0;
    const start = Math.atan2(h.y - a.y, h.x - a.x);
    const target = Math.atan2(h.y + dy - a.y, h.x + dx - a.x);
    let delta = target - start;
    while (delta > Math.PI) delta -= TAU;
    while (delta < -Math.PI) delta += TAU;
    return delta;
  }

  _similarityFromDrag(drag, dx, dy) {
    const h = drag.rotateHandle;
    const a = drag.anchor;
    if (!h || !a) return { delta:0, scale:1 };
    const sx = h.x - a.x, sy = h.y - a.y;
    const tx = h.x + dx - a.x, ty = h.y + dy - a.y;
    const startLen = Math.hypot(sx, sy);
    if (startLen < EPS) return { delta:0, scale:1 };
    let delta = Math.atan2(ty, tx) - Math.atan2(sy, sx);
    while (delta > Math.PI) delta -= TAU;
    while (delta < -Math.PI) delta += TAU;
    const scale = drag.mode === 'similarity'
      ? Math.max(0.05, Math.hypot(tx, ty) / startLen)
      : 1;
    return { delta, scale };
  }

  _dragPreviewPoint(drag, r, dx, dy) {
    if (drag.mode !== 'rotate' && drag.mode !== 'similarity') return { x:r.x + dx, y:r.y + dy };
    const a = drag.anchor;
    const { delta, scale } = this._similarityFromDrag(drag, dx, dy);
    const cs = Math.cos(delta), sn = Math.sin(delta);
    const vx = r.x - a.x, vy = r.y - a.y;
    return {
      x:a.x + scale * (vx*cs - vy*sn),
      y:a.y + scale * (vx*sn + vy*cs)
    };
  }

  _dragDeltaForSnap(drag, snap) {
    if (drag.mode !== 'rotate' && drag.mode !== 'similarity') {
      return { dx:snap.x - snap.dragRecord.x, dy:snap.y - snap.dragRecord.y };
    }
    const r = snap.dragRecord;
    const a = drag.anchor;
    const h = drag.rotateHandle;
    if (!r || !a || !h) return { dx:0, dy:0 };
    const rsx = r.x - a.x, rsy = r.y - a.y;
    const rtx = snap.x - a.x, rty = snap.y - a.y;
    const rStartLen = Math.hypot(rsx, rsy);
    if (rStartLen < EPS) return { dx:0, dy:0 };
    let delta = Math.atan2(rty, rtx) - Math.atan2(rsy, rsx);
    while (delta > Math.PI) delta -= TAU;
    while (delta < -Math.PI) delta += TAU;
    const scale = drag.mode === 'similarity'
      ? Math.max(0.05, Math.hypot(rtx, rty) / rStartLen)
      : 1;
    const cs = Math.cos(delta), sn = Math.sin(delta);
    const hvx = h.x - a.x, hvy = h.y - a.y;
    const hx = a.x + scale * (hvx*cs - hvy*sn);
    const hy = a.y + scale * (hvx*sn + hvy*cs);
    return { dx:hx - h.x, dy:hy - h.y };
  }

  solveLocalizedDrag(drag, dx, dy) {
    const sketch = this.activeSketch();
    if (!sketch || !drag || !drag.pts.length) return null;

    if (drag.mode === 'dof') {
      return this._solveDofDrag(drag, dx, dy);
    }

    if (drag.mode === 'locked') {
      this._restoreSketchParams(drag.state || []);
      return { ok:true, iters:0, residual:0, state:this._lastSolve?.state || 'fully' };
    }

    if (drag.mode === 'rotate' || drag.mode === 'similarity') {
      const a = drag.anchor;
      const { delta, scale } = this._similarityFromDrag(drag, dx, dy);
      const cs = Math.cos(delta), sn = Math.sin(delta);
      for (const r of drag.pts) {
        const vx = r.x - a.x, vy = r.y - a.y;
        r.p.x = a.x + scale * (vx*cs - vy*sn);
        r.p.y = a.y + scale * (vx*sn + vy*cs);
      }
      for (const r of drag.transformParams || []) {
        if (r.key === 'r') r.ent[r.key] = Math.max(EPS, r.value * scale);
        else if (r.key === 'a0' || r.key === 'a1') r.ent[r.key] = r.value + delta;
        else r.ent[r.key] = r.value;
      }
      for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();
      return { ok:true, iters:0, residual:0, state:this._lastSolve?.state || 'under' };
    }

    if (drag.mode === 'rigid') {
      for (const r of drag.pts) {
        r.p.x = r.x + dx;
        r.p.y = r.y + dy;
      }
      for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();
      return { ok:true, iters:0, residual:0, state:this._lastSolve?.state || 'under' };
    }

    const targets = new Map();
    for (const r of drag.pts) targets.set(r.p.id, { x:r.x + dx, y:r.y + dy });

    let best = null;
    const placeDraggedPoints = () => {
      for (const r of drag.pts) {
        const t = targets.get(r.p.id);
        r.p.x = t.x;
        r.p.y = t.y;
      }
    };
    const finish = (result) => {
      for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();
      // Drag solves use temporary pins to keep unaffected geometry local.
      // Those pins are not real sketch constraints, so do not use their
      // fully-defined analysis for canvas colouring while the pointer moves.
      return result;
    };
    const trySolve = (depth, includeTargets) => {
      this._restoreSketchParams(drag.state);
      placeDraggedPoints();
      const movable = this._dragMovableIds(drag, depth);
      const extra = this._dragTempConstraints(drag.state, movable, includeTargets ? targets : null);
      const result = this.solver.solve(sketch, this.project.sketches, extra);
      const values = this._captureParamValues(drag.state);
      if (!best || result.residual < best.result.residual) best = { result, values };
      return result;
    };

    for (const depth of drag.depths) {
      const result = trySolve(depth, true);
      if (result.ok) return finish(result);
    }

    // If the cursor target conflicts with a real fixed/reference relation,
    // keep the local pins but let the actual sketch constraints win.
    for (const depth of drag.depths) {
      const result = trySolve(depth, false);
      if (result.ok) return finish(result);
    }

    if (best) {
      this._applyParamValues(drag.state, best.values);
      return finish(best.result);
    }
    return null;
  }

  /* ---- Solving ---- */
  commit() {
    this.undoStack.push(JSON.stringify(this.project.toJSON()));
    if (this.undoStack.length > 100) this.undoStack.shift();
    this.redoStack.length = 0;
    this.solveAndRender();
  }

  solveSoft() {
    const sketch = this.activeSketch(); if (!sketch) return;
    const r = this.solver.solve(sketch, this.project.sketches);
    for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();
    this._updateConstraintStatus(r);
    this._lastSolve = r;
  }

  solveAndRender() {
    const sketch = this.activeSketch();
    if (!sketch) { this.requestRender(); return; }
    const t0 = performance.now();
    const r = this.solver.solve(sketch, this.project.sketches);
    const t1 = performance.now();
    for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();
    this._updateConstraintStatus(r);
    this._lastSolve = r;

    const solvePill = document.getElementById('status-solve');
    solvePill.classList.remove('ok','warn','error');
    if (r.m === 0)            { solvePill.textContent = 'no constraints'; solvePill.classList.add('warn'); }
    else if (r.ok)            { solvePill.textContent = `solved (${r.iters} it, ${(t1-t0).toFixed(1)} ms)`; solvePill.classList.add('ok'); }
    else                       { solvePill.textContent = `not solved (res ${r.residual.toExponential(2)})`; solvePill.classList.add('error'); }

    const statePill = document.getElementById('status-state');
    statePill.classList.remove('ok','warn','error');
    if (r.state === 'fully')   { statePill.textContent = 'Fully defined'; statePill.classList.add('ok'); }
    else if (r.state === 'over'){ statePill.textContent = `Over-defined (${r.redundant} redundant)`; statePill.classList.add('error'); }
    else                        { statePill.textContent = 'Under-defined'; statePill.classList.add('warn'); }

    document.getElementById('status-dof').textContent = 'DOF: ' + r.dof;
    this.requestRender();
  }

  _updateConstraintStatus(result) {
    const sketch = this.activeSketch(); if (!sketch) return;
    const entityStatus = result.entityStatus;
    const overOverall = result.state === 'over';
    // Per-entity colouring: each entity becomes black ("fully") as soon as
    // ITS parameters are pinned, regardless of the sketch's overall state.
    // If the whole sketch is over-defined we still flag every entity as
    // 'over' (red) — that's a global error.
    for (const e of sketch.entities) {
      const s = entityStatus.get(e.id) || 'under';
      e.status = overOverall ? 'over' : s;
      for (const c of e.children()) {
        const cs = entityStatus.get(c.id) || s;
        c.status = overOverall ? 'over' : cs;
      }
    }
    // Reference geometry from non-active visible sketches is frozen by the
    // solver, so we draw it in the "fully" colour (black at full alpha is
    // dimmed elsewhere).
    for (const s of this.project.sketches) {
      if (s.id === sketch.id) continue;
      for (const e of s.entities) {
        e.status = 'fully';
        for (const c of e.children()) c.status = 'fully';
      }
    }
  }

  /* ---- Constraint application ---- */
  applyConstraint(kind) {
    const sketch = this.activeSketch(); if (!sketch) return;
    const sel = this.selectedEntitiesAndPoints();
    const { points, lines, circles, arcs } = classifySelection(sel);

    const beforeJSON = JSON.stringify(this.project.toJSON());
    const beforeState = this._captureSketchParams(sketch);
    const beforeGraph = this._buildConstraintGraph(sketch);
    const tryAdd = (cons) => { if (Array.isArray(cons)) sketch.constraints.push(...cons); else sketch.constraints.push(cons); };

    let added = false;
    switch (kind) {
      case 'fix':
        for (const p of points) { tryAdd(new FixConstraint(p.id, p.x, p.y)); p.fixed = true; added = true; }
        for (const e of lines)  for (const p of [e.p1,e.p2]) { tryAdd(new FixConstraint(p.id, p.x, p.y)); p.fixed = true; added = true; }
        for (const c of circles){ tryAdd(new FixConstraint(c.center.id, c.center.x, c.center.y)); c.center.fixed = true; added = true; }
        for (const a of arcs)   { tryAdd(new FixConstraint(a.center.id, a.center.x, a.center.y)); a.center.fixed = true; added = true; }
        break;
      case 'coincident':
        for (let i = 1; i < points.length; i++) { tryAdd(new CoincidentConstraint(points[0].id, points[i].id)); added = true; }
        break;
      case 'horizontal':
      case 'vertical': {
        const C = kind === 'horizontal' ? HorizontalConstraint : VerticalConstraint;
        for (const l of lines) { tryAdd(new C(l.id, l.p1.id, l.p2.id)); added = true; }
        if (points.length === 2) {
          // synthesise a line-id reference between them
          const fakeId = newId('virt');
          tryAdd(new C(fakeId, points[0].id, points[1].id)); added = true;
        }
        break;
      }
      case 'parallel':
      case 'perpendicular':
      case 'collinear':
      case 'equalLength': {
        const C = { parallel:ParallelConstraint, perpendicular:PerpendicularConstraint,
                    collinear:CollinearConstraint, equalLength:EqualLengthConstraint }[kind];
        // For transitive relations (parallel, collinear, equalLength) avoid
        // adding pairs that are already linked through the existing
        // constraint graph. The relation is added with the FIRST selected
        // entity as the anchor — i.e. all subsequent picks are tied to
        // lines[0]. Perpendicular is NOT transitive, so we always add.
        const transitive = (kind !== 'perpendicular');
        const lineByPair = new Map();
        for (const e of sketch.entities) if (e instanceof Line) {
          lineByPair.set(e.p1.id+'|'+e.p2.id, e);
          lineByPair.set(e.p2.id+'|'+e.p1.id, e);
        }
        const parent = new Map();
        const find = (x) => { while (parent.get(x) !== x) { parent.set(x, parent.get(parent.get(x))); x = parent.get(x); } return x; };
        const union = (a, b) => { const ra=find(a), rb=find(b); if (ra !== rb) parent.set(ra, rb); };
        if (transitive) {
          for (const e of sketch.entities) if (e instanceof Line) parent.set(e.id, e.id);
          for (const c of sketch.constraints) {
            if (c.kind !== kind) continue;
            const lA = lineByPair.get(c.l1.a+'|'+c.l1.b);
            const lB = lineByPair.get(c.l2.a+'|'+c.l2.b);
            if (lA && lB) union(lA.id, lB.id);
          }
        }
        for (let i = 1; i < lines.length; i++) {
          if (transitive && find(lines[0].id) === find(lines[i].id)) continue; // already linked
          tryAdd(new C(
            { a: lines[0].p1.id, b: lines[0].p2.id },
            { a: lines[i].p1.id, b: lines[i].p2.id }
          ));
          if (transitive) union(lines[0].id, lines[i].id);
          added = true;
        }
        break;
      }
      case 'equalRadius':
      case 'equal': {
        const all = [...circles, ...arcs];
        if (all.length >= 2) {
          // skip duplicates via union-find of existing equalRadius graph
          const parent = new Map();
          for (const e of [...circles, ...arcs]) parent.set(e.id, e.id);
          for (const e of sketch.entities) if (e instanceof Circle || e instanceof Arc) parent.set(e.id, e.id);
          const find = (x) => { while (parent.get(x) !== x) { parent.set(x, parent.get(parent.get(x))); x = parent.get(x); } return x; };
          const union = (a,b) => { const ra=find(a), rb=find(b); if (ra!==rb) parent.set(ra, rb); };
          for (const c of sketch.constraints) if (c.kind === 'equalRadius') union(c.c1, c.c2);
          for (let i = 1; i < all.length; i++) {
            if (find(all[0].id) === find(all[i].id)) continue;
            tryAdd(new EqualRadiusConstraint(all[0].id, all[i].id));
            union(all[0].id, all[i].id);
            added = true;
          }
        } else if (lines.length >= 2) {
          // fall through to equalLength behaviour
          this.applyConstraint('equalLength');
          return;
        }
        break;
      }
      case 'concentric': {
        const all = [...circles, ...arcs];
        if (all.length >= 2) {
          const parent = new Map();
          for (const e of all) parent.set(e.center.id, e.center.id);
          const find = (x) => { while (parent.get(x) !== x) { parent.set(x, parent.get(parent.get(x))); x = parent.get(x); } return x; };
          const union = (a,b) => { const ra=find(a), rb=find(b); if (ra!==rb) parent.set(ra, rb); };
          for (const c of sketch.constraints) if (c.kind === 'concentric') union(c.p1, c.p2);
          for (let i = 1; i < all.length; i++) {
            if (find(all[0].center.id) === find(all[i].center.id)) continue;
            tryAdd(new ConcentricConstraint(all[0].center.id, all[i].center.id));
            union(all[0].center.id, all[i].center.id);
            added = true;
          }
        }
        break;
      }
      case 'tangent': {
        if (lines.length === 1 && (circles.length + arcs.length) === 1) {
          const l = lines[0], c = circles[0] || arcs[0];
          tryAdd(new TangentLineCircleConstraint({a:l.p1.id, b:l.p2.id}, c.id, c.center.id));
          added = true;
        } else if ((circles.length + arcs.length) === 2 && lines.length === 0) {
          const a = circles[0] || arcs[0];
          const b = circles[1] || arcs[circles.length === 0 ? 1 : 0] || arcs[0];
          tryAdd(new TangentCircleCircleConstraint(a.id, a.center.id, b.id, b.center.id, false));
          added = true;
        }
        break;
      }
      case 'midpoint': {
        if (lines.length === 1 && points.length === 1) {
          tryAdd(new MidpointConstraint(points[0].id, { a: lines[0].p1.id, b: lines[0].p2.id }));
          added = true;
        }
        break;
      }
      case 'pointOnLine': {
        if (lines.length === 1 && points.length >= 1) {
          for (const p of points) tryAdd(new PointOnLineConstraint(p.id, { a: lines[0].p1.id, b: lines[0].p2.id }));
          added = true;
        }
        break;
      }
      case 'pointOnCircle': {
        if ((circles.length + arcs.length) === 1 && points.length >= 1) {
          const c = circles[0] || arcs[0];
          for (const p of points) tryAdd(new PointOnCircleConstraint(p.id, c.id, c.center.id));
          added = true;
        }
        break;
      }
    }

    if (added) {
      if (kind !== 'fix' && sel.length >= 2) {
        this._solveWithFirstSelectionMoving(sketch, sel, beforeState, beforeGraph);
      }
      this.commit();
      // If the new constraint(s) made things impossible to solve, warn.
      const solver = this.solver.solve(sketch, this.project.sketches);
      if (solver.state === 'over' && solver.residual > 1e-2) {
        const msg = `This relation makes the sketch over-defined (residual ${solver.residual.toExponential(2)}). Keep it anyway?`;
        if (!confirm(msg)) {
          // revert
          this.project = Project.fromJSON(JSON.parse(beforeJSON));
          this.selectionOrder = [];
          this.solveAndRender();
          this.refreshUI();
        }
      }
    }
  }

  applyDimension(kind) {
    // Route sidebar dimension buttons through the SmartDim tool: copy the
    // current selection in as picks, infer the preview, override the kind
    // when the button is more specific than the default inference (e.g.
    // "Radius" on a Circle that would default to Diameter), then enter
    // the placing phase so the user clicks once to place + types value.
    const sketch = this.activeSketch();
    const sel = this.selectedEntitiesAndPoints();
    if (!sketch || !sel.length) return;
    this.setTool('smartdim');
    this.tool.picks = sel.slice();
    if (!this.tool._inferPreview()) return;
    const p = this.tool.preview;
    if (kind === 'radius' && p.kind === 'diameter') {
      p.kind = 'radius';
      p.value = p.circle.r;
    } else if (kind === 'diameter' && p.kind === 'radius' && p.circle instanceof Circle) {
      p.kind = 'diameter';
      p.value = p.circle.r * 2;
    }
    this.tool.phase = 'placing';
    this.tool._updateCursorPlacement(this.lastWorldCursor);
    this.requestRender();
  }

  /* ---- Render loop ---- */
  requestRender() { this.dirty = true; }
  _loop() {
    const tick = () => { if (this.dirty) { this._render(); this.dirty = false; } requestAnimationFrame(tick); };
    requestAnimationFrame(tick);
  }
  _render() {
    this.renderer.drawGrid(this.gridOn);
    this.renderer.drawEntities(this.project.sketches, this.project.activeSketchId);

    // Build a project-wide id → entity lookup for dimension drawing.
    const entMap = new Map();
    const walk = (e) => { entMap.set(e.id, e); for (const c of e.children()) walk(c); };
    for (const s of this.project.visibleSketches()) for (const e of s.entities) walk(e);
    const sketch = this.activeSketch();
    if (sketch) {
      this.renderer.drawDimensions(sketch, entMap, this._lastSolve?.redundantIds);
    }

    const prev = this.tool.getPreview && this.tool.getPreview();
    if (prev) {
      if (prev.paths)      for (const p of prev.paths) this.renderer.drawTempPath(p, prev.dashed);
      if (prev.circles)    for (const c of prev.circles) this.renderer.drawTempCircle(c.center, c.r);
      if (prev.box)        this.renderer.drawSelectionBox(prev.box);
      if (prev.dimPicks)   this.renderer.drawDimPicks(prev.dimPicks);
      if (prev.dimPreview) this.renderer.drawDimPreview(prev.dimPreview);
    }

    if (this.snapOn) this.renderer.drawSnapMarker(this.lastSnap);
  }

  /* ---- Tool selection ---- */
  setTool(name) {
    if (this.tool && this.tool.deactivate) this.tool.deactivate();
    this.toolName = name;
    switch (name) {
      case 'select':    this.tool = new SelectTool(this); break;
      case 'line':      this.tool = new LineTool(this); break;
      case 'rectangle': this.tool = new RectangleTool(this); break;
      case 'circle':    this.tool = new CircleTool(this); break;
      case 'hexagon':   this.tool = new HexagonTool(this); break;
      case 'arc':       this.tool = new ArcTool(this); break;
      case 'point':     this.tool = new PointTool(this); break;
      case 'smartdim':  this.tool = new SmartDimensionTool(this); break;
    }
    if (this.tool.activate) this.tool.activate();
    document.querySelectorAll('#topbar .tool').forEach(b => b.classList.toggle('active', b.dataset.tool === name));
    document.getElementById('status-tool').textContent = 'Tool: ' + name[0].toUpperCase() + name.slice(1);
    document.getElementById('status-hint').textContent = (this.tool.hint && this.tool.hint()) || '';
    this.canvas.style.cursor = name === 'select' ? 'default' : 'crosshair';
    this.refreshToolOptions();
    this.requestRender();
  }

  /* ---- Canvas events ---- */
  _setupCanvasEvents() {
    const c = this.canvas;
    let panning = false; let panStart = null;

    const getWorld = (ev) => {
      const r = c.getBoundingClientRect();
      const sx = ev.clientX - r.left, sy = ev.clientY - r.top;
      return { screen: {x:sx, y:sy}, world: this.view.screenToWorld({x:sx, y:sy}) };
    };

    c.addEventListener('contextmenu', e => e.preventDefault());

    c.addEventListener('pointerdown', (ev) => {
      c.setPointerCapture(ev.pointerId);
      const { screen, world } = getWorld(ev);
      if (ev.button === 1 || ev.button === 2 || (ev.button === 0 && ev.altKey)) {
        panning = true;
        panStart = { x: ev.clientX, y: ev.clientY, panX: this.view.panX, panY: this.view.panY };
        c.style.cursor = 'grabbing';
        return;
      }
      const snap = this._snapForCurrentTool(world);
      this.lastSnap = snap;
      this.tool.onPointerDown(world, snap, ev);
    });

    c.addEventListener('pointermove', (ev) => {
      const { screen, world } = getWorld(ev);
      this.lastWorldCursor = world;
      document.getElementById('status-coords').textContent = `x: ${world.x.toFixed(3)}  y: ${world.y.toFixed(3)}`;
      if (panning) {
        this.view.panX = panStart.panX + (ev.clientX - panStart.x);
        this.view.panY = panStart.panY + (ev.clientY - panStart.y);
        this.requestRender();
        return;
      }
      const snap = this._snapForCurrentTool(world);
      this.lastSnap = snap;
      this.tool.onPointerMove(world, snap, ev);
      const hint = document.getElementById('cursor-hint');
      if (snap) {
        hint.textContent = snap.kind;
        hint.style.left = screen.x + 'px';
        hint.style.top  = screen.y + 'px';
        hint.style.display = 'block';
      } else hint.style.display = 'none';
      this.requestRender();
    });

    c.addEventListener('pointerup', (ev) => {
      const { world } = getWorld(ev);
      if (panning) { panning = false; c.style.cursor = this.toolName === 'select' ? 'default' : 'crosshair'; return; }
      const snap = this._snapForCurrentTool(world);
      this.tool.onPointerUp(world, snap, ev);
    });

    c.addEventListener('wheel', (ev) => {
      ev.preventDefault();
      const r = c.getBoundingClientRect();
      const sp = { x: ev.clientX - r.left, y: ev.clientY - r.top };
      const factor = Math.exp(-ev.deltaY * 0.0015);
      this.view.zoomAt(sp, factor);
      document.getElementById('status-zoom').textContent = 'Zoom: ' + Math.round(this.view.zoom*25) + '%';
      this.requestRender();
    }, { passive: false });
  }

  _setupKeyboard() {
    window.addEventListener('keydown', (ev) => {
      if (ev.target.matches('input,textarea,[contenteditable="true"]')) return;
      const k = ev.key.toLowerCase();
      if ((ev.ctrlKey || ev.metaKey) && k === 'z') { ev.preventDefault(); this.undo(); return; }
      if ((ev.ctrlKey || ev.metaKey) && (k === 'y' || (ev.shiftKey && k === 'z'))) { ev.preventDefault(); this.redo(); return; }
      if (k === 's') this.setTool('select');
      else if (k === 'l') this.setTool('line');
      else if (k === 'r') this.setTool('rectangle');
      else if (k === 'c') this.setTool('circle');
      else if (k === 'h') this.setTool('hexagon');
      else if (k === 'a') this.setTool('arc');
      else if (k === 'p') this.setTool('point');
      else if (k === 'd') this.setTool('smartdim');
      else if (k === 'f') this.zoomFit();
      else if (k === 'f5') { ev.preventDefault(); this.solveAndRender(); }
      this.tool.onKey && this.tool.onKey(ev);
    });
  }

  /* ---- Top bar ---- */
  _setupTopbar() {
    document.querySelectorAll('#topbar .tool').forEach(b =>
      b.addEventListener('click', () => this.setTool(b.dataset.tool)));

    document.querySelectorAll('#topbar [data-action]').forEach(b => {
      b.addEventListener('click', () => {
        const a = b.dataset.action;
        switch (a) {
          case 'new':          this.newProject(); break;
          case 'save':         this.saveLocal(); break;
          case 'export':       this.exportJSON(); break;
          case 'import':       this.importJSON(); break;
          case 'undo':         this.undo(); break;
          case 'redo':         this.redo(); break;
          case 'solve':        this.solveAndRender(); break;
          case 'construction': this.constructionMode = !this.constructionMode; b.classList.toggle('on', this.constructionMode); break;
          case 'grid':         this.gridOn = !this.gridOn; b.classList.toggle('on', this.gridOn); this.requestRender(); break;
          case 'snap':         this.snapOn = !this.snapOn; b.classList.toggle('on', this.snapOn); this.requestRender(); break;
          case 'zoom-fit':     this.zoomFit(); break;
          case 'zoom-reset':   this.view.zoom = 4; this.view.panX = 0; this.view.panY = 0; this.requestRender(); break;
        }
      });
    });
  }

  zoomFit() {
    const sketch = this.activeSketch(); if (!sketch || sketch.entities.length === 0) return;
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    const acc = (p) => { if (p.x<minX) minX=p.x; if (p.y<minY) minY=p.y; if (p.x>maxX) maxX=p.x; if (p.y>maxY) maxY=p.y; };
    for (const e of sketch.entities) {
      if (e instanceof Line) { acc(e.p1); acc(e.p2); }
      else if (e instanceof Circle) { acc({x:e.center.x-e.r, y:e.center.y-e.r}); acc({x:e.center.x+e.r, y:e.center.y+e.r}); }
      else if (e instanceof Arc)    { acc({x:e.center.x-e.r, y:e.center.y-e.r}); acc({x:e.center.x+e.r, y:e.center.y+e.r}); }
      else if (e instanceof Point)  { acc(e); }
    }
    if (minX === Infinity) return;
    this.view.fitTo({minX, minY, maxX, maxY}, 80);
    this.requestRender();
  }

  /* ---- Sidebar ---- */
  _setupSidebar() {
    document.getElementById('add-layer').addEventListener('click', () => {
      this.project.addSketch();
      this.commit();
      this.refreshUI();
    });
    document.getElementById('project-name').addEventListener('input', (e) => {
      this.project.name = e.target.value;
    });
  }

  refreshUI() {
    this._refreshLayers();
    this.refreshToolOptions();
    this._refreshSelectionPanel();
    document.getElementById('project-name').value = this.project.name;
  }

  refreshToolOptions() {
    const section = document.getElementById('tool-options-section');
    const body = document.getElementById('tool-options-body');
    if (!section || !body) return;
    if (this.toolName !== 'hexagon') {
      section.hidden = true;
      body.innerHTML = '';
      return;
    }
    section.hidden = false;
    body.innerHTML = `
      <div class="prop-row">
        <label for="polygon-sides">sides</label>
        <input id="polygon-sides" type="number" min="3" max="64" step="1" value="${this.polygonSides}">
      </div>
    `;
    const input = body.querySelector('#polygon-sides');
    input.addEventListener('input', () => {
      const n = Math.round(parseFloat(input.value));
      if (!Number.isFinite(n)) return;
      this.polygonSides = clamp(n, 3, 64);
      input.value = this.polygonSides;
      this.requestRender();
      document.getElementById('status-hint').textContent = (this.tool.hint && this.tool.hint()) || '';
    });
  }

  _refreshLayers() {
    const ul = document.getElementById('layers-list');
    ul.innerHTML = '';
    for (const s of this.project.sketches) {
      const row = document.createElement('div');
      row.className = 'layer-row' + (s.id === this.project.activeSketchId ? ' active' : '');
      row.innerHTML = `
        <button class="icon-btn" title="Toggle visibility">${s.visible ? '👁' : '◌'}</button>
        <span class="name" title="${s.name}">${s.name}<span class="badge">${s.entities.length}</span></span>
        <button class="icon-btn" title="Delete">✕</button>
      `;
      const [vis, name, del] = row.querySelectorAll(':scope > *');
      vis.addEventListener('click', (e) => { e.stopPropagation(); s.visible = !s.visible; this.refreshUI(); this.requestRender(); });
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        if (this.project.sketches.length <= 1) return alert('A project must have at least one sketch.');
        if (!confirm(`Delete sketch "${s.name}"?`)) return;
        this.project.removeSketch(s.id);
        this.commit();
        this.refreshUI();
      });
      name.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        const span = e.currentTarget;
        span.setAttribute('contenteditable', 'true');
        span.focus();
        const range = document.createRange(); range.selectNodeContents(span);
        const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
        const finish = () => {
          span.removeAttribute('contenteditable');
          s.name = span.textContent.trim() || s.name;
          span.removeEventListener('blur', finish);
          this.refreshUI();
        };
        span.addEventListener('blur', finish);
        span.addEventListener('keydown', (ev) => { if (ev.key==='Enter'){ ev.preventDefault(); span.blur(); }});
      });
      row.addEventListener('click', () => {
        this.project.activeSketchId = s.id;
        this.clearSelection();
        this.solveAndRender();
        this.refreshUI();
      });
      ul.appendChild(row);
    }
  }

  _refreshSelectionPanel() {
    const sel = this.selectedEntitiesAndPoints();
    const body = document.getElementById('sel-body');
    document.getElementById('sel-count').textContent = sel.length + (sel.length === 1 ? ' item' : ' items');

    if (sel.length === 0) {
      body.innerHTML = '<div class="empty">Click an entity to select. Ctrl-click to add or remove from selection.</div>';
      return;
    }

    const activeId = this.project.activeSketchId;
    const sketch = this.activeSketch();

    // ---- Selection list ----
    let html = '<div class="sb-subhead">Items</div>';
    for (const e of sel) {
      const owner = this.project.sketchOf(e);
      const cross = owner && owner.id !== activeId;
      const glyph = e instanceof Point ? '•' : e instanceof Line ? '╱' : e instanceof Circle ? '○' : e instanceof Arc ? '◜' : '?';
      const kind  = e.constructor.kind;
      html += `<div class="sel-item${cross ? ' cross-layer' : ''}">
                 <span class="glyph">${glyph}</span>
                 <span>${kind} ${e.id}</span>
                 <span class="layer-tag">${owner ? owner.name : '—'}</span>
               </div>`;
    }

    // ---- Add Relations ----
    const rels = availableRelations(sel);
    html += '<div class="sb-subhead">Add Relation</div>';
    if (rels.length === 0) {
      html += '<div class="empty">No relations apply to this selection.</div>';
    } else {
      html += '<div class="rel-grid">';
      for (const r of rels) {
        html += `<button class="rel-btn" data-rel="${r.kind}"><span class="glyph">${r.glyph}</span>${r.label}</button>`;
      }
      html += '</div>';
    }

    // ---- Add Dimension ----
    const dims = availableDimensions(sel);
    html += '<div class="sb-subhead">Add Dimension</div>';
    if (dims.length === 0) {
      html += '<div class="empty">No dimension applies. Use Smart Dim (D) or pick a different combo.</div>';
    } else {
      html += '<div class="rel-grid">';
      for (const d of dims) {
        html += `<button class="rel-btn" data-dim="${d.kind}"><span class="glyph">${d.glyph}</span>${d.label}</button>`;
      }
      html += '</div>';
    }

    // ---- Existing Relations on selection ----
    const related = (sketch?.constraints || []).filter(c => constraintAppliesToSelection(c, sel));
    html += '<div class="sb-subhead">Existing Relations</div>';
    if (related.length === 0) {
      html += '<div class="empty">None on selection.</div>';
    } else {
      html += '<div>';
      for (const c of related) {
        const label = CONSTRAINT_LABELS[c.kind] || c.kind;
        const valStr = (c.value !== null && c.value !== undefined) ? ` = ${Number(c.value).toFixed(3)}` : '';
        html += `<span class="constraint-pill" data-cid="${c.id}">${label}${valStr}<span class="x" data-cid="${c.id}">×</span></span>`;
      }
      html += '</div>';
    }

    // ---- Properties for the first item ----
    const e = sel[0];
    html += '<div class="sb-subhead">Properties</div>';
    if (e instanceof Point) {
      html += `<div class="prop-row"><label>x</label><input type="number" step="0.001" data-edit="x" value="${e.x.toFixed(4)}"></div>`;
      html += `<div class="prop-row"><label>y</label><input type="number" step="0.001" data-edit="y" value="${e.y.toFixed(4)}"></div>`;
      html += `<div class="prop-row"><label>fixed</label><input type="checkbox" data-toggle="fixed" ${e.fixed?'checked':''}></div>`;
    } else if (e instanceof Circle || e instanceof Arc) {
      html += `<div class="prop-row"><label>radius</label><input type="number" step="0.001" data-edit="r" value="${e.r.toFixed(4)}"></div>`;
      html += `<div class="prop-row"><label>construction</label><input type="checkbox" data-toggle="construction" ${e.construction?'checked':''}></div>`;
    } else if (e instanceof Line) {
      html += `<div class="prop-row"><label>length</label><span>${dist(e.p1,e.p2).toFixed(4)} ${this.project.units}</span></div>`;
      html += `<div class="prop-row"><label>construction</label><input type="checkbox" data-toggle="construction" ${e.construction?'checked':''}></div>`;
    }

    body.innerHTML = html;

    // Wire up buttons / inputs
    body.querySelectorAll('[data-rel]').forEach(b =>
      b.addEventListener('click', () => this.applyConstraint(b.dataset.rel)));
    body.querySelectorAll('[data-dim]').forEach(b =>
      b.addEventListener('click', () => this.applyDimension(b.dataset.dim)));
    body.querySelectorAll('input[data-edit]').forEach(inp => {
      inp.addEventListener('change', () => {
        const k = inp.dataset.edit;
        const v = parseFloat(inp.value);
        if (!Number.isFinite(v)) return;
        // Snap near-zero values back to exactly zero.
        e[k] = (Math.abs(v) < 1e-12) ? 0 : v;
        // If this Point is anchored by a Fix constraint, the constraint's
        // own (x,y) is the solver's target. Update it so the typed value
        // sticks instead of being pulled back to the old fix.
        if (e instanceof Point) {
          const fc = sketch.constraints.find(c => c.kind === 'fix' && c.pointId === e.id);
          if (fc) { fc.x = e.x; fc.y = e.y; }
        }
        this.commit();
      });
    });
    body.querySelectorAll('input[data-toggle]').forEach(inp => {
      inp.addEventListener('change', () => {
        const k = inp.dataset.toggle; e[k] = inp.checked;
        if (k === 'fixed' && inp.checked && e instanceof Point) {
          sketch.constraints.push(new FixConstraint(e.id, e.x, e.y));
        }
        if (k === 'fixed' && !inp.checked && e instanceof Point) {
          sketch.constraints = sketch.constraints.filter(c => !(c.kind === 'fix' && c.pointId === e.id));
        }
        this.commit();
        this.refreshUI();
      });
    });
    body.querySelectorAll('.constraint-pill .x').forEach(x => {
      x.addEventListener('click', () => {
        const cid = x.dataset.cid;
        sketch.constraints = sketch.constraints.filter(c => c.id !== cid);
        // recompute fixed flags from remaining FixConstraints
        for (const en of sketch.entities) for (const c of en.children()) c.fixed = false;
        for (const c of sketch.constraints) if (c.kind === 'fix') {
          for (const en of sketch.entities) for (const p of en.children()) if (p.id === c.pointId) p.fixed = true;
        }
        this.commit();
        this.refreshUI();
      });
    });
  }

  /* ---- Storage ---- */
  saveLocal() {
    localStorage.setItem('sketchcad:last', JSON.stringify(this.project.toJSON()));
    const pill = document.getElementById('status-solve');
    const old = pill.textContent;
    pill.textContent = 'saved to browser';
    setTimeout(() => pill.textContent = old, 1500);
  }
  loadLocalIfAny() {
    const raw = localStorage.getItem('sketchcad:last');
    if (!raw) return false;
    try { this.project = Project.fromJSON(JSON.parse(raw)); return true; }
    catch (e) { console.warn('load failed', e); return false; }
  }
  newProject() {
    if (!confirm('Discard current project and start a new one?')) return;
    this.project = new Project(); this.project.addSketch('Sketch 1');
    this.undoStack.length = 0; this.redoStack.length = 0;
    this.selectionOrder = [];
    this.refreshUI(); this.solveAndRender();
  }
  exportJSON() { this._modal('Export JSON', JSON.stringify(this.project.toJSON(), null, 2), false); }
  importJSON() {
    this._modal('Import JSON', '', true).then(text => {
      if (!text) return;
      try {
        this.project = Project.fromJSON(JSON.parse(text));
        this.selectionOrder = [];
        this.commit(); this.refreshUI();
      } catch (e) { alert('Failed to parse: ' + e.message); }
    });
  }

  _setupModal() {
    const m = document.getElementById('json-modal');
    document.getElementById('json-modal-cancel').addEventListener('click', () => {
      m.classList.remove('show');
      this._modalResolve && this._modalResolve(null);
    });
    document.getElementById('json-modal-ok').addEventListener('click', () => {
      m.classList.remove('show');
      this._modalResolve && this._modalResolve(document.getElementById('json-modal-text').value);
    });
  }
  _modal(title, text, editable) {
    const m = document.getElementById('json-modal');
    document.getElementById('json-modal-title').textContent = title;
    const ta = document.getElementById('json-modal-text');
    ta.value = text; ta.readOnly = !editable;
    m.classList.add('show');
    return new Promise((res) => { this._modalResolve = res; });
  }

  /* ---- Undo / redo ---- */
  undo() {
    if (this.undoStack.length < 2) return;
    const cur = this.undoStack.pop();
    this.redoStack.push(cur);
    const prev = this.undoStack[this.undoStack.length - 1];
    this.project = Project.fromJSON(JSON.parse(prev));
    this._afterStateSwap();
  }
  redo() {
    if (!this.redoStack.length) return;
    const next = this.redoStack.pop();
    this.undoStack.push(next);
    this.project = Project.fromJSON(JSON.parse(next));
    this._afterStateSwap();
  }
  /** After replacing this.project with a freshly revived version, the
   *  current tool may be holding references to entities that no longer
   *  exist (e.g. LineTool.startPt, SmartDim.picks). Re-activating the
   *  tool resets that state without changing tool selection. */
  _afterStateSwap() {
    if (this.tool && this.tool.activate) this.tool.activate();
    this.lastSnap = null;
    this.selectionOrder = [];
    this.refreshUI();
    this.solveAndRender();
  }

  _setupResize() {
    const onResize = () => {
      this.renderer.dpr = window.devicePixelRatio || 1;
      this.renderer.resize();
      this.requestRender();
    };
    window.addEventListener('resize', onResize);
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(onResize).observe(this.canvas);
    }
    onResize();
    requestAnimationFrame(onResize);
  }
}

/* =============== BOOTSTRAP ==================================== */
const app = new App();
app.undoStack.push(JSON.stringify(app.project.toJSON()));
window._app = app;
</script>
</body>
</html>
