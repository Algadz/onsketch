      <div class="sb-subhead">Pick Mode</div>
      <button class="choice-row ${entitiesActive ? 'active' : ''}" id="mirror-pick-entities">
        <span class="glyph">${entitiesActive ? '>' : '+'}</span>
        <span><strong>Entities</strong><span>Click or box-select points, lines, or circles.</span></span>
      </button>
      <button class="choice-row ${axisActive ? 'active' : ''}" id="mirror-pick-axis">
        <span class="glyph">${axisActive ? '>' : '+'}</span>
        <span><strong>Axis</strong><span>Click a line to define the reflection axis.</span></span>
      </button>
      <div class="sb-subhead">Sources</div>
      ${sourceHtml}
      <div class="sb-subhead">Mirror Axis</div>
      ${axisHtml}
      <div class="rel-grid op-actions">
        <button class="rel-btn primary" id="mirror-create" ${(!axis || !sources.length) ? 'disabled' : ''}>${uiIcon('mirror')}Create</button>
        <button class="rel-btn danger" id="mirror-cancel">${uiIcon('x')}Cancel</button>
      </div>
    `;
    body.querySelector('#mirror-pick-entities')?.addEventListener('click', () => {
      this.mirrorPickMode = 'entities';
      this.refreshToolOptions();
    });
    body.querySelector('#mirror-pick-axis')?.addEventListener('click', () => {
      this.mirrorPickMode = 'axis';
      this.refreshToolOptions();
    });
    body.querySelector('#mirror-create')?.addEventListener('click', () => this.mirrorSelection());
    body.querySelector('#mirror-cancel')?.addEventListener('click', () => {
      this.cancelOperation();
    });
  }

  _refreshOffsetOptions(section, body) {
    section.hidden = false;
    document.getElementById('tool-options-title').textContent = 'Offset';
    const entities = this._offsetEntities();
    const topologyIssue = this._offsetTopologyIssue(entities);
    const preview = this._offsetPreviewData();
    document.getElementById('status-hint').textContent =
      this.offsetPhase === 'typing'
        ? 'Offset: type a value, Enter to create, Esc to cancel.'
        : entities.length
        ? 'Offset: move the mouse to place. Click in space to type a value, or use Create below.'
        : 'Offset: click one or more lines, circles, or arcs to select them.';
    const entityHtml = entities.length
      ? `<div class="stack-list">${entities.map(entity => `<div class="sel-item"><span class="glyph">${entity instanceof Line ? 'L' : entity instanceof Circle ? 'C' : 'A'}</span><span>${this._entityLabel(entity)}${entity.id === this.offsetAnchorId ? ' anchor' : ''}</span></div>`).join('')}</div>`
      : '<div class="tool-note">Click lines, circles, arcs, or box-select a path to offset.</div>';
    body.innerHTML = `
      <div class="tool-summary">
        <div class="tool-metric"><strong>${entities.length}</strong><span>Entities</span></div>
        <div class="tool-metric"><strong>${this.offsetSide > 0 ? 'A' : 'B'}</strong><span>Side</span></div>
      </div>
      <div class="sb-subhead">Offset Entities</div>
      ${entityHtml}
      <div class="prop-row">
        <label for="offset-distance">distance</label>
        <input id="offset-distance" type="number" min="0" step="0.1" value="${Number(this.offsetDistance) || 0}">
      </div>
      <div class="prop-row">
        <label>side</label>
        <button class="rel-btn" id="offset-flip" ${entities.length ? '' : 'disabled'}>${uiIcon('flip')}Flip side</button>
      </div>
      ${topologyIssue ? `<div class="tool-note warn">${topologyIssue}</div>` : ''}
      ${entities.length && !topologyIssue && !preview ? '<div class="tool-note warn">Offset distance is invalid for one or more selected entities.</div>' : ''}
      <div class="rel-grid op-actions">
        <button class="rel-btn primary" id="offset-create" ${(!entities.length || topologyIssue || !preview) ? 'disabled' : ''}>${uiIcon('plus')}Create</button>
        <button class="rel-btn danger" id="offset-cancel">${uiIcon('x')}Cancel</button>
      </div>
    `;
    const input = body.querySelector('#offset-distance');
    input?.addEventListener('input', () => {
      const n = Math.abs(parseFloat(input.value));
      this.offsetDistance = Number.isFinite(n) ? n : 0;
      this.refreshToolOptions();
      this.requestRender();
    });
    body.querySelector('#offset-flip')?.addEventListener('click', () => {
      this.offsetSide *= -1;
      this.refreshToolOptions();
      this.requestRender();
    });
    body.querySelector('#offset-create')?.addEventListener('click', () => this.offsetSelection());
    body.querySelector('#offset-cancel')?.addEventListener('click', () => {
      this.cancelOperation();
    });
  }

  mirrorSelection() {
    const sketch = this.activeSketch(); if (!sketch) return;
    const data = this._mirrorOperationData();
    const axis = data?.axis;
    const sources = data?.sources || [];
    if (!axis) {
      alert('Select a mirror axis.');
      return;
    }
    if (!sources.length) {
      alert('Select at least one point, line, or circle in addition to the mirror axis.');
      return;
    }

    const pointMap = new Map();
    const linkedPoints = new Set();
    const newEntities = [];
    const axisRef = { a: axis.p1.id, b: axis.p2.id };
    const mirroredPoint = (p) => {
      if (pointMap.has(p)) return pointMap.get(p);
      const mp = mirrorPointAcrossLine(p, axis);
      const q = new Point(mp.x, mp.y);
      pointMap.set(p, q);
      return q;
    };
    const linkPoint = (p) => {
      const q = mirroredPoint(p);
      if (!linkedPoints.has(p.id)) {
        sketch.constraints.push(new SymmetricConstraint(p.id, q.id, axisRef, 'p1'));
        linkedPoints.add(p.id);
      }
      return q;
    };

    for (const src of sources) {
      if (src instanceof Point) {
        const p = linkPoint(src);
        sketch.addEntity(p);
        newEntities.push(p);
      } else if (src instanceof Line) {
        const a = linkPoint(src.p1);
        const b = linkPoint(src.p2);
        const line = new Line(a, b);
        line.construction = src.construction;
        sketch.addEntity(line);
        newEntities.push(line);
      } else if (src instanceof Circle) {
        const center = linkPoint(src.center);
        const circle = new Circle(center, src.r);
        circle.construction = src.construction;
        sketch.addEntity(circle);
        sketch.constraints.push(new EqualRadiusConstraint(src.id, circle.id));
        newEntities.push(circle);
      }
    }

    if (!newEntities.length) return;
    this.clearSelection();
    for (const e of newEntities) this.setSelected(e, true);
    this.operationName = null;
    this.mirrorPickMode = 'entities';
    this.mirrorEntityIds = [];
    this.mirrorAxisId = null;
    document.getElementById('status-hint').textContent = (this.tool.hint && this.tool.hint()) || '';
    this.commit();
    this.refreshUI();
  }

  getMirrorPreview() {
    if (this.operationName !== 'mirror') return null;
    const data = this._mirrorOperationData();
    const axis = data?.axis;
    const sources = data?.sources || [];
    if (!axis || !sources.length) return null;
    const pointMap = new Map();
    const mirroredPoint = (p) => {
      if (pointMap.has(p)) return pointMap.get(p);
      const q = mirrorPointAcrossLine(p, axis);
      pointMap.set(p, q);
      return q;
    };
    const paths = [];
    const points = [];
    const circles = [];
    for (const src of sources) {
      if (src instanceof Point) {
        points.push(mirroredPoint(src));
      } else if (src instanceof Line) {
        paths.push([mirroredPoint(src.p1), mirroredPoint(src.p2)]);
      } else if (src instanceof Circle) {
        circles.push({ center: mirroredPoint(src.center), r: src.r });
      }
    }
    return { paths, points, circles, dashed: true };
  }

  _mapOffsetEntityIds(source, target, idMap) {
    if (!source || !target) return;
    idMap.set(source.id, target.id);
    const sourceChildren = source.children ? source.children() : [];
    const targetChildren = target.children ? target.children() : [];
    for (let i = 0; i < sourceChildren.length && i < targetChildren.length; i++) {
      idMap.set(sourceChildren[i].id, targetChildren[i].id);
    }
  }

  _cloneOffsetGroupConstraint(c, idMap) {
    if (!c || !c.refs().every(id => idMap.has(id))) return null;

    const mid = (id) => idMap.get(id);
    const lineRef = (l) => l ? { a: mid(l.a), b: mid(l.b) } : null;
    const arcRef = (r) => r ? { arcId: mid(r.arcId), centerId: mid(r.centerId), which: r.which } : null;
    const pointRef = (r) => r?.pointId ? { pointId: mid(r.pointId) } : arcRef(r);
    const copyMeta = (clone) => {
      if (!clone) return null;
      for (const key of ['labelOffset', 'labelParallel', 'labelAngle', 'labelDist', 'labelMidAngle']) {
        if (c[key] != null) clone[key] = c[key];
      }
      if (c.sourceSide) clone.sourceSide = c.sourceSide;
      if (c.driven) clone.driven = true;
      if (c.isDiameter) clone.isDiameter = true;
      return clone;
    };

    let clone = null;
    switch (c.kind) {
      case 'coincident':
        clone = new CoincidentConstraint(mid(c.p1), mid(c.p2));
        break;
      case 'horizontal':
        clone = new HorizontalConstraint(mid(c.lineId), mid(c.p1), mid(c.p2));
        break;
      case 'vertical':
        clone = new VerticalConstraint(mid(c.lineId), mid(c.p1), mid(c.p2));
        break;
      case 'pointRefHorizontal':
        clone = new PointRefHorizontalConstraint(pointRef(c.ref1), pointRef(c.ref2));
        break;
      case 'pointRefVertical':
        clone = new PointRefVerticalConstraint(pointRef(c.ref1), pointRef(c.ref2));
        break;
      case 'symmetric':
        clone = new SymmetricConstraint(mid(c.p1), mid(c.p2), lineRef(c.axis));
        break;
      case 'parallel':
        clone = new ParallelConstraint(lineRef(c.l1), lineRef(c.l2));
        break;
      case 'perpendicular':
        clone = new PerpendicularConstraint(lineRef(c.l1), lineRef(c.l2));
        break;
      case 'collinear':
        clone = new CollinearConstraint(lineRef(c.l1), lineRef(c.l2));
        break;
      case 'equalLength':
        clone = new EqualLengthConstraint(lineRef(c.l1), lineRef(c.l2));
        break;
      case 'equalRadius':
        clone = new EqualRadiusConstraint(mid(c.c1), mid(c.c2));
        break;
      case 'concentric':
        clone = new ConcentricConstraint(mid(c.p1), mid(c.p2));
        break;
      case 'tangent':
        clone = c.c1 != null
          ? new TangentCircleCircleConstraint(mid(c.c1), mid(c.p1), mid(c.c2), mid(c.p2), !!c.internal)
          : new TangentLineCircleConstraint(lineRef(c.l), mid(c.circleId), mid(c.centerId));
        break;
      case 'midpoint':
        clone = new MidpointConstraint(mid(c.pointId), lineRef(c.l));
        break;
      case 'angle':
        clone = new AngleConstraint(lineRef(c.l1), lineRef(c.l2), c.value);
        break;
      case 'directedAngle':
        clone = new DirectedAngleConstraint(lineRef(c.l1), lineRef(c.l2), c.value);
        break;
      case 'pointOnLine':
        clone = new PointOnLineConstraint(mid(c.pointId), lineRef(c.l));
        break;
      case 'pointOnCircle':
        clone = new PointOnCircleConstraint(mid(c.pointId), mid(c.circleId), mid(c.centerId));
        break;
      case 'arcEndpointCoincident':
        clone = new ArcEndpointCoincidentConstraint(arcRef(c.ref), mid(c.pointId));
        break;
      case 'arcEndpointArcEndpointCoincident':
        clone = new ArcEndpointArcEndpointCoincidentConstraint(arcRef(c.ref1), arcRef(c.ref2));
        break;
      case 'arcEndpointMidpoint':
        clone = new ArcEndpointMidpointConstraint(arcRef(c.ref), lineRef(c.l));
        break;
      case 'arcEndpointOnLine':
        clone = new ArcEndpointOnLineConstraint(arcRef(c.ref), lineRef(c.l));
        break;
      case 'arcEndpointOnCircle':
        clone = new ArcEndpointOnCircleConstraint(arcRef(c.ref), mid(c.circleId), mid(c.centerId));
        break;
      case 'offset':
        clone = new OffsetConstraint(
          mid(c.sourceEntityId), mid(c.targetEntityId), c.offsetKind,
          c.offsetKind === 'line'
            ? { l1: lineRef(c.l1), l2: lineRef(c.l2) }
            : { p1: mid(c.p1), p2: mid(c.p2) }
        );
        break;
    }
    return copyMeta(clone);
  }

  _offsetGroupConstraintClones(sketch, idMap) {
    const clones = [];
    for (const c of sketch.constraints) {
      if (!this._isOffsetTransferableConstraint(c, idMap)) continue;
      const clone = this._cloneOffsetGroupConstraint(c, idMap);
      if (!clone) continue;
      if (this._isInvalidConstraint(sketch, clone)) continue;
      if (this._isDuplicateConstraint(sketch, clone)) continue;
      clones.push(clone);
    }
    return clones;
  }

  _isOffsetTransferableConstraint(c, idMap) {
    if (!c || !c.refs().every(id => idMap.has(id))) return false;

    // Offset is a derived feature, not a raw copy. Most source constraints
    // either already flow through source->target offset constraints
    // (horizontal, vertical, equal lengths, central angles) or are build
    // scaffolding (midpoints on construction centerlines). Copying them
    // over-constrains generated geometry. Transfer only constraints whose
    // geometric meaning remains true after offsetting both referenced shapes.
    switch (c.kind) {
      case 'pointOnCircle':
        return true;
      case 'arcEndpointOnCircle':
        return true;
      case 'concentric':
        return true;
      default:
        return false;
    }
  }

  _offsetSourcesWithInternalCirclePointConstraints(sketch, sourceIds) {
    const blocked = new Set();
    for (const c of sketch.constraints) {
      if (c.kind === 'pointOnCircle' && sourceIds.has(c.pointId) && sourceIds.has(c.circleId) && sourceIds.has(c.centerId)) {
        blocked.add(c.circleId);
      } else if (c.kind === 'arcEndpointOnCircle'
          && sourceIds.has(c.ref.arcId) && sourceIds.has(c.ref.centerId)
          && sourceIds.has(c.circleId) && sourceIds.has(c.centerId)) {
        blocked.add(c.circleId);
      }
    }
    return blocked;
  }

  offsetSelection() {
    const sketch = this.activeSketch(); if (!sketch) return;
    const preview = this._offsetPreviewData();
    const entities = this._offsetEntities();
    if (!entities.length) {
      alert('Select one or more lines, circles, or arcs to offset.');
      return;
    }
    const topologyIssue = this._offsetTopologyIssue(entities);
    if (topologyIssue) {
      alert(topologyIssue);
      return;
    }
    if (!preview) {
      alert('Offset distance is invalid for one or more selected entities.');
      return;
    }

    const made = [];
    const madeBySourceId = new Map();
    const sourceToTargetId = new Map();
    const pointMap = new Map();
    const getPoint = (p) => {
      if (!p) return null;
      if (pointMap.has(p)) return pointMap.get(p);
      const q = new Point(p.x, p.y);
      pointMap.set(p, q);
      return q;
    };
    for (const item of preview.items) {
      let entity = null;
      if (item.kind === 'line') {
        entity = new Line(getPoint(item.p1), getPoint(item.p2));
      } else if (item.kind === 'circle') {
        entity = new Circle(new Point(item.center.x, item.center.y), item.r);
      } else if (item.kind === 'arc') {
        entity = new Arc(new Point(item.center.x, item.center.y), item.r, item.a0, item.a1);
        entity.clockwise = !!item.clockwise;
        entity.syncEnds();
      }
      if (!entity) continue;
      entity.construction = item.source.construction;
      sketch.addEntity(entity);
      made.push(entity);
      madeBySourceId.set(item.source.id, { source: item.source, entity, item });
      this._mapOffsetEntityIds(item.source, entity, sourceToTargetId);
    }
    const constrainedCircleSources = this._offsetSourcesWithInternalCirclePointConstraints(
      sketch,
      new Set(sourceToTargetId.keys())
    );
    const clonedConstraints = this._offsetGroupConstraintClones(sketch, sourceToTargetId);
    const distPairs = [];
    for (const { source, entity, item } of madeBySourceId.values()) {
      if (source instanceof Line && entity instanceof Line) {
        sketch.constraints.push(new OffsetConstraint(
          source.id, entity.id, 'line',
          { l1: { a: source.p1.id, b: source.p2.id },
            l2: { a: entity.p1.id, b: entity.p2.id } }
        ));
        distPairs.push({ kind: 'line', pointId: entity.p1.id,
          l: { a: source.p1.id, b: source.p2.id },
          sourceEntityId: source.id,
          targetEntityId: entity.id,
          value: item.offsetValue });
      } else if ((source instanceof Circle || source instanceof Arc) && (entity instanceof Circle || entity instanceof Arc)) {
        sketch.constraints.push(new OffsetConstraint(
          source.id, entity.id, 'circle',
          { p1: source.center.id, p2: entity.center.id }
        ));
        if (!constrainedCircleSources.has(source.id)) {
          distPairs.push({ kind: 'circle', c1: entity.id, c2: source.id, value: item.offsetValue });
        }
        if (source instanceof Arc && entity instanceof Arc) {
          sketch.constraints.push(new ParamFixConstraint(entity.id, 'a0', entity.a0));
          sketch.constraints.push(new ParamFixConstraint(entity.id, 'a1', entity.a1));
        }
      }
    }
    for (const c of clonedConstraints) sketch.constraints.push(c);
    if (distPairs.length > 0) {
      sketch.constraints.push(new OffsetDistanceConstraint(distPairs, Math.abs(preview.items[0].offsetValue)));
    }
    if (!made.length) return;
    sketch.features.push({
      id:newId('f'),
      kind:'offset',
      sourceEntityIds:[...madeBySourceId.values()].map(v => v.source.id),
      generatedEntityIds:made.map(e => e.id),
      distance:Math.abs(preview.items[0].offsetValue),
      policy:'derived',
      transferredConstraintKinds:[...new Set(clonedConstraints.map(c => c.kind))]
    });

    this.clearSelection();
    for (const entity of made) this.setSelected(entity, true);
    this._clearOperationState();
    document.getElementById('status-hint').textContent = (this.tool.hint && this.tool.hint()) || '';
    this.commit();
    this.refreshUI();
  }

  getOffsetPreview() {
    if (this.operationName !== 'offset') return null;
    const preview = this._offsetPreviewData();
    if (!preview) return null;
    const paths = [], circles = [], arcs = [];
    for (const item of preview.items) {
      if (item.kind === 'line') paths.push([item.p1, item.p2]);
      else if (item.kind === 'circle') circles.push({ center: item.center, r: item.r });
      else if (item.kind === 'arc') arcs.push({ center: item.center, r: item.r, a0: item.a0, a1: item.a1, clockwise: item.clockwise });
    }
    return { paths, circles, arcs, dashed: true };
  }

  /* ---- Constraint application ---- */
  applyConstraint(kind) {
    const sketch = this.activeSketch(); if (!sketch) return;
    const sel = this.selectedEntitiesAndPoints();
    const { points, lines, circles, arcs } = classifySelection(sel);

    const beforeJSON = JSON.stringify(this.project.toJSON());
    const beforeState = this._captureSketchParams(sketch);
    const beforeGraph = this._buildConstraintGraph(sketch, { skipKinds: this._dragJointConstraintKinds() });
    const tryAdd = (cons) => {
      const list = Array.isArray(cons) ? cons : [cons];
      for (const c of list) {
        if (!this._isInvalidConstraint(sketch, c)) sketch.constraints.push(c);
      }
    };

    let added = false;
    switch (kind) {
      case 'fix':
        for (const p of points) {
          tryAdd(this._fixConstraintForPoint(p));
          if (!this.arcEndpointRef(p)) p.fixed = true;
          added = true;
        }
        for (const e of lines)  for (const p of [e.p1,e.p2]) { tryAdd(new FixConstraint(p.id, p.x, p.y)); p.fixed = true; added = true; }
        for (const c of circles){ tryAdd(new FixConstraint(c.center.id, c.center.x, c.center.y)); c.center.fixed = true; added = true; }
        for (const a of arcs)   { tryAdd(new FixConstraint(a.center.id, a.center.x, a.center.y)); a.center.fixed = true; added = true; }
        break;
      case 'coincident':
        for (let i = 1; i < points.length; i++) { tryAdd(this._coincidentConstraintForPoints(points[0], points[i])); added = true; }
        break;
      case 'horizontal':
      case 'vertical': {
        const C = kind === 'horizontal' ? HorizontalConstraint : VerticalConstraint;
        for (const l of lines) { tryAdd(new C(l.id, l.p1.id, l.p2.id)); added = true; }
        if (points.length === 2) {
          tryAdd(this._axisConstraintForPoints(kind, points[0], points[1])); added = true;
        }
        break;
      }
      case 'parallel':
      case 'perpendicular':
      case 'collinear':
      case 'equalLength': {
        const C = { parallel:ParallelConstraint, perpendicular:PerpendicularConstraint,
                    collinear:CollinearConstraint, equalLength:EqualLengthConstraint }[kind];
        // For transitive relations (parallel, collinear, equalLength) avoid
        // adding pairs that are already linked through the existing
        // constraint graph. The relation is added with the FIRST selected
        // entity as the anchor — i.e. all subsequent picks are tied to
        // lines[0]. Perpendicular is NOT transitive, so we always add.
        const transitive = (kind !== 'perpendicular');
        const lineByPair = new Map();
        for (const e of sketch.entities) if (e instanceof Line) {
          lineByPair.set(e.p1.id+'|'+e.p2.id, e);
          lineByPair.set(e.p2.id+'|'+e.p1.id, e);
        }
        const parent = new Map();
        const find = (x) => { while (parent.get(x) !== x) { parent.set(x, parent.get(parent.get(x))); x = parent.get(x); } return x; };
        const union = (a, b) => { const ra=find(a), rb=find(b); if (ra !== rb) parent.set(ra, rb); };
        if (transitive) {
          for (const e of sketch.entities) if (e instanceof Line) parent.set(e.id, e.id);
          for (const c of sketch.constraints) {
            if (c.kind !== kind) continue;
            const lA = lineByPair.get(c.l1.a+'|'+c.l1.b);
            const lB = lineByPair.get(c.l2.a+'|'+c.l2.b);
            if (lA && lB) union(lA.id, lB.id);
          }
        }
        for (let i = 1; i < lines.length; i++) {
          if (transitive && find(lines[0].id) === find(lines[i].id)) continue; // already linked
          tryAdd(new C(
            { a: lines[0].p1.id, b: lines[0].p2.id },
            { a: lines[i].p1.id, b: lines[i].p2.id }
          ));
          if (transitive) union(lines[0].id, lines[i].id);
          added = true;
        }
        break;
      }
      case 'equalRadius':
      case 'equal': {
        const all = [...circles, ...arcs];
        if (all.length >= 2) {
          // skip duplicates via union-find of existing equalRadius graph
          const parent = new Map();
          for (const e of [...circles, ...arcs]) parent.set(e.id, e.id);
          for (const e of sketch.entities) if (e instanceof Circle || e instanceof Arc) parent.set(e.id, e.id);
          const find = (x) => { while (parent.get(x) !== x) { parent.set(x, parent.get(parent.get(x))); x = parent.get(x); } return x; };
          const union = (a,b) => { const ra=find(a), rb=find(b); if (ra!==rb) parent.set(ra, rb); };
          for (const c of sketch.constraints) if (c.kind === 'equalRadius') union(c.c1, c.c2);
          for (let i = 1; i < all.length; i++) {
            if (find(all[0].id) === find(all[i].id)) continue;
            tryAdd(new EqualRadiusConstraint(all[0].id, all[i].id));
            union(all[0].id, all[i].id);
            added = true;
          }
        } else if (lines.length >= 2) {
          // fall through to equalLength behaviour
          this.applyConstraint('equalLength');
          return;
        }
        break;
      }
      case 'concentric': {
        const all = [...circles, ...arcs];
        if (all.length >= 2) {
          const parent = new Map();
          for (const e of all) parent.set(e.center.id, e.center.id);
          const find = (x) => { while (parent.get(x) !== x) { parent.set(x, parent.get(parent.get(x))); x = parent.get(x); } return x; };
          const union = (a,b) => { const ra=find(a), rb=find(b); if (ra!==rb) parent.set(ra, rb); };
          for (const c of sketch.constraints) if (c.kind === 'concentric') union(c.p1, c.p2);
          for (let i = 1; i < all.length; i++) {
            if (find(all[0].center.id) === find(all[i].center.id)) continue;
            tryAdd(new ConcentricConstraint(all[0].center.id, all[i].center.id));
            union(all[0].center.id, all[i].center.id);
            added = true;
          }
        }
        break;
      }
      case 'tangent': {
        if (lines.length === 1 && (circles.length + arcs.length) === 1) {
          const l = lines[0], c = circles[0] || arcs[0];
          tryAdd(new TangentLineCircleConstraint({a:l.p1.id, b:l.p2.id}, c.id, c.center.id));
          added = true;
        } else if ((circles.length + arcs.length) === 2 && lines.length === 0) {
          const a = circles[0] || arcs[0];
          const b = circles[1] || arcs[circles.length === 0 ? 1 : 0] || arcs[0];
          tryAdd(new TangentCircleCircleConstraint(a.id, a.center.id, b.id, b.center.id, false));
          added = true;
        }
        break;
      }
      case 'midpoint': {
        if (lines.length === 1 && points.length === 1) {
          tryAdd(this._midpointConstraintForPoint(points[0], lines[0]));
          added = true;
        }
        break;
      }
      case 'pointOnLine': {
        if (lines.length === 1 && points.length >= 1) {
          for (const p of points) tryAdd(this._pointOnLineConstraintForPoint(p, lines[0]));
          added = true;
        }
        break;
      }
      case 'pointOnCircle': {
        if ((circles.length + arcs.length) === 1 && points.length >= 1) {
          const c = circles[0] || arcs[0];
          for (const p of points) tryAdd(this._pointOnCircleConstraintForPoint(p, c));
          added = true;
        }
        break;
      }
    }

    if (added) {
      if (kind !== 'fix' && sel.length >= 2) {
        this._solveWithFirstSelectionMoving(sketch, sel, beforeState, beforeGraph);
      }
      const affectedIds = new Set();
      for (const item of sel) {
        if (!item?.id) continue;
        affectedIds.add(item.id);
        if (item.children) for (const child of item.children()) affectedIds.add(child.id);
      }
      this.commit({ activeIds: affectedIds });
      // If the new constraint(s) made things impossible to solve, warn.
      const solver = this.solver.solve(sketch, this.project.sketches, [], {
        diagnostics:true,
        activeIds:affectedIds
      });
      if (solver.state === 'over' && solver.residual > 1e-2) {
        const msg = `This relation makes the sketch over-defined (residual ${solver.residual.toExponential(2)}). Keep it anyway?`;
        if (!confirm(msg)) {
          // revert
          this.project = Project.fromJSON(JSON.parse(beforeJSON));
          this.selectionOrder = [];
          this.solveAndRender();
          this.refreshUI();
        }
      }
    }
  }

  applyDimension(kind) {
    // Route sidebar dimension buttons through the SmartDim tool: copy the
    // current selection in as picks, infer the preview, override the kind
    // when the button is more specific than the default inference (e.g.
    // "Radius" on a Circle that would default to Diameter), then enter
    // the placing phase so the user clicks once to place + types value.
    const sketch = this.activeSketch();
    const sel = this.selectedEntitiesAndPoints();
    if (!sketch || !sel.length) return;
    this.setTool('smartdim');
    this.tool.picks = sel.slice();
    if (!this.tool._inferPreview()) return;
    const p = this.tool.preview;
    if (kind === 'radius' && p.kind === 'diameter') {
      p.kind = 'radius';
      p.value = p.circle.r;
    } else if (kind === 'diameter' && p.kind === 'radius' && p.circle instanceof Circle) {
      p.kind = 'diameter';
      p.value = p.circle.r * 2;
    }
    this.tool.phase = 'placing';
    this.tool._updateCursorPlacement(this.lastWorldCursor);
    this.requestRender();
  }

  /* ---- Render loop ---- */
  requestRender() { this.dirty = true; }
  _loop() {
    const tick = () => { if (this.dirty) { this._render(); this.dirty = false; } requestAnimationFrame(tick); };
    requestAnimationFrame(tick);
  }
  _render() {
    this.renderer.drawGrid(this.gridOn);
    this.renderer.drawEntities(this.project.sketches, this.project.activeSketchId);

    // Build a project-wide id → entity lookup for dimension drawing.
    const entMap = new Map();
    const walk = (e) => { entMap.set(e.id, e); for (const c of e.children()) walk(c); };
    for (const s of this.project.visibleSketches()) for (const e of s.entities) walk(e);
    const sketch = this.activeSketch();
    if (sketch) {
      this.renderer.drawDimensions(sketch, entMap, this._lastSolve?.redundantIds);
    }

    const prev = this.tool.getPreview && this.tool.getPreview();
    if (prev) {
      if (prev.paths)      for (const p of prev.paths) this.renderer.drawTempPath(p, prev.dashed);
      if (prev.dashedPaths) for (const p of prev.dashedPaths) this.renderer.drawTempPath(p, true);
      if (prev.circles)    for (const c of prev.circles) this.renderer.drawTempCircle(c.center, c.r);
      if (prev.arcs)       for (const a of prev.arcs) this.renderer.drawTempArc(a.center, a.r, a.a0, a.a1, !!a.clockwise);
      if (prev.points)     for (const p of prev.points) this.renderer.drawTempPoint(p);
      if (prev.box)        this.renderer.drawSelectionBox(prev.box);
      if (prev.dimPicks)   this.renderer.drawDimPicks(prev.dimPicks);
      if (prev.dimPreview) this.renderer.drawDimPreview(prev.dimPreview);
    }
    const opPrev = (this.getMirrorPreview && this.getMirrorPreview())
      || (this.getOffsetPreview && this.getOffsetPreview());
    if (opPrev) {
      if (opPrev.paths)   for (const p of opPrev.paths) this.renderer.drawTempPath(p, true);
      if (opPrev.circles) for (const c of opPrev.circles) this.renderer.drawTempCircle(c.center, c.r);
      if (opPrev.arcs)    for (const a of opPrev.arcs) this.renderer.drawTempArc(a.center, a.r, a.a0, a.a1, !!a.clockwise);
      if (opPrev.points)  for (const p of opPrev.points) this.renderer.drawTempPoint(p);
    }

    if (this.snapOn) {
      // During a drag, lastDragSnaps holds every active snap (primary +
      // any secondary handles that incidentally landed on snap targets).
      // Otherwise, we just have the single cursor snap to draw.
      if (this.lastDragSnaps && this.lastDragSnaps.length) {
        for (const s of this.lastDragSnaps) this.renderer.drawSnapMarker(s);
      } else {
        this.renderer.drawSnapMarker(this.lastSnap);
      }
    }
  }

  /* ---- Tool selection ---- */
  setTool(name) {
    this.hideContextMenu();
    this._clearOperationState();
    if (this.tool && this.tool.deactivate) this.tool.deactivate();
    this.toolName = name;
    switch (name) {
      case 'select':    this.tool = new SelectTool(this); break;
      case 'line':      this.tool = new LineTool(this); break;
      case 'centerLine': this.tool = new CenterLineTool(this); break;
      case 'rectangle': this.tool = new RectangleTool(this); break;
      case 'centerRectangle': this.tool = new CenterRectangleTool(this); break;
      case 'circle':    this.tool = new CircleTool(this); break;
      case 'threePointCircle': this.tool = new ThreePointCircleTool(this); break;
      case 'hexagon':   this.tool = new HexagonTool(this); break;
      case 'arc':       this.tool = new ArcTool(this); break;
      case 'point':     this.tool = new PointTool(this); break;
      case 'smartdim':  this.tool = new SmartDimensionTool(this); break;
    }
    if (this.tool.activate) this.tool.activate();
    document.querySelectorAll('#topbar .tool').forEach(b => b.classList.toggle('active', b.dataset.tool === name));
    document.getElementById('status-tool').textContent = 'Tool: ' + (
      name === 'centerRectangle' ? 'Center Rectangle' :
      name === 'centerLine' ? 'Centerpoint Line' :
      name === 'threePointCircle' ? '3-Point Circle' :
      name[0].toUpperCase() + name.slice(1)
    );
    document.getElementById('status-hint').textContent = (this.tool.hint && this.tool.hint()) || '';
    this.canvas.style.cursor = name === 'select' ? 'default' : 'crosshair';
    this.refreshToolOptions();
    this.requestRender();
  }

  /* ---- Canvas events ---- */
  _setupCanvasEvents() {
    const c = this.canvas;
    let panning = false; let panStart = null;

    const getWorld = (ev) => {
      const r = c.getBoundingClientRect();
      const sx = ev.clientX - r.left, sy = ev.clientY - r.top;
      return { screen: {x:sx, y:sy}, world: this.view.screenToWorld({x:sx, y:sy}) };
    };

    c.addEventListener('contextmenu', e => e.preventDefault());

    c.addEventListener('dblclick', (ev) => {
      if (this.toolName === 'line' && this.tool && this.tool.startPt) {
        ev.preventDefault();
        this.tool.terminateChain(true);
      }
    });

    c.addEventListener('pointerdown', (ev) => {
      const { screen, world } = getWorld(ev);
      if (ev.button === 2) {
        ev.preventDefault();
        this.showContextMenu(screen, world, ev);
        return;
      }
      this.hideContextMenu();
      c.setPointerCapture(ev.pointerId);
      if (ev.button === 1 || (ev.button === 0 && ev.altKey)) {
        panning = true;
        panStart = { x: ev.clientX, y: ev.clientY, panX: this.view.panX, panY: this.view.panY };
        c.style.cursor = 'grabbing';
        return;
      }
      const snap = this._snapForCurrentTool(world);
      this.lastSnap = snap;
      this.tool.onPointerDown(world, snap, ev);
    });

    c.addEventListener('pointermove', (ev) => {
      const { screen, world } = getWorld(ev);
      this.lastWorldCursor = world;
      document.getElementById('status-coords').textContent = `x: ${world.x.toFixed(3)}  y: ${world.y.toFixed(3)}`;
      if (panning) {
        this.view.panX = panStart.panX + (ev.clientX - panStart.x);
        this.view.panY = panStart.panY + (ev.clientY - panStart.y);
        this.requestRender();
        return;
      }
      if (this.contextMenuEl) {
        this.lastSnap = null;
        document.getElementById('cursor-hint').style.display = 'none';
        return;
      }
      const snap = this._snapForCurrentTool(world);
      this.lastSnap = snap;
      this.tool.onPointerMove(world, snap, ev);
      const hint = document.getElementById('cursor-hint');
      if (snap && !snap.rejected) {
        hint.textContent = snap.kind;
        hint.style.left = screen.x + 'px';
        hint.style.top  = screen.y + 'px';
        hint.style.display = 'block';
      } else hint.style.display = 'none';
      this.requestRender();
    });

    c.addEventListener('pointerup', (ev) => {
      if (ev.button === 2) return;
      const { world } = getWorld(ev);
      if (panning) { panning = false; c.style.cursor = this.toolName === 'select' ? 'default' : 'crosshair'; return; }
      const snap = this._snapForCurrentTool(world);
      this.tool.onPointerUp(world, snap, ev);
    });

    c.addEventListener('wheel', (ev) => {
      ev.preventDefault();
      this.hideContextMenu();
      const r = c.getBoundingClientRect();
      const sp = { x: ev.clientX - r.left, y: ev.clientY - r.top };
      const factor = Math.exp(-ev.deltaY * 0.0015);
      this.view.zoomAt(sp, factor);
      document.getElementById('status-zoom').textContent = 'Zoom: ' + Math.round(this.view.zoom*25) + '%';
      this.requestRender();
    }, { passive: false });
  }

  _setupKeyboard() {
    window.addEventListener('keydown', (ev) => {
      if (ev.target.matches('input,textarea,[contenteditable="true"]')) return;
      if (ev.key === 'Escape' && this.contextMenuEl) {
        ev.preventDefault();
        this.hideContextMenu();
        return;
      }
      if (ev.key === 'Escape' && this.operationName && this.cancelOperation()) {
        ev.preventDefault();
        return;
      }
      const k = ev.key.toLowerCase();
      if ((ev.ctrlKey || ev.metaKey) && k === 'z') { ev.preventDefault(); this.undo(); return; }
      if ((ev.ctrlKey || ev.metaKey) && (k === 'y' || (ev.shiftKey && k === 'z'))) { ev.preventDefault(); this.redo(); return; }
      if (k === 's') this.setTool('select');
      else if (k === 'l') this.setTool(ev.shiftKey ? 'centerLine' : 'line');
      else if (k === 'r') this.setTool(ev.shiftKey ? 'centerRectangle' : 'rectangle');
      else if (k === 'c') this.setTool(ev.shiftKey ? 'threePointCircle' : 'circle');
      else if (k === 'h') this.setTool('hexagon');
      else if (k === 'a') this.setTool('arc');
      else if (k === 'p') this.setTool('point');
      else if (k === 'd') this.setTool('smartdim');
      else if (k === 'f') this.zoomFit();
      else if (k === 'f5') { ev.preventDefault(); this.solveAndRender(); }
      this.tool.onKey && this.tool.onKey(ev);
    });
  }

  /* ---- Top bar ---- */
  _setupTopbar() {
    document.querySelectorAll('#topbar .tool').forEach(b =>
      b.addEventListener('click', () => this.setTool(b.dataset.tool)));

    document.querySelectorAll('#topbar [data-action]').forEach(b => {
      b.addEventListener('click', () => {
        const a = b.dataset.action;
        switch (a) {
          case 'new':          this.newProject(); break;
          case 'save':         this.saveLocal(); break;
          case 'export':       this.exportJSON(); break;
          case 'import':       this.importJSON(); break;
          case 'undo':         this.undo(); break;
          case 'redo':         this.redo(); break;
          case 'solve':        this.solveAndRender(); break;
          case 'mirror':       this.startMirrorOperation(); break;
          case 'offset':       this.startOffsetOperation(); break;
          case 'construction': this.constructionMode = !this.constructionMode; b.classList.toggle('on', this.constructionMode); break;
          case 'grid':         this.gridOn = !this.gridOn; b.classList.toggle('on', this.gridOn); this.requestRender(); break;
          case 'snap':         this.snapOn = !this.snapOn; b.classList.toggle('on', this.snapOn); this.requestRender(); break;
          case 'zoom-fit':     this.zoomFit(); break;
          case 'zoom-reset':   this.view.zoom = 4; this.view.panX = 0; this.view.panY = 0; this.requestRender(); break;
        }
      });
    });
  }

  zoomFit() {
    const sketch = this.activeSketch(); if (!sketch || sketch.entities.length === 0) return;
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    const acc = (p) => { if (p.x<minX) minX=p.x; if (p.y<minY) minY=p.y; if (p.x>maxX) maxX=p.x; if (p.y>maxY) maxY=p.y; };
    for (const e of sketch.entities) {
      if (e instanceof Line) { acc(e.p1); acc(e.p2); }
      else if (e instanceof Circle) { acc({x:e.center.x-e.r, y:e.center.y-e.r}); acc({x:e.center.x+e.r, y:e.center.y+e.r}); }
      else if (e instanceof Arc)    { acc({x:e.center.x-e.r, y:e.center.y-e.r}); acc({x:e.center.x+e.r, y:e.center.y+e.r}); }
      else if (e instanceof Point)  { acc(e); }
    }
    if (minX === Infinity) return;
    this.view.fitTo({minX, minY, maxX, maxY}, 80);
    this.requestRender();
  }

  /* ---- Sidebar ---- */
  _setupSidebar() {
    document.getElementById('add-layer').addEventListener('click', () => {
      this.project.addSketch();
      this.commit();
      this.refreshUI();
    });
    document.getElementById('project-name').addEventListener('input', (e) => {
      this.project.name = e.target.value;
    });
  }

  refreshUI() {
    this._refreshLayers();
    this.refreshToolOptions();
    this._refreshSelectionPanel();
    document.getElementById('project-name').value = this.project.name;
  }

  refreshToolOptions() {
    const section = document.getElementById('tool-options-section');
    const body = document.getElementById('tool-options-body');
    if (!section || !body) return;
    if (this.operationName === 'mirror') {
      this._refreshMirrorOptions(section, body);
      return;
    }
    if (this.operationName === 'offset') {
      this._refreshOffsetOptions(section, body);
      return;
    }
    if (this.toolName !== 'hexagon') {
      section.hidden = true;
      body.innerHTML = '';
      document.getElementById('tool-options-title').textContent = 'Tool Options';
      return;
    }
    section.hidden = false;
    document.getElementById('tool-options-title').textContent = 'Polygon';
    body.innerHTML = `
      <div class="tool-summary">
        <div class="tool-metric"><strong id="polygon-sides-summary">${this.polygonSides}</strong><span>Sides</span></div>
        <div class="tool-metric"><strong>2</strong><span>Clicks</span></div>
      </div>
      <div class="prop-row">
        <label for="polygon-sides">sides</label>
        <input id="polygon-sides" type="number" min="3" max="64" step="1" value="${this.polygonSides}">
      </div>
    `;
    const input = body.querySelector('#polygon-sides');
    input.addEventListener('input', () => {
      const n = Math.round(parseFloat(input.value));
      if (!Number.isFinite(n)) return;
      this.polygonSides = clamp(n, 3, 64);
      input.value = this.polygonSides;
      body.querySelector('#polygon-sides-summary').textContent = this.polygonSides;
      this.requestRender();
      document.getElementById('status-hint').textContent = (this.tool.hint && this.tool.hint()) || '';
    });
  }

  _refreshLayers() {
    const ul = document.getElementById('layers-list');
    ul.innerHTML = '';
    for (const s of this.project.sketches) {
      const row = document.createElement('div');
      row.className = 'layer-row' + (s.id === this.project.activeSketchId ? ' active' : '');
      row.innerHTML = `
        <button class="icon-btn" title="Toggle visibility" aria-label="Toggle visibility">${uiIcon(s.visible ? 'eye' : 'eyeOff')}</button>
        <span class="name" title="${s.name}">${s.name}<span class="badge">${s.entities.length}</span></span>
        <button class="icon-btn" title="Delete" aria-label="Delete sketch">${uiIcon('trash')}</button>
      `;
      const [vis, name, del] = row.querySelectorAll(':scope > *');
      vis.addEventListener('click', (e) => { e.stopPropagation(); s.visible = !s.visible; this.refreshUI(); this.requestRender(); });
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        if (this.project.sketches.length <= 1) return alert('A project must have at least one sketch.');
        if (!confirm(`Delete sketch "${s.name}"?`)) return;
        this.project.removeSketch(s.id);
        this.commit();
        this.refreshUI();
      });
      name.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        const span = e.currentTarget;
        span.setAttribute('contenteditable', 'true');
        span.focus();
        const range = document.createRange(); range.selectNodeContents(span);
        const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
        const finish = () => {
          span.removeAttribute('contenteditable');
          s.name = span.textContent.trim() || s.name;
          span.removeEventListener('blur', finish);
          this.refreshUI();
        };
        span.addEventListener('blur', finish);
        span.addEventListener('keydown', (ev) => { if (ev.key==='Enter'){ ev.preventDefault(); span.blur(); }});
      });
      row.addEventListener('click', () => {
        this.project.activeSketchId = s.id;
        this.clearSelection();
        this.solveAndRender();
        this.refreshUI();
      });
      ul.appendChild(row);
    }
  }

  _refreshSelectionPanel() {
    const sel = this.selectedEntitiesAndPoints();
    const body = document.getElementById('sel-body');
    document.getElementById('sel-count').textContent = sel.length + (sel.length === 1 ? ' item' : ' items');

    if (sel.length === 0) {
      body.innerHTML = '<div class="empty">Click an entity to select. Ctrl-click to add or remove from selection.</div>';
      return;
    }

    const activeId = this.project.activeSketchId;
    const sketch = this.activeSketch();
    const hasConstraintSelection = sel.some(e => e instanceof Constraint);

    // ---- Selection list ----
    let html = '<div class="sb-subhead">Items</div>';
    for (const e of sel) {
      const owner = this.project.sketchOf(e);
      const cross = owner && owner.id !== activeId;
      const glyph = e instanceof Point ? 'P' : e instanceof Line ? 'L' : e instanceof Circle ? 'C' : e instanceof Arc ? 'A' : '?';
      const kind  = e instanceof Constraint ? (CONSTRAINT_LABELS[e.kind] || e.kind) : e.constructor.kind;
      html += `<div class="sel-item${cross ? ' cross-layer' : ''}">
                 <span class="glyph">${glyph}</span>
                 <span>${kind} ${e.id}</span>
                 <span class="layer-tag">${owner ? owner.name : '—'}</span>
               </div>`;
    }

    // ---- Add Relations ----
    const rels = hasConstraintSelection ? [] : availableRelations(sel);
    html += '<div class="sb-subhead">Add Relation</div>';
    if (rels.length === 0) {
      html += '<div class="empty">No relations apply to this selection.</div>';
    } else {
      html += '<div class="rel-grid">';
      for (const r of rels) {
        html += `<button class="rel-btn" data-rel="${r.kind}"><span class="glyph">${r.glyph}</span>${r.label}</button>`;
      }
      html += '</div>';
    }

    // ---- Add Dimension ----
    const dims = hasConstraintSelection ? [] : availableDimensions(sel);
    html += '<div class="sb-subhead">Add Dimension</div>';
    if (dims.length === 0) {
      html += '<div class="empty">No dimension applies. Use Smart Dim (D) or pick a different combo.</div>';
    } else {
      html += '<div class="rel-grid">';
      for (const d of dims) {
        html += `<button class="rel-btn" data-dim="${d.kind}"><span class="glyph">${d.glyph}</span>${d.label}</button>`;
      }
      html += '</div>';
    }

    // ---- Existing Relations on selection ----
    const related = (sketch?.constraints || []).filter(c => constraintAppliesToSelection(c, sel));
    html += '<div class="sb-subhead">Existing Relations</div>';
    if (related.length === 0) {
      html += '<div class="empty">None on selection.</div>';
    } else {
      html += '<div>';
      for (const c of related) {
        const label = CONSTRAINT_LABELS[c.kind] || c.kind;
        const valStr = (c.value !== null && c.value !== undefined) ? ` = ${Number(c.value).toFixed(3)}` : '';
        html += `<span class="constraint-pill" data-cid="${c.id}">${label}${valStr}<span class="x" data-cid="${c.id}">×</span></span>`;
      }
      html += '</div>';
    }

    // ---- Properties ----
    const e = sel[0];
    const constructionTargets = sel.filter(x => x instanceof Line || x instanceof Circle || x instanceof Arc);
    html += '<div class="sb-subhead">Properties</div>';
    if (sel.length > 1) {
      if (constructionTargets.length) {
        const allConstruction = constructionTargets.every(x => x.construction);
        html += `<div class="prop-row"><label>construction</label><input type="checkbox" data-toggle="construction-all" ${allConstruction?'checked':''}></div>`;
      } else {
        html += '<div class="empty">No shared properties.</div>';
      }
    } else if (e instanceof Point) {
      html += `<div class="prop-row"><label>x</label><input type="number" step="0.001" data-edit="x" value="${e.x.toFixed(4)}"></div>`;
      html += `<div class="prop-row"><label>y</label><input type="number" step="0.001" data-edit="y" value="${e.y.toFixed(4)}"></div>`;
      html += `<div class="prop-row"><label>fixed</label><input type="checkbox" data-toggle="fixed" ${e.fixed?'checked':''}></div>`;
    } else if (e instanceof Circle || e instanceof Arc) {
      html += `<div class="prop-row"><label>radius</label><input type="number" step="0.001" data-edit="r" value="${e.r.toFixed(4)}"></div>`;
      html += `<div class="prop-row"><label>construction</label><input type="checkbox" data-toggle="construction" ${e.construction?'checked':''}></div>`;
    } else if (e instanceof Line) {
      html += `<div class="prop-row"><label>length</label><span>${dist(e.p1,e.p2).toFixed(4)} ${this.project.units}</span></div>`;
      html += `<div class="prop-row"><label>construction</label><input type="checkbox" data-toggle="construction" ${e.construction?'checked':''}></div>`;
    } else if (e instanceof Constraint) {
      const val = e.kind === 'angle'
        ? (normalizeAngleValue(e.value) * 180 / Math.PI).toFixed(3) + '°'
        : (e.value != null ? Number(e.value).toFixed(3) : '');
      if (val) html += `<div class="prop-row"><label>value</label><span>${val}</span></div>`;
      if (['distance','pointLineDistance','radius','curveDistance','angle','offsetDistance'].includes(e.kind)) {
        html += `<div class="prop-row"><label>driven</label><span>${e.driven ? 'yes' : 'no'}</span></div>`;
      }
    }

    body.innerHTML = html;
    const constructionAll = body.querySelector('input[data-toggle="construction-all"]');
    if (constructionAll) {
      constructionAll.indeterminate = constructionTargets.some(x => x.construction) &&
        !constructionTargets.every(x => x.construction);
    }

    // Wire up buttons / inputs
    body.querySelectorAll('[data-rel]').forEach(b =>
      b.addEventListener('click', () => this.applyConstraint(b.dataset.rel)));
    body.querySelectorAll('[data-dim]').forEach(b =>
      b.addEventListener('click', () => this.applyDimension(b.dataset.dim)));
    body.querySelectorAll('input[data-edit]').forEach(inp => {
      inp.addEventListener('change', () => {
        const k = inp.dataset.edit;
        const v = parseFloat(inp.value);
        if (!Number.isFinite(v)) return;
        // Snap near-zero values back to exactly zero.
        e[k] = (Math.abs(v) < 1e-12) ? 0 : v;
        // If this Point is anchored by a Fix constraint, the constraint's
        // own (x,y) is the solver's target. Update it so the typed value
        // sticks instead of being pulled back to the old fix.
        if (e instanceof Point) {
          const fc = sketch.constraints.find(c => c.kind === 'fix' && c.pointId === e.id);
          if (fc) { fc.x = e.x; fc.y = e.y; }
        }
        this.commit();
      });
    });
    body.querySelectorAll('input[data-toggle]').forEach(inp => {
      inp.addEventListener('change', () => {
        const k = inp.dataset.toggle;
        if (k === 'construction-all') {
          for (const target of constructionTargets) target.construction = inp.checked;
          this.commit();
          this.refreshUI();
          return;
        }
        e[k] = inp.checked;
        if (k === 'fixed' && inp.checked && e instanceof Point) {
          sketch.constraints.push(new FixConstraint(e.id, e.x, e.y));
        }
        if (k === 'fixed' && !inp.checked && e instanceof Point) {
          sketch.constraints = sketch.constraints.filter(c => !(c.kind === 'fix' && c.pointId === e.id));
        }
        this.commit();
        this.refreshUI();
      });
    });
    body.querySelectorAll('.constraint-pill .x').forEach(x => {
      x.addEventListener('click', () => {
        const cid = x.dataset.cid;
        sketch.constraints = sketch.constraints.filter(c => c.id !== cid);
        // recompute fixed flags from remaining FixConstraints
        for (const en of sketch.entities) for (const c of en.children()) c.fixed = false;
        for (const c of sketch.constraints) if (c.kind === 'fix') {
          for (const en of sketch.entities) for (const p of en.children()) if (p.id === c.pointId) p.fixed = true;
        }
        this.commit();
        this.refreshUI();
      });
    });
  }

  /* ---- Storage ---- */
  saveLocal() {
    localStorage.setItem('sketchcad:last', JSON.stringify(this.project.toJSON()));
    const pill = document.getElementById('status-solve');
    const old = pill.textContent;
    pill.textContent = 'saved to browser';
    setTimeout(() => pill.textContent = old, 1500);
  }
  loadLocalIfAny() {
    const raw = localStorage.getItem('sketchcad:last');
    if (!raw) return false;
    try { this.project = Project.fromJSON(JSON.parse(raw)); return true; }
    catch (e) { console.warn('load failed', e); return false; }
  }
  newProject() {
    if (!confirm('Discard current project and start a new one?')) return;
    this.project = new Project(); this.project.addSketch('Sketch 1');
    this.undoStack.length = 0; this.redoStack.length = 0;
    this.selectionOrder = [];
    this.refreshUI(); this.solveAndRender();
  }
  exportJSON() { this._modal('Export JSON', JSON.stringify(this.project.toJSON(), null, 2), false); }
  importJSON() {
    this._modal('Import JSON', '', true).then(text => {
      if (!text) return;
      try {
        this.project = Project.fromJSON(JSON.parse(text));
        this.selectionOrder = [];
        this.commit({ diagnostics:'sync' });
        this.refreshUI();
      } catch (e) { alert('Failed to parse: ' + e.message); }
    });
  }

  _setupModal() {
    const m = document.getElementById('json-modal');
    document.getElementById('json-modal-cancel').addEventListener('click', () => {
      m.classList.remove('show');
      this._modalResolve && this._modalResolve(null);
    });
    document.getElementById('json-modal-ok').addEventListener('click', () => {
      m.classList.remove('show');
      this._modalResolve && this._modalResolve(document.getElementById('json-modal-text').value);
    });
  }
  _modal(title, text, editable) {
    const m = document.getElementById('json-modal');
    document.getElementById('json-modal-title').textContent = title;
    const ta = document.getElementById('json-modal-text');
    ta.value = text; ta.readOnly = !editable;
    m.classList.add('show');
    return new Promise((res) => { this._modalResolve = res; });
  }

  /* ---- Undo / redo ---- */
  undo() {
    if (this.undoStack.length < 2) return;
    const cur = this.undoStack.pop();
    this.redoStack.push(cur);
    const prev = this.undoStack[this.undoStack.length - 1];
    this.project = Project.fromJSON(JSON.parse(prev));
    this._afterStateSwap();
  }
  redo() {
    if (!this.redoStack.length) return;
    const next = this.redoStack.pop();
    this.undoStack.push(next);
    this.project = Project.fromJSON(JSON.parse(next));
    this._afterStateSwap();
  }
  /** After replacing this.project with a freshly revived version, the
   *  current tool may be holding references to entities that no longer
   *  exist (e.g. LineTool.startPt, SmartDim.picks). Re-activating the
   *  tool resets that state without changing tool selection. */
  _afterStateSwap() {
    if (this.tool && this.tool.activate) this.tool.activate();
    this.lastSnap = null;
    this.lastDragSnaps = [];
    this.selectionOrder = [];
    this.refreshUI();
    this.solveAndRender();
  }

  _setupResize() {
    const onResize = () => {
      this.renderer.dpr = window.devicePixelRatio || 1;
      this.renderer.resize();
      this.requestRender();
    };
    window.addEventListener('resize', onResize);
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(onResize).observe(this.canvas);
    }
    onResize();
    requestAnimationFrame(onResize);
  }
}

/* =============== BOOTSTRAP ==================================== */
const app = new App();
app.undoStack.push(JSON.stringify(app.project.toJSON()));
window._app = app;
</script>
