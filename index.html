<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>OnSketch</title>
<script defer src="https://cloud.umami.is/script.js" data-website-id="50dad292-9502-4749-a86e-68f2ed8b2e7a"></script>
<style>
  /* ============================================================
     OnSketch — light, professional, utilitarian.
     ============================================================ */
  :root {
    --bg:            #eef1f4;
    --panel:         #f6f7f9;
    --panel-2:       #ffffff;
    --panel-3:       #fbfcfd;
    --border:        #cfd5dd;
    --border-soft:   #e4e8ee;
    --text:          #1b2028;
    --text-soft:     #58616d;
    --text-muted:    #858f9b;
    --accent:        #2563a5;
    --accent-strong: #174f87;
    --accent-soft:   #dce9f7;
    --accent-softer: #edf5fd;
    --selected:      #ff8a1e;
    --hover:         #eef4fa;
    --construction:  #c44b8a;
    --underc:        #1f7ad6;
    --fullyc:        #111418;
    --overc:         #d63a3a;
    --grid-fine:     #e6e9ee;
    --grid-major:    #c8ced6;
    --canvas-a:      #fbfcfd;
    --canvas-b:      #e3e8ef;
    --shadow-soft:   0 1px 2px rgba(18, 25, 38, 0.06);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 13px/1.4 -apple-system, "Segoe UI", "Inter", system-ui, sans-serif;
    color: var(--text);
    background: var(--bg);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  button, input, select, textarea { font: inherit; color: inherit; }

  #app {
    display: grid;
    grid-template-columns: 292px minmax(0, 1fr);
    grid-template-rows: 52px minmax(0, 1fr) 28px;
    grid-template-areas:
      "topbar   topbar"
      "sidebar  workspace"
      "statusbar statusbar";
    height: 100vh;
  }

  /* ---------- Top bar ---------- */
  #topbar {
    grid-area: topbar;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    overflow-y: hidden;
    box-shadow: var(--shadow-soft);
  }
  #topbar .group {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 10px 0 0;
    border-right: 1px solid var(--border-soft);
    height: 38px;
    flex: 0 0 auto;
  }
  #topbar .group:last-child { border-right: 0; }
  #topbar .label {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 2px 0 0;
    min-width: 36px;
  }
  .tbtn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 32px;
    min-width: 32px;
    padding: 0 9px;
    border: 1px solid transparent;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text);
    gap: 6px;
    font-size: 12px;
    white-space: nowrap;
  }
  .tbtn:hover { background: var(--hover); border-color: var(--border-soft); }
  .tbtn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 1px 2px rgba(37, 99, 165, 0.22);
  }
  .tbtn.toggle.on {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: #bdd5ee;
  }
  .tbtn.tool {
    width: 34px;
    padding: 0;
  }
  .tbtn svg, .ui-icon { width: 16px; height: 16px; flex: 0 0 auto; }
  .tbtn .btn-label { line-height: 1; }
  .tbtn:focus-visible,
  .icon-btn:focus-visible,
  .rel-btn:focus-visible,
  .context-menu-item:focus-visible,
  input:focus-visible,
  textarea:focus-visible {
    outline: 2px solid color-mix(in srgb, var(--accent) 55%, white);
    outline-offset: 1px;
  }
  .sep { width: 1px; height: 22px; background: var(--border-soft); margin: 0 4px; }

  /* ---------- Left sidebar ---------- */
  #sidebar {
    grid-area: sidebar;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    box-shadow: 1px 0 0 rgba(255,255,255,0.55) inset;
  }
  .sb-section {
    display: flex;
    flex-direction: column;
    min-height: 0;
    border-bottom: 1px solid var(--border);
  }
  .sb-section:last-child { border-bottom: 0; }
  .sb-layers   { flex: 0 1 auto; min-height: 88px; max-height: 34%; }
  .sb-tool-options {
    flex: 0 0 auto;
    background: var(--panel-3);
    border-left: 3px solid var(--accent);
  }
  .sb-tool-options .sb-body { flex: 0 0 auto; min-height: auto; overflow: visible; }
  .sb-selection{ flex: 1 1 auto; min-height: 200px; }
  .sb-meta     { flex: 0 0 auto; }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 11px;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-soft);
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border-soft);
    background: linear-gradient(#fff, #fafbfc);
    flex: 0 0 auto;
    font-weight: 700;
  }
  .panel-header .actions { display: flex; gap: 2px; }
  .panel-header .badge {
    text-transform: none;
    letter-spacing: 0;
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    padding: 0 6px;
    font-size: 10px;
    color: var(--text-soft);
  }
  .icon-btn {
    width: 24px; height: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid transparent;
    background: transparent;
    border-radius: 5px;
    cursor: pointer;
    color: var(--text-soft);
    font-size: 12px;
  }
  .icon-btn:hover { background: var(--hover); color: var(--text); }
  .icon-btn svg { width: 14px; height: 14px; }

  #layers-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .layer-row {
    display: grid;
    grid-template-columns: 26px minmax(0, 1fr) 26px;
    align-items: center;
    gap: 4px;
    padding: 3px 6px;
    margin: 2px 6px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .layer-row:hover { background: var(--hover); border-color: var(--border-soft); }
  .layer-row.active {
    background: var(--accent-softer);
    border-color: #bfd6ee;
  }
  .layer-row .name {
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 4px 2px;
    min-width: 0;
  }
  .layer-row .name[contenteditable="true"] {
    background: white;
    border: 1px solid var(--accent);
    border-radius: 4px;
    outline: none;
  }
  .layer-row .name .badge {
    font-size: 10px;
    color: var(--text-muted);
    margin-left: 4px;
    background: transparent;
    border: 0;
    padding: 0;
  }

  /* Selection / relations panel body */
  .sb-body {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 10px 11px 12px;
    min-height: 0;
  }
  .sb-subhead {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin: 12px 0 6px;
    font-weight: 600;
  }
  .sb-subhead:first-child { margin-top: 0; }
  .muted { color: var(--text-muted); }
  .empty {
    color: var(--text-muted);
    padding: 6px 0;
    font-size: 11px;
  }

  /* Selection list */
  .sel-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 6px;
    font-size: 12px;
    color: var(--text);
    border-radius: 6px;
    border: 1px solid transparent;
    min-width: 0;
  }
  .sel-item:hover { background: var(--hover); border-color: var(--border-soft); }
  .sel-item.active {
    background: var(--accent-softer);
    border-color: #bdd5ee;
    color: var(--accent-strong);
  }
  .sel-item .glyph {
    width: 14px;
    flex: 0 0 14px;
    text-align: center;
    color: var(--text-soft);
    font-weight: 600;
  }
  .sel-item > span:not(.glyph):not(.layer-tag) {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .sel-item .layer-tag {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-muted);
    padding: 0 4px;
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    flex: 0 0 auto;
  }
  .sel-item.cross-layer .layer-tag {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Relation buttons grid */
  .rel-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
    margin: 4px 0;
  }
  .rel-btn {
    min-height: 32px;
    padding: 6px 8px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text);
    min-width: 0;
  }
  .rel-btn:hover {
    background: var(--accent-softer);
    border-color: var(--accent);
    color: var(--accent);
  }
  .rel-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    justify-content: center;
  }
  .rel-btn.primary:hover { background: var(--accent-strong); color: white; }
  .rel-btn.danger:hover {
    background: #fff0f0;
    border-color: var(--overc);
    color: var(--overc);
  }
  .rel-btn.full { grid-column: 1 / -1; justify-content: center; }
  .rel-btn:disabled {
    background: var(--panel);
    color: var(--text-muted);
    cursor: not-allowed;
    border-color: var(--border-soft);
  }
  .rel-btn .glyph {
    width: 14px;
    text-align: center;
    flex: 0 0 14px;
    color: var(--text-soft);
    font-weight: 600;
  }
  .rel-btn:hover .glyph { color: var(--accent); }
  .rel-btn.primary .glyph,
  .rel-btn.primary:hover .glyph { color: white; }

  .tool-summary {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
    margin-bottom: 8px;
  }
  .tool-metric {
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    background: white;
    padding: 7px 8px;
    min-width: 0;
  }
  .tool-metric strong {
    display: block;
    font-size: 16px;
    line-height: 1;
    color: var(--text);
    margin-bottom: 2px;
  }
  .tool-metric span {
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .choice-row {
    width: 100%;
    display: grid;
    grid-template-columns: 24px minmax(0, 1fr);
    gap: 7px;
    align-items: center;
    padding: 8px;
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    background: white;
    cursor: pointer;
    margin-bottom: 6px;
    text-align: left;
  }
  .choice-row:hover {
    border-color: #bfd6ee;
    background: var(--accent-softer);
  }
  .choice-row.active {
    border-color: var(--accent);
    background: var(--accent-softer);
    box-shadow: inset 3px 0 0 var(--accent);
  }
  .choice-row .glyph {
    width: 24px;
    height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    background: var(--panel);
    color: var(--accent);
    font-weight: 700;
  }
  .choice-row strong {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }
  .choice-row.active strong { color: var(--accent-strong); }
  .choice-row span:not(.glyph) {
    display: block;
    color: var(--text-muted);
    font-size: 11px;
    line-height: 1.3;
    margin-top: 1px;
  }
  .stack-list {
    display: grid;
    gap: 3px;
  }
  .tool-note {
    border-left: 3px solid var(--border);
    padding: 6px 7px;
    margin: 6px 0;
    background: var(--panel);
    color: var(--text-soft);
    font-size: 11px;
    border-radius: 0 5px 5px 0;
  }
  .tool-note.warn {
    border-left-color: #d28a18;
    background: #fff7e8;
    color: #7b5317;
  }
  .op-actions { margin-top: 10px; }

  /* Existing constraint pills */
  .constraint-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 6px;
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    font-size: 11px;
    margin: 2px 2px 2px 0;
    color: var(--text-soft);
  }
  .constraint-pill .x {
    cursor: pointer; color: var(--text-muted);
    font-size: 14px; line-height: 1;
  }
  .constraint-pill .x:hover { color: var(--overc); }

  /* Property rows */
  .prop-row {
    display: grid;
    grid-template-columns: 82px minmax(0, 1fr);
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    font-size: 12px;
  }
  .prop-row label {
    color: var(--text-soft);
    font-size: 11px;
    text-transform: capitalize;
  }
  .prop-row input[type=number],
  .prop-row input[type=text] {
    flex: 1;
    padding: 5px 7px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: white;
    min-width: 0;
  }
  .prop-row input:focus {
    outline: 1px solid var(--accent);
    border-color: var(--accent);
  }
  .prop-row .rel-btn { width: 100%; justify-content: center; }

  /* Project meta */
  #project-meta {
    padding: 10px 11px;
    font-size: 11px;
    color: var(--text-soft);
    background: var(--panel-2);
  }
  #project-meta input[type=text] {
    width: 100%;
    padding: 6px 7px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: white;
    margin-top: 4px;
    font-size: 12px;
  }
  #project-meta input[type=text]:focus { outline: 1px solid var(--accent); border-color: var(--accent); }

  /* ---------- Workspace / canvas ---------- */
  #workspace {
    grid-area: workspace;
    position: relative;
    overflow: hidden;
    background: radial-gradient(circle at 50% 35%, var(--canvas-a) 0%, #f5f8fb 38%, var(--canvas-b) 100%);
  }
  #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ---------- Status bar ---------- */
  #statusbar {
    grid-area: statusbar;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 10px;
    background: var(--panel-2);
    border-top: 1px solid var(--border);
    color: var(--text-soft);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    min-width: 0;
  }
  #statusbar .spacer { flex: 1; }
  #statusbar .pill {
    padding: 1px 7px;
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    background: var(--panel);
  }
  #status-hint {
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 160px;
  }
  #statusbar .pill.ok    { border-color: #cbe1cc; background: #ecf6ed; color: #2c6b34; }
  #statusbar .pill.warn  { border-color: #f0d9b5; background: #fbf2e2; color: #8a5a16; }
  #statusbar .pill.error { border-color: #efc4c4; background: #fbeaea; color: #8a2a2a; }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(20,25,32,0.32);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1000;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: white;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.18);
    width: 460px;
    max-width: 90vw;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .modal h3 {
    margin: 0; padding: 12px 16px;
    border-bottom: 1px solid var(--border-soft);
    font-size: 14px;
  }
  .modal .body { padding: 14px 16px; }
  .modal .footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border-soft);
    display: flex; gap: 6px; justify-content: flex-end;
    background: var(--panel);
  }
  .modal textarea {
    width: 100%; min-height: 220px;
    font: 12px/1.4 ui-monospace, Menlo, Consolas, monospace;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 3px;
    resize: vertical;
  }
  .btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 6px;
    cursor: pointer;
  }
  .btn:hover { background: var(--hover); }
  .btn.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .btn.primary:hover { background: #1d527f; }

  /* Cursor hint */
  #cursor-hint {
    position: absolute;
    pointer-events: none;
    background: rgba(28,32,38,0.86);
    color: white;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
    transform: translate(12px, 14px);
    z-index: 20;
    display: none;
  }

  #context-menu {
    position: fixed;
    min-width: 170px;
    max-width: 260px;
    max-height: 260px;
    overflow-y: auto;
    padding: 5px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 10px 28px rgba(15, 23, 42, 0.18);
    z-index: 40;
  }
  .context-menu-item {
    width: 100%;
    border: 0;
    background: transparent;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 8px;
    border-radius: 6px;
    font: 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
    text-align: left;
    cursor: pointer;
  }
  .context-menu-item:hover {
    background: var(--accent-softer);
    color: var(--accent);
  }
  .context-menu-item .glyph {
    width: 16px;
    flex: 0 0 16px;
    color: var(--text-soft);
    text-align: center;
    font-weight: 700;
  }
  .context-menu-item:hover .glyph { color: var(--accent); }
  .context-menu-item .meta {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 10px;
  }
</style>
</head>
<body>

<div id="app">

  <!-- ============================================================
       TOP BAR
       ============================================================ -->
  <header id="topbar">
    <div class="group">
      <span class="label">File</span>
      <button class="tbtn" data-action="new" title="New project" aria-label="New project">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v5h4"/><path d="M9 14h6M12 11v6"/></svg>
      </button>
      <button class="tbtn" data-action="save" title="Save to browser" aria-label="Save to browser">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h12l2 2v14H5z"/><path d="M8 4v6h8V4"/><path d="M8 20v-6h8v6"/></svg>
      </button>
      <button class="tbtn" data-action="export" title="Export JSON" aria-label="Export JSON">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4"/><path d="M8 8l4-4 4 4"/><path d="M5 14v5h14v-5"/></svg>
      </button>
      <button class="tbtn" data-action="import" title="Import JSON" aria-label="Import JSON">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v11"/><path d="M8 11l4 4 4-4"/><path d="M5 14v5h14v-5"/></svg>
      </button>
    </div>

    <div class="group">
      <span class="label">Edit</span>
      <button class="tbtn" data-action="undo" title="Undo (Ctrl+Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
      </button>
      <button class="tbtn" data-action="redo" title="Redo (Ctrl+Y)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 15-6.7L21 13"/></svg>
      </button>
    </div>

    <div class="group">
      <span class="label">Draw</span>
      <button class="tbtn tool" data-tool="select" title="Select (S)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l13 8-5 1 3 7-2 1-3-7-4 4z"/></svg>
      </button>
      <button class="tbtn tool" data-tool="line" title="Line (L)">

<script>
/* ============================================================
   SketchCAD — main script. Vanilla JS, no deps.

   Module layout (single-file, comment-delimited):
     1.  Math + linear algebra utilities
     2.  Entities  (Point, Line, Circle, Arc)
     3.  Constraints
     4.  Solver  (Levenberg–Marquardt + rank for DOF / over-defined)
     5.  Sketch / Project model
     6.  View + Renderer
     7.  Snap engine
     8.  Tools (Select, Line, Rect, Circle, Arc, Point, SmartDim)
     9.  Available-relations engine (selection-aware)
    10.  App / event wiring
   ============================================================ */

/* =============== 1. MATH UTILITIES ============================ */
const EPS = 1e-9;
const TAU = Math.PI * 2;
const dist  = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const dist2 = (a, b) => (a.x-b.x)**2 + (a.y-b.y)**2;
const lerp  = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

const UI_ICONS = {
  eye: '<path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6z"/><circle cx="12" cy="12" r="2.5"/>',
  eyeOff: '<path d="M3 3l18 18"/><path d="M7.4 7.4C4.3 9.1 2.5 12 2.5 12s3.5 6 9.5 6c1.8 0 3.3-.5 4.6-1.2"/><path d="M10.2 6.2c.6-.1 1.2-.2 1.8-.2 6 0 9.5 6 9.5 6s-.8 1.4-2.3 2.8"/>',
  trash: '<path d="M4 7h16"/><path d="M9 7V5h6v2"/><path d="M7 7l1 13h8l1-13"/><path d="M10 11v5M14 11v5"/>',
  mirror: '<path d="M12 4v16"/><path d="M5 7l5 5-5 5z"/><path d="M19 7l-5 5 5 5z"/>',
  plus: '<path d="M12 5v14M5 12h14"/>',
  x: '<path d="M6 6l12 12M18 6L6 18"/>',
  check: '<path d="M20 6L9 17l-5-5"/>',
  flip: '<path d="M7 7h10l-3-3M17 17H7l3 3"/><path d="M7 7l10 10"/>'
};
function uiIcon(name) {
  return `<svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${UI_ICONS[name] || ''}</svg>`;
}

/** Solve A x = b where A is square (n×n). Naive Gaussian elimination
 *  with partial pivoting. Returns x or null if singular. */
function solveLinear(A, b) {
  const n = A.length;
  const M = A.map((row, i) => [...row, b[i]]);
  for (let i = 0; i < n; i++) {
    let p = i;
    for (let k = i + 1; k < n; k++) if (Math.abs(M[k][i]) > Math.abs(M[p][i])) p = k;
    if (Math.abs(M[p][i]) < 1e-14) return null;
    [M[i], M[p]] = [M[p], M[i]];
    for (let k = i + 1; k < n; k++) {
      const f = M[k][i] / M[i][i];
      for (let j = i; j <= n; j++) M[k][j] -= f * M[i][j];
    }
  }
  const x = new Array(n).fill(0);
  for (let i = n - 1; i >= 0; i--) {
    let s = M[i][n];
    for (let j = i + 1; j < n; j++) s -= M[i][j] * x[j];
    x[i] = s / M[i][i];
  }
  return x;
}

/** Estimate the rank of an m×n matrix by column-pivoted modified
 *  Gram–Schmidt. Returns the count of independent columns whose
 *  residual norm exceeds `tol`. */
function rankApprox(A, tol = 1e-8) {
  if (!A || !A.length || !A[0].length) return 0;
  const m = A.length, n = A[0].length;
  // Work on column vectors.
  const cols = [];
  for (let j = 0; j < n; j++) {
    const c = new Array(m);
    for (let i = 0; i < m; i++) c[i] = A[i][j];
    cols.push(c);
  }
  const Q = [];
  let rank = 0;
  // Pivot greedily on remaining column with largest norm.
  const remaining = new Set(cols.map((_, i) => i));
  while (remaining.size) {
    let bestIdx = -1, bestN = -1;
    for (const i of remaining) {
      let s = 0; for (let k = 0; k < m; k++) s += cols[i][k] * cols[i][k];
      if (s > bestN) { bestN = s; bestIdx = i; }
    }
    if (bestN < tol * tol) break;
    const v = cols[bestIdx].slice();
    for (const q of Q) {
      let dot = 0;
      for (let k = 0; k < m; k++) dot += v[k] * q[k];
      for (let k = 0; k < m; k++) v[k] -= dot * q[k];
    }
    let norm = 0;
    for (let k = 0; k < m; k++) norm += v[k] * v[k];
    norm = Math.sqrt(norm);
    if (norm > tol) {
      for (let k = 0; k < m; k++) v[k] /= norm;
      Q.push(v);
      rank++;
      // strip this component from all remaining columns
      for (const i of remaining) {
        if (i === bestIdx) continue;
        let dot = 0;
        for (let k = 0; k < m; k++) dot += cols[i][k] * v[k];
        for (let k = 0; k < m; k++) cols[i][k] -= dot * v[k];
      }
    }
    remaining.delete(bestIdx);
  }
  return rank;
}

/** Build an orthonormal basis of the row space of m×n matrix A, by
 *  modified Gram-Schmidt on the rows. Returns array of length-n vectors. */
function rowSpaceBasis(A, tol = 1e-8) {
  if (!A || !A.length) return [];
  const n = A[0].length;
  const basis = [];
  for (let i = 0; i < A.length; i++) {
    const v = A[i].slice();
    for (const b of basis) {
      let dot = 0;
      for (let k = 0; k < n; k++) dot += v[k] * b[k];
      for (let k = 0; k < n; k++) v[k] -= dot * b[k];
    }
    let norm = 0;
    for (let k = 0; k < n; k++) norm += v[k] * v[k];
    norm = Math.sqrt(norm);
    if (norm > tol) {
      for (let k = 0; k < n; k++) v[k] /= norm;
      basis.push(v);
    }
  }
  return basis;
}

/** A parameter (column index j) is "pinned" — uniquely determined by the
 *  constraint system — iff the standard basis vector e_j lies in the row
 *  space of J. We check this by ||proj_basis(e_j)||² ≈ 1. */
function nullSpaceBasis(rowBasis, n, tol = 1e-8) {
  const basis = [];
  for (let j = 0; j < n; j++) {
    const v = new Array(n).fill(0);
    v[j] = 1;
    for (const b of rowBasis) {
      let dot = 0;
      for (let k = 0; k < n; k++) dot += v[k] * b[k];
      for (let k = 0; k < n; k++) v[k] -= dot * b[k];
    }
    for (const b of basis) {
      let dot = 0;
      for (let k = 0; k < n; k++) dot += v[k] * b[k];
      for (let k = 0; k < n; k++) v[k] -= dot * b[k];
    }
    let norm = 0;
    for (let k = 0; k < n; k++) norm += v[k] * v[k];
    norm = Math.sqrt(norm);
    if (norm > tol) {
      for (let k = 0; k < n; k++) v[k] /= norm;
      basis.push(v);
    }
  }
  return basis;
}

function solveLeastSquares(A, b, damping = 1e-8) {
  if (!A.length || !A[0]?.length) return null;
  const n = A[0].length;
  const normal = Array.from({ length:n }, () => new Array(n).fill(0));
  const rhs = new Array(n).fill(0);
  for (let i = 0; i < A.length; i++) {
    for (let j = 0; j < n; j++) {
      const aij = A[i][j];
      rhs[j] += aij * b[i];
      for (let k = 0; k < n; k++) normal[j][k] += aij * A[i][k];
    }
  }
  for (let j = 0; j < n; j++) normal[j][j] += damping;
  return solveLinear(normal, rhs);
}

function paramPinnedFromBasis(basis, n) {
  const pinned = new Array(n).fill(false);
  for (let j = 0; j < n; j++) {
    let s = 0;
    for (const b of basis) s += b[j] * b[j];
    pinned[j] = s > 1 - 1e-6;
  }
  return pinned;
}

/** Intersection of two infinite lines (a,b) and (c,d). null if parallel. */
function lineIntersection(a, b, c, d) {
  const denom = (a.x-b.x)*(c.y-d.y) - (a.y-b.y)*(c.x-d.x);
  if (Math.abs(denom) < EPS) return null;
  const t = ((a.x-c.x)*(c.y-d.y) - (a.y-c.y)*(c.x-d.x)) / denom;
  return { x: a.x + t*(b.x-a.x), y: a.y + t*(b.y-a.y) };
}

function normAngle(a) {
  a %= TAU;
  return a < 0 ? a + TAU : a;
}

function ccwDelta(from, to) {
  return normAngle(to - from);
}

function signedAngleDelta(from, to) {
  let d = to - from;
  while (d > Math.PI) d -= TAU;
  while (d < -Math.PI) d += TAU;
  return d;
}

function unwrapAngleNear(angle, reference) {
  return reference + signedAngleDelta(reference, angle);
}

function angleOnDirectedArc(theta, a0, a1, clockwise = false, tol = 1e-3) {
  const span = clockwise ? normAngle(a0 - a1) : normAngle(a1 - a0);
  const rel = clockwise ? normAngle(a0 - theta) : normAngle(theta - a0);
  return rel <= span + tol;
}

function directedArcSpan(a0, a1, clockwise = false) {
  return clockwise ? -normAngle(a0 - a1) : normAngle(a1 - a0);
}

function drawDirectedArcPath(ctx, view, center, radius, a0, a1, clockwise = false) {
  const span = directedArcSpan(a0, a1, clockwise);
  if (Math.abs(span) < 1e-6 || radius < EPS) return;
  const steps = Math.max(8, Math.ceil(Math.abs(span) / (Math.PI / 24)));
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const a = a0 + span * t;
    const p = view.worldToScreen({
      x: center.x + radius * Math.cos(a),
      y: center.y + radius * Math.sin(a)
    });
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
}

function angleSeparation(a, b) {
  const d = ccwDelta(a, b);
  return d > Math.PI ? TAU - d : d;
}

function normalizeAngleValue(rad) {
  if (!Number.isFinite(rad)) return 0;
  let a = Math.abs(rad) % TAU;
  if (a > Math.PI) a = TAU - a;
  return a;
}

function angleArcFromPoints(a1, b1, a2, b2) {
  const ang1 = Math.atan2(b1.y - a1.y, b1.x - a1.x);
  const ang2 = Math.atan2(b2.y - a2.y, b2.x - a2.x);
  const d12 = ccwDelta(ang1, ang2);
  if (d12 <= Math.PI) {
    return { start: ang1, end: ang1 + d12, span: d12, midAngle: normAngle(ang1 + d12 / 2) };
  }
  const span = TAU - d12;
  return { start: ang2, end: ang2 + span, span, midAngle: normAngle(ang2 + span / 2) };
}

function angleSectorCandidates(l1, l2) {
  const a1 = Math.atan2(l1.p2.y - l1.p1.y, l1.p2.x - l1.p1.x);
  const a2 = Math.atan2(l2.p2.y - l2.p1.y, l2.p2.x - l2.p1.x);
  const rays = [
    { line: 1, angle: normAngle(a1),           ref: { a:l1.p1.id, b:l1.p2.id } },
    { line: 1, angle: normAngle(a1 + Math.PI), ref: { a:l1.p2.id, b:l1.p1.id } },
    { line: 2, angle: normAngle(a2),           ref: { a:l2.p1.id, b:l2.p2.id } },
    { line: 2, angle: normAngle(a2 + Math.PI), ref: { a:l2.p2.id, b:l2.p1.id } }
  ].sort((a, b) => a.angle - b.angle);

  const out = [];
  for (let i = 0; i < rays.length; i++) {
    const start = rays[i];
    const end = rays[(i + 1) % rays.length];
    if (start.line === end.line) continue;
    const span = ccwDelta(start.angle, end.angle);
    if (span < 1e-7 || span > Math.PI + 1e-7) continue;
    out.push({
      start: start.angle,
      end: start.angle + span,
      span,
      value: normalizeAngleValue(span),
      midAngle: normAngle(start.angle + span / 2),
      l1Ref: start.line === 1 ? start.ref : end.ref,
      l2Ref: start.line === 2 ? start.ref : end.ref
    });
  }
  return out;
}

function angleSectorForCursor(l1, l2, world) {
  const inter = lineIntersection(l1.p1, l1.p2, l2.p1, l2.p2);
  if (!inter) return null;
  const candidates = angleSectorCandidates(l1, l2);
  if (!candidates.length) return null;
  if (!world) return candidates.reduce((best, c) => c.span < best.span ? c : best, candidates[0]);

  if (dist(inter, world) < EPS) {
    return candidates.reduce((best, c) => c.span < best.span ? c : best, candidates[0]);
  }

  const bearing = normAngle(Math.atan2(world.y - inter.y, world.x - inter.x));
  let best = null;
  for (const c of candidates) {
    const within = ccwDelta(c.start, bearing) <= c.span + 1e-7;
    if (!within) continue;
    const score = angleSeparation(bearing, c.midAngle);
    if (!best || score < best.score) best = { ...c, score };
  }
  if (best) {
    const { score, ...sector } = best;
    return sector;
  }

  const fallback = candidates
    .map(c => ({ ...c, score: angleSeparation(bearing, c.midAngle) }))
    .sort((a, b) => a.score - b.score)[0];
  const { score, ...sector } = fallback;
  return sector;
}

function angleSectorForValue(l1, l2, value, preferredMidAngle = null) {
  const candidates = angleSectorCandidates(l1, l2);
  if (!candidates.length) return null;
  const target = normalizeAngleValue(value);
  return candidates
    .map(c => ({
      ...c,
      valueScore: Math.abs(c.value - target),
      midScore: preferredMidAngle == null ? 0 : angleSeparation(c.midAngle, preferredMidAngle)
    }))
    .sort((a, b) => {
      const dv = a.valueScore - b.valueScore;
      if (Math.abs(dv) > 1e-7) return dv;
      return a.midScore - b.midScore;
    })[0];
}

function regularPolygonFromCenterEdge(center, edgeMid, sides) {
  const n = Math.max(3, Math.round(sides || 6));
  const apothem = dist(center, edgeMid);
  if (apothem < EPS) return null;
  const theta = Math.atan2(edgeMid.y - center.y, edgeMid.x - center.x);
  const radius = apothem / Math.cos(Math.PI / n);
  const start = theta - Math.PI / n;
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = start + i * TAU / n;
    pts.push({ x: center.x + radius * Math.cos(a), y: center.y + radius * Math.sin(a) });
  }
  return pts;
}

function centerRectangleCorners(center, corner) {
  const dx = corner.x - center.x;
  const dy = corner.y - center.y;
  if (Math.abs(dx) < EPS || Math.abs(dy) < EPS) return null;
  return {
    a: { x: center.x - dx, y: center.y - dy },
    b: { x: center.x + dx, y: center.y - dy },
    c: { x: center.x + dx, y: center.y + dy },
    d: { x: center.x - dx, y: center.y + dy }
  };
}

function circleFrom3Points(a, b, c) {
  const ax=a.x, ay=a.y, bx=b.x, by=b.y, cx=c.x, cy=c.y;
  const d = 2*(ax*(by-cy) + bx*(cy-ay) + cx*(ay-by));
  if (Math.abs(d) < EPS) return null;
  const ux = ((ax*ax+ay*ay)*(by-cy) + (bx*bx+by*by)*(cy-ay) + (cx*cx+cy*cy)*(ay-by)) / d;
  const uy = ((ax*ax+ay*ay)*(cx-bx) + (bx*bx+by*by)*(ax-cx) + (cx*cx+cy*cy)*(bx-ax)) / d;
  return { center: { x: ux, y: uy }, r: Math.hypot(ax-ux, ay-uy) };
}

function mirrorPointAcrossLine(p, axis) {
  const ax = axis.p1.x, ay = axis.p1.y;
  const dx = axis.p2.x - axis.p1.x, dy = axis.p2.y - axis.p1.y;
  const len2 = dx*dx + dy*dy;
  if (len2 < EPS) return { x:p.x, y:p.y };
  const t = ((p.x - ax)*dx + (p.y - ay)*dy) / len2;
  const hx = ax + t*dx, hy = ay + t*dy;
  return { x: 2*hx - p.x, y: 2*hy - p.y };
}

function offsetLine(line, signedDistance) {
  const dx = line.p2.x - line.p1.x;
  const dy = line.p2.y - line.p1.y;
  const len = Math.hypot(dx, dy);
  if (len < EPS) return null;
  const nx = -dy / len, ny = dx / len;
  return {
    p1: { x: line.p1.x + nx * signedDistance, y: line.p1.y + ny * signedDistance },
    p2: { x: line.p2.x + nx * signedDistance, y: line.p2.y + ny * signedDistance }
  };
}

function offsetCircle(circle, signedDistance) {
  const r = circle.r + signedDistance;
  if (r <= EPS) return null;
  return { center: { x: circle.center.x, y: circle.center.y }, r };
}

function offsetArc(arc, signedDistance) {
  const r = arc.r + signedDistance;
  if (r <= EPS) return null;
  return { center: { x: arc.center.x, y: arc.center.y }, r, a0: arc.a0, a1: arc.a1, clockwise: !!arc.clockwise };
}

/* =============== 2. ENTITIES ================================== */
let _idSeq = 1;
const newId = (prefix='e') => prefix + (_idSeq++);

class Entity {
  constructor() {
    this.id = newId();
    this.layerId = null;
    this.construction = false;
    this.fixed = false;
    this.status = 'under';        // 'under' | 'fully' | 'over'
    this.selected = false;
    this.hover = false;
  }
  paramKeys() { return []; }
  getParam(k) { return this[k]; }
  setParam(k, v) { this[k] = v; }
  children() { return []; }
  toJSON() {
    const o = { type: this.constructor.kind, id: this.id,
                construction: this.construction, fixed: this.fixed };
    for (const k of this.paramKeys()) o[k] = this[k];
    return o;
  }
}

class Point extends Entity {
  static kind = 'point';
  constructor(x = 0, y = 0) { super(); this.x = x; this.y = y; }
  paramKeys() { return ['x','y']; }
  hit(world, view) { return dist(this, world) * view.zoom < 7; }
  draw(ctx, view, style) {
    const p = view.worldToScreen(this);
    ctx.save();
    ctx.fillStyle = style.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, this.selected ? 4.5 : 3, 0, TAU);
    ctx.fill();
    if (this.fixed) {
      ctx.strokeStyle = style.color;
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, TAU); ctx.stroke();
    }
    ctx.restore();
  }
}

class Line extends Entity {
  static kind = 'line';
  constructor(p1, p2) { super(); this.p1 = p1; this.p2 = p2; }
  children() { return [this.p1, this.p2]; }
  hit(world, view) {
    const a = this.p1, b = this.p2;
    const dx = b.x - a.x, dy = b.y - a.y;
    const L2 = dx*dx + dy*dy;
    if (L2 < EPS) return dist(world, a) * view.zoom < 6;
    let t = ((world.x - a.x)*dx + (world.y - a.y)*dy) / L2;
    t = clamp(t, 0, 1);
    const px = a.x + t*dx, py = a.y + t*dy;
    return Math.hypot(world.x - px, world.y - py) * view.zoom < 6;
  }
  draw(ctx, view, style) {
    const a = view.worldToScreen(this.p1);
    const b = view.worldToScreen(this.p2);
    ctx.save();
    ctx.strokeStyle = style.color;
    ctx.lineWidth = style.width;
    if (style.dashed) ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.stroke();
    ctx.restore();
  }
  toJSON() {
    return { type: 'line', id: this.id,
             construction: this.construction, fixed: this.fixed,
             p1: this.p1.toJSON(), p2: this.p2.toJSON() };
  }
}

class Circle extends Entity {
  static kind = 'circle';
  constructor(center, r) { super(); this.center = center; this.r = r; }
  paramKeys() { return ['r']; }
  children() { return [this.center]; }
  hit(world, view) {
    const d = dist(this.center, world);
    return Math.abs(d - this.r) * view.zoom < 6;
  }
  draw(ctx, view, style) {
    const c = view.worldToScreen(this.center);
    ctx.save();
    ctx.strokeStyle = style.color;
    ctx.lineWidth = style.width;
    if (style.dashed) ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.arc(c.x, c.y, this.r * view.zoom, 0, TAU);
    ctx.stroke();
    ctx.restore();
  }
  toJSON() {
    return { type: 'circle', id: this.id,
             construction: this.construction, fixed: this.fixed,
             center: this.center.toJSON(), r: this.r };
  }
}

class Arc extends Entity {
  static kind = 'arc';
  constructor(center, r, a0, a1) {
    super();
    this.center = center; this.r = r; this.a0 = a0; this.a1 = a1;
    this.clockwise = false;
    this.start = new Point(center.x + r*Math.cos(a0), center.y + r*Math.sin(a0));
    this.end   = new Point(center.x + r*Math.cos(a1), center.y + r*Math.sin(a1));
    this.start.arcOwner = this; this.start.arcEndpoint = 'start';
    this.end.arcOwner = this;   this.end.arcEndpoint = 'end';
  }
  paramKeys() { return ['r', 'a0', 'a1']; }
  children() { return [this.center, this.start, this.end]; }
  syncEnds() {
    this.start.x = this.center.x + this.r*Math.cos(this.a0);
    this.start.y = this.center.y + this.r*Math.sin(this.a0);
    this.end.x   = this.center.x + this.r*Math.cos(this.a1);
    this.end.y   = this.center.y + this.r*Math.sin(this.a1);
  }
  hit(world, view) {
    this.syncEnds();
    const dx = world.x - this.center.x, dy = world.y - this.center.y;
    const d = Math.hypot(dx, dy);
    if (Math.abs(d - this.r) * view.zoom > 6) return false;
    return angleOnDirectedArc(Math.atan2(dy, dx), this.a0, this.a1, this.clockwise);
  }
  draw(ctx, view, style) {
    this.syncEnds();
    ctx.save();
    ctx.strokeStyle = style.color;
    ctx.lineWidth = style.width;
    if (style.dashed) ctx.setLineDash([6, 4]);
    ctx.beginPath();
    drawDirectedArcPath(ctx, view, this.center, this.r, this.a0, this.a1, this.clockwise);
    ctx.stroke();
    ctx.restore();
  }
  toJSON() {
    return { type: 'arc', id: this.id,
             construction: this.construction, fixed: this.fixed,
             center: this.center.toJSON(),
             r: this.r, a0: this.a0, a1: this.a1, clockwise: !!this.clockwise };
  }
}

/* =============== 3. CONSTRAINTS =============================== */
class Constraint {
  constructor(kind) { this.id = newId('c'); this.kind = kind; this.value = null; this.selected = false; }
  residuals(L) { return []; }
  refs() { return []; }
  toJSON() { return { id:this.id, kind:this.kind, value:this.value, refs:this.refs() }; }
}

class FixConstraint extends Constraint {
  constructor(pointId, x, y) { super('fix'); this.pointId=pointId; this.x=x; this.y=y; }
  refs() { return [this.pointId]; }
  residuals(L) { return [ L(this.pointId,'x') - this.x, L(this.pointId,'y') - this.y ]; }
  toJSON() { return { id:this.id, kind:'fix', pointId:this.pointId, x:this.x, y:this.y }; }
}

class ParamFixConstraint extends Constraint {
  constructor(entityId, key, value) {
    super('paramFix');
    this.entityId = entityId;
    this.key = key;
    this.value = value;
  }
  refs() { return [this.entityId]; }
  residuals(L) { return [ L(this.entityId, this.key) - this.value ]; }
  toJSON() { return { id:this.id, kind:'paramFix', entityId:this.entityId, key:this.key, value:this.value }; }
}

class CoincidentConstraint extends Constraint {
  constructor(p1Id, p2Id) { super('coincident'); this.p1=p1Id; this.p2=p2Id; }
  refs() { return [this.p1, this.p2]; }
  residuals(L) { return [ L(this.p1,'x')-L(this.p2,'x'), L(this.p1,'y')-L(this.p2,'y') ]; }
  toJSON() { return { id:this.id, kind:'coincident', p1:this.p1, p2:this.p2 }; }
}

class HorizontalConstraint extends Constraint {
  constructor(lineId, p1Id, p2Id) { super('horizontal'); this.lineId=lineId; this.p1=p1Id; this.p2=p2Id; }
  refs() { return [this.lineId, this.p1, this.p2]; }
  residuals(L) { return [ L(this.p1,'y') - L(this.p2,'y') ]; }
  toJSON() { return { id:this.id, kind:'horizontal', lineId:this.lineId, p1:this.p1, p2:this.p2 }; }
}

class VerticalConstraint extends Constraint {
  constructor(lineId, p1Id, p2Id) { super('vertical'); this.lineId=lineId; this.p1=p1Id; this.p2=p2Id; }
  refs() { return [this.lineId, this.p1, this.p2]; }
  residuals(L) { return [ L(this.p1,'x') - L(this.p2,'x') ]; }
  toJSON() { return { id:this.id, kind:'vertical', lineId:this.lineId, p1:this.p1, p2:this.p2 }; }
}

class SymmetricConstraint extends Constraint {
  constructor(p1Id, p2Id, axis, sourceSide = null) {
    super('symmetric');
    this.p1 = p1Id;
    this.p2 = p2Id;
    this.axis = axis;
    this.sourceSide = sourceSide;
  }
  refs() { return [this.p1, this.p2, this.axis.a, this.axis.b]; }
  residuals(L) {
    const ax=L(this.axis.a,'x'), ay=L(this.axis.a,'y');
    const bx=L(this.axis.b,'x'), by=L(this.axis.b,'y');
    const px=L(this.p1,'x'), py=L(this.p1,'y');
    const qx=L(this.p2,'x'), qy=L(this.p2,'y');
    const dx=bx-ax, dy=by-ay;
    const len = Math.hypot(dx, dy);
    if (len < EPS) return [0, 0];
    const mx = (px + qx) / 2, my = (py + qy) / 2;
    return [
      (dx*(my-ay) - dy*(mx-ax)) / len,
      (dx*(qx-px) + dy*(qy-py)) / len
    ];
  }
  toJSON() {
    const o = { id:this.id, kind:'symmetric', p1:this.p1, p2:this.p2, axis:this.axis };
    if (this.sourceSide) o.sourceSide = this.sourceSide;
    return o;
  }
}

class ParallelConstraint extends Constraint {
  constructor(l1Pts, l2Pts) { super('parallel'); this.l1=l1Pts; this.l2=l2Pts; }
  refs() { return [this.l1.a, this.l1.b, this.l2.a, this.l2.b]; }
  residuals(L) {
    const dx1=L(this.l1.b,'x')-L(this.l1.a,'x'), dy1=L(this.l1.b,'y')-L(this.l1.a,'y');
    const dx2=L(this.l2.b,'x')-L(this.l2.a,'x'), dy2=L(this.l2.b,'y')-L(this.l2.a,'y');
    return [ dx1*dy2 - dy1*dx2 ];
  }
  toJSON() { return { id:this.id, kind:'parallel', l1:this.l1, l2:this.l2 }; }
}

class PerpendicularConstraint extends Constraint {
  constructor(l1Pts, l2Pts) { super('perpendicular'); this.l1=l1Pts; this.l2=l2Pts; }
  refs() { return [this.l1.a, this.l1.b, this.l2.a, this.l2.b]; }
  residuals(L) {
    const dx1=L(this.l1.b,'x')-L(this.l1.a,'x'), dy1=L(this.l1.b,'y')-L(this.l1.a,'y');
    const dx2=L(this.l2.b,'x')-L(this.l2.a,'x'), dy2=L(this.l2.b,'y')-L(this.l2.a,'y');
    return [ dx1*dx2 + dy1*dy2 ];
  }
  toJSON() { return { id:this.id, kind:'perpendicular', l1:this.l1, l2:this.l2 }; }
}

class CollinearConstraint extends Constraint {
  /** Two lines lie on the same infinite line: parallel + one endpoint of l2 on l1's line. */
  constructor(l1Pts, l2Pts) { super('collinear'); this.l1=l1Pts; this.l2=l2Pts; }
  refs() { return [this.l1.a, this.l1.b, this.l2.a, this.l2.b]; }
  residuals(L) {
    const ax=L(this.l1.a,'x'), ay=L(this.l1.a,'y');
    const bx=L(this.l1.b,'x'), by=L(this.l1.b,'y');
    const cx=L(this.l2.a,'x'), cy=L(this.l2.a,'y');
    const dx=L(this.l2.b,'x'), dy=L(this.l2.b,'y');
    // both endpoints of l2 lie on the line through l1
    const v = (px, py) => (bx-ax)*(py-ay) - (by-ay)*(px-ax);
    return [ v(cx, cy), v(dx, dy) ];
  }
  toJSON() { return { id:this.id, kind:'collinear', l1:this.l1, l2:this.l2 }; }
}

class EqualLengthConstraint extends Constraint {
  constructor(l1Pts, l2Pts) { super('equalLength'); this.l1=l1Pts; this.l2=l2Pts; }
  refs() { return [this.l1.a, this.l1.b, this.l2.a, this.l2.b]; }
  residuals(L) {
    if (this.driven) return [];
    const dx1=L(this.l1.b,'x')-L(this.l1.a,'x'), dy1=L(this.l1.b,'y')-L(this.l1.a,'y');
    const dx2=L(this.l2.b,'x')-L(this.l2.a,'x'), dy2=L(this.l2.b,'y')-L(this.l2.a,'y');
    return [ Math.sqrt(dx1*dx1+dy1*dy1) - Math.sqrt(dx2*dx2+dy2*dy2) ];
  }
  toJSON() {
    const o = { id:this.id, kind:'equalLength', l1:this.l1, l2:this.l2 };
    if (this.driven) o.driven = true;
    return o;
  }
}

class EqualRadiusConstraint extends Constraint {
  constructor(c1Id, c2Id) { super('equalRadius'); this.c1=c1Id; this.c2=c2Id; }
  refs() { return [this.c1, this.c2]; }
  residuals(L) { return [ L(this.c1,'r') - L(this.c2,'r') ]; }
  toJSON() { return { id:this.id, kind:'equalRadius', c1:this.c1, c2:this.c2 }; }
}

class ConcentricConstraint extends Constraint {
  /** Two circles/arcs share a center. We hold both center points coincident. */
  constructor(c1CenterId, c2CenterId) { super('concentric'); this.p1=c1CenterId; this.p2=c2CenterId; }
  refs() { return [this.p1, this.p2]; }
  residuals(L) { return [ L(this.p1,'x')-L(this.p2,'x'), L(this.p1,'y')-L(this.p2,'y') ]; }
  toJSON() { return { id:this.id, kind:'concentric', p1:this.p1, p2:this.p2 }; }
}

class TangentLineCircleConstraint extends Constraint {
  /** Distance from center to line equals radius (squared form, sign-free). */
  constructor(l, circleId, centerId) { super('tangent'); this.l=l; this.circleId=circleId; this.centerId=centerId; }
  refs() { return [this.l.a, this.l.b, this.circleId, this.centerId]; }
  residuals(L) {
    const ax=L(this.l.a,'x'), ay=L(this.l.a,'y');
    const bx=L(this.l.b,'x'), by=L(this.l.b,'y');
    const cx=L(this.centerId,'x'), cy=L(this.centerId,'y');
    const r=L(this.circleId,'r');
    const dx=bx-ax, dy=by-ay;
    const cross = dx*(cy-ay) - dy*(cx-ax);
    const len2 = dx*dx + dy*dy;
    return [ cross*cross - r*r*len2 ];
  }
  toJSON() { return { id:this.id, kind:'tangent', l:this.l, circleId:this.circleId, centerId:this.centerId }; }
}

class TangentCircleCircleConstraint extends Constraint {
  /** External tangent: distance between centers == r1 + r2. */
  constructor(c1Id, c1CenterId, c2Id, c2CenterId, internal=false) {
    super('tangent');
    this.c1=c1Id; this.p1=c1CenterId; this.c2=c2Id; this.p2=c2CenterId; this.internal=internal;
  }
  refs() { return [this.c1, this.p1, this.c2, this.p2]; }
  residuals(L) {
    const dx=L(this.p1,'x')-L(this.p2,'x'), dy=L(this.p1,'y')-L(this.p2,'y');
    const r1=L(this.c1,'r'), r2=L(this.c2,'r');
    const target = this.internal ? Math.abs(r1 - r2) : (r1 + r2);
    return [ Math.sqrt(dx*dx+dy*dy) - target ];
  }
  toJSON() { return { id:this.id, kind:'tangentCC', c1:this.c1, p1:this.p1, c2:this.c2, p2:this.p2, internal:this.internal }; }
}

class MidpointConstraint extends Constraint {
  /** A point sits at the midpoint of a line. */
  constructor(pointId, l) { super('midpoint'); this.pointId=pointId; this.l=l; }
  refs() { return [this.pointId, this.l.a, this.l.b]; }
  residuals(L) {
    return [
      2*L(this.pointId,'x') - L(this.l.a,'x') - L(this.l.b,'x'),
      2*L(this.pointId,'y') - L(this.l.a,'y') - L(this.l.b,'y')
    ];
  }
  toJSON() { return { id:this.id, kind:'midpoint', pointId:this.pointId, l:this.l }; }
}

class DistanceConstraint extends Constraint {
  constructor(p1Id, p2Id, value) {
    super('distance'); this.p1=p1Id; this.p2=p2Id; this.value=value;
    this.labelOffset=null; this.labelParallel=null; this.driven=false;
  }
  refs() { return [this.p1, this.p2]; }
  residuals(L) {
    if (this.driven) return [];
    const dx=L(this.p1,'x')-L(this.p2,'x'), dy=L(this.p1,'y')-L(this.p2,'y');
    return [ Math.sqrt(dx*dx+dy*dy) - this.value ];
  }
  toJSON() {
    const o = { id:this.id, kind:'distance', p1:this.p1, p2:this.p2, value:this.value };
    if (this.labelOffset   != null) o.labelOffset   = this.labelOffset;
    if (this.labelParallel != null) o.labelParallel = this.labelParallel;
    if (this.driven) o.driven = true;
    return o;
  }
}

class PointLineDistanceConstraint extends Constraint {
  /** Perpendicular distance from a point to the infinite line through (a,b). */
  constructor(pointId, l, value) {
    super('pointLineDistance'); this.pointId=pointId; this.l=l; this.value=value;
    this.labelOffset=null; this.labelParallel=null; this.driven=false;
  }
  refs() { return [this.pointId, this.l.a, this.l.b]; }
  residuals(L) {
    if (this.driven) return [];
    const px=L(this.pointId,'x'), py=L(this.pointId,'y');
    const ax=L(this.l.a,'x'),     ay=L(this.l.a,'y');
    const bx=L(this.l.b,'x'),     by=L(this.l.b,'y');
    const dx=bx-ax, dy=by-ay;
    const cross = dx*(py-ay) - dy*(px-ax);
    const len2 = dx*dx + dy*dy;
    return [ cross*cross - this.value*this.value*len2 ];
  }
  toJSON() {
    const o = { id:this.id, kind:'pointLineDistance', pointId:this.pointId, l:this.l, value:this.value };
    if (this.labelOffset   != null) o.labelOffset   = this.labelOffset;
    if (this.labelParallel != null) o.labelParallel = this.labelParallel;
    if (this.driven) o.driven = true;
    return o;
  }
}

class RadiusConstraint extends Constraint {
  constructor(circleId, value) {
    super('radius'); this.circleId=circleId; this.value=value;
    this.labelAngle=null; this.labelDist=null;     // labelDist: distance from center, controls inside/outside
    this.isDiameter=false; this.driven=false;
  }
  refs() { return [this.circleId]; }
  residuals(L) {
    if (this.driven) return [];
    return [ L(this.circleId,'r') - this.value ];
  }
  toJSON() {
    const o = { id:this.id, kind:'radius', circleId:this.circleId, value:this.value };
    if (this.labelAngle != null) o.labelAngle = this.labelAngle;
    if (this.labelDist  != null) o.labelDist  = this.labelDist;
    if (this.isDiameter) o.isDiameter = true;
    if (this.driven) o.driven = true;
    return o;
  }
}

class CurveDistanceConstraint extends Constraint {
  constructor(c1Id, c2Id, mode, value) {
    super('curveDistance');
    this.c1 = c1Id;
    this.c2 = c2Id;
    this.mode = mode; // 'gap' | 'radial'
    this.value = value;
    this.labelOffset = null;
    this.labelParallel = null;
    this.labelAngle = null;
    this.labelDist = null;
    this.driven = false;
  }
  refs() { return [this.c1, this.c2]; }
  residuals(L) {
    if (this.driven) return [];
    if (this.mode === 'gap') {
      const dx = L(this.c2,'x') - L(this.c1,'x');
      const dy = L(this.c2,'y') - L(this.c1,'y');
      return [Math.hypot(dx, dy) - L(this.c1,'r') - L(this.c2,'r') - this.value];
    }
    return [L(this.c1,'r') - L(this.c2,'r') - this.value];
  }
  toJSON() {
    const o = { id:this.id, kind:'curveDistance', c1:this.c1, c2:this.c2, mode:this.mode, value:this.value };
    if (this.labelOffset != null) o.labelOffset = this.labelOffset;
    if (this.labelParallel != null) o.labelParallel = this.labelParallel;
    if (this.labelAngle != null) o.labelAngle = this.labelAngle;
    if (this.labelDist != null) o.labelDist = this.labelDist;
    if (this.driven) o.driven = true;
    return o;
  }
}

class OffsetConstraint extends Constraint {
  /** Marks entity B as a geometric offset of entity A.
   *  For lines: enforces parallelism (replaces ParallelConstraint).
   *  For circles/arcs: enforces concentricity (replaces ConcentricConstraint).
   *  No value — the distance is handled separately by OffsetDistanceConstraint. */
  constructor(sourceEntityId, targetEntityId, offsetKind, pts) {
    super('offset');
    this.sourceEntityId = sourceEntityId;
    this.targetEntityId = targetEntityId;
    this.offsetKind = offsetKind; // 'line' | 'circle'
    // For lines: pts = { l1: {a,b}, l2: {a,b} }  (point IDs of source & target lines)
    // For circles/arcs: pts = { p1: centerId, p2: centerId }
    Object.assign(this, pts);
  }
  refs() {
    if (this.offsetKind === 'line')
      return [this.sourceEntityId, this.targetEntityId, this.l1.a, this.l1.b, this.l2.a, this.l2.b];
    return [this.sourceEntityId, this.targetEntityId, this.p1, this.p2];
  }
  residuals(L) {
    if (this.offsetKind === 'line') {
      const dx1=L(this.l1.b,'x')-L(this.l1.a,'x'), dy1=L(this.l1.b,'y')-L(this.l1.a,'y');
      const dx2=L(this.l2.b,'x')-L(this.l2.a,'x'), dy2=L(this.l2.b,'y')-L(this.l2.a,'y');
      const len1 = Math.hypot(dx1, dy1), len2 = Math.hypot(dx2, dy2);
      if (len1 < EPS || len2 < EPS) return [0, 1];
      return [
        (dx1*dy2 - dy1*dx2) / (len1 * len2), // parallel
        (dx1*dx2 + dy1*dy2) / (len1 * len2) - 1 // same direction
      ];
    }
    return [L(this.p1,'x')-L(this.p2,'x'), L(this.p1,'y')-L(this.p2,'y')]; // concentric
  }
  toJSON() {
    const o = { id:this.id, kind:'offset', sourceEntityId:this.sourceEntityId,
      targetEntityId:this.targetEntityId, offsetKind:this.offsetKind };
    if (this.offsetKind === 'line') { o.l1 = this.l1; o.l2 = this.l2; }
    else { o.p1 = this.p1; o.p2 = this.p2; }
    return o;
  }
}

class OffsetDistanceConstraint extends Constraint {
  /** Shared distance value for an entire offset operation.
   *  Stores one entry per offset pair and emits one residual per pair,
   *  so changing this single value updates all offset entities at once.
   *  pairs: Array of
   *    { kind:'line',   pointId, l:{a,b} }  — same math as PointLineDistanceConstraint
   *    { kind:'circle', c1:entityId, c2:entityId } — same math as CurveDistanceConstraint radial */
  constructor(pairs, value) {
    super('offsetDistance');
    this.pairs = pairs;
    this.value = value;
    this.labelOffset = null; this.labelParallel = null;
    this.labelAngle = null; this.labelDist = null; this.driven = false;
  }
  refs() {
    return this.pairs.flatMap(p =>
      p.kind === 'line' ? [p.pointId, p.l.a, p.l.b] : [p.c1, p.c2]
    );
  }
  residuals(L) {
    if (this.driven) return [];
    return this.pairs.map(p => {
      if (p.kind === 'line') {
        const px=L(p.pointId,'x'), py=L(p.pointId,'y');
        const ax=L(p.l.a,'x'), ay=L(p.l.a,'y'), bx=L(p.l.b,'x'), by=L(p.l.b,'y');
        const dx=bx-ax, dy=by-ay;
        const len = Math.hypot(dx, dy);
        if (len < EPS) return 0;
        const cross = dx*(py-ay) - dy*(px-ax);
        const value = p.value != null ? p.value : (cross < 0 ? -Math.abs(this.value) : Math.abs(this.value));
        return cross / len - value;
      }
      const radial = L(p.c1,'r') - L(p.c2,'r');
      const value = p.value != null ? p.value : (radial < 0 ? -Math.abs(this.value) : Math.abs(this.value));
      return radial - value; // radial
    });
  }
  toJSON() {
    const o = { id:this.id, kind:'offsetDistance', pairs:this.pairs, value:this.value };
    if (this.labelOffset   != null) o.labelOffset   = this.labelOffset;
    if (this.labelParallel != null) o.labelParallel = this.labelParallel;
    if (this.labelAngle    != null) o.labelAngle    = this.labelAngle;
    if (this.labelDist     != null) o.labelDist     = this.labelDist;
    if (this.driven) o.driven = true;
    return o;
  }
}

class AngleConstraint extends Constraint {
  /** Angle between two line entities, in radians (0 .. π). The solver
   *  constrains the undirected line pair so dragging an endpoint through
   *  the opposite endpoint does not mirror the line to preserve a directed
   *  segment vector. The stored value still selects the displayed sector. */
  constructor(l1Pts, l2Pts, value) {
    super('angle'); this.l1=l1Pts; this.l2=l2Pts; this.value=normalizeAngleValue(value);
    this.labelDist=null; this.labelMidAngle=null; this.driven=false;
  }
  refs() { return [this.l1.a, this.l1.b, this.l2.a, this.l2.b]; }
  residuals(L) {
    if (this.driven) return [];
    const dx1=L(this.l1.b,'x')-L(this.l1.a,'x'), dy1=L(this.l1.b,'y')-L(this.l1.a,'y');
    const dx2=L(this.l2.b,'x')-L(this.l2.a,'x'), dy2=L(this.l2.b,'y')-L(this.l2.a,'y');
    const len1 = Math.hypot(dx1, dy1), len2 = Math.hypot(dx2, dy2);
    if (len1 < EPS || len2 < EPS) return [0];
    const cosAng = (dx1*dx2 + dy1*dy2) / (len1 * len2);
    const target = Math.cos(this.value);
    if (Math.abs(target) < 1e-9) return [ cosAng ];
    return [ Math.sign(cosAng || target) === Math.sign(target)
      ? cosAng - target
      : -cosAng - target ];
  }
  toJSON() {
    const o = { id:this.id, kind:'angle', l1:this.l1, l2:this.l2, value:this.value };
    if (this.labelDist     != null) o.labelDist     = this.labelDist;
    if (this.labelMidAngle != null) o.labelMidAngle = this.labelMidAngle;
    if (this.driven) o.driven = true;
    return o;
  }
}

class DirectedAngleConstraint extends Constraint {
  constructor(l1Pts, l2Pts, value) {
    super('directedAngle');
    this.l1 = l1Pts;
    this.l2 = l2Pts;
    this.value = value;
  }
  refs() { return [this.l1.a, this.l1.b, this.l2.a, this.l2.b]; }
  residuals(L) {
    const dx1=L(this.l1.b,'x')-L(this.l1.a,'x'), dy1=L(this.l1.b,'y')-L(this.l1.a,'y');
    const dx2=L(this.l2.b,'x')-L(this.l2.a,'x'), dy2=L(this.l2.b,'y')-L(this.l2.a,'y');
    const len1 = Math.hypot(dx1, dy1), len2 = Math.hypot(dx2, dy2);
    if (len1 < EPS || len2 < EPS) return [0];
    const dot = (dx1*dx2 + dy1*dy2) / (len1 * len2);
    const cross = (dx1*dy2 - dy1*dx2) / (len1 * len2);
    let delta = Math.atan2(cross, dot) - this.value;
    while (delta > Math.PI) delta -= TAU;
    while (delta < -Math.PI) delta += TAU;
    return [ delta ];
  }
  toJSON() { return { id:this.id, kind:'directedAngle', l1:this.l1, l2:this.l2, value:this.value }; }
}

class PointOnLineConstraint extends Constraint {
  constructor(pointId, l) { super('pointOnLine'); this.pointId=pointId; this.l=l; }
  refs() { return [this.pointId, this.l.a, this.l.b]; }
  residuals(L) {
    const px=L(this.pointId,'x'), py=L(this.pointId,'y');
    const ax=L(this.l.a,'x'), ay=L(this.l.a,'y');
    const bx=L(this.l.b,'x'), by=L(this.l.b,'y');
    return [ (bx-ax)*(py-ay) - (by-ay)*(px-ax) ];
  }
  toJSON() { return { id:this.id, kind:'pointOnLine', pointId:this.pointId, l:this.l }; }
}

class PointOnCircleConstraint extends Constraint {
  constructor(pointId, circleId, centerId) {
    super('pointOnCircle');
    this.pointId=pointId; this.circleId=circleId; this.centerId=centerId;
  }
  refs() { return [this.pointId, this.circleId, this.centerId]; }
  residuals(L) {
    const dx=L(this.pointId,'x')-L(this.centerId,'x');
    const dy=L(this.pointId,'y')-L(this.centerId,'y');
    return [ Math.sqrt(dx*dx+dy*dy) - L(this.circleId,'r') ];
  }
  toJSON() { return { id:this.id, kind:'pointOnCircle', pointId:this.pointId, circleId:this.circleId, centerId:this.centerId }; }
}

function arcEndpointXY(L, ref) {
  const angleKey = ref.which === 'start' ? 'a0' : 'a1';
  const a = L(ref.arcId, angleKey);
  const r = L(ref.arcId, 'r');
  return {
    x: L(ref.centerId, 'x') + r * Math.cos(a),
    y: L(ref.centerId, 'y') + r * Math.sin(a)
  };
}

function pointRefXY(L, ref) {
  if (ref.pointId) return { x: L(ref.pointId, 'x'), y: L(ref.pointId, 'y') };
  return arcEndpointXY(L, ref);
}

function pointRefIds(ref) {
  return ref.pointId ? [ref.pointId] : [ref.arcId, ref.centerId];
}

class ArcEndpointCoincidentConstraint extends Constraint {
  constructor(ref, pointId) {
    super('arcEndpointCoincident');
    this.ref = ref;
    this.pointId = pointId;
  }
  refs() { return [this.ref.arcId, this.ref.centerId, this.pointId]; }
  residuals(L) {
    const p = arcEndpointXY(L, this.ref);
    return [p.x - L(this.pointId, 'x'), p.y - L(this.pointId, 'y')];
  }
  toJSON() { return { id:this.id, kind:'arcEndpointCoincident', ref:this.ref, pointId:this.pointId }; }
}

class ArcEndpointArcEndpointCoincidentConstraint extends Constraint {
  constructor(ref1, ref2) {
    super('arcEndpointArcEndpointCoincident');
    this.ref1 = ref1;
    this.ref2 = ref2;
  }
  refs() { return [this.ref1.arcId, this.ref1.centerId, this.ref2.arcId, this.ref2.centerId]; }
  residuals(L) {
    const a = arcEndpointXY(L, this.ref1);
    const b = arcEndpointXY(L, this.ref2);
    return [a.x - b.x, a.y - b.y];
  }
  toJSON() { return { id:this.id, kind:'arcEndpointArcEndpointCoincident', ref1:this.ref1, ref2:this.ref2 }; }
}

class PointRefHorizontalConstraint extends Constraint {
  constructor(ref1, ref2) {
    super('pointRefHorizontal');
    this.ref1 = ref1;
    this.ref2 = ref2;
  }
  refs() { return [...pointRefIds(this.ref1), ...pointRefIds(this.ref2)]; }
  residuals(L) {
    const a = pointRefXY(L, this.ref1);
    const b = pointRefXY(L, this.ref2);
    return [a.y - b.y];
  }
  toJSON() { return { id:this.id, kind:'pointRefHorizontal', ref1:this.ref1, ref2:this.ref2 }; }
}

class PointRefVerticalConstraint extends Constraint {
  constructor(ref1, ref2) {
    super('pointRefVertical');
    this.ref1 = ref1;
    this.ref2 = ref2;
  }
  refs() { return [...pointRefIds(this.ref1), ...pointRefIds(this.ref2)]; }
  residuals(L) {
    const a = pointRefXY(L, this.ref1);
    const b = pointRefXY(L, this.ref2);
    return [a.x - b.x];
  }
  toJSON() { return { id:this.id, kind:'pointRefVertical', ref1:this.ref1, ref2:this.ref2 }; }
}

class ArcEndpointMidpointConstraint extends Constraint {
  constructor(ref, l) {
    super('arcEndpointMidpoint');
    this.ref = ref;
    this.l = l;
  }
  refs() { return [this.ref.arcId, this.ref.centerId, this.l.a, this.l.b]; }
  residuals(L) {
    const p = arcEndpointXY(L, this.ref);
    return [
      2 * p.x - L(this.l.a, 'x') - L(this.l.b, 'x'),
      2 * p.y - L(this.l.a, 'y') - L(this.l.b, 'y')
    ];
  }
  toJSON() { return { id:this.id, kind:'arcEndpointMidpoint', ref:this.ref, l:this.l }; }
}

class ArcEndpointFixConstraint extends Constraint {
  constructor(ref, x, y) {
    super('arcEndpointFix');
    this.ref = ref;
    this.x = x;
    this.y = y;
  }
  refs() { return [this.ref.arcId, this.ref.centerId]; }
  residuals(L) {
    const p = arcEndpointXY(L, this.ref);
    return [p.x - this.x, p.y - this.y];
  }
  toJSON() { return { id:this.id, kind:'arcEndpointFix', ref:this.ref, x:this.x, y:this.y }; }
}

class ArcEndpointOnLineConstraint extends Constraint {
  constructor(ref, l) {
    super('arcEndpointOnLine');
    this.ref = ref;
    this.l = l;
  }
  refs() { return [this.ref.arcId, this.ref.centerId, this.l.a, this.l.b]; }
  residuals(L) {
    const p = arcEndpointXY(L, this.ref);
    const ax=L(this.l.a,'x'), ay=L(this.l.a,'y');
    const bx=L(this.l.b,'x'), by=L(this.l.b,'y');
    return [ (bx-ax)*(p.y-ay) - (by-ay)*(p.x-ax) ];
  }
  toJSON() { return { id:this.id, kind:'arcEndpointOnLine', ref:this.ref, l:this.l }; }
}

class ArcEndpointOnCircleConstraint extends Constraint {
  constructor(ref, circleId, centerId) {
    super('arcEndpointOnCircle');
    this.ref = ref;
    this.circleId = circleId;
    this.centerId = centerId;
  }
  refs() { return [this.ref.arcId, this.ref.centerId, this.circleId, this.centerId]; }
  residuals(L) {
    const p = arcEndpointXY(L, this.ref);
    const dx=p.x-L(this.centerId,'x'), dy=p.y-L(this.centerId,'y');
    return [ Math.sqrt(dx*dx+dy*dy) - L(this.circleId,'r') ];
  }
  toJSON() { return { id:this.id, kind:'arcEndpointOnCircle', ref:this.ref, circleId:this.circleId, centerId:this.centerId }; }
}
