<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SketchCAD</title>
<script defer src="https://cloud.umami.is/script.js" data-website-id="50dad292-9502-4749-a86e-68f2ed8b2e7a"></script>
<style>
  /* ============================================================
     SketchCAD — light, professional, utilitarian.
     ============================================================ */
  :root {
    --bg:            #eef0f3;
    --panel:         #f7f8fa;
    --panel-2:       #ffffff;
    --border:        #d4d8de;
    --border-soft:   #e3e6ea;
    --text:          #1c2026;
    --text-soft:     #5a626c;
    --text-muted:    #8a929c;
    --accent:        #2563a5;
    --accent-soft:   #d6e3f1;
    --selected:      #ff8a1e;
    --hover:         #ecf2f8;
    --construction:  #c44b8a;
    --underc:        #1f7ad6;
    --fullyc:        #111418;
    --overc:         #d63a3a;
    --grid-fine:     #e6e9ee;
    --grid-major:    #c8ced6;
    --canvas-a:      #fbfcfd;
    --canvas-b:      #e3e8ef;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 13px/1.4 -apple-system, "Segoe UI", "Inter", system-ui, sans-serif;
    color: var(--text);
    background: var(--bg);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  button, input, select { font: inherit; color: inherit; }

  #app {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 44px 1fr 24px;
    grid-template-areas:
      "topbar   topbar"
      "sidebar  workspace"
      "statusbar statusbar";
    height: 100vh;
  }

  /* ---------- Top bar ---------- */
  #topbar {
    grid-area: topbar;
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 8px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
  }
  #topbar .group {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 6px;
    border-right: 1px solid var(--border-soft);
    height: 100%;
  }
  #topbar .group:last-child { border-right: 0; }
  #topbar .label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 4px;
  }
  .tbtn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 30px;
    min-width: 30px;
    padding: 0 8px;
    border: 1px solid transparent;
    background: transparent;
    border-radius: 3px;
    cursor: pointer;
    color: var(--text);
    gap: 6px;
    font-size: 12px;
  }
  .tbtn:hover { background: var(--hover); }
  .tbtn.active {
    background: var(--accent-soft);
    border-color: #b6cce4;
    color: var(--accent);
  }
  .tbtn.toggle.on {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .tbtn svg { width: 16px; height: 16px; flex: 0 0 auto; }
  .sep { width: 1px; height: 22px; background: var(--border-soft); margin: 0 4px; }

  /* ---------- Left sidebar ---------- */
  #sidebar {
    grid-area: sidebar;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .sb-section {
    display: flex;
    flex-direction: column;
    min-height: 0;
    border-bottom: 1px solid var(--border);
  }
  .sb-section:last-child { border-bottom: 0; }
  .sb-layers   { flex: 0 1 auto; min-height: 80px; max-height: 35%; }
  .sb-tool-options { flex: 0 0 auto; }
  .sb-tool-options .sb-body { flex: 0 0 auto; min-height: auto; overflow: visible; }
  .sb-selection{ flex: 1 1 auto; min-height: 200px; }
  .sb-meta     { flex: 0 0 auto; }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 10px;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border-soft);
    background: var(--panel-2);
    flex: 0 0 auto;
  }
  .panel-header .actions { display: flex; gap: 2px; }
  .panel-header .badge {
    text-transform: none;
    letter-spacing: 0;
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 9px;
    padding: 0 6px;
    font-size: 10px;
    color: var(--text-soft);
  }
  .icon-btn {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid transparent;
    background: transparent;
    border-radius: 3px;
    cursor: pointer;
    color: var(--text-soft);
    font-size: 13px;
  }
  .icon-btn:hover { background: var(--hover); color: var(--text); }
  .icon-btn svg { width: 13px; height: 13px; }

  #layers-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .layer-row {
    display: grid;
    grid-template-columns: 22px 1fr 22px;
    align-items: center;
    gap: 2px;
    padding: 2px 6px;
    margin: 1px 4px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .layer-row:hover { background: var(--hover); }
  .layer-row.active {
    background: var(--accent-soft);
    border-color: #b6cce4;
  }
  .layer-row .name {
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 4px 4px;
  }
  .layer-row .name[contenteditable="true"] {
    background: white;
    border: 1px solid var(--accent);
    border-radius: 2px;
    outline: none;
  }
  .layer-row .name .badge {
    font-size: 10px;
    color: var(--text-muted);
    margin-left: 4px;
    background: transparent;
    border: 0;
    padding: 0;
  }

  /* Selection / relations panel body */
  .sb-body {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 8px 10px;
    min-height: 0;
  }
  .sb-subhead {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin: 10px 0 4px;
    font-weight: 600;
  }
  .sb-subhead:first-child { margin-top: 0; }
  .muted { color: var(--text-muted); }
  .empty {
    color: var(--text-muted);
    font-style: italic;
    padding: 4px 0;
    font-size: 11px;
  }

  /* Selection list */
  .sel-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 4px;
    font-size: 12px;
    color: var(--text);
    border-radius: 2px;
  }
  .sel-item:hover { background: var(--hover); }
  .sel-item .glyph {
    width: 14px;
    flex: 0 0 14px;
    text-align: center;
    color: var(--text-soft);
    font-weight: 600;
  }
  .sel-item .layer-tag {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-muted);
    padding: 0 4px;
    border: 1px solid var(--border-soft);
    border-radius: 8px;
  }
  .sel-item.cross-layer .layer-tag {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Relation buttons grid */
  .rel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin: 2px 0;
  }
  .rel-btn {
    padding: 5px 7px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text);
  }
  .rel-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .rel-btn:disabled {
    background: var(--panel);
    color: var(--text-muted);
    cursor: not-allowed;
    border-color: var(--border-soft);
  }
  .rel-btn .glyph {
    width: 14px;
    text-align: center;
    flex: 0 0 14px;
    color: var(--text-soft);
    font-weight: 600;
  }
  .rel-btn:hover .glyph { color: var(--accent); }

  /* Existing constraint pills */
  .constraint-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 6px;
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    font-size: 11px;
    margin: 2px 2px 2px 0;
    color: var(--text-soft);
  }
  .constraint-pill .x {
    cursor: pointer; color: var(--text-muted);
    font-size: 14px; line-height: 1;
  }
  .constraint-pill .x:hover { color: var(--overc); }

  /* Property rows */
  .prop-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 0;
    font-size: 12px;
  }
  .prop-row label {
    width: 70px;
    color: var(--text-soft);
    font-size: 11px;
  }
  .prop-row input[type=number],
  .prop-row input[type=text] {
    flex: 1;
    padding: 3px 5px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: white;
    min-width: 0;
  }
  .prop-row input:focus {
    outline: 1px solid var(--accent);
    border-color: var(--accent);
  }

  /* Project meta */
  #project-meta {
    padding: 8px 10px;
    font-size: 11px;
    color: var(--text-soft);
    background: var(--panel-2);
  }
  #project-meta input[type=text] {
    width: 100%;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: white;
    margin-top: 4px;
    font-size: 12px;
  }
  #project-meta input[type=text]:focus { outline: 1px solid var(--accent); border-color: var(--accent); }

  /* ---------- Workspace / canvas ---------- */
  #workspace {
    grid-area: workspace;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, var(--canvas-a) 0%, var(--canvas-b) 100%);
  }
  #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ---------- Status bar ---------- */
  #statusbar {
    grid-area: statusbar;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 10px;
    background: var(--panel-2);
    border-top: 1px solid var(--border);
    color: var(--text-soft);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  #statusbar .spacer { flex: 1; }
  #statusbar .pill {
    padding: 1px 7px;
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    background: var(--panel);
  }
  #statusbar .pill.ok    { border-color: #cbe1cc; background: #ecf6ed; color: #2c6b34; }
  #statusbar .pill.warn  { border-color: #f0d9b5; background: #fbf2e2; color: #8a5a16; }
  #statusbar .pill.error { border-color: #efc4c4; background: #fbeaea; color: #8a2a2a; }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(20,25,32,0.32);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1000;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: white;
    border-radius: 5px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.18);
    width: 460px;
    max-width: 90vw;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .modal h3 {
    margin: 0; padding: 12px 16px;
    border-bottom: 1px solid var(--border-soft);
    font-size: 14px;
  }
  .modal .body { padding: 14px 16px; }
  .modal .footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border-soft);
    display: flex; gap: 6px; justify-content: flex-end;
    background: var(--panel);
  }
  .modal textarea {
    width: 100%; min-height: 220px;
    font: 12px/1.4 ui-monospace, Menlo, Consolas, monospace;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 3px;
    resize: vertical;
  }
  .btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 3px;
    cursor: pointer;
  }
  .btn:hover { background: var(--hover); }
  .btn.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .btn.primary:hover { background: #1d527f; }

  /* Cursor hint */
  #cursor-hint {
    position: absolute;
    pointer-events: none;
    background: rgba(28,32,38,0.86);
    color: white;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
    transform: translate(12px, 14px);
    z-index: 20;
    display: none;
  }
</style>
</head>
<body>

<div id="app">

  <!-- ============================================================
       TOP BAR
       ============================================================ -->
  <header id="topbar">
    <div class="group">
      <button class="tbtn" data-action="new"      title="New project">New</button>
      <button class="tbtn" data-action="save"     title="Save to browser">Save</button>
      <button class="tbtn" data-action="export"   title="Export JSON">Export</button>
      <button class="tbtn" data-action="import"   title="Import JSON">Import</button>
    </div>

    <div class="group">
      <button class="tbtn" data-action="undo" title="Undo (Ctrl+Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
      </button>
      <button class="tbtn" data-action="redo" title="Redo (Ctrl+Y)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 15-6.7L21 13"/></svg>
      </button>
    </div>

    <div class="group">
      <span class="label">Tools</span>
      <button class="tbtn tool" data-tool="select" title="Select (S)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l13 8-5 1 3 7-2 1-3-7-4 4z"/></svg>
      </button>
      <button class="tbtn tool" data-tool="line" title="Line (L)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="20" x2="20" y2="4"/><circle cx="4" cy="20" r="1.6" fill="currentColor"/><circle cx="20" cy="4" r="1.6" fill="currentColor"/></svg>
      </button>
      <button class="tbtn tool" data-tool="rectangle" title="Rectangle (R)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="6" width="16" height="12"/></svg>
      </button>
      <button class="tbtn tool" data-tool="circle" title="Circle (C)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/></svg>
      </button>
      <button class="tbtn tool" data-tool="hexagon" title="Hexagon / Polygon (H)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3.5l7.4 4.25v8.5L12 20.5l-7.4-4.25v-8.5z"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="tbtn tool" data-tool="arc" title="3-Point Arc (A)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 18a10 10 0 0 1 16 0"/><circle cx="4" cy="18" r="1.4" fill="currentColor"/><circle cx="20" cy="18" r="1.4" fill="currentColor"/><circle cx="12" cy="8" r="1.4" fill="currentColor"/></svg>
      </button>
      <button class="tbtn tool" data-tool="point" title="Point (P)">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button class="tbtn tool" data-tool="smartdim" title="Smart Dimension (D)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 8h4M3 16h4M21 8h-4M21 16h-4M5 8v8M19 8v8"/><text x="9" y="14" fill="currentColor" stroke="none" font-size="8" font-weight="700">12</text></svg>
      </button>
    </div>

    <div class="group">
      <button class="tbtn toggle" data-action="construction" title="Construction (toggle)">⌐ dashed</button>
      <button class="tbtn toggle on" data-action="grid"      title="Grid">▦ grid</button>
      <button class="tbtn toggle on" data-action="snap"      title="Snap">⊹ snap</button>
      <button class="tbtn"          data-action="solve"      title="Solve now (F5)">Solve</button>
    </div>

    <div class="group">
      <button class="tbtn" data-action="zoom-fit"   title="Zoom to fit (F)">Fit</button>
      <button class="tbtn" data-action="zoom-reset" title="Reset view">1:1</button>
    </div>
  </header>

  <!-- ============================================================
       LEFT SIDEBAR
       ============================================================ -->
  <aside id="sidebar">

    <!-- Sketches / Layers -->
    <div class="sb-section sb-layers">
      <div class="panel-header">
        <span>Sketches / Layers</span>
        <div class="actions">
          <button class="icon-btn" id="add-layer" title="Add sketch">＋</button>
        </div>
      </div>
      <div id="layers-list"></div>
    </div>

    <!-- Tool options -->
    <div class="sb-section sb-tool-options" id="tool-options-section" hidden>
      <div class="panel-header">
        <span>Tool Options</span>
      </div>
      <div class="sb-body" id="tool-options-body"></div>
    </div>

    <!-- Selection / Relations / Properties -->
    <div class="sb-section sb-selection">
      <div class="panel-header">
        <span>Selection</span>
        <span class="badge" id="sel-count">0 items</span>
      </div>
      <div class="sb-body" id="sel-body">
        <div class="empty">Click an entity to select. Ctrl-click to add or remove from selection.</div>
      </div>
    </div>

    <!-- Project meta -->
    <div class="sb-section sb-meta">
      <div id="project-meta">
        <div>Project name</div>
        <input type="text" id="project-name" value="Untitled" />
        <div style="margin-top:6px;font-size:10px;color:var(--text-muted)">
          Units: <span id="units">mm</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- ============================================================
       WORKSPACE
       ============================================================ -->
  <main id="workspace">
    <canvas id="canvas"></canvas>
    <div id="cursor-hint"></div>
  </main>

  <!-- ============================================================
       STATUS BAR
       ============================================================ -->
  <footer id="statusbar">
    <span id="status-tool">Tool: Select</span>
    <span id="status-coords">x: 0.000  y: 0.000</span>
    <span id="status-zoom">Zoom: 100%</span>
    <span class="spacer"></span>
    <span class="pill" id="status-state">—</span>
    <span class="pill" id="status-dof">DOF: 0</span>
    <span class="pill" id="status-solve">solver idle</span>
    <span id="status-hint" style="color:var(--text-muted)"></span>
  </footer>
</div>

<!-- Import / Export modal -->
<div class="modal-backdrop" id="json-modal">
  <div class="modal">
    <h3 id="json-modal-title">Export JSON</h3>
    <div class="body">
      <textarea id="json-modal-text"></textarea>
    </div>
    <div class="footer">
      <button class="btn"          id="json-modal-cancel">Cancel</button>
      <button class="btn primary"  id="json-modal-ok">OK</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   SketchCAD — main script. Vanilla JS, no deps.

   Module layout (single-file, comment-delimited):
     1.  Math + linear algebra utilities
     2.  Entities  (Point, Line, Circle, Arc)
     3.  Constraints
     4.  Solver  (Levenberg–Marquardt + rank for DOF / over-defined)
     5.  Sketch / Project model
     6.  View + Renderer
     7.  Snap engine
     8.  Tools (Select, Line, Rect, Circle, Arc, Point, SmartDim)
     9.  Available-relations engine (selection-aware)
    10.  App / event wiring
   ============================================================ */

/* =============== 1. MATH UTILITIES ============================ */
const EPS = 1e-9;
const TAU = Math.PI * 2;
const dist  = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const dist2 = (a, b) => (a.x-b.x)**2 + (a.y-b.y)**2;
const lerp  = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

/** Solve A x = b where A is square (n×n). Naive Gaussian elimination
 *  with partial pivoting. Returns x or null if singular. */
function solveLinear(A, b) {
  const n = A.length;
  const M = A.map((row, i) => [...row, b[i]]);
  for (let i = 0; i < n; i++) {
    let p = i;
    for (let k = i + 1; k < n; k++) if (Math.abs(M[k][i]) > Math.abs(M[p][i])) p = k;
    if (Math.abs(M[p][i]) < 1e-14) return null;
    [M[i], M[p]] = [M[p], M[i]];
    for (let k = i + 1; k < n; k++) {
      const f = M[k][i] / M[i][i];
      for (let j = i; j <= n; j++) M[k][j] -= f * M[i][j];
    }
  }
  const x = new Array(n).fill(0);
  for (let i = n - 1; i >= 0; i--) {
    let s = M[i][n];
    for (let j = i + 1; j < n; j++) s -= M[i][j] * x[j];
    x[i] = s / M[i][i];
  }
  return x;
}

/** Estimate the rank of an m×n matrix by column-pivoted modified
 *  Gram–Schmidt. Returns the count of independent columns whose
 *  residual norm exceeds `tol`. */
function rankApprox(A, tol = 1e-8) {
  if (!A || !A.length || !A[0].length) return 0;
  const m = A.length, n = A[0].length;
  // Work on column vectors.
  const cols = [];
  for (let j = 0; j < n; j++) {
    const c = new Array(m);
    for (let i = 0; i < m; i++) c[i] = A[i][j];
    cols.push(c);
  }
  const Q = [];
  let rank = 0;
  // Pivot greedily on remaining column with largest norm.
  const remaining = new Set(cols.map((_, i) => i));
  while (remaining.size) {
    let bestIdx = -1, bestN = -1;
    for (const i of remaining) {
      let s = 0; for (let k = 0; k < m; k++) s += cols[i][k] * cols[i][k];
      if (s > bestN) { bestN = s; bestIdx = i; }
    }
    if (bestN < tol * tol) break;
    const v = cols[bestIdx].slice();
    for (const q of Q) {
      let dot = 0;
      for (let k = 0; k < m; k++) dot += v[k] * q[k];
      for (let k = 0; k < m; k++) v[k] -= dot * q[k];
    }
    let norm = 0;
    for (let k = 0; k < m; k++) norm += v[k] * v[k];
    norm = Math.sqrt(norm);
    if (norm > tol) {
      for (let k = 0; k < m; k++) v[k] /= norm;
      Q.push(v);
      rank++;
      // strip this component from all remaining columns
      for (const i of remaining) {
        if (i === bestIdx) continue;
        let dot = 0;
        for (let k = 0; k < m; k++) dot += cols[i][k] * v[k];
        for (let k = 0; k < m; k++) cols[i][k] -= dot * v[k];
      }
    }
    remaining.delete(bestIdx);
  }
  return rank;
}

/** Build an orthonormal basis of the row space of m×n matrix A, by
 *  modified Gram-Schmidt on the rows. Returns array of length-n vectors. */
function rowSpaceBasis(A, tol = 1e-8) {
  if (!A || !A.length) return [];
  const n = A[0].length;
  const basis = [];
  for (let i = 0; i < A.length; i++) {
    const v = A[i].slice();
    for (const b of basis) {
      let dot = 0;
      for (let k = 0; k < n; k++) dot += v[k] * b[k];
      for (let k = 0; k < n; k++) v[k] -= dot * b[k];
    }
    let norm = 0;
    for (let k = 0; k < n; k++) norm += v[k] * v[k];
    norm = Math.sqrt(norm);
    if (norm > tol) {
      for (let k = 0; k < n; k++) v[k] /= norm;
      basis.push(v);
    }
  }
  return basis;
}

/** A parameter (column index j) is "pinned" — uniquely determined by the
 *  constraint system — iff the standard basis vector e_j lies in the row
 *  space of J. We check this by ||proj_basis(e_j)||² ≈ 1. */
function nullSpaceBasis(rowBasis, n, tol = 1e-8) {
  const basis = [];
  for (let j = 0; j < n; j++) {
    const v = new Array(n).fill(0);
    v[j] = 1;
    for (const b of rowBasis) {
      let dot = 0;
      for (let k = 0; k < n; k++) dot += v[k] * b[k];
      for (let k = 0; k < n; k++) v[k] -= dot * b[k];
    }
    for (const b of basis) {
      let dot = 0;
      for (let k = 0; k < n; k++) dot += v[k] * b[k];
      for (let k = 0; k < n; k++) v[k] -= dot * b[k];
    }
    let norm = 0;
    for (let k = 0; k < n; k++) norm += v[k] * v[k];
    norm = Math.sqrt(norm);
    if (norm > tol) {
      for (let k = 0; k < n; k++) v[k] /= norm;
      basis.push(v);
    }
  }
  return basis;
}

function solveLeastSquares(A, b, damping = 1e-8) {
  if (!A.length || !A[0]?.length) return null;
  const n = A[0].length;
  const normal = Array.from({ length:n }, () => new Array(n).fill(0));
  const rhs = new Array(n).fill(0);
  for (let i = 0; i < A.length; i++) {
    for (let j = 0; j < n; j++) {
      const aij = A[i][j];
      rhs[j] += aij * b[i];
      for (let k = 0; k < n; k++) normal[j][k] += aij * A[i][k];
    }
  }
  for (let j = 0; j < n; j++) normal[j][j] += damping;
  return solveLinear(normal, rhs);
}

function paramPinnedFromBasis(basis, n) {
  const pinned = new Array(n).fill(false);
  for (let j = 0; j < n; j++) {
    let s = 0;
    for (const b of basis) s += b[j] * b[j];
    pinned[j] = s > 1 - 1e-6;
  }
  return pinned;
}

/** Intersection of two infinite lines (a,b) and (c,d). null if parallel. */
function lineIntersection(a, b, c, d) {
  const denom = (a.x-b.x)*(c.y-d.y) - (a.y-b.y)*(c.x-d.x);
  if (Math.abs(denom) < EPS) return null;
  const t = ((a.x-c.x)*(c.y-d.y) - (a.y-c.y)*(c.x-d.x)) / denom;
  return { x: a.x + t*(b.x-a.x), y: a.y + t*(b.y-a.y) };
}

function normAngle(a) {
  a %= TAU;
  return a < 0 ? a + TAU : a;
}

function ccwDelta(from, to) {
  return normAngle(to - from);
}

function angleSeparation(a, b) {
  const d = ccwDelta(a, b);
  return d > Math.PI ? TAU - d : d;
}

function normalizeAngleValue(rad) {
  if (!Number.isFinite(rad)) return 0;
  let a = Math.abs(rad) % TAU;
  if (a > Math.PI) a = TAU - a;
  return a;
}

function angleArcFromPoints(a1, b1, a2, b2) {
  const ang1 = Math.atan2(b1.y - a1.y, b1.x - a1.x);
  const ang2 = Math.atan2(b2.y - a2.y, b2.x - a2.x);
  const d12 = ccwDelta(ang1, ang2);
  if (d12 <= Math.PI) {
    return { start: ang1, end: ang1 + d12, span: d12, midAngle: normAngle(ang1 + d12 / 2) };
  }
  const span = TAU - d12;
  return { start: ang2, end: ang2 + span, span, midAngle: normAngle(ang2 + span / 2) };
}

function angleSectorCandidates(l1, l2) {
  const a1 = Math.atan2(l1.p2.y - l1.p1.y, l1.p2.x - l1.p1.x);
  const a2 = Math.atan2(l2.p2.y - l2.p1.y, l2.p2.x - l2.p1.x);
  const rays = [
    { line: 1, angle: normAngle(a1),           ref: { a:l1.p1.id, b:l1.p2.id } },
    { line: 1, angle: normAngle(a1 + Math.PI), ref: { a:l1.p2.id, b:l1.p1.id } },
    { line: 2, angle: normAngle(a2),           ref: { a:l2.p1.id, b:l2.p2.id } },
    { line: 2, angle: normAngle(a2 + Math.PI), ref: { a:l2.p2.id, b:l2.p1.id } }
  ].sort((a, b) => a.angle - b.angle);

  const out = [];
  for (let i = 0; i < rays.length; i++) {
    const start = rays[i];
    const end = rays[(i + 1) % rays.length];
    if (start.line === end.line) continue;
    const span = ccwDelta(start.angle, end.angle);
    if (span < 1e-7 || span > Math.PI + 1e-7) continue;
    out.push({
      start: start.angle,
      end: start.angle + span,
      span,
      value: normalizeAngleValue(span),
      midAngle: normAngle(start.angle + span / 2),
      l1Ref: start.line === 1 ? start.ref : end.ref,
      l2Ref: start.line === 2 ? start.ref : end.ref
    });
  }
  return out;
}

function angleSectorForCursor(l1, l2, world) {
  const inter = lineIntersection(l1.p1, l1.p2, l2.p1, l2.p2);
  if (!inter) return null;
  const candidates = angleSectorCandidates(l1, l2);
  if (!candidates.length) return null;
  if (!world) return candidates.reduce((best, c) => c.span < best.span ? c : best, candidates[0]);

  if (dist(inter, world) < EPS) {
    return candidates.reduce((best, c) => c.span < best.span ? c : best, candidates[0]);
  }

  const bearing = normAngle(Math.atan2(world.y - inter.y, world.x - inter.x));
  let best = null;
  for (const c of candidates) {
    const within = ccwDelta(c.start, bearing) <= c.span + 1e-7;
    if (!within) continue;
    const score = angleSeparation(bearing, c.midAngle);
    if (!best || score < best.score) best = { ...c, score };
  }
  if (best) {
    const { score, ...sector } = best;
    return sector;
  }

  const fallback = candidates
    .map(c => ({ ...c, score: angleSeparation(bearing, c.midAngle) }))
    .sort((a, b) => a.score - b.score)[0];
  const { score, ...sector } = fallback;
  return sector;
}

function regularPolygonFromCenterEdge(center, edgeMid, sides) {
  const n = Math.max(3, Math.round(sides || 6));
  const apothem = dist(center, edgeMid);
  if (apothem < EPS) return null;
  const theta = Math.atan2(edgeMid.y - center.y, edgeMid.x - center.x);
  const radius = apothem / Math.cos(Math.PI / n);
  const start = theta - Math.PI / n;
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = start + i * TAU / n;
    pts.push({ x: center.x + radius * Math.cos(a), y: center.y + radius * Math.sin(a) });
  }
  return pts;
}

/* =============== 2. ENTITIES ================================== */
let _idSeq = 1;
const newId = (prefix='e') => prefix + (_idSeq++);

class Entity {
  constructor() {
    this.id = newId();
    this.layerId = null;
    this.construction = false;
    this.fixed = false;
    this.status = 'under';        // 'under' | 'fully' | 'over'
    this.selected = false;
    this.hover = false;
  }
  paramKeys() { return []; }
  getParam(k) { return this[k]; }
  setParam(k, v) { this[k] = v; }
  children() { return []; }
  toJSON() {
    const o = { type: this.constructor.kind, id: this.id,
                construction: this.construction, fixed: this.fixed };
    for (const k of this.paramKeys()) o[k] = this[k];
    return o;
  }
}

class Point extends Entity {
  static kind = 'point';
  constructor(x = 0, y = 0) { super(); this.x = x; this.y = y; }
  paramKeys() { return ['x','y']; }
  hit(world, view) { return dist(this, world) * view.zoom < 7; }
  draw(ctx, view, style) {
    const p = view.worldToScreen(this);
    ctx.save();
    ctx.fillStyle = style.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, this.selected ? 4.5 : 3, 0, TAU);
    ctx.fill();
    if (this.fixed) {
      ctx.strokeStyle = style.color;
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, TAU); ctx.stroke();
    }
    ctx.restore();
  }
}

class Line extends Entity {
  static kind = 'line';
  constructor(p1, p2) { super(); this.p1 = p1; this.p2 = p2; }
  children() { return [this.p1, this.p2]; }
  hit(world, view) {
    const a = this.p1, b = this.p2;
    const dx = b.x - a.x, dy = b.y - a.y;
    const L2 = dx*dx + dy*dy;
    if (L2 < EPS) return dist(world, a) * view.zoom < 6;
    let t = ((world.x - a.x)*dx + (world.y - a.y)*dy) / L2;
    t = clamp(t, 0, 1);
    const px = a.x + t*dx, py = a.y + t*dy;
    return Math.hypot(world.x - px, world.y - py) * view.zoom < 6;
  }
  draw(ctx, view, style) {
    const a = view.worldToScreen(this.p1);
    const b = view.worldToScreen(this.p2);
    ctx.save();
    ctx.strokeStyle = style.color;
    ctx.lineWidth = style.width;
    if (style.dashed) ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.stroke();
    ctx.restore();
  }
  toJSON() {
    return { type: 'line', id: this.id,
             construction: this.construction, fixed: this.fixed,
             p1: this.p1.toJSON(), p2: this.p2.toJSON() };
  }
}

class Circle extends Entity {
  static kind = 'circle';
  constructor(center, r) { super(); this.center = center; this.r = r; }
  paramKeys() { return ['r']; }
  children() { return [this.center]; }
  hit(world, view) {
    const d = dist(this.center, world);
    return Math.abs(d - this.r) * view.zoom < 6;
  }
  draw(ctx, view, style) {
    const c = view.worldToScreen(this.center);
    ctx.save();
    ctx.strokeStyle = style.color;
    ctx.lineWidth = style.width;
    if (style.dashed) ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.arc(c.x, c.y, this.r * view.zoom, 0, TAU);
    ctx.stroke();
    ctx.restore();
  }
  toJSON() {
    return { type: 'circle', id: this.id,
             construction: this.construction, fixed: this.fixed,
             center: this.center.toJSON(), r: this.r };
  }
}

class Arc extends Entity {
  static kind = 'arc';
  constructor(center, r, a0, a1) {
    super();
    this.center = center; this.r = r; this.a0 = a0; this.a1 = a1;
    this.start = new Point(center.x + r*Math.cos(a0), center.y + r*Math.sin(a0));
    this.end   = new Point(center.x + r*Math.cos(a1), center.y + r*Math.sin(a1));
  }
  paramKeys() { return ['r', 'a0', 'a1']; }
  children() { return [this.center]; }
  syncEnds() {
    this.start.x = this.center.x + this.r*Math.cos(this.a0);
    this.start.y = this.center.y + this.r*Math.sin(this.a0);
    this.end.x   = this.center.x + this.r*Math.cos(this.a1);
    this.end.y   = this.center.y + this.r*Math.sin(this.a1);
  }
  hit(world, view) {
    this.syncEnds();
    const dx = world.x - this.center.x, dy = world.y - this.center.y;
    const d = Math.hypot(dx, dy);
    if (Math.abs(d - this.r) * view.zoom > 6) return false;
    let a = Math.atan2(dy, dx);
    let a0 = this.a0, a1 = this.a1;
    while (a1 < a0) a1 += TAU;
    while (a < a0)  a  += TAU;
    return a <= a1 + 1e-3;
  }
  draw(ctx, view, style) {
    this.syncEnds();
    const c = view.worldToScreen(this.center);
    ctx.save();
    ctx.strokeStyle = style.color;
    ctx.lineWidth = style.width;
    if (style.dashed) ctx.setLineDash([6, 4]);
    ctx.beginPath();
    let a0 = this.a0, a1 = this.a1;
    while (a1 < a0) a1 += TAU;
    ctx.arc(c.x, c.y, this.r * view.zoom, a0, a1, false);
    ctx.stroke();
    ctx.restore();
  }
  toJSON() {
    return { type: 'arc', id: this.id,
             construction: this.construction, fixed: this.fixed,
             center: this.center.toJSON(),
             r: this.r, a0: this.a0, a1: this.a1 };
  }
}

/* =============== 3. CONSTRAINTS =============================== */
class Constraint {
  constructor(kind) { this.id = newId('c'); this.kind = kind; this.value = null; }
  residuals(L) { return []; }
  refs() { return []; }
  toJSON() { return { id:this.id, kind:this.kind, value:this.value, refs:this.refs() }; }
}

class FixConstraint extends Constraint {
  constructor(pointId, x, y) { super('fix'); this.pointId=pointId; this.x=x; this.y=y; }
  refs() { return [this.pointId]; }
  residuals(L) { return [ L(this.pointId,'x') - this.x, L(this.pointId,'y') - this.y ]; }
  toJSON() { return { id:this.id, kind:'fix', pointId:this.pointId, x:this.x, y:this.y }; }
}

class ParamFixConstraint extends Constraint {
  constructor(entityId, key, value) {
    super('paramFix');
    this.entityId = entityId;
    this.key = key;
    this.value = value;
  }
  refs() { return [this.entityId]; }
  residuals(L) { return [ L(this.entityId, this.key) - this.value ]; }
  toJSON() { return { id:this.id, kind:'paramFix', entityId:this.entityId, key:this.key, value:this.value }; }
}

class CoincidentConstraint extends Constraint {
  constructor(p1Id, p2Id) { super('coincident'); this.p1=p1Id; this.p2=p2Id; }
  refs() { return [this.p1, this.p2]; }
  residuals(L) { return [ L(this.p1,'x')-L(this.p2,'x'), L(this.p1,'y')-L(this.p2,'y') ]; }
  toJSON() { return { id:this.id, kind:'coincident', p1:this.p1, p2:this.p2 }; }
}

class HorizontalConstraint extends Constraint {
  constructor(lineId, p1Id, p2Id) { super('horizontal'); this.lineId=lineId; this.p1=p1Id; this.p2=p2Id; }
  refs() { return [this.lineId, this.p1, this.p2]; }
  residuals(L) { return [ L(this.p1,'y') - L(this.p2,'y') ]; }
  toJSON() { return { id:this.id, kind:'horizontal', lineId:this.lineId, p1:this.p1, p2:this.p2 }; }
}

class VerticalConstraint extends Constraint {
  constructor(lineId, p1Id, p2Id) { super('vertical'); this.lineId=lineId; this.p1=p1Id; this.p2=p2Id; }
  refs() { return [this.lineId, this.p1, this.p2]; }
  residuals(L) { return [ L(this.p1,'x') - L(this.p2,'x') ]; }
  toJSON() { return { id:this.id, kind:'vertical', lineId:this.lineId, p1:this.p1, p2:this.p2 }; }
}

class ParallelConstraint extends Constraint {
  constructor(l1Pts, l2Pts) { super('parallel'); this.l1=l1Pts; this.l2=l2Pts; }
  refs() { return [this.l1.a, this.l1.b, this.l2.a, this.l2.b]; }
  residuals(L) {
    const dx1=L(this.l1.b,'x')-L(this.l1.a,'x'), dy1=L(this.l1.b,'y')-L(this.l1.a,'y');
    const dx2=L(this.l2.b,'x')-L(this.l2.a,'x'), dy2=L(this.l2.b,'y')-L(this.l2.a,'y');
    return [ dx1*dy2 - dy1*dx2 ];
  }
  toJSON() { return { id:this.id, kind:'parallel', l1:this.l1, l2:this.l2 }; }
}

class PerpendicularConstraint extends Constraint {
  constructor(l1Pts, l2Pts) { super('perpendicular'); this.l1=l1Pts; this.l2=l2Pts; }
  refs() { return [this.l1.a, this.l1.b, this.l2.a, this.l2.b]; }
  residuals(L) {
    const dx1=L(this.l1.b,'x')-L(this.l1.a,'x'), dy1=L(this.l1.b,'y')-L(this.l1.a,'y');
    const dx2=L(this.l2.b,'x')-L(this.l2.a,'x'), dy2=L(this.l2.b,'y')-L(this.l2.a,'y');
    return [ dx1*dx2 + dy1*dy2 ];
  }
  toJSON() { return { id:this.id, kind:'perpendicular', l1:this.l1, l2:this.l2 }; }
}

class CollinearConstraint extends Constraint {
  /** Two lines lie on the same infinite line: parallel + one endpoint of l2 on l1's line. */
  constructor(l1Pts, l2Pts) { super('collinear'); this.l1=l1Pts; this.l2=l2Pts; }
  refs() { return [this.l1.a, this.l1.b, this.l2.a, this.l2.b]; }
  residuals(L) {
    const ax=L(this.l1.a,'x'), ay=L(this.l1.a,'y');
    const bx=L(this.l1.b,'x'), by=L(this.l1.b,'y');
    const cx=L(this.l2.a,'x'), cy=L(this.l2.a,'y');
    const dx=L(this.l2.b,'x'), dy=L(this.l2.b,'y');
    // both endpoints of l2 lie on the line through l1
    const v = (px, py) => (bx-ax)*(py-ay) - (by-ay)*(px-ax);
    return [ v(cx, cy), v(dx, dy) ];
  }
  toJSON() { return { id:this.id, kind:'collinear', l1:this.l1, l2:this.l2 }; }
}

class EqualLengthConstraint extends Constraint {
  constructor(l1Pts, l2Pts) { super('equalLength'); this.l1=l1Pts; this.l2=l2Pts; }
  refs() { return [this.l1.a, this.l1.b, this.l2.a, this.l2.b]; }
  residuals(L) {
    if (this.driven) return [];
    const dx1=L(this.l1.b,'x')-L(this.l1.a,'x'), dy1=L(this.l1.b,'y')-L(this.l1.a,'y');
    const dx2=L(this.l2.b,'x')-L(this.l2.a,'x'), dy2=L(this.l2.b,'y')-L(this.l2.a,'y');
    return [ Math.sqrt(dx1*dx1+dy1*dy1) - Math.sqrt(dx2*dx2+dy2*dy2) ];
  }
  toJSON() {
    const o = { id:this.id, kind:'equalLength', l1:this.l1, l2:this.l2 };
    if (this.driven) o.driven = true;
    return o;
  }
}

class EqualRadiusConstraint extends Constraint {
  constructor(c1Id, c2Id) { super('equalRadius'); this.c1=c1Id; this.c2=c2Id; }
  refs() { return [this.c1, this.c2]; }
  residuals(L) { return [ L(this.c1,'r') - L(this.c2,'r') ]; }
  toJSON() { return { id:this.id, kind:'equalRadius', c1:this.c1, c2:this.c2 }; }
}

class ConcentricConstraint extends Constraint {
  /** Two circles/arcs share a center. We hold both center points coincident. */
  constructor(c1CenterId, c2CenterId) { super('concentric'); this.p1=c1CenterId; this.p2=c2CenterId; }
  refs() { return [this.p1, this.p2]; }
  residuals(L) { return [ L(this.p1,'x')-L(this.p2,'x'), L(this.p1,'y')-L(this.p2,'y') ]; }
  toJSON() { return { id:this.id, kind:'concentric', p1:this.p1, p2:this.p2 }; }
}

class TangentLineCircleConstraint extends Constraint {
  /** Distance from center to line equals radius (squared form, sign-free). */
  constructor(l, circleId, centerId) { super('tangent'); this.l=l; this.circleId=circleId; this.centerId=centerId; }
  refs() { return [this.l.a, this.l.b, this.circleId, this.centerId]; }
  residuals(L) {
    const ax=L(this.l.a,'x'), ay=L(this.l.a,'y');
    const bx=L(this.l.b,'x'), by=L(this.l.b,'y');
    const cx=L(this.centerId,'x'), cy=L(this.centerId,'y');
    const r=L(this.circleId,'r');
    const dx=bx-ax, dy=by-ay;
    const cross = dx*(cy-ay) - dy*(cx-ax);
    const len2 = dx*dx + dy*dy;
    return [ cross*cross - r*r*len2 ];
  }
  toJSON() { return { id:this.id, kind:'tangent', l:this.l, circleId:this.circleId, centerId:this.centerId }; }
}

class TangentCircleCircleConstraint extends Constraint {
  /** External tangent: distance between centers == r1 + r2. */
  constructor(c1Id, c1CenterId, c2Id, c2CenterId, internal=false) {
    super('tangent');
    this.c1=c1Id; this.p1=c1CenterId; this.c2=c2Id; this.p2=c2CenterId; this.internal=internal;
  }
  refs() { return [this.c1, this.p1, this.c2, this.p2]; }
  residuals(L) {
    const dx=L(this.p1,'x')-L(this.p2,'x'), dy=L(this.p1,'y')-L(this.p2,'y');
    const r1=L(this.c1,'r'), r2=L(this.c2,'r');
    const target = this.internal ? Math.abs(r1 - r2) : (r1 + r2);
    return [ Math.sqrt(dx*dx+dy*dy) - target ];
  }
  toJSON() { return { id:this.id, kind:'tangentCC', c1:this.c1, p1:this.p1, c2:this.c2, p2:this.p2, internal:this.internal }; }
}

class MidpointConstraint extends Constraint {
  /** A point sits at the midpoint of a line. */
  constructor(pointId, l) { super('midpoint'); this.pointId=pointId; this.l=l; }
  refs() { return [this.pointId, this.l.a, this.l.b]; }
  residuals(L) {
    return [
      2*L(this.pointId,'x') - L(this.l.a,'x') - L(this.l.b,'x'),
      2*L(this.pointId,'y') - L(this.l.a,'y') - L(this.l.b,'y')
    ];
  }
  toJSON() { return { id:this.id, kind:'midpoint', pointId:this.pointId, l:this.l }; }
}

class DistanceConstraint extends Constraint {
  constructor(p1Id, p2Id, value) {
    super('distance'); this.p1=p1Id; this.p2=p2Id; this.value=value;
    this.labelOffset=null; this.labelParallel=null; this.driven=false;
  }
  refs() { return [this.p1, this.p2]; }
  residuals(L) {
    if (this.driven) return [];
    const dx=L(this.p1,'x')-L(this.p2,'x'), dy=L(this.p1,'y')-L(this.p2,'y');
    return [ Math.sqrt(dx*dx+dy*dy) - this.value ];
  }
  toJSON() {
    const o = { id:this.id, kind:'distance', p1:this.p1, p2:this.p2, value:this.value };
    if (this.labelOffset   != null) o.labelOffset   = this.labelOffset;
    if (this.labelParallel != null) o.labelParallel = this.labelParallel;
    if (this.driven) o.driven = true;
    return o;
  }
}

class PointLineDistanceConstraint extends Constraint {
  /** Perpendicular distance from a point to the infinite line through (a,b). */
  constructor(pointId, l, value) {
    super('pointLineDistance'); this.pointId=pointId; this.l=l; this.value=value;
    this.labelOffset=null; this.labelParallel=null; this.driven=false;
  }
  refs() { return [this.pointId, this.l.a, this.l.b]; }
  residuals(L) {
    if (this.driven) return [];
    const px=L(this.pointId,'x'), py=L(this.pointId,'y');
    const ax=L(this.l.a,'x'),     ay=L(this.l.a,'y');
    const bx=L(this.l.b,'x'),     by=L(this.l.b,'y');
    const dx=bx-ax, dy=by-ay;
    const cross = dx*(py-ay) - dy*(px-ax);
    const len2 = dx*dx + dy*dy;
    return [ cross*cross - this.value*this.value*len2 ];
  }
  toJSON() {
    const o = { id:this.id, kind:'pointLineDistance', pointId:this.pointId, l:this.l, value:this.value };
    if (this.labelOffset   != null) o.labelOffset   = this.labelOffset;
    if (this.labelParallel != null) o.labelParallel = this.labelParallel;
    if (this.driven) o.driven = true;
    return o;
  }
}

class RadiusConstraint extends Constraint {
  constructor(circleId, value) {
    super('radius'); this.circleId=circleId; this.value=value;
    this.labelAngle=null; this.labelDist=null;     // labelDist: distance from center, controls inside/outside
    this.isDiameter=false; this.driven=false;
  }
  refs() { return [this.circleId]; }
  residuals(L) {
    if (this.driven) return [];
    return [ L(this.circleId,'r') - this.value ];
  }
  toJSON() {
    const o = { id:this.id, kind:'radius', circleId:this.circleId, value:this.value };
    if (this.labelAngle != null) o.labelAngle = this.labelAngle;
    if (this.labelDist  != null) o.labelDist  = this.labelDist;
    if (this.isDiameter) o.isDiameter = true;
    if (this.driven) o.driven = true;
    return o;
  }
}

class AngleConstraint extends Constraint {
  /** Absolute angle between two lines, in radians (0 .. π). The sector
   *  is encoded by oriented endpoint refs, so the drawn
   *  wedge and the solver enforce the same acute/obtuse choice. */
  constructor(l1Pts, l2Pts, value) {
    super('angle'); this.l1=l1Pts; this.l2=l2Pts; this.value=normalizeAngleValue(value);
    this.labelDist=null; this.labelMidAngle=null; this.driven=false;
  }
  refs() { return [this.l1.a, this.l1.b, this.l2.a, this.l2.b]; }
  residuals(L) {
    if (this.driven) return [];
    const dx1=L(this.l1.b,'x')-L(this.l1.a,'x'), dy1=L(this.l1.b,'y')-L(this.l1.a,'y');
    const dx2=L(this.l2.b,'x')-L(this.l2.a,'x'), dy2=L(this.l2.b,'y')-L(this.l2.a,'y');
    const len1 = Math.hypot(dx1, dy1), len2 = Math.hypot(dx2, dy2);
    if (len1 < EPS || len2 < EPS) return [0];
    // cos of the angle between the two direction vectors. Using cos
    // (rather than the signed difference) makes the constraint enforce
    // the *absolute* angle: cos(θ) = cos(-θ), so rotational sense is
    // free, but cos(θ) ≠ cos(π-θ), so acute / obtuse stays distinct.
    const cosAng = (dx1*dx2 + dy1*dy2) / (len1 * len2);
    return [ cosAng - Math.cos(this.value) ];
  }
  toJSON() {
    const o = { id:this.id, kind:'angle', l1:this.l1, l2:this.l2, value:this.value };
    if (this.labelDist     != null) o.labelDist     = this.labelDist;
    if (this.labelMidAngle != null) o.labelMidAngle = this.labelMidAngle;
    if (this.driven) o.driven = true;
    return o;
  }
}

class DirectedAngleConstraint extends Constraint {
  constructor(l1Pts, l2Pts, value) {
    super('directedAngle');
    this.l1 = l1Pts;
    this.l2 = l2Pts;
    this.value = value;
  }
  refs() { return [this.l1.a, this.l1.b, this.l2.a, this.l2.b]; }
  residuals(L) {
    const dx1=L(this.l1.b,'x')-L(this.l1.a,'x'), dy1=L(this.l1.b,'y')-L(this.l1.a,'y');
    const dx2=L(this.l2.b,'x')-L(this.l2.a,'x'), dy2=L(this.l2.b,'y')-L(this.l2.a,'y');
    const len1 = Math.hypot(dx1, dy1), len2 = Math.hypot(dx2, dy2);
    if (len1 < EPS || len2 < EPS) return [0];
    const dot = (dx1*dx2 + dy1*dy2) / (len1 * len2);
    const cross = (dx1*dy2 - dy1*dx2) / (len1 * len2);
    let delta = Math.atan2(cross, dot) - this.value;
    while (delta > Math.PI) delta -= TAU;
    while (delta < -Math.PI) delta += TAU;
    return [ delta ];
  }
  toJSON() { return { id:this.id, kind:'directedAngle', l1:this.l1, l2:this.l2, value:this.value }; }
}

class PointOnLineConstraint extends Constraint {
  constructor(pointId, l) { super('pointOnLine'); this.pointId=pointId; this.l=l; }
  refs() { return [this.pointId, this.l.a, this.l.b]; }
  residuals(L) {
    const px=L(this.pointId,'x'), py=L(this.pointId,'y');
    const ax=L(this.l.a,'x'), ay=L(this.l.a,'y');
    const bx=L(this.l.b,'x'), by=L(this.l.b,'y');
    return [ (bx-ax)*(py-ay) - (by-ay)*(px-ax) ];
  }
  toJSON() { return { id:this.id, kind:'pointOnLine', pointId:this.pointId, l:this.l }; }
}

class PointOnCircleConstraint extends Constraint {
  constructor(pointId, circleId, centerId) {
    super('pointOnCircle');
    this.pointId=pointId; this.circleId=circleId; this.centerId=centerId;
  }
  refs() { return [this.pointId, this.circleId, this.centerId]; }
  residuals(L) {
    const dx=L(this.pointId,'x')-L(this.centerId,'x');
    const dy=L(this.pointId,'y')-L(this.centerId,'y');
    return [ Math.sqrt(dx*dx+dy*dy) - L(this.circleId,'r') ];
  }
  toJSON() { return { id:this.id, kind:'pointOnCircle', pointId:this.pointId, circleId:this.circleId, centerId:this.centerId }; }
}

const CONSTRAINT_LABELS = {
  fix:'Fix', coincident:'Coincident', horizontal:'Horizontal',
  vertical:'Vertical', parallel:'Parallel', perpendicular:'Perpendicular',
  collinear:'Collinear', equalLength:'Equal length', equalRadius:'Equal radius',
  concentric:'Concentric', tangent:'Tangent', midpoint:'Midpoint',
  distance:'Distance', radius:'Radius', angle:'Angle', directedAngle:'Central angle',
  pointLineDistance:'Pt-Line dist',
  pointOnLine:'On line', pointOnCircle:'On circle'
};

const CONSTRAINT_GLYPHS = {
  fix:'⚓', coincident:'⌖', horizontal:'━', vertical:'┃',
  parallel:'∥', perpendicular:'⟂', collinear:'≡',
  equal:'＝', equalLength:'＝', equalRadius:'＝',
  concentric:'⊙', tangent:'∽', midpoint:'⌐',
  distance:'↔', radius:'R', diameter:'⌀', angle:'∠',
  pointLineDistance:'↔',
  pointOnLine:'⊥•', pointOnCircle:'○•'
};

/* =============== 4. SOLVER ==================================== */
class Solver {
  constructor() { this.maxIter = 80; this.tol = 1e-9; this.lambda0 = 1e-3; }

  /** Build the param vector + an id-to-entity lookup. The lookup
   *  scope is `lookupScope` (entities visible across the project),
   *  but only entities in `editScope` (the active sketch) provide
   *  parameters that the solver actually moves. */
  _collectParams(editScope) {
    const params = [];
    const seen = new Set();
    const walk = (e) => {
      if (seen.has(e)) return;
      seen.add(e);
      for (const c of e.children()) walk(c);
      for (const k of e.paramKeys()) params.push({ ent: e, key: k });
    };
    for (const e of editScope.entities) walk(e);
    return params;
  }

  _lookupBuilder(allSketches) {
    const byId = new Map();
    const walk = (e) => { byId.set(e.id, e); for (const c of e.children()) walk(c); };
    for (const s of allSketches) for (const e of s.entities) walk(e);
    return (id, key) => {
      const e = byId.get(id);
      return e ? e[key] : 0;
    };
  }

  solve(activeSketch, allVisibleSketches = [activeSketch], extraConstraints = []) {
    const params = this._collectParams(activeSketch);
    const n = params.length;
    const constraints = extraConstraints.length
      ? activeSketch.constraints.concat(extraConstraints)
      : activeSketch.constraints;

    if (n === 0) return { ok:true, iters:0, residual:0, dof:0, n:0, m:constraints.length, rank:0, redundant:0, state:'fully',
                          entityStatus:new Map(), redundantIds:new Set(), pinned:[] };
    if (constraints.length === 0) {
      return { ok:true, iters:0, residual:0, dof:n, n, m:0, rank:0, redundant:0, state:'under',
               entityStatus:new Map(), redundantIds:new Set(), pinned:new Array(n).fill(false) };
    }

    const L = this._lookupBuilder(allVisibleSketches);
    const x = params.map(p => p.ent[p.key]);
    const setX = (xv) => { for (let i = 0; i < n; i++) params[i].ent[params[i].key] = xv[i]; };
    setX(x);

    const computeF = () => {
      const f = [];
      for (const c of constraints) for (const r of c.residuals(L)) f.push(r);
      return f;
    };

    let f = computeF();
    let m = f.length;
    let lambda = this.lambda0;
    let lastJ = null;

    let iters;
    for (iters = 0; iters < this.maxIter; iters++) {
      // numerical Jacobian
      const J = Array.from({ length: m }, () => new Array(n).fill(0));
      for (let j = 0; j < n; j++) {
        const x0 = x[j];
        const step = Math.max(1e-6, Math.abs(x0) * 1e-7);
        x[j] = x0 + step; setX(x);
        const fp = computeF();
        x[j] = x0; setX(x);
        const inv = 1.0 / step;
        for (let i = 0; i < m; i++) J[i][j] = (fp[i] - f[i]) * inv;
      }
      lastJ = J;

      const sumSq = f.reduce((s, v) => s + v*v, 0);
      if (Math.sqrt(sumSq) < this.tol) { iters++; break; }

      const JtJ = Array.from({ length: n }, () => new Array(n).fill(0));
      const Jtf = new Array(n).fill(0);
      for (let i = 0; i < m; i++) {
        for (let j = 0; j < n; j++) {
          const Jij = J[i][j]; if (Jij === 0) continue;
          Jtf[j] += Jij * f[i];
          for (let k = 0; k < n; k++) JtJ[j][k] += Jij * J[i][k];
        }
      }
      for (let j = 0; j < n; j++) JtJ[j][j] += lambda;

      const dx = solveLinear(JtJ, Jtf.map(v => -v));
      if (!dx) { lambda *= 10; if (lambda > 1e12) break; continue; }

      for (let j = 0; j < n; j++) x[j] += dx[j];
      setX(x);
      const f2 = computeF();
      const sumSq2 = f2.reduce((s, v) => s + v*v, 0);
      if (sumSq2 < sumSq) {
        f = f2;
        lambda = Math.max(1e-9, lambda * 0.5);
      } else {
        for (let j = 0; j < n; j++) x[j] -= dx[j];
        setX(x);
        lambda *= 4;
        if (lambda > 1e12) break;
      }
    }

    const residual = Math.sqrt(f.reduce((s,v)=>s+v*v, 0));
    // Rank-based analysis of the final Jacobian. The orthonormal basis
    // of J's row space lets us answer two questions cheaply:
    //   1) Is parameter j fully determined?  → projection of e_j onto
    //      the basis has unit length.
    //   2) Which constraints are redundant?  → rerun rank with each
    //      constraint's rows removed; if rank doesn't drop, redundant.
    const basis = lastJ ? rowSpaceBasis(lastJ, 1e-7) : [];
    const rank = basis.length;
    const dof = Math.max(0, n - rank);
    const redundant = Math.max(0, m - rank);
    const pinned = paramPinnedFromBasis(basis, n);

    // Per-entity status: gather param indices recursively (own + children),
    // then "fully" iff every relevant parameter is pinned.
    const entToIdx = new Map();
    for (let i = 0; i < params.length; i++) {
      const e = params[i].ent;
      if (!entToIdx.has(e)) entToIdx.set(e, []);
      entToIdx.get(e).push(i);
    }
    const gather = (e, acc) => {
      const own = entToIdx.get(e); if (own) for (const i of own) acc.push(i);
      for (const c of e.children()) gather(c, acc);
    };
    const entityStatus = new Map();
    const setStatus = (e) => {
      const idx = []; gather(e, idx);
      const fully = idx.length > 0 && idx.every(i => pinned[i]);
      entityStatus.set(e.id, fully ? 'fully' : 'under');
    };
    for (const e of activeSketch.entities) {
      setStatus(e);
      for (const c of e.children()) setStatus(c);
    }

    // Per-constraint redundancy: a constraint is redundant if removing its
    // rows from J leaves the rank unchanged. We compute row offsets while
    // walking constraints in their original order.
    const redundantIds = new Set();
    if (lastJ && rank > 0 && constraints.length > 1) {
      let off = 0;
      for (const c of constraints) {
        const rows = c.residuals(L).length;
        if (rows === 0) continue;
        const Jminus = [];
        for (let i = 0; i < lastJ.length; i++) {
          if (i < off || i >= off + rows) Jminus.push(lastJ[i]);
        }
        const rWithout = rowSpaceBasis(Jminus, 1e-7).length;
        if (rWithout >= rank) redundantIds.add(c.id);
        off += rows;
      }
    }

    let state;
    if (residual > 1e-3) state = 'over';
    else if (dof === 0)  state = 'fully';
    else                  state = 'under';

    return { ok: residual < 1e-4, iters, residual, dof, n, m, rank, redundant,
             state, entityStatus, redundantIds, pinned };
  }
}

/* =============== 5. SKETCH / PROJECT MODEL ==================== */
class Sketch {
  constructor(name='Sketch 1') {
    this.id = newId('s');
    this.name = name;
    this.visible = true;
    this.entities = [];
    this.constraints = [];
  }
  addEntity(e) { e.layerId = this.id; this.entities.push(e); }
  removeEntity(e) {
    this.entities = this.entities.filter(x => x !== e);
    const ids = new Set();
    const walk = (x) => { ids.add(x.id); for (const c of x.children()) walk(c); };
    walk(e);
    this.constraints = this.constraints.filter(c => !c.refs().some(r => ids.has(r)));
  }
  toJSON() {
    return {
      id:this.id, name:this.name, visible:this.visible,
      entities:this.entities.map(e => e.toJSON()),
      constraints:this.constraints.map(c => c.toJSON())
    };
  }
}

class Project {
  constructor() {
    this.name = 'Untitled';
    this.units = 'mm';
    this.sketches = [];
    this.activeSketchId = null;
  }
  addSketch(name) {
    const s = new Sketch(name || ('Sketch ' + (this.sketches.length + 1)));
    this.sketches.push(s);
    if (!this.activeSketchId) this.activeSketchId = s.id;
    return s;
  }
  removeSketch(id) {
    this.sketches = this.sketches.filter(s => s.id !== id);
    if (this.activeSketchId === id) this.activeSketchId = this.sketches[0]?.id || null;
  }
  active() { return this.sketches.find(s => s.id === this.activeSketchId); }
  visibleSketches() { return this.sketches.filter(s => s.visible); }
  sketchOf(entityOrPoint) {
    for (const s of this.sketches) {
      for (const e of s.entities) {
        if (e === entityOrPoint) return s;
        for (const c of e.children()) if (c === entityOrPoint) return s;
      }
    }
    return null;
  }
  toJSON() {
    return {
      version: 2, name:this.name, units:this.units,
      activeSketchId:this.activeSketchId,
      sketches:this.sketches.map(s => s.toJSON())
    };
  }
  static fromJSON(o) {
    const p = new Project();
    p.name  = o.name || 'Untitled';
    p.units = o.units || 'mm';
    p.sketches = (o.sketches || []).map(sj => {
      const s = new Sketch(sj.name);
      s.id = sj.id; s.visible = sj.visible !== false;
      // CRITICAL — shared point identity must be preserved across revival.
      // Without this map, a corner that was a single Point shared by two
      // lines comes back as TWO Points carrying the same id. The solver's
      // id→entity lookup then sees the duplicate and resolves to whichever
      // copy was walked last, leaving the other copy uncoupled — which
      // looks like "undo broke all the constraints".
      const idMap = new Map();
      const reviveEntity = (ej) => {
        if (ej.id && idMap.has(ej.id)) return idMap.get(ej.id);
        let e;
        if (ej.type === 'point')        e = new Point(ej.x, ej.y);
        else if (ej.type === 'line')   { const a = reviveEntity(ej.p1), b = reviveEntity(ej.p2); e = new Line(a, b); }
        else if (ej.type === 'circle') { const c = reviveEntity(ej.center); e = new Circle(c, ej.r); }
        else if (ej.type === 'arc')    { const c = reviveEntity(ej.center); e = new Arc(c, ej.r, ej.a0, ej.a1); }
        else return null;
        if (ej.id) e.id = ej.id;
        e.construction = !!ej.construction;
        e.fixed = !!ej.fixed;
        if (ej.id) idMap.set(ej.id, e);
        return e;
      };
      for (const ej of sj.entities) {
        const e = reviveEntity(ej);
        if (e) s.addEntity(e);
      }
      for (const cj of (sj.constraints || [])) {
        let c = null;
        switch (cj.kind) {
          case 'fix':           c = new FixConstraint(cj.pointId, cj.x, cj.y); break;
          case 'coincident':    c = new CoincidentConstraint(cj.p1, cj.p2); break;
          case 'horizontal':    c = new HorizontalConstraint(cj.lineId, cj.p1, cj.p2); break;
          case 'vertical':      c = new VerticalConstraint(cj.lineId, cj.p1, cj.p2); break;
          case 'parallel':      c = new ParallelConstraint(cj.l1, cj.l2); break;
          case 'perpendicular': c = new PerpendicularConstraint(cj.l1, cj.l2); break;
          case 'collinear':     c = new CollinearConstraint(cj.l1, cj.l2); break;
          case 'equalLength':   c = new EqualLengthConstraint(cj.l1, cj.l2); break;
          case 'equalRadius':   c = new EqualRadiusConstraint(cj.c1, cj.c2); break;
          case 'concentric':    c = new ConcentricConstraint(cj.p1, cj.p2); break;
          case 'tangent':       c = new TangentLineCircleConstraint(cj.l, cj.circleId, cj.centerId); break;
          case 'tangentCC':     c = new TangentCircleCircleConstraint(cj.c1, cj.p1, cj.c2, cj.p2, !!cj.internal); break;
          case 'midpoint':      c = new MidpointConstraint(cj.pointId, cj.l); break;
          case 'distance':      c = new DistanceConstraint(cj.p1, cj.p2, cj.value); break;
          case 'pointLineDistance': c = new PointLineDistanceConstraint(cj.pointId, cj.l, cj.value); break;
          case 'radius':        c = new RadiusConstraint(cj.circleId, cj.value); break;
          case 'angle':         c = new AngleConstraint(cj.l1, cj.l2, cj.value); break;
          case 'directedAngle': c = new DirectedAngleConstraint(cj.l1, cj.l2, cj.value); break;
          case 'pointOnLine':   c = new PointOnLineConstraint(cj.pointId, cj.l); break;
          case 'pointOnCircle': c = new PointOnCircleConstraint(cj.pointId, cj.circleId, cj.centerId); break;
        }
        if (c) {
          if (cj.id) c.id = cj.id;
          if (cj.labelOffset   != null) c.labelOffset   = cj.labelOffset;
          if (cj.labelParallel != null) c.labelParallel = cj.labelParallel;
          if (cj.labelAngle    != null) c.labelAngle    = cj.labelAngle;
          if (cj.labelDist     != null) c.labelDist     = cj.labelDist;
          if (cj.labelMidAngle != null) c.labelMidAngle = cj.labelMidAngle;
          if (cj.isDiameter)            c.isDiameter    = true;
          if (cj.driven)                c.driven        = true;
          s.constraints.push(c);
        }
      }
      return s;
    });
    p.activeSketchId = o.activeSketchId || (p.sketches[0]?.id ?? null);
    // Bump the global id counter past any id we just read so newly created
    // entities/constraints can't collide with existing ones.
    let maxN = 0;
    const noteId = (id) => {
      if (typeof id !== 'string') return;
      const m = id.match(/^[a-z]+(\d+)$/i);
      if (m) { const n = parseInt(m[1], 10); if (n > maxN) maxN = n; }
    };
    for (const s of p.sketches) {
      noteId(s.id);
      const walk = (e) => { noteId(e.id); for (const c of e.children()) walk(c); };
      for (const e of s.entities) walk(e);
      for (const c of s.constraints) noteId(c.id);
    }
    if (maxN >= _idSeq) _idSeq = maxN + 1;
    return p;
  }
}

/* =============== 6. VIEW / RENDERER =========================== */
class View {
  constructor() { this.zoom=4; this.panX=0; this.panY=0; this.cssW=0; this.cssH=0; }
  worldToScreen(p) {
    return { x: this.cssW/2 + this.panX + p.x*this.zoom,
             y: this.cssH/2 + this.panY - p.y*this.zoom };
  }
  screenToWorld(p) {
    return { x:  (p.x - this.cssW/2 - this.panX)/this.zoom,
             y: -(p.y - this.cssH/2 - this.panY)/this.zoom };
  }
  zoomAt(screenPt, factor) {
    const w = this.screenToWorld(screenPt);
    this.zoom = clamp(this.zoom * factor, 0.05, 5000);
    const w2 = this.screenToWorld(screenPt);
    this.panX += (w2.x - w.x) * this.zoom;
    this.panY -= (w2.y - w.y) * this.zoom;
  }
  fitTo(bbox, paddingPx = 60) {
    if (!bbox) return;
    const w = bbox.maxX - bbox.minX, h = bbox.maxY - bbox.minY;
    if (w < EPS && h < EPS) return;
    const zx = (this.cssW - paddingPx*2) / Math.max(w, EPS);
    const zy = (this.cssH - paddingPx*2) / Math.max(h, EPS);
    this.zoom = clamp(Math.min(zx, zy), 0.05, 5000);
    const cx = (bbox.minX + bbox.maxX)/2, cy = (bbox.minY + bbox.maxY)/2;
    this.panX = -cx * this.zoom;
    this.panY =  cy * this.zoom;
  }
}

class Renderer {
  constructor(canvas, view) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.view = view;
    this.dpr = window.devicePixelRatio || 1;
    this.lastDimRects = [];
  }
  resize() {
    const r = this.canvas.getBoundingClientRect();
    this.view.cssW = r.width; this.view.cssH = r.height;
    this.canvas.width  = Math.floor(r.width  * this.dpr);
    this.canvas.height = Math.floor(r.height * this.dpr);
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
  }
  drawGrid(showGrid) {
    const ctx = this.ctx, v = this.view;
    ctx.clearRect(0, 0, v.cssW, v.cssH);
    if (!showGrid) return;
    let unit = 1;
    while (unit * v.zoom < 12) unit *= 10;
    while (unit * v.zoom > 120) unit /= 10;
    const tl = v.screenToWorld({x:0,y:0}), br = v.screenToWorld({x:v.cssW,y:v.cssH});
    const minX = Math.floor(tl.x / unit) * unit;
    const maxX = Math.ceil (br.x / unit) * unit;
    const minY = Math.floor(br.y / unit) * unit;
    const maxY = Math.ceil (tl.y / unit) * unit;

    ctx.strokeStyle = '#e8ecf1'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = minX; x <= maxX + EPS; x += unit) {
      const sx = v.worldToScreen({x,y:0}).x + 0.5;
      ctx.moveTo(sx, 0); ctx.lineTo(sx, v.cssH);
    }
    for (let y = minY; y <= maxY + EPS; y += unit) {
      const sy = v.worldToScreen({x:0,y}).y + 0.5;
      ctx.moveTo(0, sy); ctx.lineTo(v.cssW, sy);
    }
    ctx.stroke();

    ctx.strokeStyle = '#cdd3db';
    ctx.beginPath();
    const major = unit * 10;
    const mMinX = Math.floor(tl.x / major) * major;
    const mMaxX = Math.ceil (br.x / major) * major;
    const mMinY = Math.floor(br.y / major) * major;
    const mMaxY = Math.ceil (tl.y / major) * major;
    for (let x = mMinX; x <= mMaxX + EPS; x += major) {
      const sx = v.worldToScreen({x,y:0}).x + 0.5;
      ctx.moveTo(sx, 0); ctx.lineTo(sx, v.cssH);
    }
    for (let y = mMinY; y <= mMaxY + EPS; y += major) {
      const sy = v.worldToScreen({x:0,y}).y + 0.5;
      ctx.moveTo(0, sy); ctx.lineTo(v.cssW, sy);
    }
    ctx.stroke();

    const o = v.worldToScreen({x:0,y:0});
    ctx.strokeStyle = '#a7afba'; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(o.x - 7, o.y); ctx.lineTo(o.x + 7, o.y);
    ctx.moveTo(o.x, o.y - 7); ctx.lineTo(o.x, o.y + 7);
    ctx.stroke();
  }

  styleFor(entity, isActive) {
    let color = '#1f7ad6';                          // blue (under)
    if (entity.status === 'fully') color = '#111418';
    if (entity.status === 'over')  color = '#d63a3a'; // red
    if (entity.construction)        color = '#c44b8a';
    if (entity.hover)               color = '#1d527f';
    if (entity.selected)            color = '#ff8a1e';
    if (!isActive && !entity.selected) color = '#7a828c';
    return {
      color,
      width: entity.selected ? 2 : 1.4,
      dashed: entity.construction
    };
  }

  drawEntities(sketches, activeId) {
    const ctx = this.ctx, v = this.view;
    for (const s of sketches) {
      if (!s.visible) continue;
      const isActive = s.id === activeId;
      ctx.globalAlpha = isActive ? 1 : 0.55;
      for (const e of s.entities) {
        const style = this.styleFor(e, isActive);
        e.draw(ctx, v, style);
        for (const c of e.children()) c.draw(ctx, v, this.styleFor(c, isActive));
      }
      ctx.globalAlpha = 1;
    }
  }

  drawSnapMarker(snap) {
    if (!snap) return;
    const v = this.view, ctx = this.ctx;
    const s = v.worldToScreen(snap);
    ctx.save();
    ctx.strokeStyle = '#1f7ad6'; ctx.fillStyle = 'white'; ctx.lineWidth = 1.4;
    ctx.beginPath();
    if (snap.kind === 'endpoint')      ctx.rect(s.x-5, s.y-5, 10, 10);
    else if (snap.kind === 'midpoint') { ctx.moveTo(s.x, s.y-6); ctx.lineTo(s.x+6, s.y); ctx.lineTo(s.x, s.y+6); ctx.lineTo(s.x-6, s.y); ctx.closePath(); }
    else if (snap.kind === 'center')   ctx.arc(s.x, s.y, 5, 0, TAU);
    else                                ctx.arc(s.x, s.y, 4, 0, TAU);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  drawTempPath(pathPoints, dashed=false) {
    if (!pathPoints || pathPoints.length < 2) return;
    const v = this.view, ctx = this.ctx;
    ctx.save();
    ctx.strokeStyle = '#1f7ad6'; ctx.lineWidth = 1.2;
    if (dashed) ctx.setLineDash([5, 4]);
    ctx.beginPath();
    const a = v.worldToScreen(pathPoints[0]);
    ctx.moveTo(a.x, a.y);
    for (let i = 1; i < pathPoints.length; i++) {
      const p = v.worldToScreen(pathPoints[i]);
      ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.restore();
  }

  drawTempCircle(center, radius) {
    const v = this.view, ctx = this.ctx;
    const c = v.worldToScreen(center);
    ctx.save();
    ctx.strokeStyle = '#1f7ad6'; ctx.lineWidth = 1.2;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.arc(c.x, c.y, radius * v.zoom, 0, TAU);
    ctx.stroke();
    ctx.restore();
  }

  drawSelectionBox(box) {
    if (!box) return;
    const ctx = this.ctx;
    ctx.save();
    ctx.strokeStyle = '#2563a5';
    ctx.fillStyle = 'rgba(37,99,165,0.08)';
    ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.rect(box.x, box.y, box.w, box.h);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  drawDimPicks(picks) {
    if (!picks || !picks.length) return;
    const v = this.view, ctx = this.ctx;
    ctx.save();
    ctx.strokeStyle = '#ff8a1e';
    ctx.fillStyle = 'rgba(255,138,30,0.18)';
    ctx.lineWidth = 2;
    for (const e of picks) {
      if (e instanceof Point) {
        const p = v.worldToScreen(e);
        ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, TAU);
        ctx.fill(); ctx.stroke();
      } else if (e instanceof Line) {
        const a = v.worldToScreen(e.p1), b = v.worldToScreen(e.p2);
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
        ctx.stroke();
      } else if (e instanceof Circle) {
        const c = v.worldToScreen(e.center);
        ctx.beginPath(); ctx.arc(c.x, c.y, e.r * v.zoom, 0, TAU);
        ctx.stroke();
      } else if (e instanceof Arc) {
        e.syncEnds();
        const c = v.worldToScreen(e.center);
        let a0 = e.a0, a1 = e.a1; while (a1 < a0) a1 += TAU;
        ctx.beginPath(); ctx.arc(c.x, c.y, e.r * v.zoom, a0, a1, false);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  /* ----- Dimension labels on the canvas ----- */
  drawDimensions(sketch, entMap, redundantIds) {
    if (!sketch) return;
    // remember the screen-space rect of every label we draw so the app can
    // hit-test them for click-to-edit / drag-to-move
    this.lastDimRects = [];
    for (const c of sketch.constraints) {
      const grey = c.driven || (redundantIds && redundantIds.has(c.id));
      switch (c.kind) {
        case 'distance':          this._drawDistance(c, entMap, grey); break;
        case 'pointLineDistance': this._drawPLDistance(c, entMap, grey); break;
        case 'radius':            this._drawRadius(c, entMap, grey); break;
        case 'angle':             this._drawAngle(c, entMap, grey); break;
      }
    }
  }

  /** Draw a SmartDim preview that follows the cursor — synthesises a
   *  fake constraint + entity map and reuses the committed-dimension
   *  drawing routines so the preview looks identical to what gets
   *  saved. */
  drawDimPreview(preview) {
    if (!preview) return;
    if (preview.kind === 'distance') {
      const fake = { p1:'_a', p2:'_b', value: preview.value,
                      labelOffset: preview.offset, labelParallel: preview.parallel };
      const map = new Map([['_a', preview.p1], ['_b', preview.p2]]);
      this._drawDistance(fake, map, false);
    } else if (preview.kind === 'pointLineDistance') {
      const fake = { pointId:'_p', l:{a:'_la', b:'_lb'}, value: preview.value,
                      labelOffset: preview.offset, labelParallel: preview.parallel };
      const map = new Map([['_p', preview.p], ['_la', preview.line.p1], ['_lb', preview.line.p2]]);
      this._drawPLDistance(fake, map, false);
    } else if (preview.kind === 'radius' || preview.kind === 'diameter') {
      const fake = {
        circleId:'_c',
        value: preview.kind === 'diameter' ? preview.value / 2 : preview.value,
        labelAngle: preview.angle,
        labelDist:  preview.dist,
        isDiameter: preview.kind === 'diameter'
      };
      const map = new Map([['_c', preview.circle]]);
      this._drawRadius(fake, map, false);
    } else if (preview.kind === 'angle') {
      const fake = {
        l1: preview.l1Ref || { a:preview.l1.p1.id, b:preview.l1.p2.id },
        l2: preview.l2Ref || { a:preview.l2.p1.id, b:preview.l2.p2.id },
        value: preview.value, labelDist: preview.dist,
        labelMidAngle: preview.midAngle
      };
      const map = new Map([
        [preview.l1.p1.id, preview.l1.p1], [preview.l1.p2.id, preview.l1.p2],
        [preview.l2.p1.id, preview.l2.p1], [preview.l2.p2.id, preview.l2.p2]
      ]);
      this._drawAngle(fake, map, false);
    }
  }

  _dimColors(grey) {
    return grey
      ? { stroke: 'rgba(120,128,140,0.85)', fill: 'rgba(120,128,140,0.85)', text: '#7a828c' }
      : { stroke: '#1c2026', fill: '#1c2026', text: '#1c2026' };
  }

  _drawArrow(ctx, tip, dir) {
    // dir is a screen-space unit vector pointing AWAY from tip (along the
    // dimension line). Arrow head points back toward tip.
    const len = 7, spread = 0.38;
    const cs = Math.cos(spread), sn = Math.sin(spread);
    const ax = tip.x + len * (dir.x*cs - dir.y*sn);
    const ay = tip.y + len * (dir.y*cs + dir.x*sn);
    const bx = tip.x + len * (dir.x*cs + dir.y*sn);
    const by = tip.y + len * (dir.y*cs - dir.x*sn);
    ctx.beginPath();
    ctx.moveTo(tip.x, tip.y); ctx.lineTo(ax, ay); ctx.lineTo(bx, by);
    ctx.closePath(); ctx.fill();
  }

  _drawText(ctx, x, y, text, color, angleRad = 0) {
    ctx.save();
    ctx.translate(x, y);
    let a = angleRad;
    if (a > Math.PI/2)  a -= Math.PI;
    if (a < -Math.PI/2) a += Math.PI;
    ctx.rotate(a);
    ctx.font = '11px ui-sans-serif, system-ui, -apple-system, "Segoe UI"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Subtle stroke under the text so it stays legible over grid / lines
    // without painting a hard white background rectangle.
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineJoin = 'round';
    ctx.strokeText(text, 0, 0);
    ctx.fillStyle = color;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  _drawDistance(c, entMap, grey, recordAs) {
    const p1 = entMap.get(c.p1), p2 = entMap.get(c.p2);
    if (!p1 || !p2) return;
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const len = Math.hypot(dx, dy);
    if (len < EPS) return;
    const v = this.view, ctx = this.ctx;

    const offsetWorld   = (c.labelOffset   != null) ? c.labelOffset   : (12 / v.zoom);
    const parallelWorld = (c.labelParallel != null) ? c.labelParallel : 0;
    const nx = -dy / len, ny = dx / len; // perpendicular unit
    const tx =  dx / len, ty =  dy / len; // tangent unit

    // Extension feet at the perpendicular projections of p1 and p2 onto
    // the dim line. The text rides at midpoint + tangent * parallel.
    const a = { x: p1.x + nx * offsetWorld, y: p1.y + ny * offsetWorld };
    const b = { x: p2.x + nx * offsetWorld, y: p2.y + ny * offsetWorld };
    const labelMid = {
      x: (p1.x + p2.x)/2 + nx * offsetWorld + tx * parallelWorld,
      y: (p1.y + p2.y)/2 + ny * offsetWorld + ty * parallelWorld
    };

    const pa = v.worldToScreen(a), pb = v.worldToScreen(b);
    const pp1 = v.worldToScreen(p1), pp2 = v.worldToScreen(p2);
    const plab = v.worldToScreen(labelMid);

    const cols = this._dimColors(grey);
    ctx.save();
    ctx.strokeStyle = cols.stroke; ctx.fillStyle = cols.fill; ctx.lineWidth = 1;

    // Extension lines (small gap from anchor, extend slightly past dim line)
    const ux = pa.x - pp1.x, uy = pa.y - pp1.y;
    const ul = Math.hypot(ux, uy) || 1;
    const e1 = { x: ux/ul, y: uy/ul };
    ctx.beginPath();
    ctx.moveTo(pp1.x + e1.x*4, pp1.y + e1.y*4);
    ctx.lineTo(pa.x  + e1.x*4, pa.y  + e1.y*4);
    ctx.moveTo(pp2.x + e1.x*4, pp2.y + e1.y*4);
    ctx.lineTo(pb.x  + e1.x*4, pb.y  + e1.y*4);

    // The dim line spans from foot a to foot b, but if the label sits past
    // one of the feet (cursor was dragged outside the segment) we extend
    // the line out to the label so the text is on the line.
    const segLen = len; // = |b - a| in world
    const tParam = parallelWorld / segLen + 0.5; // 0=at a, 1=at b
    let dimStart = pa, dimEnd = pb;
    if (tParam < 0)      dimStart = plab;
    else if (tParam > 1) dimEnd   = plab;
    ctx.moveTo(dimStart.x, dimStart.y); ctx.lineTo(dimEnd.x, dimEnd.y);
    ctx.stroke();

    // Arrows always sit at the feet, pointing inward toward each other.
    const dxs = pb.x - pa.x, dys = pb.y - pa.y;
    const dl  = Math.hypot(dxs, dys) || 1;
    const dir = { x: dxs/dl, y: dys/dl };
    this._drawArrow(ctx, pa, dir);
    this._drawArrow(ctx, pb, { x: -dir.x, y: -dir.y });

    const text = (c.value != null) ? Number(c.value).toFixed(2) : len.toFixed(2);
    this._drawText(ctx, plab.x, plab.y, text, cols.text, Math.atan2(dys, dxs));
    ctx.restore();

    if (this.lastDimRects) {
      ctx.font = '11px ui-sans-serif, system-ui, -apple-system, "Segoe UI"';
      const w = ctx.measureText(text).width;
      this.lastDimRects.push({
        constraint: recordAs || c,
        x: plab.x - w/2 - 4, y: plab.y - 9, w: w + 8, h: 18
      });
    }
  }

  _drawPLDistance(c, entMap, grey) {
    const pt = entMap.get(c.pointId);
    const la = entMap.get(c.l.a), lb = entMap.get(c.l.b);
    if (!pt || !la || !lb) return;
    const dx = lb.x - la.x, dy = lb.y - la.y;
    const len2 = dx*dx + dy*dy;
    if (len2 < EPS) return;
    const t = ((pt.x - la.x)*dx + (pt.y - la.y)*dy) / len2;
    const foot = { x: la.x + t*dx, y: la.y + t*dy };
    // Render as a distance dim between the point and its foot, carrying
    // the constraint's labelOffset through so the dim line stays where
    // the user placed it. Record under the original PLD constraint so
    // hit-testing finds it.
    this._drawDistance(
      { p1: '_a', p2: '_b', value: c.value,
        labelOffset: c.labelOffset, labelParallel: c.labelParallel },
      new Map([['_a', pt], ['_b', foot]]),
      grey,
      c
    );
  }

  _drawRadius(c, entMap, grey) {
    const circ = entMap.get(c.circleId);
    if (!circ) return;
    const center = circ.center;
    const r = circ.r;
    const v = this.view, ctx = this.ctx;
    const cols = this._dimColors(grey);

    const angle = (c.labelAngle != null) ? c.labelAngle : Math.PI/6;
    // labelDist controls inside-vs-outside placement based on cursor
    // distance from center. Inside (labelDist < r) → label inside the
    // circle, arrow at rim points outward. Outside (labelDist >= r) →
    // label past the rim, arrow at rim points inward at the center.
    let labelDist;
    if (c.labelDist != null) {
      labelDist = c.labelDist;
    } else {
      const radPx = r * v.zoom;
      labelDist = (radPx > 60) ? Math.max(r * 0.45, r - 26 / v.zoom) : (r + 14 / v.zoom);
    }
    const insideMode = labelDist < r;
    const rim   = { x: center.x + r * Math.cos(angle),         y: center.y + r * Math.sin(angle) };
    const label = { x: center.x + labelDist * Math.cos(angle), y: center.y + labelDist * Math.sin(angle) };
    const pcen = v.worldToScreen(center);
    const prim = v.worldToScreen(rim);
    const plab = v.worldToScreen(label);

    let arrowDir;
    if (insideMode) {
      const dxs = prim.x - pcen.x, dys = prim.y - pcen.y;
      const dl = Math.hypot(dxs, dys) || 1;
      arrowDir = { x: dxs / dl, y: dys / dl };
    } else {
      const dxs = pcen.x - prim.x, dys = pcen.y - prim.y;
      const dl = Math.hypot(dxs, dys) || 1;
      arrowDir = { x: dxs / dl, y: dys / dl };
    }

    ctx.save();
    ctx.strokeStyle = cols.stroke; ctx.fillStyle = cols.fill; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(plab.x, plab.y); ctx.lineTo(prim.x, prim.y);
    ctx.stroke();
    this._drawArrow(ctx, prim, arrowDir);

    const radius = c.value ?? r;
    const txt = c.isDiameter
      ? '⌀' + Number(radius * 2).toFixed(2)
      : 'R' + Number(radius).toFixed(2);
    this._drawText(ctx, plab.x, plab.y, txt, cols.text, 0);
    ctx.restore();

    if (this.lastDimRects) {
      ctx.font = '11px ui-sans-serif, system-ui, -apple-system, "Segoe UI"';
      const w = ctx.measureText(txt).width;
      this.lastDimRects.push({ constraint: c, x: plab.x - w/2 - 4, y: plab.y - 9, w: w + 8, h: 18 });
    }
  }

  _drawAngle(c, entMap, grey) {
    const a1 = entMap.get(c.l1.a), b1 = entMap.get(c.l1.b);
    const a2 = entMap.get(c.l2.a), b2 = entMap.get(c.l2.b);
    if (!a1 || !b1 || !a2 || !b2) return;
    const inter = lineIntersection(a1, b1, a2, b2);
    if (!inter) return;

    const v = this.view, ctx = this.ctx;
    const cols = this._dimColors(grey);
    const arc = angleArcFromPoints(a1, b1, a2, b2);
    const pinter = v.worldToScreen(inter);
    const radPx = Math.max(10, (c.labelDist != null) ? c.labelDist * v.zoom : 32);

    ctx.save();
    ctx.strokeStyle = cols.stroke; ctx.fillStyle = cols.fill; ctx.lineWidth = 1;
    // Canvas y is flipped relative to math angles — negate for arc().
    ctx.beginPath();
    ctx.arc(pinter.x, pinter.y, radPx, -arc.start, -arc.end, true);
    ctx.stroke();

    const midAng = arc.midAngle;
    const value = normalizeAngleValue(c.value ?? arc.span);
    const txt = (value * 180 / Math.PI).toFixed(1) + '°';
    const tx = pinter.x + (radPx + 12) * Math.cos(midAng);
    const ty = pinter.y - (radPx + 12) * Math.sin(midAng); // flip y
