/* =============== 4. SOLVER ==================================== */
class Solver {
  constructor() { this.maxIter = 80; this.tol = 1e-9; this.lambda0 = 1e-3; }

  /** Build the param vector + an id-to-entity lookup. The lookup
   *  scope is `lookupScope` (entities visible across the project),
   *  but only entities in `editScope` (the active sketch) provide
   *  parameters that the solver actually moves. */
  _collectParams(editScope) {
    const params = [];
    const seen = new Set();
    const walk = (e) => {
      if (seen.has(e)) return;
      seen.add(e);
      for (const c of e.children()) walk(c);
      for (const k of e.paramKeys()) params.push({ ent: e, key: k });
    };
    for (const e of editScope.entities) walk(e);
    return params;
  }

  _lookupBuilder(allSketches) {
    const byId = new Map();
    const walk = (e) => { byId.set(e.id, e); for (const c of e.children()) walk(c); };
    for (const s of allSketches) for (const e of s.entities) walk(e);
    return (id, key) => {
      const e = byId.get(id);
      return e ? e[key] : 0;
    };
  }

  _componentGroups(activeSketch, constraints) {
    const graph = new Map();
    const add = (id) => {
      if (!id) return;
      if (!graph.has(id)) graph.set(id, new Set());
    };
    const link = (a, b) => {
      if (!a || !b || a === b) return;
      add(a); add(b);
      graph.get(a).add(b);
      graph.get(b).add(a);
    };
    const walk = (e) => {
      add(e.id);
      for (const child of e.children()) {
        add(child.id);
        link(e.id, child.id);
        walk(child);
      }
    };
    for (const e of activeSketch.entities) walk(e);
    for (const c of constraints) {
      if (c.driven) continue;
      const refs = c.refs().filter(Boolean);
      for (const id of refs) add(id);
      for (let i = 0; i < refs.length; i++) {
        for (let j = i + 1; j < refs.length; j++) link(refs[i], refs[j]);
      }
    }

    const seen = new Set();
    const groups = [];
    for (const e of activeSketch.entities) {
      if (seen.has(e.id)) continue;
      const ids = new Set();
      const q = [e.id];
      seen.add(e.id);
      ids.add(e.id);
      for (let qi = 0; qi < q.length; qi++) {
        const id = q[qi];
        for (const nb of (graph.get(id) || [])) {
          if (seen.has(nb)) continue;
          seen.add(nb);
          ids.add(nb);
          q.push(nb);
        }
      }
      const entities = activeSketch.entities.filter(ent => {
        if (ids.has(ent.id)) return true;
        return ent.children().some(child => ids.has(child.id));
      });
      const groupConstraints = constraints.filter(c => c.refs().some(id => ids.has(id)));
      groups.push({ ids, entities, constraints:groupConstraints });
    }
    return groups;
  }

  _solveComponents(activeSketch, allVisibleSketches, constraints, options) {
    const groups = this._componentGroups(activeSketch, constraints);
    if (groups.length <= 1) {
      return this.solve({ entities:activeSketch.entities, constraints }, allVisibleSketches, [], { ...options, componentize:false });
    }
    const activeIds = options.activeIds instanceof Set
      ? options.activeIds
      : (options.activeIds ? new Set(options.activeIds) : null);
    const groupsToSolve = activeIds && activeIds.size
      ? groups.filter(g => [...activeIds].some(id => g.ids.has(id)))
      : groups;
    if (!groupsToSolve.length) {
      const diagnostics = options.diagnostics !== false;
      return {
        ok:true, iters:0, residual:0, dof:diagnostics ? 0 : null,
        n:0, m:0, rank:diagnostics ? 0 : null, redundant:0,
        state:diagnostics ? 'under' : 'solved',
        entityStatus:diagnostics ? new Map() : null,
        redundantIds:diagnostics ? new Set() : null,
        pinned:diagnostics ? [] : null, diagnostics
      };
    }

    const diagnostics = options.diagnostics !== false;
    const entityStatus = diagnostics ? new Map() : null;
    const redundantIds = diagnostics ? new Set() : null;
    const pinned = [];
    let ok = true, iters = 0, residualSq = 0, n = 0, m = 0, rank = 0, redundant = 0, dof = 0;
    let over = false, under = false;

    for (const group of groupsToSolve) {
      const subSketch = { entities: group.entities, constraints: group.constraints };
      const r = this.solve(subSketch, allVisibleSketches, [], { ...options, componentize:false });
      ok = ok && r.ok;
      iters = Math.max(iters, r.iters || 0);
      residualSq += (r.residual || 0) * (r.residual || 0);
      n += r.n || 0;
      m += r.m || 0;
      if (diagnostics) {
        rank += r.rank || 0;
        redundant += r.redundant || 0;
        dof += r.dof || 0;
        if (r.state === 'over') over = true;
        else if (r.state === 'under') under = true;
        for (const [id, status] of r.entityStatus || []) entityStatus.set(id, status);
        for (const id of r.redundantIds || []) redundantIds.add(id);
        if (r.pinned) pinned.push(...r.pinned);
      } else if (r.state === 'over') {
        over = true;
      }
    }

    const residual = Math.sqrt(residualSq);
    const state = diagnostics
      ? (over ? 'over' : (under || dof > 0 ? 'under' : 'fully'))
      : (over || residual > 1e-3 ? 'over' : 'solved');
    return {
      ok, iters, residual, dof:diagnostics ? dof : null, n, m,
      rank:diagnostics ? rank : null, redundant, state,
      entityStatus, redundantIds, pinned:diagnostics ? pinned : null, diagnostics
    };
  }

  solve(activeSketch, allVisibleSketches = [activeSketch], extraConstraints = [], options = {}) {
    const diagnostics = options.diagnostics !== false;
    const constraints = extraConstraints.length
      ? activeSketch.constraints.concat(extraConstraints)
      : activeSketch.constraints;
    if (options.componentize !== false && activeSketch.entities?.length > 1) {
      return this._solveComponents(activeSketch, allVisibleSketches, constraints, options);
    }
    const params = this._collectParams(activeSketch);
    const n = params.length;

    if (n === 0) return { ok:true, iters:0, residual:0, dof:diagnostics ? 0 : null, n:0, m:constraints.length,
                          rank:diagnostics ? 0 : null, redundant:0, state:diagnostics ? 'fully' : 'solved',
                          entityStatus:diagnostics ? new Map() : null,
                          redundantIds:diagnostics ? new Set() : null,
                          pinned:diagnostics ? [] : null, diagnostics };
    if (constraints.length === 0) {
      return { ok:true, iters:0, residual:0, dof:diagnostics ? n : null, n, m:0,
               rank:diagnostics ? 0 : null, redundant:0, state:diagnostics ? 'under' : 'solved',
               entityStatus:diagnostics ? new Map() : null,
               redundantIds:diagnostics ? new Set() : null,
               pinned:diagnostics ? new Array(n).fill(false) : null, diagnostics };
    }

    const L = this._lookupBuilder(allVisibleSketches);
    const x = params.map(p => p.ent[p.key]);
    const setX = (xv) => { for (let i = 0; i < n; i++) params[i].ent[params[i].key] = xv[i]; };
    setX(x);

    const computeF = () => {
      const f = [];
      for (const c of constraints) for (const r of c.residuals(L)) f.push(r);
      return f;
    };

    let f = computeF();
    let m = f.length;
    let lambda = this.lambda0;
    let lastJ = null;

    let iters;
    for (iters = 0; iters < this.maxIter; iters++) {
      // numerical Jacobian
      const J = Array.from({ length: m }, () => new Array(n).fill(0));
      for (let j = 0; j < n; j++) {
        const x0 = x[j];
        const step = Math.max(1e-6, Math.abs(x0) * 1e-7);
        x[j] = x0 + step; setX(x);
        const fp = computeF();
        x[j] = x0; setX(x);
        const inv = 1.0 / step;
        for (let i = 0; i < m; i++) J[i][j] = (fp[i] - f[i]) * inv;
      }
      lastJ = J;

      const sumSq = f.reduce((s, v) => s + v*v, 0);
      if (Math.sqrt(sumSq) < this.tol) { iters++; break; }

      const JtJ = Array.from({ length: n }, () => new Array(n).fill(0));
      const Jtf = new Array(n).fill(0);
      for (let i = 0; i < m; i++) {
        for (let j = 0; j < n; j++) {
          const Jij = J[i][j]; if (Jij === 0) continue;
          Jtf[j] += Jij * f[i];
          for (let k = 0; k < n; k++) JtJ[j][k] += Jij * J[i][k];
        }
      }
      for (let j = 0; j < n; j++) JtJ[j][j] += lambda;

      const dx = solveLinear(JtJ, Jtf.map(v => -v));
      if (!dx) { lambda *= 10; if (lambda > 1e12) break; continue; }

      for (let j = 0; j < n; j++) x[j] += dx[j];
      setX(x);
      const f2 = computeF();
      const sumSq2 = f2.reduce((s, v) => s + v*v, 0);
      if (sumSq2 < sumSq) {
        f = f2;
        lambda = Math.max(1e-9, lambda * 0.5);
      } else {
        for (let j = 0; j < n; j++) x[j] -= dx[j];
        setX(x);
        lambda *= 4;
        if (lambda > 1e12) break;
      }
    }

    const residual = Math.sqrt(f.reduce((s,v)=>s+v*v, 0));
    if (!diagnostics) {
      const state = residual > 1e-3 ? 'over' : 'solved';
      return { ok: residual < 1e-4, iters, residual, dof:null, n, m, rank:null,
               redundant:0, state, entityStatus:null, redundantIds:null, pinned:null,
               diagnostics:false };
    }

    // Rank-based analysis of the final Jacobian. The orthonormal basis
    // of J's row space lets us answer two questions cheaply:
    //   1) Is parameter j fully determined?  → projection of e_j onto
    //      the basis has unit length.
    //   2) Which constraints are redundant?  → rerun rank with each
    //      constraint's rows removed; if rank doesn't drop, redundant.
    const basis = lastJ ? rowSpaceBasis(lastJ, 1e-7) : [];
    const rank = basis.length;
    const dof = Math.max(0, n - rank);
    const redundant = Math.max(0, m - rank);
    const pinned = paramPinnedFromBasis(basis, n);

    // Per-entity status: gather param indices recursively (own + children),
    // then "fully" iff every relevant parameter is pinned.
    const entToIdx = new Map();
    for (let i = 0; i < params.length; i++) {
      const e = params[i].ent;
      if (!entToIdx.has(e)) entToIdx.set(e, []);
      entToIdx.get(e).push(i);
    }
    const gather = (e, acc) => {
      const own = entToIdx.get(e); if (own) for (const i of own) acc.push(i);
      for (const c of e.children()) gather(c, acc);
    };
    const entityStatus = new Map();
    const setStatus = (e) => {
      const idx = []; gather(e, idx);
      const fully = idx.length > 0 && idx.every(i => pinned[i]);
      entityStatus.set(e.id, fully ? 'fully' : 'under');
    };
    for (const e of activeSketch.entities) {
      setStatus(e);
      for (const c of e.children()) setStatus(c);
    }

    // Per-constraint redundancy: a constraint is redundant if removing its
    // rows from J leaves the rank unchanged. We compute row offsets while
    // walking constraints in their original order.
    const redundantIds = new Set();
    if (lastJ && rank > 0 && constraints.length > 1) {
      let off = 0;
      for (const c of constraints) {
        const rows = c.residuals(L).length;
        if (rows === 0) continue;
        const Jminus = [];
        for (let i = 0; i < lastJ.length; i++) {
          if (i < off || i >= off + rows) Jminus.push(lastJ[i]);
        }
        const rWithout = rowSpaceBasis(Jminus, 1e-7).length;
        if (rWithout >= rank) redundantIds.add(c.id);
        off += rows;
      }
    }

    let state;
    if (residual > 1e-3) state = 'over';
    else if (dof === 0)  state = 'fully';
    else                  state = 'under';

    return { ok: residual < 1e-4, iters, residual, dof, n, m, rank, redundant,
             state, entityStatus, redundantIds, pinned };
  }
}

/* =============== 5. SKETCH / PROJECT MODEL ==================== */
class Sketch {
  constructor(name='Sketch 1') {
    this.id = newId('s');
    this.name = name;
    this.visible = true;
    this.entities = [];
    this.constraints = [];
    this.features = [];
    this.dirtyIds = new Set();
  }
  addEntity(e) {
    e.layerId = this.id;
    this.entities.push(e);
    const mark = (x) => {
      this.dirtyIds.add(x.id);
      for (const c of x.children()) mark(c);
    };
    mark(e);
  }
  removeEntity(e) {
    this.entities = this.entities.filter(x => x !== e);
    const ids = new Set();
    const walk = (x) => { ids.add(x.id); for (const c of x.children()) walk(c); };
    walk(e);
    const liveIds = new Set();
    for (const en of this.entities) walkLive(en);
    function walkLive(x) {
      liveIds.add(x.id);
      for (const c of x.children()) walkLive(c);
    }
    const staleIds = new Set([...ids].filter(id => !liveIds.has(id)));
    this.constraints = this.constraints.filter(c => !c.refs().some(r => staleIds.has(r)));
    this.features = (this.features || []).filter(f => {
      const refs = []
        .concat(f.sourceEntityIds || [])
        .concat(f.generatedEntityIds || []);
      return !refs.some(id => staleIds.has(id));
    });
  }
  toJSON() {
    const o = {
      id:this.id, name:this.name, visible:this.visible,
      entities:this.entities.map(e => e.toJSON()),
      constraints:this.constraints.map(c => c.toJSON())
    };
    if (this.features && this.features.length) o.features = this.features;
    return o;
  }
}

class Project {
  constructor() {
    this.name = 'Untitled';
    this.units = 'mm';
    this.sketches = [];
    this.activeSketchId = null;
  }
  addSketch(name) {
    const s = new Sketch(name || ('Sketch ' + (this.sketches.length + 1)));
    this.sketches.push(s);
    if (!this.activeSketchId) this.activeSketchId = s.id;
    return s;
  }
  removeSketch(id) {
    this.sketches = this.sketches.filter(s => s.id !== id);
    if (this.activeSketchId === id) this.activeSketchId = this.sketches[0]?.id || null;
  }
  active() { return this.sketches.find(s => s.id === this.activeSketchId); }
  visibleSketches() { return this.sketches.filter(s => s.visible); }
  sketchOf(entityOrPoint) {
    for (const s of this.sketches) {
      for (const c of s.constraints) if (c === entityOrPoint) return s;
      for (const e of s.entities) {
        if (e === entityOrPoint) return s;
        for (const c of e.children()) if (c === entityOrPoint) return s;
      }
    }
    return null;
  }
  toJSON() {
    return {
      version: 2, name:this.name, units:this.units,
      activeSketchId:this.activeSketchId,
      sketches:this.sketches.map(s => s.toJSON())
    };
  }
  static fromJSON(o) {
    const p = new Project();
    p.name  = o.name || 'Untitled';
    p.units = o.units || 'mm';
    p.sketches = (o.sketches || []).map(sj => {
      const s = new Sketch(sj.name);
      s.id = sj.id; s.visible = sj.visible !== false;
      s.features = Array.isArray(sj.features) ? sj.features.map(f => ({ ...f })) : [];
      // CRITICAL — shared point identity must be preserved across revival.
      // Without this map, a corner that was a single Point shared by two
      // lines comes back as TWO Points carrying the same id. The solver's
      // id→entity lookup then sees the duplicate and resolves to whichever
      // copy was walked last, leaving the other copy uncoupled — which
      // looks like "undo broke all the constraints".
      const idMap = new Map();
      const reviveEntity = (ej) => {
        if (ej.id && idMap.has(ej.id)) return idMap.get(ej.id);
        let e;
        if (ej.type === 'point')        e = new Point(ej.x, ej.y);
        else if (ej.type === 'line')   { const a = reviveEntity(ej.p1), b = reviveEntity(ej.p2); e = new Line(a, b); }
        else if (ej.type === 'circle') { const c = reviveEntity(ej.center); e = new Circle(c, ej.r); }
        else if (ej.type === 'arc')    { const c = reviveEntity(ej.center); e = new Arc(c, ej.r, ej.a0, ej.a1); }
        else return null;
        if (ej.id) e.id = ej.id;
        e.construction = !!ej.construction;
        e.fixed = !!ej.fixed;
        if (e instanceof Arc) e.clockwise = !!ej.clockwise;
        if (ej.id) idMap.set(ej.id, e);
        return e;
      };
      for (const ej of sj.entities) {
        const e = reviveEntity(ej);
        if (e) s.addEntity(e);
      }
      s.dirtyIds.clear();
      for (const cj of (sj.constraints || [])) {
        let c = null;
        switch (cj.kind) {
          case 'fix':           c = new FixConstraint(cj.pointId, cj.x, cj.y); break;
          case 'coincident':    c = new CoincidentConstraint(cj.p1, cj.p2); break;
          case 'horizontal':    c = new HorizontalConstraint(cj.lineId, cj.p1, cj.p2); break;
          case 'vertical':      c = new VerticalConstraint(cj.lineId, cj.p1, cj.p2); break;
          case 'pointRefHorizontal': c = new PointRefHorizontalConstraint(cj.ref1, cj.ref2); break;
          case 'pointRefVertical': c = new PointRefVerticalConstraint(cj.ref1, cj.ref2); break;
          case 'symmetric':     c = new SymmetricConstraint(cj.p1, cj.p2, cj.axis, cj.sourceSide || null); break;
          case 'parallel':      c = new ParallelConstraint(cj.l1, cj.l2); break;
          case 'perpendicular': c = new PerpendicularConstraint(cj.l1, cj.l2); break;
          case 'collinear':     c = new CollinearConstraint(cj.l1, cj.l2); break;
          case 'equalLength':   c = new EqualLengthConstraint(cj.l1, cj.l2); break;
          case 'equalRadius':   c = new EqualRadiusConstraint(cj.c1, cj.c2); break;
          case 'concentric':    c = new ConcentricConstraint(cj.p1, cj.p2); break;
          case 'tangent':       c = new TangentLineCircleConstraint(cj.l, cj.circleId, cj.centerId); break;
          case 'tangentCC':     c = new TangentCircleCircleConstraint(cj.c1, cj.p1, cj.c2, cj.p2, !!cj.internal); break;
          case 'midpoint':      c = new MidpointConstraint(cj.pointId, cj.l); break;
          case 'distance':      c = new DistanceConstraint(cj.p1, cj.p2, cj.value); break;
          case 'pointLineDistance': c = new PointLineDistanceConstraint(cj.pointId, cj.l, cj.value); break;
          case 'radius':        c = new RadiusConstraint(cj.circleId, cj.value); break;
          case 'curveDistance': c = new CurveDistanceConstraint(cj.c1, cj.c2, cj.mode, cj.value); break;
          case 'angle':         c = new AngleConstraint(cj.l1, cj.l2, cj.value); break;
          case 'directedAngle': c = new DirectedAngleConstraint(cj.l1, cj.l2, cj.value); break;
          case 'pointOnLine':   c = new PointOnLineConstraint(cj.pointId, cj.l); break;
          case 'pointOnCircle': c = new PointOnCircleConstraint(cj.pointId, cj.circleId, cj.centerId); break;
          case 'arcEndpointCoincident': c = new ArcEndpointCoincidentConstraint(cj.ref, cj.pointId); break;
          case 'arcEndpointArcEndpointCoincident': c = new ArcEndpointArcEndpointCoincidentConstraint(cj.ref1, cj.ref2); break;
          case 'arcEndpointMidpoint': c = new ArcEndpointMidpointConstraint(cj.ref, cj.l); break;
          case 'arcEndpointFix': c = new ArcEndpointFixConstraint(cj.ref, cj.x, cj.y); break;
          case 'arcEndpointOnLine': c = new ArcEndpointOnLineConstraint(cj.ref, cj.l); break;
          case 'arcEndpointOnCircle': c = new ArcEndpointOnCircleConstraint(cj.ref, cj.circleId, cj.centerId); break;
          case 'offset': c = new OffsetConstraint(cj.sourceEntityId, cj.targetEntityId, cj.offsetKind,
            cj.offsetKind === 'line' ? { l1: cj.l1, l2: cj.l2 } : { p1: cj.p1, p2: cj.p2 }); break;
          case 'offsetDistance': c = new OffsetDistanceConstraint(cj.pairs, cj.value); break;
        }
        if (c) {
          if (cj.id) c.id = cj.id;
          if (cj.labelOffset   != null) c.labelOffset   = cj.labelOffset;
          if (cj.labelParallel != null) c.labelParallel = cj.labelParallel;
          if (cj.labelAngle    != null) c.labelAngle    = cj.labelAngle;
          if (cj.labelDist     != null) c.labelDist     = cj.labelDist;
          if (cj.labelMidAngle != null) c.labelMidAngle = cj.labelMidAngle;
          if (cj.isDiameter)            c.isDiameter    = true;
          if (cj.driven)                c.driven        = true;
          s.constraints.push(c);
        }
      }
      return s;
    });
    p.activeSketchId = o.activeSketchId || (p.sketches[0]?.id ?? null);
    // Bump the global id counter past any id we just read so newly created
    // entities/constraints can't collide with existing ones.
    let maxN = 0;
    const noteId = (id) => {
      if (typeof id !== 'string') return;
      const m = id.match(/^[a-z]+(\d+)$/i);
      if (m) { const n = parseInt(m[1], 10); if (n > maxN) maxN = n; }
    };
    for (const s of p.sketches) {
      noteId(s.id);
      const walk = (e) => { noteId(e.id); for (const c of e.children()) walk(c); };
      for (const e of s.entities) walk(e);
      for (const c of s.constraints) noteId(c.id);
    }
    if (maxN >= _idSeq) _idSeq = maxN + 1;
    return p;
  }
}

/* =============== 6. VIEW / RENDERER =========================== */
class View {
  constructor() { this.zoom=4; this.panX=0; this.panY=0; this.cssW=0; this.cssH=0; }
  worldToScreen(p) {
    return { x: this.cssW/2 + this.panX + p.x*this.zoom,
             y: this.cssH/2 + this.panY - p.y*this.zoom };
  }
  screenToWorld(p) {
    return { x:  (p.x - this.cssW/2 - this.panX)/this.zoom,
             y: -(p.y - this.cssH/2 - this.panY)/this.zoom };
  }
  zoomAt(screenPt, factor) {
    const w = this.screenToWorld(screenPt);
    this.zoom = clamp(this.zoom * factor, 0.05, 5000);
    const w2 = this.screenToWorld(screenPt);
    this.panX += (w2.x - w.x) * this.zoom;
    this.panY -= (w2.y - w.y) * this.zoom;
  }
  fitTo(bbox, paddingPx = 60) {
    if (!bbox) return;
    const w = bbox.maxX - bbox.minX, h = bbox.maxY - bbox.minY;
    if (w < EPS && h < EPS) return;
    const zx = (this.cssW - paddingPx*2) / Math.max(w, EPS);
    const zy = (this.cssH - paddingPx*2) / Math.max(h, EPS);
    this.zoom = clamp(Math.min(zx, zy), 0.05, 5000);
    const cx = (bbox.minX + bbox.maxX)/2, cy = (bbox.minY + bbox.maxY)/2;
    this.panX = -cx * this.zoom;
    this.panY =  cy * this.zoom;
  }
}

class Renderer {
  constructor(canvas, view) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.view = view;
    this.dpr = window.devicePixelRatio || 1;
    this.lastDimRects = [];
  }
  resize() {
    const r = this.canvas.getBoundingClientRect();
    this.view.cssW = r.width; this.view.cssH = r.height;
    this.canvas.width  = Math.floor(r.width  * this.dpr);
    this.canvas.height = Math.floor(r.height * this.dpr);
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
  }
  drawGrid(showGrid) {
    const ctx = this.ctx, v = this.view;
    ctx.clearRect(0, 0, v.cssW, v.cssH);
    if (!showGrid) return;
    let unit = 1;
    while (unit * v.zoom < 12) unit *= 10;
    while (unit * v.zoom > 120) unit /= 10;
    const tl = v.screenToWorld({x:0,y:0}), br = v.screenToWorld({x:v.cssW,y:v.cssH});
    const minX = Math.floor(tl.x / unit) * unit;
    const maxX = Math.ceil (br.x / unit) * unit;
    const minY = Math.floor(br.y / unit) * unit;
    const maxY = Math.ceil (tl.y / unit) * unit;

    ctx.strokeStyle = '#e8ecf1'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = minX; x <= maxX + EPS; x += unit) {
      const sx = v.worldToScreen({x,y:0}).x + 0.5;
      ctx.moveTo(sx, 0); ctx.lineTo(sx, v.cssH);
    }
    for (let y = minY; y <= maxY + EPS; y += unit) {
      const sy = v.worldToScreen({x:0,y}).y + 0.5;
      ctx.moveTo(0, sy); ctx.lineTo(v.cssW, sy);
    }
    ctx.stroke();

    ctx.strokeStyle = '#cdd3db';
    ctx.beginPath();
    const major = unit * 10;
    const mMinX = Math.floor(tl.x / major) * major;
    const mMaxX = Math.ceil (br.x / major) * major;
    const mMinY = Math.floor(br.y / major) * major;
    const mMaxY = Math.ceil (tl.y / major) * major;
    for (let x = mMinX; x <= mMaxX + EPS; x += major) {
      const sx = v.worldToScreen({x,y:0}).x + 0.5;
      ctx.moveTo(sx, 0); ctx.lineTo(sx, v.cssH);
    }
    for (let y = mMinY; y <= mMaxY + EPS; y += major) {
      const sy = v.worldToScreen({x:0,y}).y + 0.5;
      ctx.moveTo(0, sy); ctx.lineTo(v.cssW, sy);
    }
    ctx.stroke();

    const o = v.worldToScreen({x:0,y:0});
    ctx.strokeStyle = '#a7afba'; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(o.x - 7, o.y); ctx.lineTo(o.x + 7, o.y);
    ctx.moveTo(o.x, o.y - 7); ctx.lineTo(o.x, o.y + 7);
    ctx.stroke();
  }

  styleFor(entity, isActive) {
    let color = '#1f7ad6';                          // blue (under)
    if (entity.status === 'fully') color = '#111418';
    if (entity.status === 'over')  color = '#d63a3a'; // red
    if (entity.construction)        color = '#c44b8a';
    if (entity.hover)               color = '#ffae5a'; // lighter orange — distinct from selected
    if (entity.selected)            color = '#ff8a1e';
    if (!isActive && !entity.selected) color = '#7a828c';
    return {
      color,
      width: entity.selected ? 2 : 1.4,
      dashed: entity.construction
    };
  }

  drawEntities(sketches, activeId) {
    const ctx = this.ctx, v = this.view;
    for (const s of sketches) {
      if (!s.visible) continue;
      const isActive = s.id === activeId;
      ctx.globalAlpha = isActive ? 1 : 0.55;
      for (const e of s.entities) {
        const style = this.styleFor(e, isActive);
        e.draw(ctx, v, style);
        for (const c of e.children()) c.draw(ctx, v, this.styleFor(c, isActive));
      }
      ctx.globalAlpha = 1;
    }
  }

  drawSnapMarker(snap) {
    if (!snap) return;
    const v = this.view, ctx = this.ctx;
    const s = v.worldToScreen(snap);
    ctx.save();
    ctx.strokeStyle = '#1f7ad6'; ctx.fillStyle = 'white'; ctx.lineWidth = 1.4;
    ctx.beginPath();
    if (snap.kind === 'endpoint')      ctx.rect(s.x-5, s.y-5, 10, 10);
    else if (snap.kind === 'midpoint') { ctx.moveTo(s.x, s.y-6); ctx.lineTo(s.x+6, s.y); ctx.lineTo(s.x, s.y+6); ctx.lineTo(s.x-6, s.y); ctx.closePath(); }
    else if (snap.kind === 'center')   ctx.arc(s.x, s.y, 5, 0, TAU);
    else                                ctx.arc(s.x, s.y, 4, 0, TAU);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  drawTempPath(pathPoints, dashed=false) {
    if (!pathPoints || pathPoints.length < 2) return;
    const v = this.view, ctx = this.ctx;
    ctx.save();
    ctx.strokeStyle = '#1f7ad6'; ctx.lineWidth = 1.2;
    if (dashed) ctx.setLineDash([5, 4]);
    ctx.beginPath();
    const a = v.worldToScreen(pathPoints[0]);
    ctx.moveTo(a.x, a.y);
    for (let i = 1; i < pathPoints.length; i++) {
      const p = v.worldToScreen(pathPoints[i]);
      ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.restore();
  }

  drawTempCircle(center, radius) {
    const v = this.view, ctx = this.ctx;
    const c = v.worldToScreen(center);
    ctx.save();
    ctx.strokeStyle = '#1f7ad6'; ctx.lineWidth = 1.2;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.arc(c.x, c.y, radius * v.zoom, 0, TAU);
    ctx.stroke();
    ctx.restore();
  }

  drawTempArc(center, radius, a0, a1, clockwise=false) {
    const v = this.view, ctx = this.ctx;
    ctx.save();
    ctx.strokeStyle = '#1f7ad6'; ctx.lineWidth = 1.2;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    drawDirectedArcPath(ctx, v, center, radius, a0, a1, clockwise);
    ctx.stroke();
    ctx.restore();
  }

  drawTempPoint(point) {
    if (!point) return;
    const v = this.view, ctx = this.ctx;
    const p = v.worldToScreen(point);
    ctx.save();
    ctx.fillStyle = '#1f7ad6';
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, TAU);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  drawSelectionBox(box) {
    if (!box) return;
    const ctx = this.ctx;
    ctx.save();
    ctx.strokeStyle = '#2563a5';
    ctx.fillStyle = 'rgba(37,99,165,0.08)';
    ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.rect(box.x, box.y, box.w, box.h);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  drawDimPicks(picks) {
    if (!picks || !picks.length) return;
    const v = this.view, ctx = this.ctx;
    ctx.save();
    ctx.strokeStyle = '#ff8a1e';
    ctx.fillStyle = 'rgba(255,138,30,0.18)';
    ctx.lineWidth = 2;
    for (const e of picks) {
      if (e instanceof Point) {
        const p = v.worldToScreen(e);
        ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, TAU);
        ctx.fill(); ctx.stroke();
      } else if (e instanceof Line) {
        const a = v.worldToScreen(e.p1), b = v.worldToScreen(e.p2);
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
        ctx.stroke();
      } else if (e instanceof Circle) {
        const c = v.worldToScreen(e.center);
        ctx.beginPath(); ctx.arc(c.x, c.y, e.r * v.zoom, 0, TAU);
        ctx.stroke();
      } else if (e instanceof Arc) {
        e.syncEnds();
        ctx.beginPath(); drawDirectedArcPath(ctx, v, e.center, e.r, e.a0, e.a1, e.clockwise);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  /* ----- Dimension labels on the canvas ----- */
  drawDimensions(sketch, entMap, redundantIds) {
    if (!sketch) return;
    // remember the screen-space rect of every label we draw so the app can
    // hit-test them for click-to-edit / drag-to-move
    this.lastDimRects = [];
    for (const c of sketch.constraints) {
      const grey = c.driven || (redundantIds && redundantIds.has(c.id));
      switch (c.kind) {
        case 'distance':          this._drawDistance(c, entMap, grey); break;
        case 'curveDistance':     this._drawCurveDistance(c, entMap, grey); break;
        case 'pointLineDistance': this._drawPLDistance(c, entMap, grey); break;
        case 'offsetDistance':    this._drawOffsetDistance(c, entMap, grey); break;
        case 'radius':            this._drawRadius(c, entMap, grey); break;
        case 'angle':             this._drawAngle(c, entMap, grey); break;
      }
    }
  }

  /** Draw a SmartDim preview that follows the cursor — synthesises a
   *  fake constraint + entity map and reuses the committed-dimension
   *  drawing routines so the preview looks identical to what gets
   *  saved. */
  drawDimPreview(preview) {
    if (!preview) return;
    if (preview.kind === 'distance') {
      const fake = { p1:'_a', p2:'_b', value: preview.value,
                      labelOffset: preview.offset, labelParallel: preview.parallel };
      const map = new Map([['_a', preview.p1], ['_b', preview.p2]]);
      this._drawDistance(fake, map, false);
    } else if (preview.kind === 'curveDistance') {
      const fake = {
        c1:'_c1', c2:'_c2', mode: preview.mode, value: preview.value,
        labelOffset: preview.offset, labelParallel: preview.parallel,
        labelAngle: preview.angle, labelDist: preview.dist
      };
      const map = new Map([['_c1', preview.c1], ['_c2', preview.c2]]);
      this._drawCurveDistance(fake, map, false);
    } else if (preview.kind === 'pointLineDistance') {
      const fake = { pointId:'_p', l:{a:'_la', b:'_lb'}, value: preview.value,
                      labelOffset: preview.offset, labelParallel: preview.parallel };
      const map = new Map([['_p', preview.p], ['_la', preview.line.p1], ['_lb', preview.line.p2]]);
      this._drawPLDistance(fake, map, false);
    } else if (preview.kind === 'radius' || preview.kind === 'diameter') {
      const fake = {
        circleId:'_c',
        value: preview.kind === 'diameter' ? preview.value / 2 : preview.value,
        labelAngle: preview.angle,
        labelDist:  preview.dist,
        isDiameter: preview.kind === 'diameter'
      };
      const map = new Map([['_c', preview.circle]]);
      this._drawRadius(fake, map, false);
    } else if (preview.kind === 'angle') {
      const fake = {
        l1: preview.l1Ref || { a:preview.l1.p1.id, b:preview.l1.p2.id },
        l2: preview.l2Ref || { a:preview.l2.p1.id, b:preview.l2.p2.id },
        value: preview.value, labelDist: preview.dist,
        labelMidAngle: preview.midAngle
      };
      const map = new Map([
        [preview.l1.p1.id, preview.l1.p1], [preview.l1.p2.id, preview.l1.p2],
        [preview.l2.p1.id, preview.l2.p1], [preview.l2.p2.id, preview.l2.p2]
      ]);
      this._drawAngle(fake, map, false);
    }
  }

  _dimColors(grey, selected = false) {
    return selected
      ? { stroke: '#ff8a1e', fill: '#ff8a1e', text: '#bf5b00' }
      : grey
      ? { stroke: 'rgba(120,128,140,0.85)', fill: 'rgba(120,128,140,0.85)', text: '#7a828c' }
      : { stroke: '#1c2026', fill: '#1c2026', text: '#1c2026' };
  }

  _drawArrow(ctx, tip, dir) {
    // dir is a screen-space unit vector pointing AWAY from tip (along the
    // dimension line). Arrow head points back toward tip.
    const len = 7, spread = 0.38;
    const cs = Math.cos(spread), sn = Math.sin(spread);
    const ax = tip.x + len * (dir.x*cs - dir.y*sn);
    const ay = tip.y + len * (dir.y*cs + dir.x*sn);
    const bx = tip.x + len * (dir.x*cs + dir.y*sn);
    const by = tip.y + len * (dir.y*cs - dir.x*sn);
    ctx.beginPath();
    ctx.moveTo(tip.x, tip.y); ctx.lineTo(ax, ay); ctx.lineTo(bx, by);
    ctx.closePath(); ctx.fill();
  }

  _drawText(ctx, x, y, text, color, angleRad = 0) {
    ctx.save();
    ctx.translate(x, y);
    let a = angleRad;
    if (a > Math.PI/2)  a -= Math.PI;
    if (a < -Math.PI/2) a += Math.PI;
    ctx.rotate(a);
    ctx.font = '11px ui-sans-serif, system-ui, -apple-system, "Segoe UI"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Subtle stroke under the text so it stays legible over grid / lines
    // without painting a hard white background rectangle.
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineJoin = 'round';
    ctx.strokeText(text, 0, 0);
    ctx.fillStyle = color;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  _drawDistance(c, entMap, grey, recordAs) {
    const p1 = entMap.get(c.p1), p2 = entMap.get(c.p2);
    if (!p1 || !p2) return;
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const len = Math.hypot(dx, dy);
    if (len < EPS) return;
    const v = this.view, ctx = this.ctx;

    const offsetWorld   = (c.labelOffset   != null) ? c.labelOffset   : (12 / v.zoom);
    const parallelWorld = (c.labelParallel != null) ? c.labelParallel : 0;
    const nx = -dy / len, ny = dx / len; // perpendicular unit
    const tx =  dx / len, ty =  dy / len; // tangent unit

    // Extension feet at the perpendicular projections of p1 and p2 onto
    // the dim line. The text rides at midpoint + tangent * parallel.
    const a = { x: p1.x + nx * offsetWorld, y: p1.y + ny * offsetWorld };
    const b = { x: p2.x + nx * offsetWorld, y: p2.y + ny * offsetWorld };
    const labelMid = {
      x: (p1.x + p2.x)/2 + nx * offsetWorld + tx * parallelWorld,
      y: (p1.y + p2.y)/2 + ny * offsetWorld + ty * parallelWorld
    };

    const pa = v.worldToScreen(a), pb = v.worldToScreen(b);
    const pp1 = v.worldToScreen(p1), pp2 = v.worldToScreen(p2);
    const plab = v.worldToScreen(labelMid);

    const target = recordAs || c;
    const cols = this._dimColors(grey, !!target.selected);
    ctx.save();
    ctx.strokeStyle = cols.stroke; ctx.fillStyle = cols.fill; ctx.lineWidth = 1;

    // Extension lines (small gap from anchor, extend slightly past dim line)
    const ux = pa.x - pp1.x, uy = pa.y - pp1.y;
    const ul = Math.hypot(ux, uy) || 1;
    const e1 = { x: ux/ul, y: uy/ul };
    ctx.beginPath();
    ctx.moveTo(pp1.x + e1.x*4, pp1.y + e1.y*4);
    ctx.lineTo(pa.x  + e1.x*4, pa.y  + e1.y*4);
    ctx.moveTo(pp2.x + e1.x*4, pp2.y + e1.y*4);
    ctx.lineTo(pb.x  + e1.x*4, pb.y  + e1.y*4);

    // The dim line spans from foot a to foot b, but if the label sits past
    // one of the feet (cursor was dragged outside the segment) we extend
    // the line out to the label so the text is on the line.
    const segLen = len; // = |b - a| in world
    const tParam = parallelWorld / segLen + 0.5; // 0=at a, 1=at b
    let dimStart = pa, dimEnd = pb;
    if (tParam < 0)      dimStart = plab;
    else if (tParam > 1) dimEnd   = plab;
    ctx.moveTo(dimStart.x, dimStart.y); ctx.lineTo(dimEnd.x, dimEnd.y);
    ctx.stroke();

    // Arrows always sit at the feet, pointing inward toward each other.
    const dxs = pb.x - pa.x, dys = pb.y - pa.y;
    const dl  = Math.hypot(dxs, dys) || 1;
    const dir = { x: dxs/dl, y: dys/dl };
    this._drawArrow(ctx, pa, dir);
    this._drawArrow(ctx, pb, { x: -dir.x, y: -dir.y });

    const text = (c.value != null) ? Number(c.value).toFixed(2) : len.toFixed(2);
    this._drawText(ctx, plab.x, plab.y, text, cols.text, Math.atan2(dys, dxs));
    ctx.restore();

    if (this.lastDimRects) {
      ctx.font = '11px ui-sans-serif, system-ui, -apple-system, "Segoe UI"';
      const w = ctx.measureText(text).width;
      this.lastDimRects.push({
        constraint: target,
        x: plab.x - w/2 - 4, y: plab.y - 9, w: w + 8, h: 18
      });
    }
  }

  _drawPLDistance(c, entMap, grey) {
    const pt = entMap.get(c.pointId);
    const la = entMap.get(c.l.a), lb = entMap.get(c.l.b);
    if (!pt || !la || !lb) return;
    const dx = lb.x - la.x, dy = lb.y - la.y;
    const len2 = dx*dx + dy*dy;
    if (len2 < EPS) return;
    const t = ((pt.x - la.x)*dx + (pt.y - la.y)*dy) / len2;
    const foot = { x: la.x + t*dx, y: la.y + t*dy };
    // Render as a distance dim between the point and its foot, carrying
    // the constraint's labelOffset through so the dim line stays where
    // the user placed it. Record under the original PLD constraint so
    // hit-testing finds it.
    this._drawDistance(
      { p1: '_a', p2: '_b', value: c.value,
        labelOffset: c.labelOffset, labelParallel: c.labelParallel },
      new Map([['_a', pt], ['_b', foot]]),
      grey,
      c
    );
  }

  _drawOffsetDistance(c, entMap, grey) {
    // Render one shared dimension annotation using the first pair,
    // but register `c` (not a fake) for hit-testing so clicking/dragging
    // the label edits the real OffsetDistanceConstraint.
    if (!c.pairs || !c.pairs.length) return;
    const first = c.pairs[0];
    if (first.kind === 'line') {
      const src = entMap.get(first.sourceEntityId);
      const dst = entMap.get(first.targetEntityId);
      const la = src instanceof Line ? src.p1 : entMap.get(first.l.a);
      const lb = src instanceof Line ? src.p2 : entMap.get(first.l.b);
      const pt = dst instanceof Line
        ? { x:(dst.p1.x + dst.p2.x) / 2, y:(dst.p1.y + dst.p2.y) / 2 }
        : entMap.get(first.pointId);
      if (!pt || !la || !lb) return;
      const dx = lb.x - la.x, dy = lb.y - la.y;
      const len2 = dx*dx + dy*dy; if (len2 < EPS) return;
      const t = ((pt.x - la.x)*dx + (pt.y - la.y)*dy) / len2;
      const foot = { x: la.x + t*dx, y: la.y + t*dy };
      this._drawDistance(
        { p1:'_a', p2:'_b', value:c.value, labelOffset:c.labelOffset, labelParallel:c.labelParallel },
        new Map([['_a', pt], ['_b', foot]]),
        grey, c
      );
    } else {
      const a = entMap.get(first.c1), b = entMap.get(first.c2);
      if (!a || !b) return;
      const outer = a.r >= b.r ? a : b;
      const inner = outer === a ? b : a;
      const angle = (c.labelAngle != null) ? c.labelAngle : Math.PI / 6;
      const labelDist = (c.labelDist != null) ? c.labelDist : (outer.r + 14 / this.view.zoom);
      const p1 = { x: inner.center.x + inner.r * Math.cos(angle), y: inner.center.y + inner.r * Math.sin(angle) };
      const p2 = { x: outer.center.x + outer.r * Math.cos(angle), y: outer.center.y + outer.r * Math.sin(angle) };
      this._drawDistance(
        { p1:'_a', p2:'_b', value:c.value, labelOffset:0,
          labelParallel: labelDist - (inner.r + outer.r) / 2 },
        new Map([['_a', p1], ['_b', p2]]),
        grey, c
      );
    }
  }

  _drawCurveDistance(c, entMap, grey) {
    const a = entMap.get(c.c1), b = entMap.get(c.c2);
    if (!a || !b) return;
    if (c.mode === 'gap') {
      const dx = b.center.x - a.center.x, dy = b.center.y - a.center.y;
      const d = Math.hypot(dx, dy);
      if (d < EPS) return;
      const ux = dx / d, uy = dy / d;
      const p1 = { x: a.center.x + ux * a.r, y: a.center.y + uy * a.r };
      const p2 = { x: b.center.x - ux * b.r, y: b.center.y - uy * b.r };
      this._drawDistance(
        { p1:'_a', p2:'_b', value:c.value, labelOffset:c.labelOffset, labelParallel:c.labelParallel },
        new Map([['_a', p1], ['_b', p2]]),
        grey,
        c
      );
      return;
    }

    const outer = a.r >= b.r ? a : b;
    const inner = outer === a ? b : a;
    const angle = (c.labelAngle != null) ? c.labelAngle : Math.PI / 6;
    const labelDist = (c.labelDist != null) ? c.labelDist : (outer.r + 14 / this.view.zoom);
    const p1 = { x: inner.center.x + inner.r * Math.cos(angle), y: inner.center.y + inner.r * Math.sin(angle) };
    const p2 = { x: outer.center.x + outer.r * Math.cos(angle), y: outer.center.y + outer.r * Math.sin(angle) };
    const fake = {
      p1:'_a', p2:'_b', value:c.value,
      labelOffset:0,
      labelParallel: labelDist - (inner.r + outer.r) / 2
    };
    this._drawDistance(fake, new Map([['_a', p1], ['_b', p2]]), grey, c);
  }

  _drawRadius(c, entMap, grey) {
    const circ = entMap.get(c.circleId);
    if (!circ) return;
    const center = circ.center;
    const r = circ.r;
    const v = this.view, ctx = this.ctx;
    const cols = this._dimColors(grey, !!c.selected);

    const angle = (c.labelAngle != null) ? c.labelAngle : Math.PI/6;
    // labelDist controls inside-vs-outside placement based on cursor
    // distance from center. Inside (labelDist < r) → label inside the
    // circle, arrow at rim points outward. Outside (labelDist >= r) →
    // label past the rim, arrow at rim points inward at the center.
    let labelDist;
    if (c.labelDist != null) {
      labelDist = c.labelDist;
    } else {
      const radPx = r * v.zoom;
      labelDist = (radPx > 60) ? Math.max(r * 0.45, r - 26 / v.zoom) : (r + 14 / v.zoom);
    }
    const insideMode = labelDist < r;
    const rim   = { x: center.x + r * Math.cos(angle),         y: center.y + r * Math.sin(angle) };
    const label = { x: center.x + labelDist * Math.cos(angle), y: center.y + labelDist * Math.sin(angle) };
    const pcen = v.worldToScreen(center);
    const prim = v.worldToScreen(rim);
    const plab = v.worldToScreen(label);

    let arrowDir;
    if (insideMode) {
      const dxs = prim.x - pcen.x, dys = prim.y - pcen.y;
      const dl = Math.hypot(dxs, dys) || 1;
      arrowDir = { x: dxs / dl, y: dys / dl };
    } else {
      const dxs = pcen.x - prim.x, dys = pcen.y - prim.y;
      const dl = Math.hypot(dxs, dys) || 1;
      arrowDir = { x: dxs / dl, y: dys / dl };
    }

    ctx.save();
    ctx.strokeStyle = cols.stroke; ctx.fillStyle = cols.fill; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(plab.x, plab.y); ctx.lineTo(prim.x, prim.y);
    ctx.stroke();
    this._drawArrow(ctx, prim, arrowDir);

    const radius = c.value ?? r;
    const txt = c.isDiameter
      ? '⌀' + Number(radius * 2).toFixed(2)
      : 'R' + Number(radius).toFixed(2);
    this._drawText(ctx, plab.x, plab.y, txt, cols.text, 0);
    ctx.restore();

    if (this.lastDimRects) {
      ctx.font = '11px ui-sans-serif, system-ui, -apple-system, "Segoe UI"';
      const w = ctx.measureText(txt).width;
      this.lastDimRects.push({ constraint: c, x: plab.x - w/2 - 4, y: plab.y - 9, w: w + 8, h: 18 });
    }
  }

  _drawAngle(c, entMap, grey) {
    const a1 = entMap.get(c.l1.a), b1 = entMap.get(c.l1.b);
    const a2 = entMap.get(c.l2.a), b2 = entMap.get(c.l2.b);
    if (!a1 || !b1 || !a2 || !b2) return;
    const inter = lineIntersection(a1, b1, a2, b2);
    if (!inter) return;

    const v = this.view, ctx = this.ctx;
    const cols = this._dimColors(grey, !!c.selected);
    const sector = angleSectorForValue(
      { p1:a1, p2:b1 },
      { p1:a2, p2:b2 },
      c.value ?? angleArcFromPoints(a1, b1, a2, b2).span,
      c.labelMidAngle
    );
    if (!sector) return;
    const arc = sector;
    const e1a = entMap.get(sector.l1Ref.a), e1b = entMap.get(sector.l1Ref.b);
    const e2a = entMap.get(sector.l2Ref.a), e2b = entMap.get(sector.l2Ref.b);
    if (!e1a || !e1b || !e2a || !e2b) return;
    const pinter = v.worldToScreen(inter);
    const radPx = Math.max(10, (c.labelDist != null) ? c.labelDist * v.zoom : 32);
    const labelDistWorld = radPx / v.zoom;

    ctx.save();
    ctx.strokeStyle = cols.stroke; ctx.fillStyle = cols.fill; ctx.lineWidth = 1;
    // Canvas y is flipped relative to math angles — negate for arc().
    ctx.beginPath();
    ctx.arc(pinter.x, pinter.y, radPx, -arc.start, -arc.end, true);
    ctx.stroke();

    // Dashed extension lines linking each measured line segment to the
    // arc-touch point on its bounding ray. Drawn whenever the segment
    // doesn't naturally cover that point — e.g. the arc radius is past
    // the segment's far end, or the segment lies on the opposite side
    // of the intersection from the picked sector. Three cases per line:
    //   labelDist in [tLo, tHi]  → no extension (segment covers it)
    //   labelDist >  tHi         → extension from far endpoint outward
    //   labelDist <  tLo         → extension from near endpoint inward
    // The "wrong-sector" case (both projections negative) falls into the
    // second branch and the resulting dashed line passes through inter.
    const drawAngleExtension = (pA, pB) => {
      const dx = pB.x - pA.x, dy = pB.y - pA.y;
      const dlen = Math.hypot(dx, dy);
      if (dlen < EPS) return;
      const dxN = dx / dlen, dyN = dy / dlen;
      const tA = (pA.x - inter.x) * dxN + (pA.y - inter.y) * dyN;
      const tB = (pB.x - inter.x) * dxN + (pB.y - inter.y) * dyN;
      const tLo = Math.min(tA, tB), tHi = Math.max(tA, tB);
      // Small tolerance so floating-point chatter doesn't make the
      // extension flicker on/off when labelDist is right at an endpoint.
      const tol = 0.5 / v.zoom;
      if (labelDistWorld >= tLo - tol && labelDistWorld <= tHi + tol) return;
      // The segment endpoint closest to the arc point along the ray.
      const nearT = Math.abs(tA - labelDistWorld) < Math.abs(tB - labelDistWorld) ? tA : tB;
      const fromWorld = { x: inter.x + nearT * dxN, y: inter.y + nearT * dyN };
      const toWorld   = { x: inter.x + labelDistWorld * dxN, y: inter.y + labelDistWorld * dyN };
      const sFrom = v.worldToScreen(fromWorld), sTo = v.worldToScreen(toWorld);
      const sdx = sTo.x - sFrom.x, sdy = sTo.y - sFrom.y;
      const sl  = Math.hypot(sdx, sdy);
      // Skip very short extensions — they read as noise rather than
      // intent. 3px is roughly the threshold where the dash pattern
      // would only show a single tick anyway.
      if (sl < 3) return;
      // 4px gap at the segment endpoint, matching the convention used
      // by distance dim extension lines.
      const gap = Math.min(4, sl / 3);
      const ux = sdx / sl, uy = sdy / sl;
      ctx.save();
      ctx.strokeStyle = cols.stroke;
      ctx.lineWidth = 0.8;
      ctx.setLineDash([5, 3]);
      ctx.beginPath();
      ctx.moveTo(sFrom.x + ux * gap, sFrom.y + uy * gap);
      ctx.lineTo(sTo.x, sTo.y);
      ctx.stroke();
      ctx.restore();
    };
    drawAngleExtension(e1a, e1b);
    drawAngleExtension(e2a, e2b);

    const midAng = arc.midAngle;
    const value = normalizeAngleValue(c.value ?? arc.span);
    const txt = (value * 180 / Math.PI).toFixed(1) + '°';
    const tx = pinter.x + (radPx + 12) * Math.cos(midAng);
    const ty = pinter.y - (radPx + 12) * Math.sin(midAng); // flip y
    this._drawText(ctx, tx, ty, txt, cols.text, 0);
    ctx.restore();

    if (this.lastDimRects) {
      ctx.font = '11px ui-sans-serif, system-ui, -apple-system, "Segoe UI"';
      const w = ctx.measureText(txt).width;
      this.lastDimRects.push({ constraint: c, x: tx - w/2 - 4, y: ty - 9, w: w + 8, h: 18 });
    }
  }
}

/* =============== 7. SNAP ENGINE =============================== */
class SnapEngine {
  constructor() { this.tolPx = 10; }
  find(world, view, sketches, options = {}) {
    if (!sketches || !sketches.length) return null;
    const tol = this.tolPx / view.zoom;
    let best = null;
    // entity attached to the snap is the *thing* the constraint will
    // reference: the Point itself for endpoints, the Line for midpoints,
    // the Circle/Arc for centers and quadrants, null for origin.
    const priority = (kind) => {
      if (kind === 'endpoint') return 5;
      if (kind === 'center') return 4;
      if (kind === 'midpoint' || kind === 'quadrant') return 3;
      if (kind === 'origin') return 2;
      return 1; // on-line / on-circle are useful, but lose to nearby points.
    };
    const consider = (pt, kind, entity) => {
      const d = dist(pt, world);
      if (d > tol) return;
      const p = priority(kind);
      const candidate = { x: pt.x, y: pt.y, kind, entity, _d: d, _p: p };
      if (options.ignore && options.ignore(candidate)) return;
      if (!best || p > best._p || (p === best._p && d < best._d)) {
        best = candidate;
      }
    };
    for (const sketch of sketches) {
      for (const e of sketch.entities) {
        if (e instanceof Line) {
          consider(e.p1, 'endpoint', e.p1);
          consider(e.p2, 'endpoint', e.p2);
          consider({ x:(e.p1.x+e.p2.x)/2, y:(e.p1.y+e.p2.y)/2 }, 'midpoint', e);
          // On-line snap: foot of perpendicular from cursor onto the line
          // segment, only valid when the foot is between the endpoints (so
          // we don't fight the endpoint snaps).
          const dx = e.p2.x - e.p1.x, dy = e.p2.y - e.p1.y;
          const len2 = dx*dx + dy*dy;
          if (len2 > EPS) {
            const t = ((world.x - e.p1.x)*dx + (world.y - e.p1.y)*dy) / len2;
            if (t > 0.05 && t < 0.95) {
              consider({ x: e.p1.x + t*dx, y: e.p1.y + t*dy }, 'on-line', e);
            }
          }
        } else if (e instanceof Circle) {
          consider(e.center, 'center', e);
          consider({ x:e.center.x+e.r, y:e.center.y }, 'quadrant', e);
          consider({ x:e.center.x-e.r, y:e.center.y }, 'quadrant', e);
          consider({ x:e.center.x, y:e.center.y+e.r }, 'quadrant', e);
          consider({ x:e.center.x, y:e.center.y-e.r }, 'quadrant', e);
          // On-circle snap: nearest point on the perimeter.
          const cdx = world.x - e.center.x, cdy = world.y - e.center.y;
          const cd  = Math.hypot(cdx, cdy);
          if (cd > EPS) {
            consider({ x: e.center.x + cdx/cd * e.r, y: e.center.y + cdy/cd * e.r }, 'on-circle', e);
          }
        } else if (e instanceof Arc) {
          e.syncEnds();
          consider(e.center, 'center', e);
          consider(e.start,  'endpoint', e.start);
          consider(e.end,    'endpoint', e.end);
          // On-arc: nearest point on the arc, but only if the angle to the
          // cursor lies within [a0, a1].
          const adx = world.x - e.center.x, ady = world.y - e.center.y;
          const ad  = Math.hypot(adx, ady);
          if (ad > EPS) {
            const theta = Math.atan2(ady, adx);
            if (angleOnDirectedArc(theta, e.a0, e.a1, e.clockwise)) {
              consider({ x: e.center.x + adx/ad * e.r, y: e.center.y + ady/ad * e.r }, 'on-circle', e);
            }
          }
        } else if (e instanceof Point) {
          consider(e, 'endpoint', e);
        }
      }
    }
    consider({ x:0, y:0 }, 'origin', null);
    return best;
  }
}

/* =============== 8. TOOLS ===================================== */
class Tool {
  constructor(app) { this.app = app; }
  activate() {} deactivate() {}
  onPointerDown() {} onPointerMove() {} onPointerUp() {} onKey() {}
  getPreview() { return null; }
}

class SelectTool extends Tool {
  constructor(app) {
    super(app);
    this.dragging = null;
    this.box = null;
    this.boxMode = 'select';
  }
  hint() { return 'Click to select. Ctrl-click to add/remove. Drag to move. Click a selected driving dimension to edit.'; }
  onPointerDown(world, snap, ev) {
    // Dimension labels first — they sit "on top of" any underlying entity
    // and need their own select / edit / drag handling.
    const r = this.app.canvas.getBoundingClientRect();
    const sx = ev.clientX - r.left, sy = ev.clientY - r.top;
    const dim = this.app.hitDimAtScreen(sx, sy);
    if (dim) {
      const wasSelected = !!dim.selected;
      const isToggle = ev.ctrlKey || ev.metaKey;
      const isAdd = ev.shiftKey;
      if (isToggle) {
        this.app.setSelected(dim, !wasSelected);
      } else {
        if (!isAdd && !wasSelected) this.app.clearSelection();
        this.app.setSelected(dim, true);
      }
      this.dimAction = dim.selected
        ? { constraint: dim, startWorld: world, moved: false,
            editOnClick: !isToggle && !isAdd && wasSelected && !dim.driven }
        : null;
      this.app.refreshUI();
      this.app.requestRender();
      return;
    }
    const hit = this.app.hitTestActiveSketch(world);
    const isToggle = ev.ctrlKey || ev.metaKey;
    const isAdd    = ev.shiftKey;
    if (this.app.operationName === 'mirror') {
      if (!hit && this.app.mirrorPickMode === 'entities') {
        this.boxMode = 'mirror';
        this.box = {
          x0: world.x, y0: world.y, x1: world.x, y1: world.y,
          replace: !isAdd && !isToggle,
          toggle: isToggle,
          sx0: sx, sy0: sy
        };
        this.app.requestRender();
        return;
      }
      this.app.handleMirrorPick(hit);
      return;
    }
    if (this.app.operationName === 'offset') {
      if (this.app.offsetPhase === 'typing') return;
      if (!hit) {
        this.boxMode = 'offset';
        this.box = {
          x0: world.x, y0: world.y, x1: world.x, y1: world.y,
          replace: !isAdd && !isToggle,
          sx0: sx, sy0: sy
        };
        this.app.requestRender();
        return;
      }
      this.app.handleOffsetPick(hit, world);
      return;
    }
    if (hit) {
      if (isToggle) this.app.setSelected(hit, !hit.selected);
      else if (isAdd) this.app.setSelected(hit, true);
      else if (!hit.selected) { this.app.clearSelection(); this.app.setSelected(hit, true); }
      else this.app.setSelected(hit, true);
      // collect drag points (only those on the active sketch)
      const activeId = this.app.project.activeSketchId;
      const pts = [];
      const seen = new Set();
      for (const s of this.app.project.sketches) {
        if (s.id !== activeId) continue;
        for (const e of s.entities) {
          const walk = (x, inheritSel) => {
            const sel = inheritSel || x.selected;
            if (x instanceof Point && sel && !x.fixed && !seen.has(x)) { seen.add(x); pts.push({ p:x, x:x.x, y:x.y }); }
            for (const c of x.children()) walk(c, sel);
          };
          walk(e, e.selected);
        }
      }
      const rigidLines = hit instanceof Line
        ? [{ lineId: hit.id, p1: hit.p1.id, p2: hit.p2.id, dx: hit.p2.x - hit.p1.x, dy: hit.p2.y - hit.p1.y }]
        : [];
      const sketch = this.app.activeSketch();
      const hitIsResizableCircle = hit instanceof Circle &&
        !sketch?.constraints.some(c => c.kind === 'radius' && c.circleId === hit.id);
      const canDrag = pts.length || hitIsResizableCircle;
      this.dragging = canDrag ? this.app.beginLocalizedDrag(world, pts, hit, rigidLines) : null;
      this.app.refreshUI();
      this.app.requestRender();
    } else {
      if (!isAdd && !isToggle) this.app.clearSelection();
      this.boxMode = 'select';
      this.box = { x0: world.x, y0: world.y, x1: world.x, y1: world.y };
      this.app.requestRender();
    }
  }
  onPointerMove(world, snap, ev) {
    if (this.app.operationName === 'offset' && this.app.offsetPhase === 'placing' && !this.dimAction && !this.dragging && !this.box) {
      this.app.updateOffsetCursor(world);
      return;
    }
    if (this.dimAction) {
      const dx = world.x - this.dimAction.startWorld.x;
      const dy = world.y - this.dimAction.startWorld.y;
      // Treat as a drag once the cursor moves a couple of pixels' worth.
      if (Math.hypot(dx, dy) * this.app.view.zoom > 3) this.dimAction.moved = true;
      if (this.dimAction.moved) {
        this.app.moveDimLabel(this.dimAction.constraint, world);
        this.app.requestRender();
      }
      return;
    }
    if (this.dragging) {
      // Pick a single "primary" handle to latch the cursor delta onto its
      // snap target — translation can only satisfy one alignment at a
      // time. The other handles still get a chance to contribute snap
      // constraints (see collectDragSnaps), they just won't be pulled
      // exactly onto their targets until release re-solves.
      let dx = world.x - this.dragging.startWorld.x;
      let dy = world.y - this.dragging.startWorld.y;
      let primary = null;
      let result = null;
      this.dragging.rejectedSnapKeys = new Set();
      if (snap && snap.dragRecord && !this.app.shouldIgnoreDragSnap(this.dragging, snap)) {
        const snapped = this.app._dragDeltaForSnap(this.dragging, snap);
        result = this.app.solveLocalizedDrag(this.dragging, snapped.dx, snapped.dy);
        if (result && result.ok && !result.rejected) {
          dx = snapped.dx;
          dy = snapped.dy;
          primary = snap;
        } else {
          snap.rejected = true;
          this.dragging.rejectedSnapKeys.add(this.app._snapKey(snap));
          this.app.lastSnap = null;
          result = null;
        }
      }
      if (!result) result = this.app.solveLocalizedDrag(this.dragging, dx, dy);
      // After the solve, probe each *other* handle at its now-final
      // position so secondary snaps (e.g. the far end of a dragged line
      // happening to fall on another line) light up too. This mirrors
      // creation, where each click contributes its own snap constraint.
      this.dragging.endSnaps = result?.rejected ? [] : this.app.collectDragSnaps(this.dragging, primary);
      this.app.lastDragSnaps = this.dragging.endSnaps;
      this.app.requestRender();
    } else if (this.box) {
      this.box.x1 = world.x; this.box.y1 = world.y;
      this.app.requestRender();
    } else {
      // Hover is edit affordance, so only the active sketch can light up.
      let changed = false;
      const hit = this.app.hitTestActiveSketch(world);
      for (const s of this.app.project.visibleSketches()) {
        for (const e of s.entities) {
          const hov = e === hit;
          if (e.hover !== hov) { e.hover = hov; changed = true; }
          for (const c of e.children()) {
            const childHov = c === hit;
            if (c.hover !== childHov) { c.hover = childHov; changed = true; }
          }
        }
      }
      if (changed) this.app.requestRender();
    }
  }
  onPointerUp(world, snap, ev) {
    if (this.dimAction) {
      if (this.dimAction.moved) {
        // The label position was mutated in-place during pointermove; just
        // commit so the change goes through the undo stack and persists.
        this.app.commit();
      } else {
        // No movement — treat as a click and open the inline editor.
        if (this.dimAction.editOnClick) this.app.editDimValue(this.dimAction.constraint);
      }
      this.dimAction = null;
      return;
    }
    if (this.box) {
      const wasOffsetBox = this.boxMode === 'offset';
      const wasMirrorBox = this.boxMode === 'mirror';
      const box = this.box;
      const x0 = Math.min(this.box.x0, this.box.x1);
      const y0 = Math.min(this.box.y0, this.box.y1);
      const x1 = Math.max(this.box.x0, this.box.x1);
      const y1 = Math.max(this.box.y0, this.box.y1);
      const movedPx = Math.hypot((world.x - box.x0) * this.app.view.zoom, (world.y - box.y0) * this.app.view.zoom);
      this.box = null;
      this.boxMode = 'select';

      if (wasOffsetBox && movedPx <= 3) {
        if (this.app.offsetEntityIds.length && this.app.offsetPhase === 'placing') {
          this.app.updateOffsetCursor(world);
          this.app._showOffsetInput();
        }
        return;
      }
      if (wasMirrorBox && movedPx <= 3) return;

      if (wasOffsetBox && box.replace) this.app.offsetEntityIds = [];
      else if (!wasMirrorBox && box.replace) this.app.clearSelection();

      const mirrorHits = [];
      for (const s of this.app.activeVisibleSketches()) {
        for (const e of s.entities) {
          const inBox = (p) => p.x >= x0 && p.x <= x1 && p.y >= y0 && p.y <= y1;
          let inside = false;
          if (e instanceof Line)        inside = inBox(e.p1) && inBox(e.p2);
          else if (e instanceof Circle) inside = inBox(e.center);
          else if (e instanceof Arc)    inside = inBox(e.center);
          else if (e instanceof Point)  inside = inBox(e);
          if (!inside) continue;
          if (wasOffsetBox) {
            if (e instanceof Line || e instanceof Circle || e instanceof Arc) {
              if (!this.app.offsetEntityIds.includes(e.id)) this.app.offsetEntityIds.push(e.id);
            }
          } else if (wasMirrorBox) {
            if (e instanceof Point || e instanceof Line || e instanceof Circle) mirrorHits.push(e);
          } else {
            this.app.setSelected(e, true);
          }
        }
      }
      if (wasOffsetBox) {
        this.app.offsetAnchorId = this.app.offsetEntityIds[0] || null;
        this.app.offsetPhase = this.app.offsetEntityIds.length ? 'placing' : 'selecting';
        this.app._syncOffsetSelection();
      } else if (wasMirrorBox) {
        this.app.handleMirrorBoxPick(mirrorHits, { replace: box.replace, toggle: box.toggle });
      } else {
        this.app.refreshUI();
      }
    }
    if (this.dragging) {
      // Promote every snap that was active at release into a real
      // constraint — same semantics as creation, where each independent
      // snap-on-click produces its own constraint. Dedupe against
      // existing constraints so dragging a handle back to where it
      // already came from doesn't pile on redundant ones.
      const sketch = this.app.activeSketch();
      const snaps = this.dragging.endSnaps || [];
      if (sketch && snaps.length) {
        for (const sn of snaps) {
          const pt = sn.dragPoint || (this.dragging.pts.length === 1 ? this.dragging.pts[0].p : null);
          if (!pt || sn.entity === pt) continue;
          if (this.app.shouldIgnoreDragSnap(this.dragging, sn)) continue;
          const c = this.app.snapToConstraint(sn, pt);
          if (!c) continue;
          if (this.app._isInvalidConstraint(sketch, c)) continue;
          if (this.app._isDuplicateConstraint(sketch, c)) continue;
          sketch.constraints.push(c);
        }
      }
      this.dragging = null;
      this.app.lastDragSnaps = [];
      this.app.commit();
    }
  }
  onKey(ev) {
    if (ev.key === 'Delete' || ev.key === 'Backspace') { this.app.deleteSelection(); ev.preventDefault(); }
    else if (ev.key === 'Escape') {
      if (this.app.cancelOperation()) {
        ev.preventDefault();
      } else {
        this.app.clearSelection();
      }
    }
  }
  getPreview() {
    if (!this.box) return null;
    const v = this.app.view;
    const a = v.worldToScreen({x:this.box.x0, y:this.box.y0});
    const b = v.worldToScreen({x:this.box.x1, y:this.box.y1});
    return { box: { x: Math.min(a.x,b.x), y: Math.min(a.y,b.y), w: Math.abs(a.x-b.x), h: Math.abs(a.y-b.y) } };
  }
}

class LineTool extends Tool {
  constructor(app) {
    super(app);
    this.startPt = null;
    this.cursor = null;
    this.axisIntent = null;
    this.invalidEnd = false;
    this._lastPlaced = null;
  }
  hint() { return 'Click to place start, click again for end. Esc to finish.'; }
  activate() { this.startPt = null; this.axisIntent = null; this.invalidEnd = false; this._lastPlaced = null; }
  _axisSnapFor(target, snap) {
    if (!this.startPt || snap) return { point: target, kind: null };
    const dx = (target.x - this.startPt.x) * this.app.view.zoom;
    const dy = (target.y - this.startPt.y) * this.app.view.zoom;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (Math.max(adx, ady) < 16 || Math.min(adx, ady) > 8) return { point: target, kind: null };
    if (ady <= adx) return { point: { x: target.x, y: this.startPt.y }, kind: 'horizontal' };
    return { point: { x: this.startPt.x, y: target.y }, kind: 'vertical' };
  }
  _invalidEndFor(point, sketch) {
    if (!this.startPt || !point) return false;
    const minLen = 4 / this.app.view.zoom;
    if (dist(this.startPt, point) <= minLen) return true;
    return this.app.pointsCoincidentInSketch(sketch, this.startPt, point);
  }
  _setInvalidEnd(invalid) {
    this.invalidEnd = invalid;
    document.getElementById('status-hint').textContent = invalid
      ? 'Select a different end point.'
      : this.hint();
  }
  terminateChain(removeLastPlaced = false) {
    const sketch = this.app.activeSketch();
    if (removeLastPlaced && sketch && this._lastPlaced && sketch.entities.includes(this._lastPlaced.line)) {
      sketch.removeEntity(this._lastPlaced.line);
      if (this.app.undoStack.length === this._lastPlaced.undoLength) this.app.undoStack.pop();
      this.app.solveAndRender();
    }
    this.startPt = null;
    this._pendingStartSnap = null;
    this.axisIntent = null;
    this.cursor = null;
    this._lastPlaced = null;
    this._setInvalidEnd(false);
    this.app.requestRender();
  }
  onPointerDown(world, snap, ev) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    if (this.startPt && ev && ev.detail >= 2) {
      this.terminateChain(true);
      return;
    }
    const raw = snap ? { x: snap.x, y: snap.y } : world;
    if (!this.startPt) {
      const { point, reused } = this.app.makeOrReusePoint(raw, snap, sketch);
      this.startPt = point;
      this._pendingStartSnap = reused ? null : snap;
      this._lastPlaced = null;
    } else {
      const axis = this._axisSnapFor(raw, snap);
      const { point: endPt, reused: endReused } = this.app.makeOrReusePoint(axis.point, snap, sketch);
      if (this._invalidEndFor(endPt, sketch)) {
        this.cursor = axis.point;
        this._setInvalidEnd(true);
        this.app.requestRender();
        return;
      }
      const endSnap = endReused ? null : snap;
      const line = new Line(this.startPt, endPt);
      if (this.app.constructionMode) line.construction = true;
      sketch.addEntity(line);
      // Apply pending snap constraints after the line (and its endpoints)
      // are part of the sketch — otherwise the solver lookup won't find them.
      if (this._pendingStartSnap) {
        const cs = this.app.snapToConstraint(this._pendingStartSnap, this.startPt);
        if (cs) sketch.constraints.push(cs);
      }
      if (endSnap) {
        const cs = this.app.snapToConstraint(endSnap, endPt);
        if (cs) sketch.constraints.push(cs);
      }
      if (axis.kind === 'horizontal') {
        sketch.constraints.push(new HorizontalConstraint(line.id, line.p1.id, line.p2.id));
      } else if (axis.kind === 'vertical') {
        sketch.constraints.push(new VerticalConstraint(line.id, line.p1.id, line.p2.id));
      }
      this.app.commit();
      this._lastPlaced = { line, undoLength:this.app.undoStack.length };
      // Chain — the end point is now in the sketch, so no pending constraint.
      this.startPt = endPt;
      this._pendingStartSnap = null;
      this.axisIntent = null;
      this._setInvalidEnd(false);
    }
    this.app.requestRender();
  }
  onPointerMove(world, snap) {
    const raw = snap ? { x:snap.x, y:snap.y } : world;
    const axis = this._axisSnapFor(raw, snap);
    this.cursor = axis.point;
    this.axisIntent = axis.kind;
    if (this.startPt) {
      const candidate = snap ? (snap.entity instanceof Point ? snap.entity : axis.point) : axis.point;
      this._setInvalidEnd(this._invalidEndFor(candidate, this.app.activeSketch()));
    }
    this.app.requestRender();
  }
  onKey(ev) {
    // First Esc closes the current line chain. Second Esc exits to Select.
    if (ev.key === 'Escape' || ev.key === 'Enter') {
      if (this.startPt) { this.terminateChain(false); }
      else { this.app.setTool('select'); }
    }
  }
  getPreview() {
    if (!this.startPt || !this.cursor || this.invalidEnd) return null;
    return { paths: [[this.startPt, this.cursor]], dashed: this.app.constructionMode };
  }
}

class CenterLineTool extends Tool {
  constructor(app) {
    super(app);
    this.center = null;
    this.cursor = null;
    this._centerSnap = null;
    this._centerReused = false;
    this.axisIntent = null;
  }
  hint() { return 'Click midpoint, then one endpoint.'; }
  activate() {
    this.center = null;
    this.cursor = null;
    this._centerSnap = null;
    this._centerReused = false;
    this.axisIntent = null;
  }
  _axisSnapFor(target, snap) {
    if (!this.center || snap) return { point: target, kind: null };
    const dx = (target.x - this.center.x) * this.app.view.zoom;
    const dy = (target.y - this.center.y) * this.app.view.zoom;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (Math.max(adx, ady) < 16 || Math.min(adx, ady) > 8) return { point: target, kind: null };
    if (ady <= adx) return { point: { x: target.x, y: this.center.y }, kind: 'horizontal' };
    return { point: { x: this.center.x, y: target.y }, kind: 'vertical' };
  }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    const raw = snap ? { x:snap.x, y:snap.y } : world;
    if (!this.center) {
      const info = this.app.makeOrReusePoint(raw, snap, sketch);
      this.center = info.point;
      this._centerSnap = info.reused ? null : snap;
      this._centerReused = info.reused;
    } else {
      const axis = this._axisSnapFor(raw, snap);
      const w = axis.point;
      const dx = w.x - this.center.x;
      const dy = w.y - this.center.y;
      if (Math.hypot(dx, dy) < EPS) return;
      const endInfo = this.app.makeOrReusePoint(w, snap, sketch);
      const a = new Point(this.center.x - dx, this.center.y - dy);
      const b = endInfo.point;
      const line = new Line(a, b);
      if (this.app.constructionMode) line.construction = true;
      sketch.addEntity(line);
      if (!this._centerReused) sketch.addEntity(this.center);
      sketch.constraints.push(new MidpointConstraint(this.center.id, { a: line.p1.id, b: line.p2.id }));
      if (axis.kind === 'horizontal') {
        sketch.constraints.push(new HorizontalConstraint(line.id, line.p1.id, line.p2.id));
      } else if (axis.kind === 'vertical') {
        sketch.constraints.push(new VerticalConstraint(line.id, line.p1.id, line.p2.id));
      }
      if (this._centerSnap) {
        const cs = this.app.snapToConstraint(this._centerSnap, this.center);
        if (cs) sketch.constraints.push(cs);
      }
      if (!endInfo.reused && snap) {
        const cs = this.app.snapToConstraint(snap, b);
        if (cs) sketch.constraints.push(cs);
      }
      this.center = null;
      this._centerSnap = null;
      this._centerReused = false;
      this.axisIntent = null;
      this.app.commit();
    }
    this.app.requestRender();
  }
  onPointerMove(world, snap) {
    const raw = snap ? { x:snap.x, y:snap.y } : world;
    const axis = this._axisSnapFor(raw, snap);
    this.cursor = axis.point;
    this.axisIntent = axis.kind;
    this.app.requestRender();
  }
  onKey(ev) {
    if (ev.key === 'Escape') {
      this.center = null;
      this._centerSnap = null;
      this._centerReused = false;
      this.axisIntent = null;
      this.app.setTool('select');
    }
  }
  getPreview() {
    if (!this.center || !this.cursor) return null;
    const dx = this.cursor.x - this.center.x;
    const dy = this.cursor.y - this.center.y;
    if (Math.hypot(dx, dy) < EPS) return null;
    return { paths: [[{ x: this.center.x - dx, y: this.center.y - dy }, this.cursor]], dashed: this.app.constructionMode };
  }
}

class RectangleTool extends Tool {
  constructor(app) { super(app); this.start = null; this.cursor = null; }
  hint() { return 'Click two corners.'; }
  activate() { this.start = null; }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    const w = snap ? { x: snap.x, y: snap.y } : world;
    if (!this.start) {
      this.start = w;
      this._startSnap = snap;
    } else {
      const startInfo = this.app.makeOrReusePoint(this.start, this._startSnap, sketch);
      const endInfo   = this.app.makeOrReusePoint(w, snap, sketch);
      const a = startInfo.point;
      const c = endInfo.point;
      const x0 = a.x, y0 = a.y, x1 = c.x, y1 = c.y;
      const b = new Point(x1, y0);
      const d = new Point(x0, y1);
      const l1 = new Line(a, b), l2 = new Line(b, c);
      const l3 = new Line(c, d), l4 = new Line(d, a);
      if (this.app.constructionMode) [l1,l2,l3,l4].forEach(l=>l.construction=true);
      sketch.addEntity(l1); sketch.addEntity(l2);
      sketch.addEntity(l3); sketch.addEntity(l4);
      sketch.constraints.push(new HorizontalConstraint(l1.id, a.id, b.id));
      sketch.constraints.push(new HorizontalConstraint(l3.id, c.id, d.id));
      sketch.constraints.push(new VerticalConstraint  (l2.id, b.id, c.id));
      sketch.constraints.push(new VerticalConstraint  (l4.id, d.id, a.id));
      // Apply snap-derived constraints to the diagonal corners.
      if (!startInfo.reused && this._startSnap) {
        const cs = this.app.snapToConstraint(this._startSnap, a);
        if (cs) sketch.constraints.push(cs);
      }
      if (!endInfo.reused && snap) {
        const cs = this.app.snapToConstraint(snap, c);
        if (cs) sketch.constraints.push(cs);
      }
      this.start = null; this._startSnap = null;
      this.app.commit();
    }
    this.app.requestRender();
  }
  onPointerMove(world, snap) { this.cursor = snap ? { x:snap.x, y:snap.y } : world; this.app.requestRender(); }
  onKey(ev) { if (ev.key === 'Escape') { this.start = null; this.app.setTool('select'); } }
  getPreview() {
    if (!this.start || !this.cursor) return null;
    const a = this.start, c = this.cursor;
    return { paths: [[ a, {x:c.x,y:a.y}, c, {x:a.x,y:c.y}, a ]], dashed: this.app.constructionMode };
  }
}

class CenterRectangleTool extends Tool {
  constructor(app) {
    super(app);
    this.center = null;
    this.cursor = null;
    this._centerSnap = null;
    this._centerReused = false;
  }
  hint() { return 'Click center, then a corner.'; }
  activate() {
    this.center = null;
    this.cursor = null;
    this._centerSnap = null;
    this._centerReused = false;
  }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    const w = snap ? { x: snap.x, y: snap.y } : world;
    if (!this.center) {
      const info = this.app.makeOrReusePoint(w, snap, sketch);
      this.center = info.point;
      this._centerSnap = info.reused ? null : snap;
      this._centerReused = info.reused;
    } else {
      const sq = centerRectangleCorners(this.center, w);
      if (!sq) return;
      const a = new Point(sq.a.x, sq.a.y);
      const b = new Point(sq.b.x, sq.b.y);
      const c = new Point(sq.c.x, sq.c.y);
      const d = new Point(sq.d.x, sq.d.y);
      const l1 = new Line(a, b), l2 = new Line(b, c);
      const l3 = new Line(c, d), l4 = new Line(d, a);
      const topMid = new Point((a.x + b.x) / 2, (a.y + b.y) / 2);
      const rightMid = new Point((b.x + c.x) / 2, (b.y + c.y) / 2);
      const bottomMid = new Point((c.x + d.x) / 2, (c.y + d.y) / 2);
      const leftMid = new Point((d.x + a.x) / 2, (d.y + a.y) / 2);
      const hCenter = new Line(leftMid, rightMid);
      const vCenter = new Line(topMid, bottomMid);
      hCenter.construction = true;
      vCenter.construction = true;
      if (this.app.constructionMode) [l1,l2,l3,l4].forEach(l => l.construction = true);
      sketch.addEntity(l1); sketch.addEntity(l2);
      sketch.addEntity(l3); sketch.addEntity(l4);
      sketch.addEntity(hCenter); sketch.addEntity(vCenter);
      if (!this._centerReused) sketch.addEntity(this.center);
      sketch.constraints.push(new HorizontalConstraint(l1.id, a.id, b.id));
      sketch.constraints.push(new VerticalConstraint  (l2.id, b.id, c.id));
      sketch.constraints.push(new HorizontalConstraint(l3.id, c.id, d.id));
      sketch.constraints.push(new VerticalConstraint  (l4.id, d.id, a.id));
      sketch.constraints.push(new MidpointConstraint(topMid.id, { a: l1.p1.id, b: l1.p2.id }));
      sketch.constraints.push(new MidpointConstraint(rightMid.id, { a: l2.p1.id, b: l2.p2.id }));
      sketch.constraints.push(new MidpointConstraint(bottomMid.id, { a: l3.p1.id, b: l3.p2.id }));
      sketch.constraints.push(new MidpointConstraint(leftMid.id, { a: l4.p1.id, b: l4.p2.id }));
      sketch.constraints.push(new MidpointConstraint(this.center.id, { a: hCenter.p1.id, b: hCenter.p2.id }));
      if (this._centerSnap) {
        const cs = this.app.snapToConstraint(this._centerSnap, this.center);
        if (cs) sketch.constraints.push(cs);
      }
      this.center = null;
      this._centerSnap = null;
      this._centerReused = false;
      this.app.commit();
    }
    this.app.requestRender();
  }
  onPointerMove(world, snap) {
    this.cursor = snap ? { x:snap.x, y:snap.y } : world;
    this.app.requestRender();
  }
  onKey(ev) {
    if (ev.key === 'Escape') {
      this.center = null;
      this._centerSnap = null;
      this._centerReused = false;
      this.app.setTool('select');
    }
  }
  getPreview() {
    if (!this.center || !this.cursor) return null;
    const sq = centerRectangleCorners(this.center, this.cursor);
    if (!sq) return null;
    return {
      paths: [[sq.a, sq.b, sq.c, sq.d, sq.a]],
      dashed: this.app.constructionMode,
      dashedPaths: [
        [{ x: sq.a.x, y: this.center.y }, { x: sq.c.x, y: this.center.y }],
        [{ x: this.center.x, y: sq.a.y }, { x: this.center.x, y: sq.c.y }]
      ]
    };
  }
}

class ThreePointCircleTool extends Tool {
  constructor(app) { super(app); this.picks = []; this.cursor = null; }
  hint() { return 'Click three points on the circle.'; }
  activate() { this.picks = []; this.cursor = null; }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    const w = snap ? { x:snap.x, y:snap.y } : world;
    const info = this.app.makeOrReusePoint(w, snap, sketch);
    this.picks.push({ ...info, snap: info.reused ? null : snap });
    if (this.picks.length === 3) {
      const circ = circleFrom3Points(this.picks[0].point, this.picks[1].point, this.picks[2].point);
      if (circ) {
        const center = new Point(circ.center.x, circ.center.y);
        const circle = new Circle(center, circ.r);
        if (this.app.constructionMode) circle.construction = true;
        sketch.addEntity(circle);
        for (const pick of this.picks) {
          if (!pick.reused) sketch.addEntity(pick.point);
        }
        for (const pick of this.picks) {
          sketch.constraints.push(new PointOnCircleConstraint(pick.point.id, circle.id, circle.center.id));
          if (pick.snap) {
            const cs = this.app.snapToConstraint(pick.snap, pick.point);
            if (cs) sketch.constraints.push(cs);
          }
        }
        this.app.commit();
      }
      this.picks = [];
      this.cursor = null;
    }
    this.app.requestRender();
  }
  onPointerMove(world, snap) {
    this.cursor = snap ? { x:snap.x, y:snap.y } : world;
    this.app.requestRender();
  }
  onKey(ev) {
    if (ev.key === 'Escape') {
      this.picks = [];
      this.cursor = null;
      this.app.setTool('select');
    }
  }
  getPreview() {
    const pts = this.picks.map(p => p.point);
    const points = [...pts];
    if (pts.length === 2 && this.cursor) {
      const circ = circleFrom3Points(pts[0], pts[1], this.cursor);
      if (circ) return { points, circles: [{ center: circ.center, r: circ.r }] };
    }
    if (this.cursor && pts.length > 0 && pts.length < 2) points.push(this.cursor);
    return points.length ? { points } : null;
  }
}

class HexagonTool extends Tool {
