      q.push(id);
      if (!graph.has(id)) graph.set(id, new Set());
    }
    for (let qi = 0; qi < q.length; qi++) {
      const id = q[qi];
      const d = distMap.get(id);
      for (const nb of (graph.get(id) || [])) {
        if (distMap.has(nb)) continue;
        distMap.set(nb, d + 1);
        q.push(nb);
      }
    }
    return distMap;
  }

  _componentFrom(graph, startId) {
    const component = new Set();
    const q = [startId];
    component.add(startId);
    for (let qi = 0; qi < q.length; qi++) {
      const id = q[qi];
      for (const nb of (graph.get(id) || [])) {
        if (component.has(nb)) continue;
        component.add(nb);
        q.push(nb);
      }
    }
    return component;
  }

  _activeIdsAndPoints(sketch) {
    const ids = new Set();
    const points = new Map();
    const walk = (e) => {
      ids.add(e.id);
      if (e instanceof Point) points.set(e.id, e);
      for (const c of e.children()) walk(c);
    };
    for (const e of sketch.entities) walk(e);
    return { ids, points };
  }

  _componentIsAnchored(sketch, component, activeIds, pointById) {
    for (const id of component) {
      if (!activeIds.has(id)) return true;
      const p = pointById.get(id);
      if (p && p.fixed) return true;
    }
    for (const c of sketch.constraints) {
      if (c.kind === 'fix' && component.has(c.pointId)) return true;
    }
    return false;
  }

  _componentHasExternalJoint(sketch, component, jointKinds = this._dragJointConstraintKinds()) {
    for (const c of sketch.constraints) {
      if (!jointKinds.has(c.kind)) continue;
      const refs = c.refs().filter(Boolean);
      const inside = refs.some(id => component.has(id));
      const outside = refs.some(id => !component.has(id));
      if (inside && outside) return true;
    }
    return false;
  }

  _componentAnchorPoint(sketch, component, activeIds, pointById) {
    const anchors = new Map();
    const addPoint = (p) => { if (p) anchors.set(p.id, p); };
    for (const id of component) {
      if (!activeIds.has(id)) {
        const e = this._lookupAny(id);
        if (e instanceof Point) addPoint(e);
        else return null;
      }
      const p = pointById.get(id);
      if (p && p.fixed) addPoint(p);
    }
    for (const c of sketch.constraints) {
      if (c.kind === 'fix' && component.has(c.pointId)) addPoint(pointById.get(c.pointId) || this._lookupAny(c.pointId));
    }
    return anchors.size === 1 ? [...anchors.values()][0] : null;
  }

  _constraintResidualNorm(constraints, L = null) {
    L = L || this._lookupFn();
    let sum = 0;
    for (const c of constraints) {
      for (const r of c.residuals(L)) sum += r * r;
    }
    return Math.sqrt(sum);
  }

  _constraintSystem(rows, constraints, L = null) {
    const activeConstraints = constraints.filter(c => !c.driven);
    L = L || this._lookupFn();
    const computeF = () => {
      const f = [];
      for (const c of activeConstraints) for (const r of c.residuals(L)) f.push(r);
      return f;
    };
    const f = computeF();
    const m = f.length, n = rows.length;
    const J = Array.from({ length:m }, () => new Array(n).fill(0));
    for (let j = 0; j < n; j++) {
      const r = rows[j];
      const x0 = r.ent[r.key];
      const step = Math.max(1e-6, Math.abs(x0) * 1e-7);
      r.ent[r.key] = x0 + step;
      const fp = computeF();
      r.ent[r.key] = x0;
      const inv = 1 / step;
      for (let i = 0; i < m; i++) J[i][j] = (fp[i] - f[i]) * inv;
    }
    const residual = Math.sqrt(f.reduce((s, v) => s + v*v, 0));
    return { f, J, residual };
  }

  _applyParamStep(rows, step) {
    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      let v = r.ent[r.key] + step[i];
      if (r.key === 'r') v = Math.max(EPS, v);
      r.ent[r.key] = v;
    }
  }

  _projectConstraintResidual(rows, constraints, passes = 2, L = null) {
    L = L || this._lookupFn();
    for (let pass = 0; pass < passes; pass++) {
      const sys = this._constraintSystem(rows, constraints, L);
      if (sys.residual < 1e-7 || !sys.J.length) return sys;
      const step = solveLeastSquares(sys.J, sys.f.map(v => -v), 1e-6);
      if (!step) return sys;
      const before = this._captureParamValues(rows);
      this._applyParamStep(rows, step);
      const next = this._constraintSystem(rows, constraints, L);
      if (next.residual <= sys.residual) continue;
      this._applyParamValues(rows, before);
      return sys;
    }
    return this._constraintSystem(rows, constraints, L);
  }

  _makeDragIntent(startWorld, pts, hit, rows) {
    const index = this._paramIndexMap(rows);
    const targets = [];
    const pointCoeff = (p, key, coeff = 1) => {
      const idx = index.get(p.id + ':' + key);
      return idx == null ? null : { idx, coeff };
    };
    const addTarget = (coeffs, start, axis, weight) => {
      const clean = coeffs.filter(Boolean);
      if (clean.length) targets.push({ coeffs:clean, start, axis, weight });
    };
    const addPointTargets = (p, weight) => {
      addTarget([pointCoeff(p, 'x')], p.x, 'x', weight);
      addTarget([pointCoeff(p, 'y')], p.y, 'y', weight);
    };
    const addLineHandleTargets = (line, weight) => {
      const dx = line.p2.x - line.p1.x, dy = line.p2.y - line.p1.y;
      const len2 = dx*dx + dy*dy;
      const t = len2 > EPS
        ? clamp(((startWorld.x - line.p1.x)*dx + (startWorld.y - line.p1.y)*dy) / len2, 0, 1)
        : 0.5;
      const a = 1 - t, b = t;
      addTarget([pointCoeff(line.p1, 'x', a), pointCoeff(line.p2, 'x', b)], a*line.p1.x + b*line.p2.x, 'x', weight);
      addTarget([pointCoeff(line.p1, 'y', a), pointCoeff(line.p2, 'y', b)], a*line.p1.y + b*line.p2.y, 'y', weight);
    };

    if (hit instanceof Point) {
      addPointTargets(hit, 400);
    } else if (hit instanceof Line) {
      addLineHandleTargets(hit, 400);
    } else if (pts.length === 1) {
      addPointTargets(pts[0].p, 400);
    } else if (pts.length === 2) {
      const p1 = pts[0].p, p2 = pts[1].p;
      addLineHandleTargets({ p1, p2 }, 400);
    } else if (pts.length > 2) {
      const n = pts.length;
      const cx = pts.reduce((s, r) => s + r.x, 0) / n;
      const cy = pts.reduce((s, r) => s + r.y, 0) / n;
      addTarget(pts.map(r => pointCoeff(r.p, 'x', 1 / n)), cx, 'x', 400);
      addTarget(pts.map(r => pointCoeff(r.p, 'y', 1 / n)), cy, 'y', 400);
      for (const r of pts) addPointTargets(r.p, 0.5);
    }
    return targets.length ? { targets } : null;
  }

  _intentTargetValue(target, dx, dy) {
    return target.start + (target.axis === 'x' ? dx : dy);
  }

  _intentCurrentValue(target, rows) {
    let v = 0;
    for (const c of target.coeffs) v += c.coeff * rows[c.idx].ent[rows[c.idx].key];
    return v;
  }

  _dragParamRegularization(drag, row) {
    const d = drag.distances?.get(row.id);
    if (d === 0) return 0.01;
    if (d === 1) return 0.03;
    if (d === 2) return 0.08;
    if (Number.isFinite(d)) return 0.15 + d * 0.05;
    return 2.0;
  }

  _intentLeastSquares(drag, nullBasis, dx, dy) {
    const rows = drag.state;
    const A = [], b = [];
    for (const target of drag.intent.targets) {
      const row = nullBasis.map(v => target.coeffs.reduce((s, c) => s + c.coeff * v[c.idx], 0));
      const norm = Math.sqrt(row.reduce((s, v) => s + v*v, 0));
      if (norm < 1e-10) continue;
      const w = Math.sqrt(target.weight);
      A.push(row.map(v => v * w));
      b.push((this._intentTargetValue(target, dx, dy) - this._intentCurrentValue(target, rows)) * w);
    }
    for (let i = 0; i < rows.length; i++) {
      const w0 = this._dragParamRegularization(drag, rows[i]);
      if (w0 <= 0) continue;
      const w = Math.sqrt(w0);
      A.push(nullBasis.map(v => v[i] * w));
      b.push((rows[i].value - rows[i].ent[rows[i].key]) * w);
    }
    return { A, b };
  }

  _dragIntentError(drag, dx, dy) {
    let sum = 0, n = 0;
    for (const target of drag.intent.targets) {
      const e = this._intentTargetValue(target, dx, dy) - this._intentCurrentValue(target, drag.state);
      sum += e * e;
      n++;
    }
    return n ? Math.sqrt(sum / n) : 0;
  }

  _dragRigidLineConstraints(dragOrLocks) {
    const locks = Array.isArray(dragOrLocks) ? dragOrLocks : (dragOrLocks?.rigidLines || []);
    return locks.flatMap(l => {
      const length = Math.hypot(l.dx, l.dy);
      return [new DistanceConstraint(l.p1, l.p2, length)];
    });
  }

  _mirrorAxisSourceLocks(sketch, axisLine, draggedPointIds = new Set()) {
    if (!sketch || !(axisLine instanceof Line)) return [];
    const axisIds = new Set([axisLine.p1.id, axisLine.p2.id]);
    const dragged = draggedPointIds instanceof Set ? draggedPointIds : new Set(draggedPointIds || []);
    const symmetric = sketch.constraints.filter(c =>
      c.kind === 'symmetric' && sameLineRefs(axisLine, c.axis));
    if (!symmetric.length) return [];

    const hasSourceMetadata = symmetric.some(c => c.sourceSide === 'p1' || c.sourceSide === 'p2');
    const allowLegacyMirrorIntent = !hasSourceMetadata && symmetric.length > 1;
    const locks = [];
    const seen = new Set();
    for (const c of symmetric) {
      const side = c.sourceSide || (allowLegacyMirrorIntent ? 'p1' : null);
      if (side !== 'p1' && side !== 'p2') continue;
      const sourceId = side === 'p2' ? c.p2 : c.p1;
      if (!sourceId || axisIds.has(sourceId) || dragged.has(sourceId) || seen.has(sourceId)) continue;
      const p = this._lookupAny(sourceId);
      if (!(p instanceof Point)) continue;
      locks.push(new FixConstraint(p.id, p.x, p.y));
      seen.add(sourceId);
    }
    return locks;
  }

  _mirrorAxisSourceLocksForDrag(sketch, hit, draggedPointIds = new Set()) {
    if (!sketch) return [];
    const dragged = draggedPointIds instanceof Set ? draggedPointIds : new Set(draggedPointIds || []);
    const axes = [];
    const addAxis = (line) => {
      if (!(line instanceof Line)) return;
      if (!sketch.constraints.some(c => c.kind === 'symmetric' && sameLineRefs(line, c.axis))) return;
      if (!axes.includes(line)) axes.push(line);
    };
    if (hit instanceof Line) addAxis(hit);
    if (hit instanceof Point) {
      for (const e of sketch.entities) {
        if (e instanceof Line && (e.p1 === hit || e.p2 === hit || dragged.has(e.p1.id) || dragged.has(e.p2.id))) {
          addAxis(e);
        }
      }
    }
    const locks = [];
    const seen = new Set();
    for (const axis of axes) {
      for (const lock of this._mirrorAxisSourceLocks(sketch, axis, dragged)) {
        if (seen.has(lock.pointId)) continue;
        seen.add(lock.pointId);
        locks.push(lock);
      }
    }
    return locks;
  }

  _beginDofDrag(sketch, state, startWorld, pts, hit, distances, rigidLines = [], mirrorAxisLocks = []) {
    const componentIds = new Set(distances.keys());
    const localState = state.filter(r => componentIds.has(r.id));
    if (!localState.length) return null;
    const constraints = sketch.constraints
      .filter(c => !c.driven && c.refs().some(id => componentIds.has(id)))
      .concat(this._dragRigidLineConstraints(rigidLines), mirrorAxisLocks);
    const lookup = this._lookupFn(this.project.sketches);
    const sys = this._constraintSystem(localState, constraints, lookup);
    if (sys.residual > 1e-4) return null;
    const intent = this._makeDragIntent(startWorld, pts, hit, localState);
    if (!intent) return null;
    const rowBasis = rowSpaceBasis(sys.J, 1e-7);
    const nullBasis = nullSpaceBasis(rowBasis, localState.length, 1e-7);
    if (!nullBasis.length) {
      return {
        mode:'locked',
        startWorld,
        pts,
        snapPts:pts,
        state:localState,
        distances,
        rigidLines,
        mirrorAxisLocks,
        snapIgnoreIds:this._offsetLinkedSnapIgnoreIds(sketch, pts.map(r => r.p.id))
      };
    }
    let responsive = false;
    for (const target of intent.targets) {
      for (const v of nullBasis) {
        const projected = target.coeffs.reduce((s, c) => s + c.coeff * v[c.idx], 0);
        if (Math.abs(projected) > 1e-7) { responsive = true; break; }
      }
      if (responsive) break;
    }
    if (!responsive) return null;
    return {
      mode:'dof',
      startWorld,
      pts,
      snapPts:pts,
      state:localState,
      constraints,
      intent,
      distances,
      rigidLines,
      mirrorAxisLocks,
      lookup,
      // A DOF drag moves the selected handle through an existing constrained
      // component. Other points in that component are legitimate targets.
      snapIgnoreIds:this._offsetLinkedSnapIgnoreIds(sketch, pts.map(r => r.p.id))
    };
  }

  _solveDofDrag(drag, dx, dy) {
    this._restoreSketchParams(drag.state);
    let bestValues = this._captureParamValues(drag.state);
    let bestError = this._dragIntentError(drag, dx, dy);
    let iterations = 0;

    for (let iter = 0; iter < 20; iter++) {
      iterations = iter + 1;
      const sys = this._constraintSystem(drag.state, drag.constraints, drag.lookup);
      const rowBasis = rowSpaceBasis(sys.J, 1e-7);
      const nullBasis = nullSpaceBasis(rowBasis, drag.state.length, 1e-7);
      if (!nullBasis.length) break;
      const { A, b } = this._intentLeastSquares(drag, nullBasis, dx, dy);
      if (!A.length) break;
      const z = solveLeastSquares(A, b, 1e-8);
      if (!z) break;
      const step = new Array(drag.state.length).fill(0);
      for (let k = 0; k < nullBasis.length; k++) {
        for (let i = 0; i < step.length; i++) step[i] += nullBasis[k][i] * z[k];
      }
      const maxStep = step.reduce((m, v) => Math.max(m, Math.abs(v)), 0);
      if (maxStep < 1e-7) break;
      this._applyParamStep(drag.state, step);
      this._projectConstraintResidual(drag.state, drag.constraints, 2, drag.lookup);
      const err = this._dragIntentError(drag, dx, dy);
      if (err < bestError) {
        bestError = err;
        bestValues = this._captureParamValues(drag.state);
      }
      if (err < 1e-5) break;
    }

    this._applyParamValues(drag.state, bestValues);
    const sys = this._constraintSystem(drag.state, drag.constraints, drag.lookup);
    const result = {
      ok: sys.residual < 1e-4,
      iters: iterations,
      residual: sys.residual,
      state: this._lastSolve?.state || 'under'
    };
    return this._finishDragStep(drag, result);
  }

  _applySimilarityToRows(rows, component, anchor, scale, angle) {
    const cs = Math.cos(angle), sn = Math.sin(angle);
    const pointRows = new Map();
    for (const r of rows) {
      if (!component.has(r.id)) continue;
      if (r.ent instanceof Point) {
        if (!pointRows.has(r.ent)) pointRows.set(r.ent, { x:r.ent.x, y:r.ent.y });
        pointRows.get(r.ent)[r.key] = r.value;
      }
    }
    for (const [p, rec] of pointRows) {
      const vx = rec.x - anchor.x, vy = rec.y - anchor.y;
      p.x = anchor.x + scale * (vx*cs - vy*sn);
      p.y = anchor.y + scale * (vx*sn + vy*cs);
    }
    for (const r of rows) {
      if (!component.has(r.id) || r.ent instanceof Point) continue;
      if (r.key === 'r') r.ent[r.key] = Math.max(EPS, r.value * scale);
      else if (r.key === 'a0' || r.key === 'a1') r.ent[r.key] = r.value + angle;
      else r.ent[r.key] = r.value;
    }
  }

  _componentTransformFreedom(sketch, state, component, anchor) {
    const relevant = sketch.constraints.filter(c => !c.driven && c.refs().some(id => component.has(id)));
    const lookup = this._lookupFn(this.project.sketches);
    const before = this._constraintResidualNorm(relevant, lookup);
    const allowed = (scale, angle) => {
      this._applySimilarityToRows(state, component, anchor, scale, angle);
      const after = this._constraintResidualNorm(relevant, lookup);
      this._restoreSketchParams(state);
      return after <= Math.max(1e-5, before * 1.05 + 1e-6);
    };
    return {
      rotate: allowed(1, 0.01),
      scale: allowed(1.01, 0)
    };
  }

  beginLocalizedDrag(startWorld, pts, hit = null, rigidLines = []) {
    const sketch = this.activeSketch();
    this._ensureOffsetPairSigns(sketch);
    const state = this._captureSketchParams(sketch);
    const initialDragIds = new Set(pts.map(r => r.p.id));
    if (hit?.id) initialDragIds.add(hit.id);
    const offsetGuard = this._captureOffsetDragGuard(sketch, initialDragIds);
    // Circle perimeter resize: when the center is fully determined by constraints,
    // dragging the perimeter should resize the circle rather than translate it.
    if (hit instanceof Circle &&
        !sketch.constraints.some(c => c.kind === 'radius' && c.circleId === hit.id)) {
      return {
        mode: 'circleResize',
        startWorld,
        pts: [],
        snapPts: [],
        state,
        circle: hit,
        center: { x:hit.center.x, y:hit.center.y },
        offsetGuard,
        snapIgnoreIds: this._offsetLinkedSnapIgnoreIds(sketch, [hit.id, hit.center.id])
      };
    }

    const endpointRef = this.arcEndpointRef(hit);
    if (endpointRef && pts.length === 1) {
      return {
        mode:'arcEndpoint',
        startWorld,
        pts,
        snapPts:pts,
        state,
        endpointRef,
        arc:hit.arcOwner,
        which:hit.arcEndpoint,
        startRadius:hit.arcOwner.r,
        startAngle:hit.arcEndpoint === 'start' ? hit.arcOwner.a0 : hit.arcOwner.a1,
        referenceAngle:hit.arcEndpoint === 'start' ? hit.arcOwner.a1 : hit.arcOwner.a0,
        unwrappedAngle:hit.arcEndpoint === 'start' ? hit.arcOwner.a0 : hit.arcOwner.a1,
        offsetGuard,
        snapIgnoreIds:this._offsetLinkedSnapIgnoreIds(sketch, [hit.id, hit.arcOwner.id])
      };
    }
    const jointKinds = this._dragJointConstraintKinds();
    const graph = this._buildConstraintGraph(sketch, { skipKinds: jointKinds });
    const startIds = new Set(pts.map(r => r.p.id));
    const distances = this._graphDistances(graph, startIds);
    const mirrorAxisLocks = this._mirrorAxisSourceLocksForDrag(sketch, hit, startIds);

    const { ids: activeIds, points: pointById } = this._activeIdsAndPoints(sketch);
    const isPointOnCircleHandleDrag = hit instanceof Point && pts.length === 1 &&
      sketch.constraints.some(c => c.kind === 'pointOnCircle' && c.pointId === hit.id);
    const components = [];
    const componentKeys = new Set();
    for (const id of startIds) {
      const component = this._componentFrom(graph, id);
      const key = [...component].sort().join('|');
      if (!componentKeys.has(key)) {
        componentKeys.add(key);
        components.push(component);
      }
    }

    if (!mirrorAxisLocks.length &&
        !isPointOnCircleHandleDrag &&
        components.length && components.every(c =>
          !this._componentIsAnchored(sketch, c, activeIds, pointById) &&
          !this._componentHasExternalJoint(sketch, c, jointKinds))) {
      const moveIds = new Set();
      for (const c of components) for (const id of c) moveIds.add(id);
      const rigidPts = [];
      for (const [id, p] of pointById) {
        if (moveIds.has(id)) rigidPts.push({ p, x:p.x, y:p.y });
      }
      if (rigidPts.length) {
        return {
          mode:'rigid',
          startWorld,
          pts:rigidPts,
          snapPts:pts,
          state,
          startIds,
          distances,
          rigidLines,
          mirrorAxisLocks,
          offsetGuard,
          snapIgnoreIds:this._offsetLinkedSnapIgnoreIds(sketch, moveIds)
        };
      }
    }

    const dofDrag = this._beginDofDrag(sketch, state, startWorld, pts, hit, distances, rigidLines, mirrorAxisLocks);
    let lockedDofDrag = dofDrag?.mode === 'locked' ? dofDrag : null;
    if (dofDrag && !lockedDofDrag) {
      dofDrag.offsetGuard = offsetGuard;
      return dofDrag;
    }

    const solveGraph = this._buildSolvingGraph(sketch);
    const solveComponents = [];
    const solveComponentKeys = new Set();
    for (const id of startIds) {
      const component = this._componentFrom(solveGraph, id);
      const key = [...component].sort().join('|');
      if (!solveComponentKeys.has(key)) {
        solveComponentKeys.add(key);
        solveComponents.push(component);
      }
    }

    if (!dofDrag || lockedDofDrag) {
      const fullDistances = this._graphDistances(solveGraph, startIds);
      const expandsThroughJoints = [...fullDistances.keys()].some(id => !distances.has(id));
      if (expandsThroughJoints) {
        const joinedDofDrag = this._beginDofDrag(sketch, state, startWorld, pts, hit, fullDistances, rigidLines, mirrorAxisLocks);
        if (joinedDofDrag && joinedDofDrag.mode !== 'locked') {
          joinedDofDrag.offsetGuard = offsetGuard;
          return joinedDofDrag;
        }
        if (!lockedDofDrag && joinedDofDrag?.mode === 'locked') lockedDofDrag = joinedDofDrag;
      }
    }

    const anchors = solveComponents.map(c => this._componentAnchorPoint(sketch, c, activeIds, pointById));
    if (!mirrorAxisLocks.length &&
        solveComponents.length && anchors.every(a => a) && new Set(anchors.map(a => a.id)).size === 1) {
      const anchor = anchors[0];
      const moveIds = new Set();
      for (const c of solveComponents) for (const id of c) moveIds.add(id);
      const snapIgnoreIds = this._offsetLinkedSnapIgnoreIds(sketch, moveIds);
      for (const c of components) for (const id of c) snapIgnoreIds.add(id);
      const rotatePts = [];
      for (const [id, p] of pointById) {
        if (moveIds.has(id) && p !== anchor) rotatePts.push({ p, x:p.x, y:p.y });
      }
      const transformFreedom = this._componentTransformFreedom(sketch, state, moveIds, anchor);
      const handle = dist(startWorld, anchor) > EPS ? { x:startWorld.x, y:startWorld.y } : pts
        .filter(r => r.p !== anchor && dist(r.p, anchor) > EPS)
        .sort((a, b) => dist(a.p, startWorld) - dist(b.p, startWorld))[0] || rotatePts[0];
      if (rotatePts.length && handle && transformFreedom.rotate) {
        const transformParams = state.filter(r => moveIds.has(r.id) && !(r.ent instanceof Point));
        return {
          mode: (transformFreedom.scale && !rigidLines.length) ? 'similarity' : 'rotate',
          startWorld,
          pts:rotatePts,
          transformParams,
          snapPts:pts.filter(r => r.p !== anchor),
          state,
          startIds,
          distances,
          rigidLines,
          mirrorAxisLocks,
          anchor:{ p:anchor, x:anchor.x, y:anchor.y },
          rotateHandle:handle,
          offsetGuard,
          snapIgnoreIds
        };
      }
    }

    if (lockedDofDrag) {
      lockedDofDrag.offsetGuard = offsetGuard;
      return lockedDofDrag;
    }

    const depthSet = new Set([0]);
    for (const r of state) {
      const d = distances.get(r.id);
      if (Number.isFinite(d)) depthSet.add(d);
    }
    const depths = [...depthSet].sort((a, b) => a - b);
    return { startWorld, pts, snapPts:pts, state, startIds, distances, depths, rigidLines, mirrorAxisLocks,
      offsetGuard,
      snapIgnoreIds:this._offsetLinkedSnapIgnoreIds(sketch, distances.keys()) };
  }

  _dragMovableIds(drag, depth) {
    const movable = new Set(drag.startIds);
    for (const [id, d] of drag.distances) {
      if (d <= depth) movable.add(id);
    }
    return movable;
  }

  _dragTempConstraints(state, movableIds, targetById, drag = null) {
    const extra = [];
    const fixedPoints = new Map();
    for (const r of state) {
      if (movableIds.has(r.id)) continue;
      if (r.ent instanceof Point) {
        if (!fixedPoints.has(r.ent)) fixedPoints.set(r.ent, { p:r.ent, x:r.ent.x, y:r.ent.y });
        fixedPoints.get(r.ent)[r.key] = r.value;
      } else {
        extra.push(new ParamFixConstraint(r.id, r.key, r.value));
      }
    }
    for (const fp of fixedPoints.values()) extra.push(new FixConstraint(fp.p.id, fp.x, fp.y));
    if (targetById) {
      for (const [id, t] of targetById) extra.push(new FixConstraint(id, t.x, t.y));
    }
    extra.push(...this._dragRigidLineConstraints(drag));
    if (drag?.mirrorAxisLocks) extra.push(...drag.mirrorAxisLocks);
    return extra;
  }

  _entityAndChildIds(entity) {
    const ids = new Set();
    const walk = (e) => {
      if (!e || ids.has(e.id)) return;
      ids.add(e.id);
      for (const c of e.children()) walk(c);
    };
    walk(entity);
    return ids;
  }

  _solveWithFirstSelectionMoving(sketch, sel, beforeState, beforeGraph) {
    if (!sketch || sel.length < 2) return null;
    const firstIds = this._entityAndChildIds(sel[0]);
    const movableIds = new Set();
    for (const id of firstIds) {
      const component = this._componentFrom(beforeGraph, id);
      for (const cid of component) movableIds.add(cid);
    }
    if (!movableIds.size) return null;

    const extra = this._dragTempConstraints(beforeState, movableIds, null);
    const result = this.solver.solve(sketch, this.project.sketches, extra, { diagnostics:false });
    if (result.ok) return result;

    this._restoreSketchParams(beforeState);
    return result;
  }

  shouldIgnoreDragSnap(drag, snap) {
    if (!drag || !snap) return false;
    if ((drag.mode === 'rotate' || drag.mode === 'similarity' || drag.mode === 'dof') && snap.kind === 'origin') {
      if (drag.anchor && Math.hypot(drag.anchor.x, drag.anchor.y) < EPS) return true;
      const fixedAtOrigin = (drag.state || []).some(r => r.ent instanceof Point && Math.hypot(r.ent.x, r.ent.y) < EPS && r.ent.fixed);
      if (fixedAtOrigin) return true;
    }
    if (!snap.entity || !snap.entity.id) return false;
    return !!(drag.snapIgnoreIds && drag.snapIgnoreIds.has(snap.entity.id));
  }

  _snapKey(snap) {
    if (!snap) return '';
    const entityId = snap.entity?.id || '';
    return `${snap.kind || ''}:${entityId}:${Math.round((snap.x || 0) * 1e6)}:${Math.round((snap.y || 0) * 1e6)}`;
  }

  _rotationDeltaFromDrag(drag, dx, dy) {
    const h = drag.rotateHandle;
    const a = drag.anchor;
    if (!h || !a) return 0;
    const start = Math.atan2(h.y - a.y, h.x - a.x);
    const target = Math.atan2(h.y + dy - a.y, h.x + dx - a.x);
    let delta = target - start;
    while (delta > Math.PI) delta -= TAU;
    while (delta < -Math.PI) delta += TAU;
    return delta;
  }

  _similarityFromDrag(drag, dx, dy) {
    const h = drag.rotateHandle;
    const a = drag.anchor;
    if (!h || !a) return { delta:0, scale:1 };
    const sx = h.x - a.x, sy = h.y - a.y;
    const tx = h.x + dx - a.x, ty = h.y + dy - a.y;
    const startLen = Math.hypot(sx, sy);
    if (startLen < EPS) return { delta:0, scale:1 };
    let delta = Math.atan2(ty, tx) - Math.atan2(sy, sx);
    while (delta > Math.PI) delta -= TAU;
    while (delta < -Math.PI) delta += TAU;
    const scale = drag.mode === 'similarity'
      ? Math.max(0.05, Math.hypot(tx, ty) / startLen)
      : 1;
    return { delta, scale };
  }

  _dragPreviewPoint(drag, r, dx, dy) {
    if (drag.mode !== 'rotate' && drag.mode !== 'similarity') return { x:r.x + dx, y:r.y + dy };
    const a = drag.anchor;
    const { delta, scale } = this._similarityFromDrag(drag, dx, dy);
    const cs = Math.cos(delta), sn = Math.sin(delta);
    const vx = r.x - a.x, vy = r.y - a.y;
    return {
      x:a.x + scale * (vx*cs - vy*sn),
      y:a.y + scale * (vx*sn + vy*cs)
    };
  }

  _dragDeltaForSnap(drag, snap) {
    if (drag.mode !== 'rotate' && drag.mode !== 'similarity') {
      return { dx:snap.x - snap.dragRecord.x, dy:snap.y - snap.dragRecord.y };
    }
    const r = snap.dragRecord;
    const a = drag.anchor;
    const h = drag.rotateHandle;
    if (!r || !a || !h) return { dx:0, dy:0 };
    const rsx = r.x - a.x, rsy = r.y - a.y;
    const rtx = snap.x - a.x, rty = snap.y - a.y;
    const rStartLen = Math.hypot(rsx, rsy);
    if (rStartLen < EPS) return { dx:0, dy:0 };
    let delta = Math.atan2(rty, rtx) - Math.atan2(rsy, rsx);
    while (delta > Math.PI) delta -= TAU;
    while (delta < -Math.PI) delta += TAU;
    const scale = drag.mode === 'similarity'
      ? Math.max(0.05, Math.hypot(rtx, rty) / rStartLen)
      : 1;
    const cs = Math.cos(delta), sn = Math.sin(delta);
    const hvx = h.x - a.x, hvy = h.y - a.y;
    const hx = a.x + scale * (hvx*cs - hvy*sn);
    const hy = a.y + scale * (hvx*sn + hvy*cs);
    return { dx:hx - h.x, dy:hy - h.y };
  }

  solveLocalizedDrag(drag, dx, dy) {
    const sketch = this.activeSketch();
    if (!sketch || !drag) return null;

    if (drag.mode === 'circleResize') {
      if (!drag.warmStarted) {
        this._restoreSketchParams(drag.state || []);
        drag.warmStarted = true;
      }
      const cx = drag.center?.x ?? drag.circle.center.x;
      const cy = drag.center?.y ?? drag.circle.center.y;
      const radius = Math.max(EPS, Math.hypot(drag.startWorld.x + dx - cx, drag.startWorld.y + dy - cy));
      drag.circle.center.x = cx;
      drag.circle.center.y = cy;
      drag.circle.r = radius;
      const extra = [
        new FixConstraint(drag.circle.center.id, cx, cy),
        new ParamFixConstraint(drag.circle.id, 'r', radius)
      ];
      const result = this.solver.solve(sketch, this.project.sketches, extra, {
        diagnostics:false,
        activeIds:[drag.circle.id, drag.circle.center.id]
      });
      return this._finishDragStep(drag, result);
    }

    if (!drag.pts.length) return null;

    if (drag.mode === 'dof') {
      return this._solveDofDrag(drag, dx, dy);
    }

    if (drag.mode === 'locked') {
      this._restoreSketchParams(drag.state || []);
      return { ok:true, iters:0, residual:0, state:this._lastSolve?.state || 'fully' };
    }

    if (drag.mode === 'arcEndpoint') {
      this._restoreSketchParams(drag.state || []);
      const arc = drag.arc;
      const target = { x:drag.pts[0].x + dx, y:drag.pts[0].y + dy };
      const vx = target.x - arc.center.x;
      const vy = target.y - arc.center.y;
      const r = Math.hypot(vx, vy);
      if (r > EPS) {
        const angle = Math.atan2(vy, vx);
        const unwrapped = unwrapAngleNear(angle, drag.unwrappedAngle ?? angle);
        drag.unwrappedAngle = unwrapped;
        const sweep = drag.which === 'start'
          ? drag.referenceAngle - unwrapped
          : unwrapped - drag.referenceAngle;
        if (Math.abs(sweep) > 1e-3) arc.clockwise = sweep < 0;
        arc.r = r;
        if (drag.which === 'start') arc.a0 = angle;
        else arc.a1 = angle;
      }
      arc.syncEnds();
      return this._finishDragStep(drag, { ok:true, iters:0, residual:0, state:this._lastSolve?.state || 'under' });
    }

    if (drag.mode === 'rotate' || drag.mode === 'similarity') {
      const a = drag.anchor;
      const { delta, scale } = this._similarityFromDrag(drag, dx, dy);
      const cs = Math.cos(delta), sn = Math.sin(delta);
      for (const r of drag.pts) {
        const vx = r.x - a.x, vy = r.y - a.y;
        r.p.x = a.x + scale * (vx*cs - vy*sn);
        r.p.y = a.y + scale * (vx*sn + vy*cs);
      }
      for (const r of drag.transformParams || []) {
        if (r.key === 'r') r.ent[r.key] = Math.max(EPS, r.value * scale);
        else if (r.key === 'a0' || r.key === 'a1') r.ent[r.key] = r.value + delta;
        else r.ent[r.key] = r.value;
      }
      for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();
      return this._finishDragStep(drag, { ok:true, iters:0, residual:0, state:this._lastSolve?.state || 'under' });
    }

    if (drag.mode === 'rigid') {
      for (const r of drag.pts) {
        r.p.x = r.x + dx;
        r.p.y = r.y + dy;
      }
      for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();
      return this._finishDragStep(drag, { ok:true, iters:0, residual:0, state:this._lastSolve?.state || 'under' });
    }

    const targets = new Map();
    for (const r of drag.pts) targets.set(r.p.id, { x:r.x + dx, y:r.y + dy });

    let best = null;
    const placeDraggedPoints = () => {
      for (const r of drag.pts) {
        const t = targets.get(r.p.id);
        r.p.x = t.x;
        r.p.y = t.y;
      }
    };
    const finish = (result) => {
      // Drag solves use temporary pins to keep unaffected geometry local.
      // Those pins are not real sketch constraints, so do not use their
      // fully-defined analysis for canvas colouring while the pointer moves.
      return this._finishDragStep(drag, result);
    };
    const trySolve = (depth, includeTargets) => {
      this._restoreSketchParams(drag.state);
      placeDraggedPoints();
      const movable = this._dragMovableIds(drag, depth);
      const extra = this._dragTempConstraints(drag.state, movable, includeTargets ? targets : null, drag);
      const result = this.solver.solve(sketch, this.project.sketches, extra, { diagnostics:false });
      const values = this._captureParamValues(drag.state);
      if (!best || result.residual < best.result.residual) best = { result, values };
      return result;
    };

    for (const depth of drag.depths) {
      const result = trySolve(depth, true);
      if (result.ok) return finish(result);
    }

    // If the cursor target conflicts with a real fixed/reference relation,
    // keep the local pins but let the actual sketch constraints win.
    for (const depth of drag.depths) {
      const result = trySolve(depth, false);
      if (result.ok) return finish(result);
    }

    if (best) {
      this._applyParamValues(drag.state, best.values);
      return finish(best.result);
    }
    return null;
  }

  /* ---- Solving ---- */
  commit(options = {}) {
    const diagnostics = options.diagnostics || 'defer';
    const sketch = this.activeSketch();
    const activeIds = options.activeIds
      ? new Set(options.activeIds)
      : (sketch && sketch.dirtyIds && sketch.dirtyIds.size ? new Set(sketch.dirtyIds) : null);
    this.undoStack.push(JSON.stringify(this.project.toJSON()));
    if (this.undoStack.length > 100) this.undoStack.shift();
    this.redoStack.length = 0;
    if (sketch?.dirtyIds) sketch.dirtyIds.clear();
    if (diagnostics === 'sync') this.solveAndRender();
    else this.solveFastAndRender({ diagnostics, activeIds });
  }

  solveSoft() {
    const sketch = this.activeSketch(); if (!sketch) return;
    const r = this.solver.solve(sketch, this.project.sketches, [], { diagnostics:true });
    for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();
    this._updateConstraintStatus(r);
    this._lastSolve = r;
  }

  solveFastAndRender(options = {}) {
    const scheduleDiagnostics = options.diagnostics === 'defer';
    if (!scheduleDiagnostics) this._cancelPendingDiagnostics();
    const sketch = this.activeSketch();
    if (!sketch) { this.requestRender(); return; }
    const t0 = performance.now();
    const r = this.solver.solve(sketch, this.project.sketches, [], {
      diagnostics:false,
      activeIds: options.activeIds || null
    });
    const t1 = performance.now();
    for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();

    const solvePill = document.getElementById('status-solve');
    solvePill.classList.remove('ok','warn','error');
    const totalConstraints = sketch.constraints.filter(c => !c.driven).length;
    if (totalConstraints === 0) { solvePill.textContent = 'no constraints'; solvePill.classList.add('warn'); }
    else if (r.ok)            { solvePill.textContent = `solved (${r.iters} it, ${(t1-t0).toFixed(1)} ms)`; solvePill.classList.add('ok'); }
    else                       { solvePill.textContent = `not solved (res ${r.residual.toExponential(2)})`; solvePill.classList.add('error'); }

    if (r.state === 'over') {
      const statePill = document.getElementById('status-state');
      statePill.classList.remove('ok','warn','error');
      statePill.textContent = 'Over-defined';
      statePill.classList.add('error');
    } else if (scheduleDiagnostics) {
      const statePill = document.getElementById('status-state');
      statePill.classList.remove('ok','warn','error');
      statePill.textContent = 'Checking...';
      statePill.classList.add('warn');
      document.getElementById('status-dof').textContent = 'DOF: ...';
    }

    this.updateAffectedConstraintStatus(options.activeIds || null);
    this.requestRender();
    if (scheduleDiagnostics) this.requestDiagnostics();
  }

  updateAffectedConstraintStatus(activeIds) {
    const sketch = this.activeSketch();
    if (!sketch || !activeIds || !activeIds.size) return;
    const r = this.solver.solve(sketch, this.project.sketches, [], {
      diagnostics:true,
      activeIds
    });
    const overOverall = r.state === 'over';
    for (const e of sketch.entities) {
      const status = r.entityStatus?.get(e.id);
      if (status) e.status = overOverall ? 'over' : status;
      for (const child of e.children()) {
        const childStatus = r.entityStatus?.get(child.id);
        if (childStatus) child.status = overOverall ? 'over' : childStatus;
      }
    }
    this._lastSolve = {
      ...(this._lastSolve || {}),
      state: r.state,
      redundantIds: this._lastSolve?.redundantIds || new Set()
    };
  }

  solveAndRender() {
    this._cancelPendingDiagnostics();
    const sketch = this.activeSketch();
    if (!sketch) { this.requestRender(); return; }
    const t0 = performance.now();
    const r = this.solver.solve(sketch, this.project.sketches, [], { diagnostics:true });
    const t1 = performance.now();
    for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();
    this._updateConstraintStatus(r);
    this._lastSolve = r;

    const solvePill = document.getElementById('status-solve');
    solvePill.classList.remove('ok','warn','error');
    if (r.m === 0)            { solvePill.textContent = 'no constraints'; solvePill.classList.add('warn'); }
    else if (r.ok)            { solvePill.textContent = `solved (${r.iters} it, ${(t1-t0).toFixed(1)} ms)`; solvePill.classList.add('ok'); }
    else                       { solvePill.textContent = `not solved (res ${r.residual.toExponential(2)})`; solvePill.classList.add('error'); }

    const statePill = document.getElementById('status-state');
    statePill.classList.remove('ok','warn','error');
    if (r.state === 'fully')   { statePill.textContent = 'Fully defined'; statePill.classList.add('ok'); }
    else if (r.state === 'over'){ statePill.textContent = `Over-defined (${r.redundant} redundant)`; statePill.classList.add('error'); }
    else                        { statePill.textContent = 'Under-defined'; statePill.classList.add('warn'); }

    document.getElementById('status-dof').textContent = 'DOF: ' + r.dof;
    this.requestRender();
  }

  _cancelPendingDiagnostics() {
    this._diagnosticsToken++;
    if (this._diagnosticsTimer != null) {
      clearTimeout(this._diagnosticsTimer);
      this._diagnosticsTimer = null;
    }
    if (this._diagnosticsFrame != null) {
      cancelAnimationFrame(this._diagnosticsFrame);
      this._diagnosticsFrame = null;
    }
    if (this._diagnosticsIdleId != null && typeof cancelIdleCallback !== 'undefined') {
      cancelIdleCallback(this._diagnosticsIdleId);
      this._diagnosticsIdleId = null;
    }
  }

  requestDiagnostics() {
    this._cancelPendingDiagnostics();
    const token = this._diagnosticsToken;
    const run = () => {
      this._diagnosticsTimer = null;
      this._diagnosticsIdleId = null;
      this._diagnosticsFrame = null;
      if (token !== this._diagnosticsToken) return;
      this.solveAndRender();
    };
    this._diagnosticsFrame = requestAnimationFrame(() => {
      if (token !== this._diagnosticsToken) return;
      if (typeof requestIdleCallback !== 'undefined') {
        this._diagnosticsIdleId = requestIdleCallback(run, { timeout: 1000 });
      } else {
        this._diagnosticsTimer = setTimeout(run, 120);
      }
    });
  }

  _updateConstraintStatus(result) {
    const sketch = this.activeSketch(); if (!sketch) return;
    const entityStatus = result.entityStatus;
    const overOverall = result.state === 'over';
    // Per-entity colouring: each entity becomes black ("fully") as soon as
    // ITS parameters are pinned, regardless of the sketch's overall state.
    // If the whole sketch is over-defined we still flag every entity as
    // 'over' (red) — that's a global error.
    for (const e of sketch.entities) {
      const s = entityStatus.get(e.id) || 'under';
      e.status = overOverall ? 'over' : s;
      for (const c of e.children()) {
        const cs = entityStatus.get(c.id) || s;
        c.status = overOverall ? 'over' : cs;
      }
    }
    // Reference geometry from non-active visible sketches is frozen by the
    // solver, so we draw it in the "fully" colour (black at full alpha is
    // dimmed elsewhere).
    for (const s of this.project.sketches) {
      if (s.id === sketch.id) continue;
      for (const e of s.entities) {
        e.status = 'fully';
        for (const c of e.children()) c.status = 'fully';
      }
    }
  }

  /* ---- Operations ---- */
  _clearOperationState() {
    if (this.offsetInputEl) { this.offsetInputEl.remove(); this.offsetInputEl = null; }
    this.operationName = null;
    this.mirrorPickMode = 'entities';
    this.mirrorEntityIds = [];
    this.mirrorAxisId = null;
    this.offsetEntityIds = [];
    this.offsetAnchorId = null;
    this.offsetPhase = 'selecting';
    this.offsetSide = 1;
  }

  cancelOperation() {
    if (!this.operationName) return false;
    this._clearOperationState();
    document.getElementById('status-hint').textContent = (this.tool.hint && this.tool.hint()) || '';
    this.refreshToolOptions();
    this.requestRender();
    return true;
  }

  cancelOffsetOperation() {
    if (this.operationName !== 'offset') return;
    this.cancelOperation();
  }

  _switchToSelectToolForOperation() {
    if (this.toolName === 'select') return;
    if (this.tool && this.tool.deactivate) this.tool.deactivate();
    this.toolName = 'select';
    this.tool = new SelectTool(this);
    if (this.tool.activate) this.tool.activate();
    document.querySelectorAll('#topbar .tool').forEach(b => b.classList.toggle('active', b.dataset.tool === 'select'));
    document.getElementById('status-tool').textContent = 'Tool: Select';
    this.canvas.style.cursor = 'default';
  }

  startMirrorOperation() {
    this._clearOperationState();
    this._switchToSelectToolForOperation();
    this.operationName = 'mirror';
    const data = this._mirrorDataFromSelection();
    this.mirrorEntityIds = data.entityIds;
    this.mirrorAxisId = data.axisId;
    this._syncMirrorSelection();
    this.refreshToolOptions();
  }

  startOffsetOperation() {
    this._clearOperationState();
    this._switchToSelectToolForOperation();
    this.operationName = 'offset';
    const entities = this._offsetEntitiesFromSelection();
    this.offsetEntityIds = entities.map(e => e.id);
    this.offsetAnchorId = entities[0]?.id || null;
    this.offsetPhase = entities.length ? 'placing' : 'selecting';
    if (this.offsetAnchorId && this.lastWorldCursor) this.updateOffsetCursor(this.lastWorldCursor);
    this._syncOffsetSelection();
    this.refreshToolOptions();
  }

  _entityLabel(e) {
    const kind = e instanceof Point ? 'Point'
      : e instanceof Line ? 'Line'
      : e instanceof Circle ? 'Circle'
      : e instanceof Arc ? 'Arc'
      : e?.constructor?.kind || 'Entity';
    return `${kind} ${e.id}`;
  }

  _offsetEntitiesFromSelection() {
    const sketch = this.activeSketch(); if (!sketch) return null;
    const sel = this.selectedEntitiesAndPoints().filter(e => !(e instanceof Constraint));
    const entities = sel.filter(e => e instanceof Line || e instanceof Circle || e instanceof Arc);
    return this._offsetProfileEntities(entities, sketch);
  }

  _normalizeOffsetEntityIds() {
    const sketch = this.activeSketch(); if (!sketch) return;
    const entities = this.offsetEntityIds
      .map(id => this._lookupAny(id))
      .filter(e => e && this.project.sketchOf(e) === sketch && (e instanceof Line || e instanceof Circle || e instanceof Arc));
    this.offsetEntityIds = this._offsetProfileEntities(entities, sketch).map(e => e.id);
    if (!this.offsetEntityIds.includes(this.offsetAnchorId)) this.offsetAnchorId = this.offsetEntityIds[0] || null;
  }

  _offsetEntities() {
    const sketch = this.activeSketch(); if (!sketch) return [];
    const entities = this.offsetEntityIds
      .map(id => this._lookupAny(id))
      .filter(e => e && this.project.sketchOf(e) === sketch && (e instanceof Line || e instanceof Circle || e instanceof Arc));
    return this._offsetProfileEntities(entities, sketch);
  }

  _offsetProfileEntities(entities, sketch) {
    if (!entities || !entities.length) return [];
    const real = entities.filter(e => !e.construction);
    if (!real.length) return entities;

    const realEntityIds = new Set(real.map(e => e.id));
    const realPointIds = new Set();
    for (const e of real) {
      for (const child of e.children()) {
        if (child instanceof Point) realPointIds.add(child.id);
      }
    }

    const isScaffold = (e) => {
      if (!e.construction) return false;
      if (e instanceof Line) return true;
      if (e instanceof Circle || e instanceof Arc) {
        return this._constructionCurveSupportsOffsetProfile(sketch, e, realEntityIds, realPointIds);
      }
      return false;
    };
    const filtered = entities.filter(e => !isScaffold(e));
    return filtered.length ? filtered : entities;
  }

  _constructionCurveSupportsOffsetProfile(sketch, curve, realEntityIds, realPointIds) {
    if (!sketch || !(curve instanceof Circle || curve instanceof Arc)) return false;
    for (const c of sketch.constraints) {
      if (c.kind === 'pointOnCircle' &&
          c.circleId === curve.id &&
          c.centerId === curve.center.id &&
          realPointIds.has(c.pointId)) {
        return true;
      }
      if (c.kind === 'arcEndpointOnCircle' &&
          c.circleId === curve.id &&
          c.centerId === curve.center.id &&
          c.ref && realEntityIds.has(c.ref.arcId)) {
        return true;
      }
    }
    return false;
  }

  _offsetSignedDistance() {
    const d = Math.abs(Number(this.offsetDistance) || 0);
    return d * (this.offsetSide >= 0 ? 1 : -1);
  }

  _offsetGroupBounds(entities = this._offsetEntities()) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    const acc = (p) => {
      minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
    };
    for (const e of entities) {
      if (e instanceof Line) {
        acc(e.p1); acc(e.p2);
      } else if (e instanceof Circle || e instanceof Arc) {
        acc({ x:e.center.x - e.r, y:e.center.y - e.r });
        acc({ x:e.center.x + e.r, y:e.center.y + e.r });
      }
    }
    return minX === Infinity ? null : { minX, minY, maxX, maxY };
  }

  _offsetGroupCenter(entities = this._offsetEntities()) {
    const bounds = this._offsetGroupBounds(entities);
    if (!bounds) return null;
    let wx = 0, wy = 0, weight = 0;
    const addWeighted = (p, w) => {
      if (!Number.isFinite(w) || w <= EPS) return;
      wx += p.x * w; wy += p.y * w; weight += w;
    };
    for (const e of entities) {
      if (e instanceof Line) {
        const len = dist(e.p1, e.p2);
        addWeighted({ x:(e.p1.x + e.p2.x) / 2, y:(e.p1.y + e.p2.y) / 2 }, len);
      } else if (e instanceof Circle || e instanceof Arc) {
        if (e instanceof Circle) {
          addWeighted(e.center, TAU * e.r);
        } else {
          const span = Math.abs(directedArcSpan(e.a0, e.a1, e.clockwise));
          const mid = e.a0 + directedArcSpan(e.a0, e.a1, e.clockwise) / 2;
          addWeighted({ x:e.center.x + e.r * Math.cos(mid), y:e.center.y + e.r * Math.sin(mid) }, span * e.r);
        }
      }
    }
    return weight > EPS
      ? { x:wx / weight, y:wy / weight }
      : { x:(bounds.minX + bounds.maxX) / 2, y:(bounds.minY + bounds.maxY) / 2 };
  }

  _offsetRayBoxBoundaryDistance(center, ux, uy, bounds) {
    if (!bounds) return null;
    let best = Infinity;
    const note = (t, x, y) => {
      if (!Number.isFinite(t) || t <= EPS) return;
      if (x < bounds.minX - 1e-6 || x > bounds.maxX + 1e-6) return;
      if (y < bounds.minY - 1e-6 || y > bounds.maxY + 1e-6) return;
      best = Math.min(best, t);
    };
    if (Math.abs(ux) > EPS) {
      let t = (bounds.minX - center.x) / ux;
      note(t, bounds.minX, center.y + uy * t);
      t = (bounds.maxX - center.x) / ux;
      note(t, bounds.maxX, center.y + uy * t);
    }
    if (Math.abs(uy) > EPS) {
      let t = (bounds.minY - center.y) / uy;
      note(t, center.x + ux * t, bounds.minY);
      t = (bounds.maxY - center.y) / uy;
      note(t, center.x + ux * t, bounds.maxY);
    }
    return Number.isFinite(best) ? best : null;
  }

  _offsetGroupSignedDistanceFromCursor(world) {
    const entities = this._offsetEntities();
    const bounds = this._offsetGroupBounds(entities);
    const center = this._offsetGroupCenter(entities);
    if (!center || !world) return null;
    const vx = world.x - center.x, vy = world.y - center.y;
    const cursorR = Math.hypot(vx, vy);
    if (cursorR < EPS) return null;
    const ux = vx / cursorR, uy = vy / cursorR;
    let boundaryR = Infinity;
    const note = (t) => {
      if (Number.isFinite(t) && t > EPS && t < boundaryR) boundaryR = t;
    };
    for (const e of entities) {
      if (e instanceof Line) {
        const sx = e.p2.x - e.p1.x, sy = e.p2.y - e.p1.y;
        const denom = ux * sy - uy * sx;
        if (Math.abs(denom) < EPS) continue;
        const qx = e.p1.x - center.x, qy = e.p1.y - center.y;
        const t = (qx * sy - qy * sx) / denom;
        const s = (qx * uy - qy * ux) / denom;
        if (s >= -1e-6 && s <= 1 + 1e-6) note(t);
      } else if (e instanceof Circle || e instanceof Arc) {
        const cx = center.x - e.center.x, cy = center.y - e.center.y;
        const b = 2 * (ux * cx + uy * cy);
        const c = cx*cx + cy*cy - e.r*e.r;
        const disc = b*b - 4*c;
        if (disc < -EPS) continue;
        const root = Math.sqrt(Math.max(0, disc));
        for (const t of [(-b - root) / 2, (-b + root) / 2]) {
          if (t <= EPS) continue;
          if (e instanceof Arc) {
            const px = center.x + ux * t, py = center.y + uy * t;
            if (!angleOnDirectedArc(Math.atan2(py - e.center.y, px - e.center.x), e.a0, e.a1, e.clockwise)) continue;
          }
          note(t);
        }
      }
    }
    if (!Number.isFinite(boundaryR)) {
      const boxR = this._offsetRayBoxBoundaryDistance(center, ux, uy, bounds);
      if (boxR == null) return null;
      boundaryR = boxR;
    }
    const radialOffset = cursorR - boundaryR;
    if (this._offsetHasClosedLineComponent(entities)) return radialOffset;
    const anchor = this.offsetAnchorId ? this._lookupAny(this.offsetAnchorId) : null;
    if (anchor instanceof Line) {
      const dx = anchor.p2.x - anchor.p1.x;
      const dy = anchor.p2.y - anchor.p1.y;
      const len = Math.hypot(dx, dy);
      if (len > EPS) {
        const nx = -dy / len, ny = dx / len;
        const centerSide = (center.x - anchor.p1.x) * nx + (center.y - anchor.p1.y) * ny;
        if (Math.abs(centerSide) > EPS) return radialOffset * (centerSide < 0 ? 1 : -1);
      }
    }
    return radialOffset;
  }

  _offsetEndpointPair(entity) {
    if (entity instanceof Line) return { a: entity.p1.id, b: entity.p2.id };
    if (entity instanceof Arc) return { a: entity.start.id, b: entity.end.id };
    return null;
  }

  _offsetTopologyIssue(entities) {
    if (!entities || !entities.length) return null;
    const pathEntities = entities.filter(e => e instanceof Line || e instanceof Arc);
    const endpointOwners = new Map();
    const entityById = new Map(pathEntities.map(e => [e.id, e]));
    const neighbors = new Map(pathEntities.map(e => [e.id, new Set()]));

    for (const e of pathEntities) {
      const pair = this._offsetEndpointPair(e);
      if (!pair) continue;
      for (const pointId of [pair.a, pair.b]) {
        if (!endpointOwners.has(pointId)) endpointOwners.set(pointId, []);
        endpointOwners.get(pointId).push(e);
      }
    }

    for (const [pointId, owners] of endpointOwners.entries()) {
      if (owners.length > 2) {
        return `Offset only supports simple path or loop groups. ${owners.length} elements meet at one point; split the branch into separate offsets.`;
      }
      if (owners.length === 2) {
        neighbors.get(owners[0].id).add(owners[1].id);
        neighbors.get(owners[1].id).add(owners[0].id);
      }
    }

    const seen = new Set();
    for (const e of pathEntities) {
      if (seen.has(e.id)) continue;
      const component = [];
      const queue = [e.id];
      seen.add(e.id);
      for (let i = 0; i < queue.length; i++) {
        const id = queue[i];
        const entity = entityById.get(id);
        if (entity) component.push(entity);
        for (const nb of neighbors.get(id) || []) {
          if (seen.has(nb)) continue;
          seen.add(nb);
          queue.push(nb);
        }
      }

      const degrees = new Map();
      for (const entity of component) {
        const pair = this._offsetEndpointPair(entity);
        if (!pair) continue;
        degrees.set(pair.a, (degrees.get(pair.a) || 0) + 1);
        degrees.set(pair.b, (degrees.get(pair.b) || 0) + 1);
      }
      const values = [...degrees.values()];
      if (values.some(n => n > 2)) {
        return 'Offset only supports simple path or loop groups. Remove branches or overlapping endpoints from the selection.';
      }
      const openEnds = values.filter(n => n === 1).length;
      if (!(openEnds === 0 || openEnds === 2)) {
        return 'Offset only supports groups that form one open chain or one closed loop.';
      }
    }

    return null;
  }

  _offsetHasClosedLineComponent(entities) {
    const lines = entities.filter(e => e instanceof Line);
    if (lines.length < 3) return false;
    const byId = new Map(lines.map(l => [l.id, l]));
    const neighbors = new Map(lines.map(l => [l.id, []]));
    const owners = new Map();
    for (const line of lines) {
      for (const p of [line.p1, line.p2]) {
        if (!owners.has(p.id)) owners.set(p.id, []);
        owners.get(p.id).push(line);
      }
    }
    for (const group of owners.values()) {
      for (let i = 0; i < group.length; i++) {
        for (let j = i + 1; j < group.length; j++) {
          neighbors.get(group[i].id).push(group[j].id);
          neighbors.get(group[j].id).push(group[i].id);
        }
      }
    }
    const seen = new Set();
    for (const line of lines) {
      if (seen.has(line.id)) continue;
      const component = [];
      const q = [line.id];
      seen.add(line.id);
      for (let qi = 0; qi < q.length; qi++) {
        const id = q[qi];
        const l = byId.get(id);
        if (l) component.push(l);
        for (const nb of neighbors.get(id) || []) {
          if (seen.has(nb)) continue;
          seen.add(nb);
          q.push(nb);
        }
      }
      if (component.length < 3) continue;
      const counts = new Map();
      for (const l of component) {
        counts.set(l.p1.id, (counts.get(l.p1.id) || 0) + 1);
        counts.set(l.p2.id, (counts.get(l.p2.id) || 0) + 1);
      }
      if ([...counts.values()].every(n => n === 2)) return true;
    }
    return false;
  }

  _offsetLocalVector(entity, endpointId) {
    if (entity instanceof Line) {
      const dx = entity.p2.x - entity.p1.x;
      const dy = entity.p2.y - entity.p1.y;
      const len = Math.hypot(dx, dy);
      if (len < EPS) return null;
      return { x: -dy / len, y: dx / len };
    }
    if (entity instanceof Arc) {
      entity.syncEnds();
      const p = endpointId === entity.start.id ? entity.start : endpointId === entity.end.id ? entity.end : null;
      if (!p) return null;
      const dx = p.x - entity.center.x;
      const dy = p.y - entity.center.y;
      const len = Math.hypot(dx, dy);
      if (len < EPS) return null;
      return { x: dx / len, y: dy / len };
    }
    return null;
  }

  _offsetRelationAtConnection(a, b, sharedId) {
    const ea = this._offsetEndpointPair(a);
    const eb = this._offsetEndpointPair(b);
    if (!ea || !eb) return 1;
    if (a instanceof Line && b instanceof Line) {
      const sameEnd = (ea.a === sharedId && eb.a === sharedId) || (ea.b === sharedId && eb.b === sharedId);
      return sameEnd ? -1 : 1;
    }
    const va = this._offsetLocalVector(a, sharedId);
    const vb = this._offsetLocalVector(b, sharedId);
    if (va && vb) {
      const dot = va.x * vb.x + va.y * vb.y;
      if (Math.abs(dot) > 1e-4) return dot >= 0 ? 1 : -1;
    }
    const sameSide = (ea.a === sharedId && eb.a === sharedId) || (ea.b === sharedId && eb.b === sharedId);
    return sameSide ? -1 : 1;
  }

  _offsetEntitySigns(entities) {
    const signs = new Map();
    const byId = new Map(entities.map(e => [e.id, e]));
    const neighbors = new Map(entities.map(e => [e.id, []]));
    const endpointOwners = new Map();
    for (const e of entities) {
      const pair = this._offsetEndpointPair(e);
      if (!pair) continue;
      for (const id of [pair.a, pair.b]) {
        if (!endpointOwners.has(id)) endpointOwners.set(id, []);
        endpointOwners.get(id).push(e);
      }
    }
    for (const [sharedId, owners] of endpointOwners.entries()) {
      for (let i = 0; i < owners.length; i++) {
        for (let j = i + 1; j < owners.length; j++) {
          const a = owners[i], b = owners[j];
          const rel = this._offsetRelationAtConnection(a, b, sharedId);
          neighbors.get(a.id).push({ id: b.id, rel });
          neighbors.get(b.id).push({ id: a.id, rel });
        }
      }
    }

    const lineComponents = [];
    const seenLines = new Set();
    for (const e of entities) {
      if (!(e instanceof Line) || seenLines.has(e.id)) continue;
      const component = [];
      const queue = [e.id];
      seenLines.add(e.id);
      while (queue.length) {
        const id = queue.shift();
        const line = byId.get(id);
        if (line instanceof Line) component.push(line);
        for (const nb of neighbors.get(id) || []) {
          const next = byId.get(nb.id);
          if (!(next instanceof Line) || seenLines.has(nb.id)) continue;
          seenLines.add(nb.id);
          queue.push(nb.id);
        }
      }
      if (component.length) lineComponents.push(component);
    }

    const closedLineComponents = [];
    for (const component of lineComponents) {
      if (component.length < 3) continue;
      const counts = new Map();
      for (const line of component) {
        counts.set(line.p1.id, (counts.get(line.p1.id) || 0) + 1);
        counts.set(line.p2.id, (counts.get(line.p2.id) || 0) + 1);
      }
      if ([...counts.values()].every(n => n === 2)) closedLineComponents.push(component);
    }

    const roots = [];
    if (this.offsetAnchorId && byId.has(this.offsetAnchorId)) roots.push(this.offsetAnchorId);
    for (const e of entities) if (!roots.includes(e.id)) roots.push(e.id);
    for (const root of roots) {
      if (signs.has(root)) continue;
      signs.set(root, 1);
      const queue = [root];
      while (queue.length) {
        const id = queue.shift();
        const base = signs.get(id);
        for (const nb of neighbors.get(id) || []) {
          if (signs.has(nb.id)) continue;
          signs.set(nb.id, base * nb.rel);
          queue.push(nb.id);
        }
      }
    }

    const groupCenter = closedLineComponents.length ? this._offsetGroupCenter(entities) : null;
    if (groupCenter) {
      for (const component of closedLineComponents) {
        for (const line of component) {
          const dx = line.p2.x - line.p1.x;
          const dy = line.p2.y - line.p1.y;
          const len = Math.hypot(dx, dy);
          if (len < EPS) continue;
          const nx = -dy / len, ny = dx / len;
          const side = (groupCenter.x - line.p1.x) * nx + (groupCenter.y - line.p1.y) * ny;
          if (Math.abs(side) > EPS) signs.set(line.id, side > 0 ? -1 : 1);
        }
      }
    }
    return signs;
  }

  _offsetDistanceFromCursor(world) {
    const groupSigned = this._offsetGroupSignedDistanceFromCursor(world);
    if (groupSigned != null) return Math.abs(groupSigned);
    const entity = this.offsetAnchorId ? this._lookupAny(this.offsetAnchorId) : null;
    if (!entity || !world) return null;
    if (entity instanceof Line) {
      const dx = entity.p2.x - entity.p1.x;
      const dy = entity.p2.y - entity.p1.y;
      const len = Math.hypot(dx, dy);
      if (len < EPS) return null;
      const nx = -dy / len, ny = dx / len;
      return Math.abs((world.x - entity.p1.x) * nx + (world.y - entity.p1.y) * ny);
    }
    return Math.abs(dist(world, entity.center) - entity.r);
  }

  _offsetCursorSide(entity, world) {
    const groupSigned = this._offsetGroupSignedDistanceFromCursor(world);
    if (groupSigned != null && Math.abs(groupSigned) > EPS) return groupSigned >= 0 ? 1 : -1;
    if (!entity || !world) return null;
    if (entity instanceof Line) {
      const dx = entity.p2.x - entity.p1.x;
      const dy = entity.p2.y - entity.p1.y;
      const len = Math.hypot(dx, dy);
      if (len < EPS) return null;
      const nx = -dy / len, ny = dx / len;
      const signed = (world.x - entity.p1.x) * nx + (world.y - entity.p1.y) * ny;
      if (Math.abs(signed) < EPS) return null;
      return signed >= 0 ? 1 : -1;
    }
    const radial = dist(world, entity.center) - entity.r;
    if (Math.abs(radial) < EPS) return null;
    return radial >= 0 ? 1 : -1;
  }

  _offsetLineNetworkPreview(lines, signs, signedDistance) {
    const raw = new Map();
    for (const line of lines) {
      const shifted = offsetLine(line, signedDistance * (signs.get(line.id) || 1));
      if (!shifted) return null;
      raw.set(line.id, { source: line, kind:'line', p1: shifted.p1, p2: shifted.p2 });
    }
    const endpointOwners = new Map();
    for (const line of lines) {
      for (const point of [line.p1, line.p2]) {
        if (!endpointOwners.has(point.id)) endpointOwners.set(point.id, []);
        endpointOwners.get(point.id).push(line);
      }
    }
    const pinned = new Map();
    const endpointKey = (line, which) => `${line.id}:${which}`;
    for (const [pointId, owners] of endpointOwners.entries()) {
      if (owners.length !== 2) continue;
      const [a, b] = owners;
      const sa = raw.get(a.id), sb = raw.get(b.id);
      if (!sa || !sb) continue;
      const inter = lineIntersection(sa.p1, sa.p2, sb.p1, sb.p2);
      if (!inter) continue;
      pinned.set(endpointKey(a, a.p1.id === pointId ? 'p1' : 'p2'), inter);
      pinned.set(endpointKey(b, b.p1.id === pointId ? 'p1' : 'p2'), inter);
    }
    const items = [];
    for (const line of lines) {
      const shifted = raw.get(line.id);
      const p1 = pinned.get(endpointKey(line, 'p1')) || shifted.p1;
      const p2 = pinned.get(endpointKey(line, 'p2')) || shifted.p2;
      const sdx = line.p2.x - line.p1.x, sdy = line.p2.y - line.p1.y;
      const tdx = p2.x - p1.x, tdy = p2.y - p1.y;
      if (Math.hypot(sdx, sdy) < EPS || Math.hypot(tdx, tdy) < EPS) return null;
      if (sdx * tdx + sdy * tdy <= EPS) return null;
      items.push({
        kind:'line',
        source: line,
        p1,
        p2
      });
    }
    if (!this._offsetLineNetworkPreviewTopologyValid(lines, items)) return null;
    return items;
  }

  _offsetLineNetworkPreviewTopologyValid(lines, items) {
    const lineIds = lines.map(l => l.id);
    const loops = this._closedLineLoopsFromEntityIds(lineIds);
    if (!loops.length) return true;

    const previewPointBySourcePointId = new Map();
    const sourceLineById = new Map(lines.map(l => [l.id, l]));
    for (const item of items) {
      const line = item.source;
      if (!(line instanceof Line) || !sourceLineById.has(line.id)) continue;
      previewPointBySourcePointId.set(line.p1.id, item.p1);
      previewPointBySourcePointId.set(line.p2.id, item.p2);
    }

    const previewArea = (pointIds) => {
      let area = 0;
      for (let i = 0; i < pointIds.length; i++) {
        const a = previewPointBySourcePointId.get(pointIds[i]);
        const b = previewPointBySourcePointId.get(pointIds[(i + 1) % pointIds.length]);
        if (!a || !b) return 0;
        area += a.x * b.y - b.x * a.y;
      }
      return area / 2;
    };

    for (const loop of loops) {
      const sourceArea = this._signedAreaForPointIds(loop.pointIds);
      if (Math.abs(sourceArea) <= EPS) continue;
      const targetArea = previewArea(loop.pointIds);
      if (Math.abs(targetArea) <= Math.max(EPS, Math.abs(sourceArea) * 1e-3)) return false;
      if (Math.sign(targetArea) !== Math.sign(sourceArea)) return false;
      for (let i = 0; i < loop.pointIds.length; i++) {
        const sourceA = this._lookupAny(loop.pointIds[i]);
        const sourceB = this._lookupAny(loop.pointIds[(i + 1) % loop.pointIds.length]);
        const targetA = previewPointBySourcePointId.get(loop.pointIds[i]);
        const targetB = previewPointBySourcePointId.get(loop.pointIds[(i + 1) % loop.pointIds.length]);
        if (!sourceA || !sourceB || !targetA || !targetB) return false;
        const sourceLen = dist(sourceA, sourceB);
        const targetLen = dist(targetA, targetB);
        if (targetLen <= Math.max(EPS, sourceLen * 1e-3)) return false;
      }
    }
    return true;
  }

  _applyOffsetPreviewConstraintRadii(preview, sketch) {
    if (!preview || !sketch) return preview;
    const itemBySourceId = new Map();
    const previewPointBySourceId = new Map();
    for (const item of preview.items) {
      const source = item.source;
      if (!source) continue;
      itemBySourceId.set(source.id, item);
      if (source instanceof Line && item.kind === 'line') {
        previewPointBySourceId.set(source.p1.id, item.p1);
        previewPointBySourceId.set(source.p2.id, item.p2);
      } else if ((source instanceof Circle || source instanceof Arc) && (item.kind === 'circle' || item.kind === 'arc')) {
        previewPointBySourceId.set(source.center.id, item.center);
        if (source instanceof Arc) {
          previewPointBySourceId.set(source.start.id, {
            x: item.center.x + item.r * Math.cos(item.a0),
            y: item.center.y + item.r * Math.sin(item.a0)
          });
          previewPointBySourceId.set(source.end.id, {
            x: item.center.x + item.r * Math.cos(item.a1),
            y: item.center.y + item.r * Math.sin(item.a1)
          });
        }
      }
    }

    const hasPreviewRef = (id) => itemBySourceId.has(id) || previewPointBySourceId.has(id);
    const setRadiusFromPoint = (curveId, centerId, pointId) => {
      const item = itemBySourceId.get(curveId);
      const center = previewPointBySourceId.get(centerId);
      const point = previewPointBySourceId.get(pointId);
      if (!item || !center || !point) return;
      const r = dist(center, point);
      if (r > EPS) item.r = r;
    };

    for (const c of sketch.constraints) {
      if (c.kind === 'pointOnCircle') {
        if ([c.pointId, c.circleId, c.centerId].every(hasPreviewRef)) {
          setRadiusFromPoint(c.circleId, c.centerId, c.pointId);
        }
      } else if (c.kind === 'arcEndpointOnCircle') {
        if ([c.ref.arcId, c.ref.centerId, c.circleId, c.centerId].every(hasPreviewRef)) {
          const refPointId = c.ref.which === 'start'
            ? this._lookupAny(c.ref.arcId)?.start?.id
            : this._lookupAny(c.ref.arcId)?.end?.id;
          if (refPointId) setRadiusFromPoint(c.circleId, c.centerId, refPointId);
        }
      }
    }
    return preview;
  }

  _offsetPreviewDataForSignedDistance(entities, signs, signedDistance) {
    const items = [];
    const lines = entities.filter(e => e instanceof Line);
    if (lines.length) {
      const lineItems = this._offsetLineNetworkPreview(lines, signs, signedDistance);
      if (!lineItems) return null;
      for (const item of lineItems) item.offsetValue = signedDistance * (signs.get(item.source.id) || 1);
      items.push(...lineItems);
    }
    for (const entity of entities) {
      if (entity instanceof Line) continue;
      const entityDistance = signedDistance * (signs.get(entity.id) || 1);
      let shifted = null;
      if (entity instanceof Circle) shifted = offsetCircle(entity, entityDistance) && { kind: 'circle', ...offsetCircle(entity, entityDistance) };
      else if (entity instanceof Arc) shifted = offsetArc(entity, entityDistance) && { kind: 'arc', ...offsetArc(entity, entityDistance) };
      if (!shifted) return null;
      shifted.source = entity;
      shifted.offsetValue = entityDistance;
      items.push(shifted);
    }
    return this._applyOffsetPreviewConstraintRadii({ items }, this.activeSketch());
  }

  _clampOffsetDistanceToValidRange(entities, signs, signedDistance) {
    const direction = signedDistance >= 0 ? 1 : -1;
    const target = Math.abs(signedDistance);
    let lo = 0, hi = target;
    let best = null;
    for (let i = 0; i < 32; i++) {
      const mid = (lo + hi) / 2;
      const preview = this._offsetPreviewDataForSignedDistance(entities, signs, direction * mid);
      if (preview) {
        lo = mid;
        best = preview;
      } else {
        hi = mid;
      }
    }
    return best;
  }

  _offsetPreviewData() {
    const entities = this._offsetEntities();
    if (!entities.length) return null;
    if (this._offsetTopologyIssue(entities)) return null;
    const signedDistance = this._offsetSignedDistance();
    if (Math.abs(signedDistance) < EPS) return null;
    const signs = this._offsetEntitySigns(entities);
    return this._offsetPreviewDataForSignedDistance(entities, signs, signedDistance)
      || this._clampOffsetDistanceToValidRange(entities, signs, signedDistance);
  }

  _syncOffsetSelection() {
    const sketch = this.activeSketch(); if (!sketch) return;
    this._normalizeOffsetEntityIds();
    this.clearSelection();
    const ids = new Set(this.offsetEntityIds);
    for (const e of sketch.entities) {
      if (ids.has(e.id)) this.setSelected(e, true);
    }
    this.refreshUI();
    this.requestRender();
  }

  updateOffsetCursor(world) {
    if (this.operationName !== 'offset' || !world) return;
    const entity = this.offsetAnchorId ? this._lookupAny(this.offsetAnchorId) : null;
    if (!entity) return;
    const side = this._offsetCursorSide(entity, world);
    if (side != null) this.offsetSide = side;
    const d = this._offsetDistanceFromCursor(world);
    if (d != null) this.offsetDistance = d;
  }

  _curveGapEndpoints(a, b) {
    const dx = b.center.x - a.center.x;
    const dy = b.center.y - a.center.y;
    const d = Math.hypot(dx, dy);
    if (d < EPS) return null;
    const ux = dx / d, uy = dy / d;
    return {
      p1: { x: a.center.x + ux * a.r, y: a.center.y + uy * a.r },
      p2: { x: b.center.x - ux * b.r, y: b.center.y - uy * b.r },
      d
    };
  }

  _cursorSuggestsCurveGap(a, b, world) {
    if (!world) return false;
    const geom = this._curveGapEndpoints(a, b);
    if (!geom) return false;
    if (geom.d <= a.r + b.r + EPS) return false;
    const mid = { x: (geom.p1.x + geom.p2.x) / 2, y: (geom.p1.y + geom.p2.y) / 2 };
    const axisX = geom.p2.x - geom.p1.x;
    const axisY = geom.p2.y - geom.p1.y;
    const len = Math.hypot(axisX, axisY);
    if (len < EPS) return false;
    const nx = -axisY / len, ny = axisX / len;
    const tx = axisX / len, ty = axisY / len;
    const wx = world.x - mid.x, wy = world.y - mid.y;
    const perp = Math.abs(wx * nx + wy * ny);
    const along = Math.abs(wx * tx + wy * ty);
    return perp < (18 / this.app.view.zoom) && along < (24 / this.app.view.zoom);
  }

  _mirrorDataFromSelection() {
    const sketch = this.activeSketch(); if (!sketch) return { entityIds: [], axisId: null };
    const sel = this.selectedEntitiesAndPoints().filter(e => !(e instanceof Constraint));
    const selectedLines = sel.filter(e => e instanceof Line);
    const constructionAxes = selectedLines.filter(l => l.construction);
    const axis = constructionAxes.length === 1 ? constructionAxes[0] : null;
    const sources = this._mirrorSourcesFrom(sel, axis);
    return { entityIds: sources.map(e => e.id), axisId: axis?.id || null };
  }

  _mirrorSourcesFrom(sel, axis) {
    const sketch = this.activeSketch(); if (!sketch) return [];
    const selectedTop = new Set(sketch.entities.filter(e => (sel.includes(e) || e.selected) && e !== axis));
    const pointOwnedBySelectedEntity = (p) => {
      for (const e of selectedTop) {
        if (e === p) return true;
        for (const c of e.children()) if (c === p) return true;
      }
      return false;
    };
    const sources = [];
    for (const e of sketch.entities) {
      if (e !== axis && (sel.includes(e) || e.selected) && (e instanceof Point || e instanceof Line || e instanceof Circle)) sources.push(e);
    }
    for (const e of sel) {
      if (e instanceof Point && e !== axis && !pointOwnedBySelectedEntity(e) && !sources.includes(e)) sources.push(e);
    }
    return sources;
  }

  _mirrorOperationData() {
    const sketch = this.activeSketch(); if (!sketch) return null;
    const axis = this.mirrorAxisId ? sketch.entities.find(e => e instanceof Line && e.id === this.mirrorAxisId) : null;
    const sources = this.mirrorEntityIds
      .map(id => this._lookupAny(id))
      .filter(e => e && this.project.sketchOf(e) === sketch && e !== axis && (e instanceof Point || e instanceof Line || e instanceof Circle));
    return { axis, sources };
  }

  _syncMirrorSelection() {
    const sketch = this.activeSketch(); if (!sketch) return;
    this.clearSelection();
    const ids = new Set(this.mirrorEntityIds);
    if (this.mirrorAxisId) ids.add(this.mirrorAxisId);
    for (const e of sketch.entities) {
      if (ids.has(e.id)) this.setSelected(e, true);
      for (const c of e.children()) if (ids.has(c.id)) this.setSelected(c, true);
    }
    this.refreshUI();
    this.requestRender();
  }

  handleMirrorPick(hit) {
    if (this.operationName !== 'mirror') return false;
    if (!hit) return true;
    const sketch = this.activeSketch();
    if (!sketch || this.project.sketchOf(hit) !== sketch) return true;
    if (this.mirrorPickMode === 'axis') {
      if (!(hit instanceof Line)) return true;
      this.mirrorAxisId = hit.id;
      this.mirrorEntityIds = this.mirrorEntityIds.filter(id => id !== hit.id);
      this.mirrorPickMode = 'entities';
    } else {
      if (!(hit instanceof Point || hit instanceof Line || hit instanceof Circle)) return true;
      if (hit.id === this.mirrorAxisId) return true;
      const i = this.mirrorEntityIds.indexOf(hit.id);
      if (i >= 0) this.mirrorEntityIds.splice(i, 1);
      else this.mirrorEntityIds.push(hit.id);
    }
    this._syncMirrorSelection();
    return true;
  }

  handleMirrorBoxPick(hits, opts = {}) {
    if (this.operationName !== 'mirror' || this.mirrorPickMode !== 'entities') return false;
    const sketch = this.activeSketch();
    if (!sketch) return true;
    if (opts.replace) this.mirrorEntityIds = [];
    for (const hit of hits || []) {
      if (!(hit instanceof Point || hit instanceof Line || hit instanceof Circle)) continue;
      if (this.project.sketchOf(hit) !== sketch) continue;
      if (hit.id === this.mirrorAxisId) continue;
      const i = this.mirrorEntityIds.indexOf(hit.id);
      if (opts.toggle) {
        if (i >= 0) this.mirrorEntityIds.splice(i, 1);
        else this.mirrorEntityIds.push(hit.id);
      } else if (i < 0) {
        this.mirrorEntityIds.push(hit.id);
      }
    }
    this._syncMirrorSelection();
    return true;
  }

  handleOffsetPick(hit, world) {
    if (this.operationName !== 'offset') return false;
    if (this.offsetPhase === 'typing') return true;
    if (!hit) {
      if (this.offsetEntityIds.length) {
        this.offsetPhase = 'placing';
        this.updateOffsetCursor(world);
        this.refreshToolOptions();
      }
      return true;
    }
    if (!(hit instanceof Line || hit instanceof Circle || hit instanceof Arc)) return true;
    const sketch = this.activeSketch();
    if (!sketch || this.project.sketchOf(hit) !== sketch) return true;
    const i = this.offsetEntityIds.indexOf(hit.id);
    if (i >= 0) this.offsetEntityIds.splice(i, 1);
    else this.offsetEntityIds.push(hit.id);
    this.offsetAnchorId = this.offsetEntityIds.includes(hit.id) ? hit.id : (this.offsetEntityIds[0] || null);
    this.offsetPhase = this.offsetEntityIds.length ? 'placing' : 'selecting';
    this.updateOffsetCursor(world);
    this._syncOffsetSelection();
    return true;
  }

  _showOffsetInput() {
    if (this.offsetInputEl) { this.offsetInputEl.remove(); this.offsetInputEl = null; }
    const pos = this.view.worldToScreen(this.lastWorldCursor || { x:0, y:0 });
    const input = document.createElement('input');
    input.type = 'text';
    Object.assign(input.style, {
      position: 'absolute',
      left: pos.x + 'px',
      top: pos.y + 'px',
      transform: 'translate(-50%, -50%)',
      zIndex: '30',
      padding: '2px 5px',
      border: '1.5px solid #2563a5',
      borderRadius: '3px',
      background: 'white',
      font: '12px ui-sans-serif, system-ui',
      width: '72px',
      textAlign: 'right',
      outline: 'none',
      boxShadow: '0 1px 4px rgba(0,0,0,0.15)'
    });
    input.value = Number(this.offsetDistance || 0).toFixed(3);
    document.getElementById('workspace').appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);
    this.offsetInputEl = input;
    this.offsetPhase = 'typing';
    const finish = (commit) => {
      if (!this.offsetInputEl) return;
      const raw = this.offsetInputEl.value;
      this.offsetInputEl.removeEventListener('keydown', onKey);
      this.offsetInputEl.removeEventListener('blur', onBlur);
      this.offsetInputEl.remove();
      this.offsetInputEl = null;
      if (commit) {
        const v = Math.abs(parseFloat(raw));
        if (Number.isFinite(v)) this.offsetDistance = v;
        this.offsetSelection();
      } else {
        this.offsetPhase = this.offsetEntityIds.length ? 'placing' : 'selecting';
        this.refreshToolOptions();
        this.requestRender();
      }
    };
    const onKey = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); finish(true); }
      else if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); finish(false); }
      else e.stopPropagation();
    };
    const onBlur = () => finish(true);
    input.addEventListener('keydown', onKey);
    input.addEventListener('blur', onBlur);
    this.refreshToolOptions();
  }

  _refreshMirrorOptions(section, body) {
    const data = this._mirrorOperationData();
    section.hidden = false;
    document.getElementById('tool-options-title').textContent = 'Mirror';
    if (!data) {
      body.innerHTML = '<div class="empty">No active sketch.</div>';
      return;
    }
    const sources = data.sources;
    const axis = data.axis;
    const sourceHtml = sources.length
      ? `<div class="stack-list">${sources.map(e => `<div class="sel-item"><span class="glyph">${e instanceof Point ? 'P' : e instanceof Line ? 'L' : 'C'}</span><span>${this._entityLabel(e)}</span></div>`).join('')}</div>`
      : '<div class="tool-note">Click or drag a box in the canvas to collect source entities.</div>';
    const axisHtml = axis
      ? `<div class="stack-list"><div class="sel-item"><span class="glyph">L</span><span>${this._entityLabel(axis)}${axis.construction ? ' construction' : ''}</span></div></div>`
      : '<div class="tool-note">Pick one line to use as the mirror axis.</div>';
    const entitiesActive = this.mirrorPickMode === 'entities';
    const axisActive = this.mirrorPickMode === 'axis';
    document.getElementById('status-hint').textContent = entitiesActive
      ? 'Mirror: click or box-select points, lines, or circles to add/remove them.'
      : 'Mirror: click a line to set the mirror axis.';
    body.innerHTML = `
      <div class="tool-summary">
        <div class="tool-metric"><strong>${sources.length}</strong><span>Sources</span></div>
        <div class="tool-metric"><strong>${axis ? 'Set' : 'None'}</strong><span>Axis</span></div>
      </div>
