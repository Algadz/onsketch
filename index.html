  constructor(app) { super(app); this.center = null; this.cursor = null; }
  hint() { return 'Set sides in Tool Options. Click center, then the midpoint of one edge.'; }
  activate() { this.center = null; this.cursor = null; this._pendingCenterSnap = null; this.app.refreshToolOptions(); }
  deactivate() { this.app.refreshToolOptions(); }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    const w = snap ? { x:snap.x, y:snap.y } : world;
    if (!this.center) {
      const { point, reused } = this.app.makeOrReusePoint(w, snap, sketch);
      this.center = point;
      this._pendingCenterSnap = reused ? null : snap;
    } else {
      const pts = regularPolygonFromCenterEdge(this.center, w, this.app.polygonSides);
      if (pts && pts.length >= 3) {
        const vertices = pts.map(p => new Point(p.x, p.y));
        const lines = [];
        const circle = new Circle(this.center, dist(this.center, vertices[0]));
        circle.construction = true;
        for (let i = 0; i < vertices.length; i++) {
          const l = new Line(vertices[i], vertices[(i + 1) % vertices.length]);
          if (this.app.constructionMode) l.construction = true;
          lines.push(l);
        }
        sketch.addEntity(circle);
        for (const l of lines) sketch.addEntity(l);
        for (const p of vertices) {
          sketch.constraints.push(new PointOnCircleConstraint(p.id, circle.id, circle.center.id));
        }
        for (let i = 1; i < lines.length; i++) {
          const equal = new EqualLengthConstraint(
            { a: lines[0].p1.id, b: lines[0].p2.id },
            { a: lines[i].p1.id, b: lines[i].p2.id }
          );
          equal.driven = true;
          sketch.constraints.push(equal);
        }
        const centralAngle = TAU / vertices.length;
        for (let i = 0; i < vertices.length - 1; i++) {
          sketch.constraints.push(new DirectedAngleConstraint(
            { a: this.center.id, b: vertices[i].id },
            { a: this.center.id, b: vertices[(i + 1) % vertices.length].id },
            centralAngle
          ));
        }
        if (this._pendingCenterSnap) {
          const cs = this.app.snapToConstraint(this._pendingCenterSnap, this.center);
          if (cs) sketch.constraints.push(cs);
        }
        this.app.commit();
      }
      this.center = null;
      this.cursor = null;
      this._pendingCenterSnap = null;
    }
    this.app.requestRender();
  }
  onPointerMove(world, snap) { this.cursor = snap ? { x:snap.x, y:snap.y } : world; this.app.requestRender(); }
  onKey(ev) { if (ev.key === 'Escape') { this.center = null; this._pendingCenterSnap = null; this.app.setTool('select'); } }
  getPreview() {
    if (!this.center || !this.cursor) return null;
    const pts = regularPolygonFromCenterEdge(this.center, this.cursor, this.app.polygonSides);
    if (!pts) return null;
    return {
      paths: [[...pts, pts[0]]],
      circles: [{ center: this.center, r: dist(this.center, pts[0]) }],
      dashed: this.app.constructionMode
    };
  }
}

class ArcTool extends Tool {
  constructor(app) {
    super(app);
    this.center = null;
    this.start = null;
    this.cursor = null;
    this.dir = 1;
    this.sweep = 0;
    this.lastAngle = null;
    this._pendingCenterSnap = null;
    this._pendingStartSnap = null;
  }
  hint() { return 'Click center, start point, sweep to end point. Tab flips direction.'; }
  activate() {
    this.center = null;
    this.start = null;
    this.cursor = null;
    this.dir = 1;
    this.sweep = 0;
    this.lastAngle = null;
    this._pendingCenterSnap = null;
    this._pendingStartSnap = null;
  }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    const w = snap ? { x:snap.x, y:snap.y } : world;
    if (!this.center) {
      const { point, reused } = this.app.makeOrReusePoint(w, snap, sketch);
      this.center = point;
      this._pendingCenterSnap = reused ? null : snap;
    } else if (!this.start) {
      if (dist(this.center, w) < EPS) return;
      this.start = { x:w.x, y:w.y };
      this.lastAngle = Math.atan2(w.y - this.center.y, w.x - this.center.x);
      this.sweep = 0;
      this._pendingStartSnap = snap;
    } else {
      const arc = this._arcFromCenterStartEnd(this.center, this.start, w);
      if (!arc) return;
      const A = new Arc(this.center, arc.r, arc.a0, arc.a1);
      A.clockwise = arc.clockwise;
      if (this.app.constructionMode) A.construction = true;
      sketch.addEntity(A);
      if (this._pendingCenterSnap) {
        const cs = this.app.snapToConstraint(this._pendingCenterSnap, this.center);
        if (cs) sketch.constraints.push(cs);
      }
      if (this._pendingStartSnap) {
        const cs = this.app.snapToConstraint(this._pendingStartSnap, A.start);
        if (cs) sketch.constraints.push(cs);
      }
      if (snap) {
        const cs = this.app.snapToConstraint(snap, A.end);
        if (cs) sketch.constraints.push(cs);
      }
      this.center = null;
      this.start = null;
      this.cursor = null;
      this.sweep = 0;
      this.lastAngle = null;
      this._pendingCenterSnap = null;
      this._pendingStartSnap = null;
      this.app.commit();
    }
    this.app.requestRender();
  }
  onPointerMove(world, snap) {
    const w = snap ? { x:snap.x, y:snap.y } : world;
    this.cursor = w;
    if (this.center && this.start && dist(this.center, w) > EPS) {
      const a = Math.atan2(w.y - this.center.y, w.x - this.center.x);
      if (this.lastAngle == null) this.lastAngle = Math.atan2(this.start.y - this.center.y, this.start.x - this.center.x);
      const d = signedAngleDelta(this.lastAngle, a);
      if (Math.abs(d) < Math.PI * 0.95) {
        this.sweep += d;
        if (Math.abs(this.sweep) > 1e-3) this.dir = this.sweep < 0 ? -1 : 1;
      }
      this.lastAngle = a;
    }
    this.app.requestRender();
  }
  onKey(ev) {
    if (ev.key === 'Escape') {
      if (this.start) { this.start = null; this.sweep = 0; this.lastAngle = null; this._pendingStartSnap = null; this.app.requestRender(); }
      else if (this.center) { this.center = null; this.sweep = 0; this.lastAngle = null; this._pendingCenterSnap = null; this._pendingStartSnap = null; this.app.requestRender(); }
      else this.app.setTool('select');
    } else if (ev.key === 'Tab') {
      ev.preventDefault();
      this.dir *= -1;
      this.sweep = this.dir * Math.max(Math.abs(this.sweep), 1e-3);
      this.app.requestRender();
    }
  }
  _arcFromCenterStartEnd(center, start, endRef) {
    const r = dist(center, start);
    if (r < EPS || dist(center, endRef) < EPS) return null;
    const startAngle = Math.atan2(start.y - center.y, start.x - center.x);
    const endAngle = Math.atan2(endRef.y - center.y, endRef.x - center.x);
    const ccwSpan = normAngle(endAngle - startAngle);
    const cwSpan = normAngle(startAngle - endAngle);
    const span = this.dir > 0 ? ccwSpan : cwSpan;
    if (span < 1e-4 || Math.abs(span - TAU) < 1e-4) return null;
    return {
      r,
      a0:startAngle,
      a1:endAngle,
      clockwise:this.dir < 0,
      end: {
        x: center.x + r * Math.cos(endAngle),
        y: center.y + r * Math.sin(endAngle)
      }
    };
  }
  getPreview() {
    if (!this.center) return null;
    const points = [this.center];
    if (!this.start) {
      if (this.cursor) return { points, paths: [[this.center, this.cursor]], dashed: this.app.constructionMode };
      return { points };
    }
    points.push(this.start);
    if (!this.cursor) return { points };
    const arc = this._arcFromCenterStartEnd(this.center, this.start, this.cursor);
    if (!arc) return { points };
    return {
      points: [...points, arc.end],
      arcs: [{ center:this.center, r:arc.r, a0:arc.a0, a1:arc.a1, clockwise:arc.clockwise }]
    };
  }
}

class PointTool extends Tool {
  hint() { return 'Click to place a point.'; }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    // Don't create a duplicate at an active-sketch endpoint we already have.
    if (snap && snap.kind === 'endpoint') {
      const owner = this.app.project.sketchOf(snap.entity);
      if (owner && owner.id === sketch.id) return;
    }
    const w = snap ? { x:snap.x, y:snap.y } : world;
    const p = new Point(w.x, w.y);
    sketch.addEntity(p);
    if (snap) {
      const cs = this.app.snapToConstraint(snap, p);
      if (cs) sketch.constraints.push(cs);
    }
    this.app.commit();
    this.app.requestRender();
  }
  onKey(ev) { if (ev.key === 'Escape') this.app.setTool('select'); }
}

/** Smart Dimension — three-phase state machine, no browser prompts.
 *
 *  PICKING  : user picks entities one at a time. As soon as the pick set
 *             forms a valid dimension combination (one line, one circle,
 *             two points, line + point, two lines, …) we infer a preview
 *             and transition straight into PLACING.
 *  PLACING  : the dimension follows the cursor — perpendicular offset
 *             for distances, leader angle for radius/diameter, arc
 *             radius for angles. Clicking another entity rebuilds the
 *             pick set (changing the dimension type). Clicking on empty
 *             space freezes the placement and enters TYPING.
 *  TYPING   : an inline input is anchored on the dim label, prefilled
 *             with the measured value. Enter / blur commits, Esc cancels.
 *
 *  The committed constraint stores its label placement (`labelOffset` /
 *  `labelAngle` / `labelDist`) so the dim renders in the same spot on
 *  reload.
 */
class SmartDimensionTool extends Tool {
  constructor(app) {
    super(app);
    this.picks = [];
    this.phase = 'picking';   // 'picking' | 'placing' | 'typing'
    this.preview = null;
    this.cursor = null;
    this.inputEl = null;
  }

  hint() {
    if (this.phase === 'typing')  return 'Type a value, Enter to set, Esc to cancel.';
    if (this.phase === 'placing') return 'Click in space to place. Click another entity to change the dimension type. Esc to cancel.';
    return 'Click a line / circle / arc, or two entities, to start a dimension.';
  }

  activate()   { this._reset(); }
  deactivate() { this._cleanup(); }

  _reset() {
    this.picks = [];
    this.phase = 'picking';
    this.preview = null;
    this._removeInput();
  }
  _removeInput() {
    if (this.inputEl) { this.inputEl.remove(); this.inputEl = null; }
  }
  _cleanup() {
    this._removeInput();
    this._reset();
    this.app.requestRender();
  }

  onPointerDown(world, snap, ev) {
    if (this.phase === 'typing') return;          // input owns events while typing
    const hit = this.app.hitTestForDimension(world);
    if (hit) {
      const idx = this.picks.indexOf(hit);
      if (idx >= 0) this.picks.splice(idx, 1);
      else          this.picks.push(hit);
      this._inferPreview();
      this.phase = this.preview ? 'placing' : 'picking';
      // Keep the default offset/angle/dist that _inferPreview just set —
      // calling _updateCursorPlacement here would zero it out (the click
      // point is on the picked feature itself), making the dim invisible.
      // The next pointermove will start tracking the cursor.
    } else {
      if (this.phase === 'placing' && this.preview) {
        this._updateCursorPlacement(world);
        this._enterTypingPhase();
      }
    }
    this.app.requestRender();
  }

  onPointerMove(world, snap, ev) {
    this.cursor = world;
    if (this.phase === 'placing' && this.preview) {
      this._updateCursorPlacement(world);
      this.app.requestRender();
    }
  }

  onKey(ev) {
    if (this.phase === 'typing') return;
    if (ev.key === 'Escape') {
      if (this.picks.length || this.preview) this._cleanup();
      else this.app.setTool('select');
    }
  }

  /** Inspect the current pick set and build a preview parameter object,
   *  preserving any prior offset/angle/dist when the type doesn't change. */
  _inferPreview() {
    const picks = this.picks;
    const points  = picks.filter(p => p instanceof Point);
    const lines   = picks.filter(p => p instanceof Line);
    const circles = picks.filter(p => p instanceof Circle);
    const arcs    = picks.filter(p => p instanceof Arc);
    const view = this.app.view;
    const defOffset   = 14 / view.zoom;
    const defParallel = 0;
    const defAngle    = Math.PI / 6;
    const defDist     = 40 / view.zoom;
    // Preserve the prior placement when the type is compatible — when the
    // user adds another pick to refine the dimension type, we keep the
    // offset/angle they were already steering toward.
    const oldOffset   = this.preview?.offset   ?? defOffset;
    const oldParallel = this.preview?.parallel ?? defParallel;
    const oldAngle    = this.preview?.angle    ?? defAngle;
    const oldDist     = this.preview?.dist     ?? defDist;

    if (picks.length === 1) {
      if (lines.length === 1) {
        const l = lines[0];
        this.preview = { kind:'distance', p1:l.p1, p2:l.p2,
                          value: dist(l.p1, l.p2),
                          offset: oldOffset, parallel: oldParallel };
        return true;
      }
      if (circles.length === 1) {
        const c = circles[0];
        // Default the cursor distance just outside the rim so the dim is
        // visible immediately after the pick (per "arrow appears on click").
        this.preview = { kind:'diameter', circle:c, value: c.r * 2,
                          angle: oldAngle, dist: c.r + defOffset };
        return true;
      }
      if (arcs.length === 1) {
        const a = arcs[0];
        this.preview = { kind:'radius', circle:a, value: a.r,
                          angle: oldAngle, dist: a.r + defOffset };
        return true;
      }
    }

    if (picks.length === 2) {
      if (points.length === 2) {
        this.preview = { kind:'distance', p1:points[0], p2:points[1],
                          value: dist(points[0], points[1]),
                          offset: oldOffset, parallel: oldParallel };
        return true;
      }
      if (lines.length === 2) {
        const [a, b] = lines;
        const sector = angleSectorForCursor(a, b, this.cursor);
        if (!sector) { this.preview = null; return false; }
        this.preview = {
          kind:'angle', l1:a, l2:b,
          value: sector.value, dist: oldDist,
          midAngle: sector.midAngle,
          l1Ref: sector.l1Ref, l2Ref: sector.l2Ref
        };
        return true;
      }
      if (lines.length === 1 && points.length === 1) {
        const l = lines[0], p = points[0];
        const dx = l.p2.x - l.p1.x, dy = l.p2.y - l.p1.y;
        const len = Math.hypot(dx, dy);
        const cur = len < EPS ? 0 : Math.abs(dx*(p.y-l.p1.y) - dy*(p.x-l.p1.x)) / len;
        this.preview = { kind:'pointLineDistance', p:p, line:l, value: cur,
                          offset: oldOffset, parallel: oldParallel };
        return true;
      }
      if ((circles.length + arcs.length) === 2) {
        const all = [...circles, ...arcs];
        const d = dist(all[0].center, all[1].center);
        if (d < EPS) {
          const outer = all[0].r >= all[1].r ? all[0] : all[1];
          const inner = outer === all[0] ? all[1] : all[0];
          this.preview = {
            kind:'curveDistance', mode:'radial', c1:outer, c2:inner,
            value: Math.abs(outer.r - inner.r),
            angle: oldAngle, dist: Math.max(outer.r, inner.r) + defOffset
          };
          return true;
        }
        if (this._cursorSuggestsCurveGap(all[0], all[1], this.cursor)) {
          const gap = Math.max(0, d - all[0].r - all[1].r);
          this.preview = {
            kind:'curveDistance', mode:'gap', c1:all[0], c2:all[1],
            value: gap, offset: oldOffset, parallel: oldParallel
          };
          return true;
        }
        this.preview = { kind:'distance', p1:all[0].center, p2:all[1].center,
                          value: d, offset: oldOffset, parallel: oldParallel };
        return true;
      }
    }

    this.preview = null;
    return false;
  }

  /** Resolve cursor world position into the appropriate placement field.
   *  For distance dims we capture BOTH a perpendicular offset and a parallel
   *  offset along the line direction, so the text rides exactly under the
   *  cursor (which may be past either arrow). For circle dims we capture
   *  the cursor's distance from the center as well as its angle, so the
   *  user picks inside-vs-outside by pulling the cursor in or out. */
  _updateCursorPlacement(world) {
    if (!this.preview) return;
    const p = this.preview;
    if (p.kind === 'distance') {
      const dx = p.p2.x - p.p1.x, dy = p.p2.y - p.p1.y;
      const len = Math.hypot(dx, dy);
      if (len < EPS) return;
      const nx = -dy / len, ny = dx / len;
      const tx =  dx / len, ty =  dy / len;
      const mid = { x: (p.p1.x + p.p2.x)/2, y: (p.p1.y + p.p2.y)/2 };
      const wx = world.x - mid.x, wy = world.y - mid.y;
      p.offset   = wx * nx + wy * ny;
      p.parallel = wx * tx + wy * ty;
    } else if (p.kind === 'curveDistance') {
      if (p.mode === 'gap') {
        const geom = this._curveGapEndpoints(p.c1, p.c2);
        if (!geom) return;
        const dx = geom.p2.x - geom.p1.x, dy = geom.p2.y - geom.p1.y;
        const len = Math.hypot(dx, dy);
        if (len < EPS) return;
        const nx = -dy / len, ny = dx / len;
        const tx =  dx / len, ty =  dy / len;
        const mid = { x: (geom.p1.x + geom.p2.x)/2, y: (geom.p1.y + geom.p2.y)/2 };
        const wx = world.x - mid.x, wy = world.y - mid.y;
        p.offset   = wx * nx + wy * ny;
        p.parallel = wx * tx + wy * ty;
      } else if (p.mode === 'radial') {
        const dx = world.x - p.c1.center.x;
        const dy = world.y - p.c1.center.y;
        const d = Math.hypot(dx, dy);
        if (d > EPS) {
          p.angle = Math.atan2(dy, dx);
          p.dist = d;
        }
      }
    } else if (p.kind === 'pointLineDistance') {
      const dx = p.line.p2.x - p.line.p1.x, dy = p.line.p2.y - p.line.p1.y;
      const len = Math.hypot(dx, dy);
      if (len < EPS) return;
      const t = ((p.p.x - p.line.p1.x)*dx + (p.p.y - p.line.p1.y)*dy) / (len*len);
      const foot = { x: p.line.p1.x + t*dx, y: p.line.p1.y + t*dy };
      const segDx = foot.x - p.p.x, segDy = foot.y - p.p.y;
      const segLen = Math.hypot(segDx, segDy);
      if (segLen < EPS) return;
      const segNx = -segDy / segLen, segNy = segDx / segLen;
      const segTx =  segDx / segLen, segTy =  segDy / segLen;
      const mid = { x: (p.p.x + foot.x)/2, y: (p.p.y + foot.y)/2 };
      const wx = world.x - mid.x, wy = world.y - mid.y;
      p.offset   = wx * segNx + wy * segNy;
      p.parallel = wx * segTx + wy * segTy;
    } else if (p.kind === 'radius' || p.kind === 'diameter') {
      const dx = world.x - p.circle.center.x;
      const dy = world.y - p.circle.center.y;
      const d = Math.hypot(dx, dy);
      if (d > EPS) {
        p.angle = Math.atan2(dy, dx);
        p.dist  = d;
      }
    } else if (p.kind === 'angle') {
      const inter = lineIntersection(p.l1.p1, p.l1.p2, p.l2.p1, p.l2.p2);
      const sector = angleSectorForCursor(p.l1, p.l2, world);
      if (inter) p.dist = Math.max(dist(inter, world), 12 / this.app.view.zoom);
      if (sector) {
        p.value = sector.value;
        p.midAngle = sector.midAngle;
        p.l1Ref = sector.l1Ref;
        p.l2Ref = sector.l2Ref;
      }
    }
  }

  _enterTypingPhase() {
    this.phase = 'typing';
    this._showInput();
  }

  _showInput() {
    if (!this.preview) return;
    const pos = this._labelScreenPos();
    if (!pos) { this._cleanup(); return; }

    const input = document.createElement('input');
    input.type = 'text';
    Object.assign(input.style, {
      position: 'absolute',
      left: pos.x + 'px',
      top:  pos.y + 'px',
      transform: 'translate(-50%, -50%)',
      zIndex: '30',
      padding: '2px 5px',
      border: '1.5px solid #2563a5',
      borderRadius: '3px',
      background: 'white',
      font: '12px ui-sans-serif, system-ui, -apple-system',
      width: '72px',
      textAlign: 'right',
      outline: 'none',
      boxShadow: '0 1px 4px rgba(0,0,0,0.15)'
    });

    const p = this.preview;
    let initial;
    if (p.kind === 'angle')          initial = normalizeAngleValue(p.value) * 180 / Math.PI;
    else                              initial = (p.kind === 'diameter') ? p.value : Math.abs(p.value);
    input.value = Number(initial).toFixed(3);

    document.getElementById('workspace').appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);
    this.inputEl = input;

    const finish = (commit) => {
      if (!this.inputEl) return;
      const raw = this.inputEl.value;
      this.inputEl.removeEventListener('keydown', onKeyDown);
      this.inputEl.removeEventListener('blur', onBlur);
      this._removeInput();
      if (commit) {
        const v = parseFloat(raw);
        this._commit(Number.isFinite(v) ? v : initial);
      }
      this._reset();
      this.app.requestRender();
    };
    const onKeyDown = (e) => {
      if (e.key === 'Enter')      { e.preventDefault(); e.stopPropagation(); finish(true);  }
      else if (e.key === 'Escape'){ e.preventDefault(); e.stopPropagation(); finish(false); }
      else                         { e.stopPropagation(); }
    };
    const onBlur = () => finish(true);
    input.addEventListener('keydown', onKeyDown);
    input.addEventListener('blur',    onBlur);
  }

  _labelScreenPos() {
    const view = this.app.view;
    const p = this.preview;
    if (p.kind === 'distance') {
      const dx = p.p2.x - p.p1.x, dy = p.p2.y - p.p1.y;
      const len = Math.hypot(dx, dy); if (len < EPS) return null;
      const nx = -dy / len, ny = dx / len;
      const tx =  dx / len, ty =  dy / len;
      const par = p.parallel || 0;
      return view.worldToScreen({
        x: (p.p1.x + p.p2.x)/2 + nx * p.offset + tx * par,
        y: (p.p1.y + p.p2.y)/2 + ny * p.offset + ty * par
      });
    }
    if (p.kind === 'curveDistance') {
      if (p.mode === 'gap') {
        const geom = this._curveGapEndpoints(p.c1, p.c2);
        if (!geom) return null;
        const dx = geom.p2.x - geom.p1.x, dy = geom.p2.y - geom.p1.y;
        const len = Math.hypot(dx, dy); if (len < EPS) return null;
        const nx = -dy / len, ny = dx / len;
        const tx =  dx / len, ty =  dy / len;
        const par = p.parallel || 0;
        return view.worldToScreen({
          x: (geom.p1.x + geom.p2.x)/2 + nx * p.offset + tx * par,
          y: (geom.p1.y + geom.p2.y)/2 + ny * p.offset + ty * par
        });
      }
      if (p.mode === 'radial') {
        const dPos = (p.dist != null) ? p.dist : (p.c1.r + 14 / view.zoom);
        return view.worldToScreen({
          x: p.c1.center.x + dPos * Math.cos(p.angle),
          y: p.c1.center.y + dPos * Math.sin(p.angle)
        });
      }
    }
    if (p.kind === 'pointLineDistance') {
      const dx = p.line.p2.x - p.line.p1.x, dy = p.line.p2.y - p.line.p1.y;
      const len = Math.hypot(dx, dy); if (len < EPS) return null;
      const t = ((p.p.x - p.line.p1.x)*dx + (p.p.y - p.line.p1.y)*dy) / (len*len);
      const foot = { x: p.line.p1.x + t*dx, y: p.line.p1.y + t*dy };
      const segDx = foot.x - p.p.x, segDy = foot.y - p.p.y;
      const segLen = Math.hypot(segDx, segDy) || 1;
      const segNx = -segDy / segLen, segNy = segDx / segLen;
      const segTx =  segDx / segLen, segTy =  segDy / segLen;
      const par = p.parallel || 0;
      return view.worldToScreen({
        x: (p.p.x + foot.x)/2 + segNx * p.offset + segTx * par,
        y: (p.p.y + foot.y)/2 + segNy * p.offset + segTy * par
      });
    }
    if (p.kind === 'radius' || p.kind === 'diameter') {
      const r = p.circle.r;
      const dPos = (p.dist != null) ? p.dist : (r + 14 / view.zoom);
      return view.worldToScreen({
        x: p.circle.center.x + dPos * Math.cos(p.angle),
        y: p.circle.center.y + dPos * Math.sin(p.angle)
      });
    }
    if (p.kind === 'angle') {
      const inter = lineIntersection(p.l1.p1, p.l1.p2, p.l2.p1, p.l2.p2);
      if (!inter) return null;
      const ref1 = p.l1Ref || { a:p.l1.p1.id, b:p.l1.p2.id };
      const ref2 = p.l2Ref || { a:p.l2.p1.id, b:p.l2.p2.id };
      const pts = new Map([
        [p.l1.p1.id, p.l1.p1], [p.l1.p2.id, p.l1.p2],
        [p.l2.p1.id, p.l2.p1], [p.l2.p2.id, p.l2.p2]
      ]);
      if (!pts.get(ref1.a) || !pts.get(ref1.b) || !pts.get(ref2.a) || !pts.get(ref2.b)) return null;
      const arc = angleArcFromPoints(pts.get(ref1.a), pts.get(ref1.b), pts.get(ref2.a), pts.get(ref2.b));
      const mid = arc.midAngle;
      const labelDist = (p.dist ?? (40 / view.zoom)) + 12 / view.zoom;
      return view.worldToScreen({
        x: inter.x + labelDist * Math.cos(mid),
        y: inter.y + labelDist * Math.sin(mid)
      });
    }
    return null;
  }

  _commit(value) {
    const sketch = this.app.activeSketch();
    if (!sketch) return;
    const p = this.preview;
    let made = null;
    if (p.kind === 'distance') {
      made = new DistanceConstraint(p.p1.id, p.p2.id, value);
      made.labelOffset   = p.offset;
      made.labelParallel = p.parallel || 0;
    } else if (p.kind === 'curveDistance') {
      made = new CurveDistanceConstraint(p.c1.id, p.c2.id, p.mode, value);
      if (p.mode === 'gap') {
        made.labelOffset = p.offset;
        made.labelParallel = p.parallel || 0;
      } else {
        made.labelAngle = p.angle;
        made.labelDist = p.dist;
      }
    } else if (p.kind === 'pointLineDistance') {
      made = new PointLineDistanceConstraint(p.p.id, { a: p.line.p1.id, b: p.line.p2.id }, value);
      made.labelOffset   = p.offset;
      made.labelParallel = p.parallel || 0;
    } else if (p.kind === 'radius') {
      made = new RadiusConstraint(p.circle.id, value);
      made.labelAngle = p.angle;
      made.labelDist  = p.dist;
    } else if (p.kind === 'diameter') {
      made = new RadiusConstraint(p.circle.id, value / 2);
      made.labelAngle = p.angle;
      made.labelDist  = p.dist;
      made.isDiameter = true;
    } else if (p.kind === 'angle') {
      made = new AngleConstraint(
        p.l1Ref || { a: p.l1.p1.id, b: p.l1.p2.id },
        p.l2Ref || { a: p.l2.p1.id, b: p.l2.p2.id },
        normalizeAngleValue(value * Math.PI / 180));
      made.labelDist = p.dist;
      made.labelMidAngle = p.midAngle;
    }
    if (made) {
      sketch.constraints.push(made);
      // Run a probe solve. If adding this dimension would over-define the
      // sketch, demote it to a "driven" dimension — informational only,
      // doesn't enforce. SolidWorks asks the user; we just do it silently
      // and render in grey.
      const affectedIds = made.refs();
      const probe = this.app.solver.solve(sketch, this.app.project.sketches, [], {
        diagnostics:true,
        activeIds:affectedIds
      });
      if (probe.state === 'over' || (probe.redundantIds && probe.redundantIds.has(made.id))) {
        made.driven = true;
      }
      this.app.commit({ activeIds: affectedIds });
      this.app.refreshUI();
    }
  }

  getPreview() { return { dimPicks: this.picks, dimPreview: this.preview, dimPhase: this.phase }; }
}

/* =============== 9. AVAILABLE-RELATIONS ENGINE ================ */
function classifySelection(sel) {
  const points  = sel.filter(e => e instanceof Point);
  const lines   = sel.filter(e => e instanceof Line);
  const circles = sel.filter(e => e instanceof Circle);
  const arcs    = sel.filter(e => e instanceof Arc);
  return { points, lines, circles, arcs, total: sel.length };
}

function sameLineRefs(line, ref) {
  if (!line || !ref) return false;
  return (ref.a === line.p1.id && ref.b === line.p2.id) ||
         (ref.a === line.p2.id && ref.b === line.p1.id);
}

function constraintAppliesToSelection(c, sel) {
  if (c.kind === 'directedAngle') return false;              // internal regular-polygon scaffold
  if (c.kind === 'equalLength' && c.driven) return false;    // informational polygon equality marker

  const refs = new Set(c.refs());
  const selectedPoints = new Set(sel.filter(e => e instanceof Point).map(e => e.id));
  const selectedLines = sel.filter(e => e instanceof Line);
  const selectedCurves = sel.filter(e => e instanceof Circle || e instanceof Arc);
  const hasLine = (ref) => selectedLines.some(l => sameLineRefs(l, ref));
  const selectedLineOwnsBothPoints = (line) =>
    selectedPoints.has(line.p1.id) && selectedPoints.has(line.p2.id);

  for (const e of sel) {
    if (e instanceof Point) {
      const arcRef = (e.arcOwner instanceof Arc && (e.arcEndpoint === 'start' || e.arcEndpoint === 'end'))
        ? { arcId:e.arcOwner.id, centerId:e.arcOwner.center.id, which:e.arcEndpoint }
        : null;
      const sameArcRef = (r) => arcRef && r && r.arcId === arcRef.arcId && r.centerId === arcRef.centerId && r.which === arcRef.which;
      if (c.kind === 'fix') return c.pointId === e.id;
      if (c.kind === 'arcEndpointFix') return sameArcRef(c.ref);
      if (c.kind === 'coincident') return c.p1 === e.id || c.p2 === e.id;
      if (c.kind === 'arcEndpointCoincident') return c.pointId === e.id || sameArcRef(c.ref);
      if (c.kind === 'arcEndpointArcEndpointCoincident') return sameArcRef(c.ref1) || sameArcRef(c.ref2);
      if (c.kind === 'pointRefHorizontal' || c.kind === 'pointRefVertical') {
        return c.ref1.pointId === e.id || c.ref2.pointId === e.id || sameArcRef(c.ref1) || sameArcRef(c.ref2);
      }
      if (c.kind === 'distance') return c.p1 === e.id || c.p2 === e.id;
      if (c.kind === 'curveDistance') return c.c1 === e.id || c.c2 === e.id;
      if (c.kind === 'pointLineDistance') return c.pointId === e.id;
      if (c.kind === 'offsetDistance') return c.pairs && c.pairs.some(p => p.kind === 'line' ? p.pointId === e.id : false);
      if (c.kind === 'midpoint') return c.pointId === e.id;
      if (c.kind === 'arcEndpointMidpoint') return sameArcRef(c.ref);
      if (c.kind === 'pointOnLine') return c.pointId === e.id;
      if (c.kind === 'arcEndpointOnLine') return sameArcRef(c.ref);
      if (c.kind === 'pointOnCircle') return c.pointId === e.id;
      if (c.kind === 'arcEndpointOnCircle') return sameArcRef(c.ref);
      if (c.kind === 'concentric') return c.p1 === e.id || c.p2 === e.id;
      if (c.kind === 'symmetric') return c.p1 === e.id || c.p2 === e.id;
      if ((c.kind === 'horizontal' || c.kind === 'vertical') &&
          selectedPoints.has(c.p1) && selectedPoints.has(c.p2)) return true;
    } else if (e instanceof Line) {
      if (refs.has(e.id)) return true;
      if ((c.kind === 'horizontal' || c.kind === 'vertical')) {
        if (c.lineId === e.id) return true;
        continue;
      }
      if (c.kind === 'parallel' || c.kind === 'perpendicular' ||
          c.kind === 'collinear' || c.kind === 'equalLength') {
        if (sameLineRefs(e, c.l1) || sameLineRefs(e, c.l2)) return true;
        continue;
      }
      if (c.kind === 'angle') {
        if (sameLineRefs(e, c.l1) || sameLineRefs(e, c.l2)) return true;
        continue;
      }
      if (c.kind === 'pointOnLine' || c.kind === 'pointLineDistance' || c.kind === 'midpoint') {
        if (sameLineRefs(e, c.l)) return true;
        continue;
      }
      if (c.kind === 'offset' && (c.sourceEntityId === e.id || c.targetEntityId === e.id)) return true;
      if (c.kind === 'offsetDistance' && c.pairs && c.pairs.some(p => p.kind === 'line' && sameLineRefs(e, p.l))) return true;
      if (c.kind === 'symmetric' && sameLineRefs(e, c.axis)) return true;
      if (c.kind === 'distance' && refs.has(e.p1.id) && refs.has(e.p2.id)) return true;
      if (c.kind === 'fix' && (c.pointId === e.p1.id || c.pointId === e.p2.id)) return true;
      if (c.kind === 'coincident' && (refs.has(e.p1.id) || refs.has(e.p2.id))) return true;
    } else if (e instanceof Circle || e instanceof Arc) {
      if (refs.has(e.id) || refs.has(e.center.id)) return true;
    }
  }

  if ((c.kind === 'parallel' || c.kind === 'perpendicular' ||
       c.kind === 'collinear' || c.kind === 'equalLength' || c.kind === 'angle') &&
      (hasLine(c.l1) || hasLine(c.l2))) return true;
  if ((c.kind === 'pointOnLine' || c.kind === 'pointLineDistance' || c.kind === 'midpoint') &&
      hasLine(c.l)) return true;
  if ((c.kind === 'horizontal' || c.kind === 'vertical')) {
    for (const l of selectedLines) if (c.lineId === l.id || selectedLineOwnsBothPoints(l)) return true;
  }
  if (c.kind === 'symmetric' && hasLine(c.axis)) return true;
  if (selectedCurves.length) {
    for (const e of selectedCurves) {
      if (c.kind === 'radius' && c.circleId === e.id) return true;
      if (c.kind === 'curveDistance' && (c.c1 === e.id || c.c2 === e.id)) return true;
      if (c.kind === 'offset' && (c.sourceEntityId === e.id || c.targetEntityId === e.id)) return true;
      if (c.kind === 'offsetDistance' && c.pairs && c.pairs.some(p => p.c1 === e.id || p.c2 === e.id)) return true;
      if (c.kind === 'equalRadius' && (c.c1 === e.id || c.c2 === e.id)) return true;
      if (c.kind === 'pointOnCircle' && c.circleId === e.id) return true;
      if (c.kind === 'concentric' && (c.p1 === e.center.id || c.p2 === e.center.id)) return true;
      if (c.kind === 'tangent' && (c.circleId === e.id || c.c1 === e.id || c.c2 === e.id)) return true;
    }
  }
  return false;
}

function availableRelations(sel) {
  const { points, lines, circles, arcs, total } = classifySelection(sel);
  const out = [];
  const push = (kind, label) => out.push({ kind, label, glyph: CONSTRAINT_GLYPHS[kind] || '' });

  if (total === 0) return out;

  // Single line: H, V, fix
  if (total === 1 && lines.length === 1) {
    push('horizontal', 'Horizontal');
    push('vertical', 'Vertical');
    push('fix', 'Fix');
    return out;
  }
  // Single circle/arc: fix
  if (total === 1 && (circles.length === 1 || arcs.length === 1)) {
    push('fix', 'Fix');
    return out;
  }
  // Single point: fix
  if (total === 1 && points.length === 1) {
    push('fix', 'Fix');
    return out;
  }
  // ≥2 points only
  if (points.length === total && total >= 2) {
    push('coincident', 'Coincident');
    push('horizontal', 'Horizontal');
    push('vertical', 'Vertical');
    push('fix', 'Fix');
    return out;
  }
  // ≥2 lines only
  if (lines.length === total && lines.length >= 2) {
    push('parallel', 'Parallel');
    push('perpendicular', 'Perpendicular');
    push('collinear', 'Collinear');
    push('equalLength', 'Equal length');
    push('horizontal', 'Horizontal');
    push('vertical', 'Vertical');
    push('fix', 'Fix');
    return out;
  }
  // ≥2 circles/arcs only
  if ((circles.length + arcs.length) === total && (circles.length + arcs.length) >= 2) {
    push('equalRadius', 'Equal radius');
    push('concentric', 'Concentric');
    push('tangent', 'Tangent');
    push('fix', 'Fix');
    return out;
  }
  // 1 line + ≥1 points
  if (lines.length === 1 && points.length >= 1 && circles.length + arcs.length === 0) {
    push('pointOnLine', 'On line');
    if (points.length === 1) push('midpoint', 'Midpoint');
    return out;
  }
  // 1 circle/arc + ≥1 points
  if ((circles.length + arcs.length) === 1 && points.length >= 1 && lines.length === 0) {
    push('pointOnCircle', 'On circle');
    return out;
  }
  // 1 line + 1 circle/arc
  if (lines.length === 1 && (circles.length + arcs.length) === 1 && points.length === 0) {
    push('tangent', 'Tangent');
    return out;
  }
  // mixed fallback
  if (points.length >= 2) push('coincident', 'Coincident');
  if (lines.length >= 2) {
    push('parallel', 'Parallel');
    push('perpendicular', 'Perpendicular');
    push('equalLength', 'Equal length');
  }
  if (circles.length + arcs.length >= 2) push('equalRadius', 'Equal radius');
  push('fix', 'Fix');
  return out;
}

function availableDimensions(sel) {
  const { points, lines, circles, arcs, total } = classifySelection(sel);
  const out = [];
  const push = (kind, label) => out.push({ kind, label, glyph: CONSTRAINT_GLYPHS[kind] || '' });

  if (total === 1 && lines.length === 1)        push('distance', 'Length');
  if (total === 1 && circles.length === 1)    { push('diameter', 'Diameter'); push('radius', 'Radius'); }
  if (total === 1 && arcs.length === 1)         push('radius', 'Radius');
  if (total === 2 && points.length === 2)       push('distance', 'Distance');
  if (total === 2 && lines.length === 2)        push('angle', 'Angle');
  if (total === 2 && lines.length === 1 && points.length === 1)
    push('pointLineDistance', 'Pt → line dist');
  return out;
}

/* =============== 10. APP ====================================== */
class App {
  constructor() {
    this.project = new Project();
    this.project.addSketch('Sketch 1');
    this.view = new View();
    this.canvas = document.getElementById('canvas');
    this.renderer = new Renderer(this.canvas, this.view);
    this.snap = new SnapEngine();
    this.solver = new Solver();
    this.tool = new SelectTool(this);
    this.toolName = 'select';
    this.operationName = null;
    this.mirrorPickMode = 'entities';
    this.mirrorEntityIds = [];
    this.mirrorAxisId = null;
    this.offsetEntityIds = [];
    this.offsetAnchorId = null;
    this.offsetPhase = 'selecting';
    this.offsetDistance = 10;
    this.offsetSide = 1;
    this.offsetInputEl = null;
    this.polygonSides = 6;
    this.gridOn = true; this.snapOn = true; this.constructionMode = false;
    this.lastSnap = null; this.lastWorldCursor = { x:0, y:0 };
    // While a drag is in progress, this holds *every* snap that is
    // currently active across all dragged handles (primary + secondaries).
    // The renderer draws a marker for each so the user sees, before
    // releasing, which snap constraints will be added.
    this.lastDragSnaps = [];
    this.selectionOrder = [];
    this.dirty = true;
    this.undoStack = []; this.redoStack = [];
    this._diagnosticsToken = 0;
    this._diagnosticsFrame = null;
    this._diagnosticsTimer = null;
    this._diagnosticsIdleId = null;
    this.contextMenuEl = null;
    this.contextMenuDocPointerDown = null;

    this._setupCanvasEvents();
    this._setupKeyboard();
    this._setupTopbar();
    this._setupSidebar();
    this._setupModal();
    this._setupResize();
    this.refreshUI();
    this.solveAndRender();
    this._loop();
  }

  /* ---- Sketch helpers ---- */
  activeSketch() { return this.project.active(); }
  visibleSketches() { return this.project.visibleSketches(); }
  activeVisibleSketches() {
    const s = this.activeSketch();
    return (s && s.visible) ? [s] : [];
  }

  makeOrReusePoint(world, snap, sketch) {
    // Endpoint snaps return the snapped Point directly so callers share
    // an existing corner only inside the active sketch. Endpoints from
    // inactive sketches stay reference geometry, so we create a new active
    // point and constrain it to the reference instead of sharing the object.
    if (snap && snap.kind === 'endpoint' && snap.entity instanceof Point && !this.arcEndpointRef(snap.entity)) {
      const owner = this.project.sketchOf(snap.entity);
      if (owner && owner.id === sketch.id) return { point: snap.entity, reused: true };
    }
    const wx = snap ? snap.x : world.x;
    const wy = snap ? snap.y : world.y;
    return { point: new Point(wx, wy), reused: false };
  }

  arcEndpointRef(point) {
    const arc = point && point.arcOwner;
    if (!(arc instanceof Arc) || (point.arcEndpoint !== 'start' && point.arcEndpoint !== 'end')) return null;
    return { arcId: arc.id, centerId: arc.center.id, which: point.arcEndpoint };
  }

  /** Translate a snap result into the constraint that should pin a freshly
   *  created Point to the snapped feature. Returns null if no constraint
   *  applies. The constraint is added by the caller AFTER the new point's
   *  parent entity has been added to the sketch (so the solver lookup can
   *  find the new id). */
  snapToConstraint(snap, point) {
    if (!snap) return null;
    const endpointRef = this.arcEndpointRef(point);
    const snapEndpointRef = this.arcEndpointRef(snap.entity);
    if (snap.kind === 'endpoint' && snapEndpointRef && !endpointRef) {
      return new ArcEndpointCoincidentConstraint(snapEndpointRef, point.id);
    }
    if (endpointRef) {
      if (snap.kind === 'endpoint' && snap.entity instanceof Point && snap.entity !== point) {
        if (snapEndpointRef) return new ArcEndpointArcEndpointCoincidentConstraint(endpointRef, snapEndpointRef);
        return new ArcEndpointCoincidentConstraint(endpointRef, snap.entity.id);
      }
      if (snap.kind === 'origin') return new ArcEndpointFixConstraint(endpointRef, 0, 0);
      if (snap.kind === 'midpoint' && snap.entity instanceof Line) {
        return new ArcEndpointMidpointConstraint(endpointRef, { a: snap.entity.p1.id, b: snap.entity.p2.id });
      }
      if (snap.kind === 'center' && snap.entity && snap.entity.center) {
        return new ArcEndpointCoincidentConstraint(endpointRef, snap.entity.center.id);
      }
      if (snap.kind === 'on-line' && snap.entity instanceof Line) {
        return new ArcEndpointOnLineConstraint(endpointRef, { a: snap.entity.p1.id, b: snap.entity.p2.id });
      }
      if ((snap.kind === 'on-circle' || snap.kind === 'quadrant') && snap.entity && (snap.entity instanceof Circle || snap.entity instanceof Arc)) {
        return new ArcEndpointOnCircleConstraint(endpointRef, snap.entity.id, snap.entity.center.id);
      }
    }
    if (snap.kind === 'endpoint' && snap.entity instanceof Point && snap.entity !== point) {
      return new CoincidentConstraint(point.id, snap.entity.id);
    }
    if (snap.kind === 'origin') {
      point.fixed = true;
      return new FixConstraint(point.id, 0, 0);
    }
    if (snap.kind === 'midpoint' && snap.entity instanceof Line) {
      return new MidpointConstraint(point.id, { a: snap.entity.p1.id, b: snap.entity.p2.id });
    }
    if (snap.kind === 'center' && snap.entity && snap.entity.center) {
      return new CoincidentConstraint(point.id, snap.entity.center.id);
    }
    if (snap.kind === 'quadrant' && snap.entity && (snap.entity instanceof Circle || snap.entity instanceof Arc)) {
      return new PointOnCircleConstraint(point.id, snap.entity.id, snap.entity.center.id);
    }
    if (snap.kind === 'on-line' && snap.entity instanceof Line) {
      return new PointOnLineConstraint(point.id, { a: snap.entity.p1.id, b: snap.entity.p2.id });
    }
    if (snap.kind === 'on-circle' && snap.entity && (snap.entity instanceof Circle || snap.entity instanceof Arc)) {
      return new PointOnCircleConstraint(point.id, snap.entity.id, snap.entity.center.id);
    }
    return null;
  }

  _pointRef(point) {
    return this.arcEndpointRef(point) || { pointId: point.id };
  }

  _fixConstraintForPoint(point) {
    const ref = this.arcEndpointRef(point);
    return ref ? new ArcEndpointFixConstraint(ref, point.x, point.y) : new FixConstraint(point.id, point.x, point.y);
  }

  _coincidentConstraintForPoints(a, b) {
    const ar = this.arcEndpointRef(a);
    const br = this.arcEndpointRef(b);
    if (ar && br) return new ArcEndpointArcEndpointCoincidentConstraint(ar, br);
    if (ar) return new ArcEndpointCoincidentConstraint(ar, b.id);
    if (br) return new ArcEndpointCoincidentConstraint(br, a.id);
    return new CoincidentConstraint(a.id, b.id);
  }

  _axisConstraintForPoints(kind, a, b) {
    const ar = this.arcEndpointRef(a);
    const br = this.arcEndpointRef(b);
    if (ar || br) {
      const C = kind === 'horizontal' ? PointRefHorizontalConstraint : PointRefVerticalConstraint;
      return new C(this._pointRef(a), this._pointRef(b));
    }
    const C = kind === 'horizontal' ? HorizontalConstraint : VerticalConstraint;
    return new C(newId('virt'), a.id, b.id);
  }

  _midpointConstraintForPoint(point, line) {
    const ref = this.arcEndpointRef(point);
    const l = { a: line.p1.id, b: line.p2.id };
    return ref ? new ArcEndpointMidpointConstraint(ref, l) : new MidpointConstraint(point.id, l);
  }

  _pointOnLineConstraintForPoint(point, line) {
    const ref = this.arcEndpointRef(point);
    const l = { a: line.p1.id, b: line.p2.id };
    return ref ? new ArcEndpointOnLineConstraint(ref, l) : new PointOnLineConstraint(point.id, l);
  }

  _pointOnCircleConstraintForPoint(point, curve) {
    const ref = this.arcEndpointRef(point);
    return ref
      ? new ArcEndpointOnCircleConstraint(ref, curve.id, curve.center.id)
      : new PointOnCircleConstraint(point.id, curve.id, curve.center.id);
  }

  pointsCoincidentInSketch(sketch, a, b) {
    if (!sketch || !a || !b) return false;
    if (a === b || a.id === b.id) return true;
    const parent = new Map();
    const find = (id) => {
      if (!parent.has(id)) parent.set(id, id);
      while (parent.get(id) !== id) {
        parent.set(id, parent.get(parent.get(id)));
        id = parent.get(id);
      }
      return id;
    };
    const union = (x, y) => {
      const rx = find(x), ry = find(y);
      if (rx !== ry) parent.set(rx, ry);
    };
    for (const e of sketch.entities) {
      for (const p of e.children()) if (p instanceof Point) find(p.id);
      if (e instanceof Point) find(e.id);
    }
    for (const c of sketch.constraints) {
      if (c.kind === 'coincident') union(c.p1, c.p2);
    }
    return find(a.id) === find(b.id);
  }

  _isInvalidConstraint(sketch, c) {
    if (!sketch || !c) return false;
    if (c.kind !== 'coincident') return false;
    for (const e of sketch.entities) {
      if (e instanceof Line) {
        const samePair = (c.p1 === e.p1.id && c.p2 === e.p2.id) ||
          (c.p1 === e.p2.id && c.p2 === e.p1.id);
        if (samePair) return true;
      }
    }
    return false;
  }

  /** Hit test that walks ALL visible sketches. Children (points) win
   *  over their parent entities so endpoint dragging works. */
  hitTestAcrossLayers(world) {
    return this.hitTestSketches(world, this.project.visibleSketches());
  }

  hitTestActiveSketch(world) {
    return this.hitTestSketches(world, this.activeVisibleSketches());
  }

  hitTestSketches(world, sketches) {
    const v = this.view;
    // Prefer points first, then larger entities. Standalone Point
    // entities, such as centerline midpoints, must win over line bodies.
    for (const s of sketches) {
      for (const e of s.entities) {
        for (const c of e.children()) if (c.hit(world, v)) return c;
        if (e instanceof Point && e.hit(world, v)) return e;
      }
    }
    for (const s of sketches) {
      for (const e of s.entities) if (!(e instanceof Point) && e.hit(world, v)) return e;
    }
    return null;
  }

  hitTestAllSketches(world, sketches) {
    const v = this.view;
    const out = [];
    const seen = new Set();
    const add = (e) => {
      if (!e || seen.has(e)) return;
      seen.add(e);
      out.push(e);
    };
    for (const s of sketches) {
      for (const e of s.entities) {
        for (const c of e.children()) if (c.hit(world, v)) add(c);
        if (e instanceof Point && e.hit(world, v)) add(e);
      }
    }
    for (const s of sketches) {
      for (const e of s.entities) {
        if (!(e instanceof Point) && e.hit(world, v)) add(e);
      }
    }
    return out;
  }

  hitTestForDimension(world) {
    // Smart Dimension picks any visible entity. Whether the constraint
    // can actually be added is checked downstream.
    return this.hitTestAcrossLayers(world);
  }

  _setHoverTarget(target) {
    let changed = false;
    for (const s of this.project.visibleSketches()) {
      for (const e of s.entities) {
        const hov = e === target;
        if (e.hover !== hov) { e.hover = hov; changed = true; }
        for (const c of e.children()) {
          const childHov = c === target;
          if (c.hover !== childHov) { c.hover = childHov; changed = true; }
        }
      }
    }
    if (changed) this.requestRender();
  }

  _contextMenuGlyph(e) {
    if (e instanceof Point) return 'P';
    if (e instanceof Line) return 'L';
    if (e instanceof Circle) return 'C';
    if (e instanceof Arc) return 'A';
    return '?';
  }

  _selectFromContextMenu(item, ev) {
    const toggle = ev.ctrlKey || ev.metaKey;
    const add = ev.shiftKey;
    if (toggle) {
      this.setSelected(item, !item.selected);
    } else {
      if (!add) this.clearSelection();
      this.setSelected(item, true);
    }
    this.hideContextMenu();
    this.refreshUI();
    this.requestRender();
  }

  showContextMenu(screen, world, ev) {
    this.hideContextMenu();
    const items = this.hitTestAllSketches(world, this.activeVisibleSketches());
    if (!items.length) return false;

    const menu = document.createElement('div');
    menu.id = 'context-menu';
    menu.addEventListener('pointerdown', e => e.stopPropagation());
    menu.addEventListener('mouseleave', () => this._setHoverTarget(null));

    for (const item of items) {
      const row = document.createElement('button');
      row.type = 'button';
      row.className = 'context-menu-item';
      row.innerHTML = `
        <span class="glyph">${this._contextMenuGlyph(item)}</span>
        <span>${this._entityLabel(item)}</span>
        <span class="meta">${item.construction ? 'construction' : item.fixed ? 'fixed' : ''}</span>
      `;
      row.addEventListener('mouseenter', () => this._setHoverTarget(item));
      row.addEventListener('click', e => this._selectFromContextMenu(item, e));
      menu.appendChild(row);
    }

    document.body.appendChild(menu);
    const margin = 8;
    const rect = menu.getBoundingClientRect();
    const left = Math.min(ev.clientX, window.innerWidth - rect.width - margin);
    const top = Math.min(ev.clientY, window.innerHeight - rect.height - margin);
    menu.style.left = Math.max(margin, left) + 'px';
    menu.style.top = Math.max(margin, top) + 'px';
    this.contextMenuEl = menu;
    this._setHoverTarget(items[0]);

    this.contextMenuDocPointerDown = (e) => {
      if (this.contextMenuEl && !this.contextMenuEl.contains(e.target)) this.hideContextMenu();
    };
    setTimeout(() => document.addEventListener('pointerdown', this.contextMenuDocPointerDown), 0);
    return true;
  }

  hideContextMenu() {
    if (this.contextMenuDocPointerDown) {
      document.removeEventListener('pointerdown', this.contextMenuDocPointerDown);
      this.contextMenuDocPointerDown = null;
    }
    if (this.contextMenuEl) {
      this.contextMenuEl.remove();
      this.contextMenuEl = null;
    }
    this._setHoverTarget(null);
  }

  /** Snap is only meaningful while you're actively placing or moving
   *  geometry. In plain Select mode (no drag in progress) and while using
   *  Smart Dim (which hit-tests entities, not snap points), we suppress
   *  snap detection so no markers or "endpoint / on-line / on-circle"
   *  hints flash at the cursor. */
  _snapForCurrentTool(world) {
    if (!this.snapOn) return null;
    const drawing = ['line','centerLine','rectangle','centerRectangle','circle','threePointCircle','hexagon','arc','point'].includes(this.toolName);
    const dragging = this.toolName === 'select' && this.tool && this.tool.dragging;
    if (!drawing && !dragging) return null;
    if (dragging) return this._snapForDragging(world);
    return this.snap.find(world, this.view, this.visibleSketches());
  }

  _snapForDragging(world) {
    const drag = this.tool?.dragging;
    if (!drag) return null;
    const dx = world.x - drag.startWorld.x;
    const dy = world.y - drag.startWorld.y;
    const draggedSet = new Set(drag.pts.map(r => r.p));
    const handles = drag.snapPts || drag.pts;
    let best = null;
    for (const r of handles) {
      const probe = this._dragPreviewPoint(drag, r, dx, dy);
      const snap = this.snap.find(probe, this.view, this.visibleSketches(), {
        ignore: (candidate) =>
          (candidate.entity && draggedSet.has(candidate.entity)) ||
          this.shouldIgnoreDragSnap(drag, candidate)
      });
      if (!snap) continue;
      const ranked = { ...snap, dragPoint: r.p, dragRecord: r };
      if (!best || ranked._p > best._p || (ranked._p === best._p && ranked._d < best._d)) best = ranked;
    }
    return best;
  }

  /** Mirror creation behavior on drag: every dragged handle that ends up
   *  on a snap target should produce its own constraint, just like every
   *  click during creation produces its own. The primary snap (already
   *  used to latch the cursor delta) is one of them; the rest come from
   *  probing each *other* handle at its post-solve final position. The
   *  user sees a marker for every entry in the returned list. */
  collectDragSnaps(drag, primary) {
    if (!drag) return [];
    const out = [];
    const usedHandles = new Set();
    if (primary) {
      out.push(primary);
      if (primary.dragRecord) usedHandles.add(primary.dragRecord);
    }
    const draggedSet = new Set(drag.pts.map(r => r.p));
    const handles = drag.snapPts || drag.pts;
    for (const r of handles) {
      if (usedHandles.has(r)) continue;
      // r.p has been mutated by solveLocalizedDrag to its final position
      // for this drag step, regardless of mode (rigid/dof/rotate/...).
      const probe = { x: r.p.x, y: r.p.y };
      const snap = this.snap.find(probe, this.view, this.visibleSketches(), {
        ignore: (candidate) =>
          (candidate.entity && draggedSet.has(candidate.entity)) ||
          this.shouldIgnoreDragSnap(drag, candidate)
      });
      if (!snap) continue;
      if (drag.rejectedSnapKeys && drag.rejectedSnapKeys.has(this._snapKey(snap))) continue;
      // It's fine if a secondary picks up the same feature as the primary
      // — e.g. dragging both endpoints of a line onto the same reference
      // line gives two distinct PointOnLine constraints (different points,
      // same line). Duplicate detection at release time deals with the
      // pathological case.
      out.push({ ...snap, dragPoint: r.p, dragRecord: r });
      usedHandles.add(r);
    }
    return out;
  }

  /** True if `sketch.constraints` already contains a constraint of the
   *  same kind referencing the exact same set of entity ids. Prevents
   *  drag from piling on a duplicate Coincident / PointOnLine / etc.
   *  when the user drags an already-constrained handle back onto its
   *  reference. */
  _isDuplicateConstraint(sketch, c) {
    if (!c || !sketch) return false;
    const key = (x) => {
      const o = x.toJSON ? x.toJSON() : { kind:x.kind, refs:x.refs() };
      const { id, ...rest } = o;
      return JSON.stringify(rest);
    };
    const exactKinds = new Set(['arcEndpointCoincident', 'arcEndpointArcEndpointCoincident', 'arcEndpointFix', 'arcEndpointMidpoint', 'arcEndpointOnLine', 'arcEndpointOnCircle', 'pointRefHorizontal', 'pointRefVertical', 'curveDistance', 'offset', 'offsetDistance']);
    if (exactKinds.has(c.kind)) {
      const aExact = key(c);
      return sketch.constraints.some(ex => ex.kind === c.kind && key(ex) === aExact);
    }
    const a = [...c.refs()].sort().join('|');
    for (const ex of sketch.constraints) {
      if (ex.kind !== c.kind) continue;
      const b = [...ex.refs()].sort().join('|');
      if (a === b) return true;
    }
    return false;
  }

  /** Hit-test in screen pixels against the rectangles the renderer recorded
   *  for every drawn dimension label. Used to detect select / edit /
   *  drag-to-reposition on existing dims. */
  hitDimAtScreen(sx, sy) {
    const rects = this.renderer.lastDimRects || [];
    for (let i = rects.length - 1; i >= 0; i--) {
      const r = rects[i];
      if (sx >= r.x && sx <= r.x + r.w && sy >= r.y && sy <= r.y + r.h) return r.constraint;
    }
    return null;
  }

  /** Move an existing dimension's label based on the cursor world position.
   *  Updates labelOffset / labelAngle / labelDist on the constraint. */
  moveDimLabel(c, world) {
    if (c.kind === 'distance' || c.kind === 'pointLineDistance' || c.kind === 'curveDistance' || c.kind === 'offsetDistance') {
      let p1, p2;
      if (c.kind === 'distance') {
        p1 = this._lookupAny(c.p1); p2 = this._lookupAny(c.p2);
      } else if (c.kind === 'offsetDistance') {
        // Use geometry of the first pair for label placement
        const first = c.pairs && c.pairs[0];
        if (!first) return;
        if (first.kind === 'line') {
          const src = this._lookupAny(first.sourceEntityId);
          const dst = this._lookupAny(first.targetEntityId);
          const pt = dst instanceof Line
            ? { x:(dst.p1.x + dst.p2.x) / 2, y:(dst.p1.y + dst.p2.y) / 2 }
            : this._lookupAny(first.pointId);
          const la = src instanceof Line ? src.p1 : this._lookupAny(first.l.a);
          const lb = src instanceof Line ? src.p2 : this._lookupAny(first.l.b);
          if (!pt || !la || !lb) return;
          const dx = lb.x - la.x, dy = lb.y - la.y;
          const len2 = dx*dx + dy*dy; if (len2 < EPS) return;
          const t = ((pt.x - la.x)*dx + (pt.y - la.y)*dy) / len2;
          p1 = pt; p2 = { x: la.x + t*dx, y: la.y + t*dy };
        } else {
          const a = this._lookupAny(first.c1), b = this._lookupAny(first.c2);
          if (!a || !b) return;
          if (c.mode === 'gap') {
            const dx = b.center.x - a.center.x, dy = b.center.y - a.center.y;
            const d = Math.hypot(dx, dy); if (d < EPS) return;
            const ux = dx / d, uy = dy / d;
            p1 = { x: a.center.x + ux * a.r, y: a.center.y + uy * a.r };
            p2 = { x: b.center.x - ux * b.r, y: b.center.y - uy * b.r };
          } else {
            const outer = a.r >= b.r ? a : b;
            const inner = outer === a ? b : a;
            const angle = (c.labelAngle != null) ? c.labelAngle : Math.PI / 6;
            p1 = { x: inner.center.x + inner.r * Math.cos(angle), y: inner.center.y + inner.r * Math.sin(angle) };
            p2 = { x: outer.center.x + outer.r * Math.cos(angle), y: outer.center.y + outer.r * Math.sin(angle) };
          }
        }
      } else if (c.kind === 'curveDistance') {
        const a = this._lookupAny(c.c1), b = this._lookupAny(c.c2);
        if (!a || !b) return;
        if (c.mode === 'gap') {
          const dx = b.center.x - a.center.x, dy = b.center.y - a.center.y;
          const d = Math.hypot(dx, dy); if (d < EPS) return;
          const ux = dx / d, uy = dy / d;
          p1 = { x: a.center.x + ux * a.r, y: a.center.y + uy * a.r };
          p2 = { x: b.center.x - ux * b.r, y: b.center.y - uy * b.r };
        } else {
          const outer = a.r >= b.r ? a : b;
          const inner = outer === a ? b : a;
          const angle = (c.labelAngle != null) ? c.labelAngle : Math.PI / 6;
          p1 = { x: inner.center.x + inner.r * Math.cos(angle), y: inner.center.y + inner.r * Math.sin(angle) };
          p2 = { x: outer.center.x + outer.r * Math.cos(angle), y: outer.center.y + outer.r * Math.sin(angle) };
        }
      } else {
        const pt = this._lookupAny(c.pointId);
        const la = this._lookupAny(c.l.a), lb = this._lookupAny(c.l.b);
        if (!pt || !la || !lb) return;
        const dx = lb.x - la.x, dy = lb.y - la.y;
        const len2 = dx*dx + dy*dy; if (len2 < EPS) return;
        const t = ((pt.x - la.x)*dx + (pt.y - la.y)*dy) / len2;
        p1 = pt; p2 = { x: la.x + t*dx, y: la.y + t*dy };
      }
      if (!p1 || !p2) return;
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const len = Math.hypot(dx, dy); if (len < EPS) return;
      const nx = -dy / len, ny = dx / len;
      const tx =  dx / len, ty =  dy / len;
      const mid = { x: (p1.x + p2.x)/2, y: (p1.y + p2.y)/2 };
      const wx = world.x - mid.x, wy = world.y - mid.y;
      const isRadialCircle = (c.kind === 'curveDistance' && c.mode === 'radial') ||
        (c.kind === 'offsetDistance' && c.pairs && c.pairs[0] && c.pairs[0].kind === 'circle');
      if (isRadialCircle) {
        let anchor = mid;
        if (c.kind === 'curveDistance') {
          const outer = this._lookupAny(c.c1), inner = this._lookupAny(c.c2);
          if (outer && inner) anchor = (outer.r >= inner.r ? outer.center : inner.center);
        } else {
          const first = c.pairs[0];
          const a = this._lookupAny(first.c1), b = this._lookupAny(first.c2);
          if (a && b) anchor = (a.r >= b.r ? a.center : b.center);
        }
        const dxw = world.x - anchor.x, dyw = world.y - anchor.y;
        const dw = Math.hypot(dxw, dyw);
        if (dw > EPS) {
          c.labelAngle = Math.atan2(dyw, dxw);
          c.labelDist = dw;
        }
      } else {
        c.labelOffset   = wx * nx + wy * ny;
        c.labelParallel = wx * tx + wy * ty;
      }
    } else if (c.kind === 'radius') {
      const circ = this._lookupAny(c.circleId); if (!circ) return;
      const dx = world.x - circ.center.x, dy = world.y - circ.center.y;
      const d = Math.hypot(dx, dy);
      if (d > EPS) {
        c.labelAngle = Math.atan2(dy, dx);
        c.labelDist  = d;
      }
    } else if (c.kind === 'angle') {
      const a1 = this._lookupAny(c.l1.a), b1 = this._lookupAny(c.l1.b);
      const a2 = this._lookupAny(c.l2.a), b2 = this._lookupAny(c.l2.b);
      if (!a1 || !b1 || !a2 || !b2) return;
      const inter = lineIntersection(a1, b1, a2, b2);
      if (!inter) return;
      const sector = angleSectorForCursor({ p1:a1, p2:b1 }, { p1:a2, p2:b2 }, world);
      c.labelDist = Math.max(dist(inter, world), 12 / this.view.zoom);
      if (sector) {
        c.value = sector.value;
        c.labelMidAngle = sector.midAngle;
        c.l1 = sector.l1Ref;
        c.l2 = sector.l2Ref;
      }
    }
  }

  /** Project-wide id → entity lookup. */
  _lookupAny(id) {
    for (const s of this.project.sketches) {
      for (const e of s.entities) {
        if (e.id === id) return e;
        for (const c of e.children()) if (c.id === id) return c;
      }
    }
    return null;
  }

  _lookupMap(sketches = this.project.sketches) {
    const byId = new Map();
    const walk = (e) => {
      byId.set(e.id, e);
      for (const c of e.children()) walk(c);
    };
    for (const s of sketches) for (const e of s.entities) walk(e);
    return byId;
  }

  _lookupFn(sketches = this.project.sketches) {
    const byId = this._lookupMap(sketches);
    return (id, key) => {
      const e = byId.get(id);
      return e ? e[key] : 0;
    };
  }

  /** Open an inline input over a dimension's label so the user can edit
   *  the value (or Esc to leave it untouched). Reuses the SmartDim input
   *  styling. */
  editDimValue(c) {
    if (!c || c.driven) return;
    const rect = (this.renderer.lastDimRects || []).find(r => r.constraint === c);
    if (!rect) return;
    const cx = rect.x + rect.w / 2, cy = rect.y + rect.h / 2;
    const input = document.createElement('input');
    input.type = 'text';
    Object.assign(input.style, {
      position: 'absolute',
      left: cx + 'px', top: cy + 'px',
      transform: 'translate(-50%, -50%)',
      zIndex: '30', padding: '2px 5px',
      border: '1.5px solid #2563a5', borderRadius: '3px',
      background: 'white', font: '12px ui-sans-serif, system-ui',
      width: '72px', textAlign: 'right', outline: 'none',
      boxShadow: '0 1px 4px rgba(0,0,0,0.15)'
    });
    let initial;
    if (c.kind === 'angle')                       initial = normalizeAngleValue(c.value) * 180 / Math.PI;
    else if (c.kind === 'radius' && c.isDiameter) initial = c.value * 2;
    else                                            initial = c.value;
    input.value = Number(initial).toFixed(3);
    document.getElementById('workspace').appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);

    const finish = (commit) => {
      input.removeEventListener('keydown', onKey);
      input.removeEventListener('blur', onBlur);
      const raw = input.value;
      input.remove();
      if (commit) {
        const v = parseFloat(raw);
        if (Number.isFinite(v)) {
          if (c.kind === 'angle')                       c.value = normalizeAngleValue(v * Math.PI / 180);
          else if (c.kind === 'radius' && c.isDiameter) c.value = v / 2;
          else if (c.kind === 'offsetDistance')          this._setOffsetDistanceValue(c, v);
          else                                            c.value = v;
          this.commit();
        }
      }
    };
    const onKey = (e) => {
      if (e.key === 'Enter')  { e.preventDefault(); e.stopPropagation(); finish(true); }
      else if (e.key === 'Escape'){ e.preventDefault(); e.stopPropagation(); finish(false); }
      else                     { e.stopPropagation(); }
    };
    const onBlur = () => finish(true);
    input.addEventListener('keydown', onKey);
    input.addEventListener('blur', onBlur);
  }

  selectedEntitiesAndPoints() {
    // Dedup — a Point shared between two or more entities (e.g. a corner
    // joining several lines) would otherwise appear once per parent.
    const out = [];
    const seen = new Set();
    const add = (x) => { if (!seen.has(x)) { seen.add(x); out.push(x); } };
    const sketch = this.activeSketch();
    if (!sketch) return out;
    const activeItems = new Set();
    for (const e of sketch.entities) {
      activeItems.add(e);
      for (const c of e.children()) activeItems.add(c);
    }
    for (const c of sketch.constraints) activeItems.add(c);
    this.selectionOrder = this.selectionOrder.filter(x => x && x.selected && activeItems.has(x));
    for (const x of this.selectionOrder) add(x);
    for (const e of sketch.entities) {
      if (e.selected) add(e);
      for (const c of e.children()) if (c.selected) add(c);
    }
    for (const c of sketch.constraints) if (c.selected) add(c);
    return out;
  }

  setSelected(entity, selected) {
    if (!entity) return;
    entity.selected = !!selected;
    const i = this.selectionOrder.indexOf(entity);
    if (selected) {
      if (i < 0) this.selectionOrder.push(entity);
    } else if (i >= 0) {
      this.selectionOrder.splice(i, 1);
    }
  }

  clearSelection() {
    for (const s of this.project.sketches) {
      for (const e of s.entities) {
        e.selected = false;
        for (const c of e.children()) c.selected = false;
      }
      for (const c of s.constraints) c.selected = false;
    }
    this.selectionOrder = [];
    this.refreshUI();
    this.requestRender();
  }

  deleteSelection() {
    const sketch = this.activeSketch(); if (!sketch) return;
    // Only delete entities that live in the active sketch.
    const toDelete = sketch.entities.filter(e => {
      if (e.selected) return true;
      for (const c of e.children()) if (c.selected) return true;
      return false;
    });
    const hasSelectedConstraints = sketch.constraints.some(c => c.selected);
    if (!toDelete.length && !hasSelectedConstraints) return;
    sketch.constraints = sketch.constraints.filter(c => !c.selected);
    for (const e of toDelete) sketch.removeEntity(e);
    this.commit();
    this.refreshUI();
  }

  _captureSketchParams(sketch) {
    const rows = [];
    const seen = new Set();
    const walk = (e) => {
      if (seen.has(e)) return;
      seen.add(e);
      for (const c of e.children()) walk(c);
      for (const key of e.paramKeys()) rows.push({ ent:e, id:e.id, key, value:e[key] });
    };
    for (const e of sketch.entities) walk(e);
    return rows;
  }

  _restoreSketchParams(rows) {
    for (const r of rows) r.ent[r.key] = r.value;
  }

  _paramIndexMap(rows) {
    const map = new Map();
    for (let i = 0; i < rows.length; i++) map.set(rows[i].id + ':' + rows[i].key, i);
    return map;
  }

  _captureParamValues(rows) {
    return rows.map(r => r.ent[r.key]);
  }

  _applyParamValues(rows, values) {
    for (let i = 0; i < rows.length; i++) rows[i].ent[rows[i].key] = values[i];
  }

  _offsetGeometryValid(sketch) {
    if (!sketch) return true;
    const L = (id, key) => {
      const e = this._lookupAny(id);
      return e ? e[key] : 0;
    };
    for (const c of sketch.constraints) {
      if (c.driven) continue;
      if (c.kind === 'offset' && c.offsetKind === 'line') {
        const dx1=L(c.l1.b,'x')-L(c.l1.a,'x'), dy1=L(c.l1.b,'y')-L(c.l1.a,'y');
        const dx2=L(c.l2.b,'x')-L(c.l2.a,'x'), dy2=L(c.l2.b,'y')-L(c.l2.a,'y');
        if (Math.hypot(dx1, dy1) <= EPS || Math.hypot(dx2, dy2) <= EPS) return false;
        if (dx1 * dx2 + dy1 * dy2 <= EPS) return false;
      } else if (c.kind === 'offset' && c.offsetKind === 'circle') {
        const source = this._lookupAny(c.sourceEntityId);
        const target = this._lookupAny(c.targetEntityId);
        if ((source instanceof Circle || source instanceof Arc) && source.r <= EPS) return false;
        if ((target instanceof Circle || target instanceof Arc) && target.r <= EPS) return false;
      } else if (c.kind === 'offsetDistance' && c.pairs) {
        for (const p of c.pairs) {
          if (p.value == null || Math.abs(p.value) <= EPS) continue;
          if (p.kind === 'line') {
            const px=L(p.pointId,'x'), py=L(p.pointId,'y');
            const ax=L(p.l.a,'x'), ay=L(p.l.a,'y'), bx=L(p.l.b,'x'), by=L(p.l.b,'y');
            const dx=bx-ax, dy=by-ay;
            const len = Math.hypot(dx, dy);
            if (len <= EPS) return false;
            const signed = (dx*(py-ay) - dy*(px-ax)) / len;
            if (signed * p.value <= EPS) return false;
          } else if (p.kind === 'circle') {
            const radial = L(p.c1,'r') - L(p.c2,'r');
            if (radial * p.value <= EPS) return false;
          }
        }
      }
    }
    return true;
  }

  _lineLengthById(id) {
    const e = this._lookupAny(id);
    return e instanceof Line ? dist(e.p1, e.p2) : null;
  }

  _curveRadiusById(id) {
    const e = this._lookupAny(id);
    return (e instanceof Circle || e instanceof Arc) ? e.r : null;
  }

  _minOffsetDragSize(size) {
    const zoom = this.view?.zoom || 4;
    const visualFloor = 4 / zoom;
    return Math.max(EPS, Math.min(size * 0.1, visualFloor));
  }

  _signedAreaForPointIds(pointIds) {
    if (!pointIds || pointIds.length < 3) return 0;
    let area = 0;
    for (let i = 0; i < pointIds.length; i++) {
      const a = this._lookupAny(pointIds[i]);
      const b = this._lookupAny(pointIds[(i + 1) % pointIds.length]);
      if (!a || !b) return 0;
      area += a.x * b.y - b.x * a.y;
    }
    return area / 2;
  }

  _closedLineLoopsFromEntityIds(entityIds) {
    const lines = [];
    for (const id of entityIds || []) {
      const e = this._lookupAny(id);
      if (e instanceof Line) lines.push(e);
    }
    if (lines.length < 3) return [];

    const byPoint = new Map();
    const lineById = new Map();
    const addAtPoint = (p, line) => {
      if (!byPoint.has(p.id)) byPoint.set(p.id, []);
      byPoint.get(p.id).push(line);
    };
    for (const line of lines) {
      lineById.set(line.id, line);
      addAtPoint(line.p1, line);
      addAtPoint(line.p2, line);
    }

    const unvisited = new Set(lines.map(l => l.id));
    const loops = [];
    while (unvisited.size) {
      const seedId = unvisited.values().next().value;
      const componentIds = new Set();
      const stack = [lineById.get(seedId)];
      while (stack.length) {
        const line = stack.pop();
        if (!line || componentIds.has(line.id)) continue;
        componentIds.add(line.id);
        unvisited.delete(line.id);
        for (const p of [line.p1, line.p2]) {
          for (const next of byPoint.get(p.id) || []) {
            if (!componentIds.has(next.id)) stack.push(next);
          }
        }
      }
      if (componentIds.size < 3) continue;

      const componentPoints = new Set();
      for (const id of componentIds) {
        const line = lineById.get(id);
        componentPoints.add(line.p1.id);
        componentPoints.add(line.p2.id);
      }
      let closed = true;
      for (const pointId of componentPoints) {
        const degree = (byPoint.get(pointId) || []).filter(l => componentIds.has(l.id)).length;
        if (degree !== 2) { closed = false; break; }
      }
      if (!closed) continue;

      const first = lineById.get(componentIds.values().next().value);
      const startId = first.p1.id;
      let currentId = first.p2.id;
      let previousLineId = first.id;
      const used = new Set([first.id]);
      const pointIds = [first.p1.id, first.p2.id];
      let ok = true;
      while (currentId !== startId) {
        const candidates = (byPoint.get(currentId) || [])
          .filter(l => componentIds.has(l.id) && l.id !== previousLineId && !used.has(l.id));
        if (candidates.length !== 1) { ok = false; break; }
        const next = candidates[0];
        used.add(next.id);
        const nextPoint = next.p1.id === currentId ? next.p2 : next.p1;
        pointIds.push(nextPoint.id);
        previousLineId = next.id;
        currentId = nextPoint.id;
        if (used.size > componentIds.size) { ok = false; break; }
      }
      if (!ok || used.size !== componentIds.size) continue;
      if (pointIds[pointIds.length - 1] === startId) pointIds.pop();
      loops.push({ pointIds });
    }
    return loops;
  }

  _offsetFeatureTouchesIds(feature, seedIds) {
    if (!seedIds || !seedIds.size) return true;
    const ids = []
      .concat(feature.sourceEntityIds || [])
      .concat(feature.generatedEntityIds || []);
    for (const id of ids) {
      if (seedIds.has(id)) return true;
      const e = this._lookupAny(id);
      if (!e || !e.children) continue;
      for (const child of e.children()) {
        if (seedIds.has(child.id)) return true;
      }
    }
    return false;
  }

  _captureOffsetDragGuard(sketch, seedIds = null) {
    const guard = { lines: [], curves: [] };
    if (!sketch) return guard;
    const seedSet = seedIds ? new Set(seedIds) : null;
    const features = sketch.features || [];
    for (const feature of features) {
      if (feature.kind !== 'offset') continue;
      if (!this._offsetFeatureTouchesIds(feature, seedSet)) continue;
      for (const ids of [feature.sourceEntityIds || [], feature.generatedEntityIds || []]) {
        for (const id of ids) {
          const len = this._lineLengthById(id);
          if (len != null && len > EPS) {
            guard.lines.push({ id, minLength:this._minOffsetDragSize(len) });
          }
          const radius = this._curveRadiusById(id);
          if (radius != null && radius > EPS) {
            guard.curves.push({ id, minRadius:this._minOffsetDragSize(radius) });
          }
        }
      }
    }
    return guard;
  }

  _offsetDragGuardValid(guard) {
    if (!guard) return true;
    for (const item of guard.lines || []) {
      const len = this._lineLengthById(item.id);
      if (len == null) continue;
      if (len <= item.minLength) return false;
    }
    for (const item of guard.curves || []) {
      const radius = this._curveRadiusById(item.id);
      if (radius == null) continue;
      if (radius <= item.minRadius) return false;
    }
    return true;
  }

  _finishDragStep(drag, result) {
    const sketch = this.activeSketch();
    if (!sketch) return result;
    if (sketch && (!this._offsetGeometryValid(sketch) || !this._offsetDragGuardValid(drag?.offsetGuard))) {
      if (drag?.lastValidValues) this._applyParamValues(drag.state, drag.lastValidValues);
      else if (drag?.state) this._restoreSketchParams(drag.state);
      for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();
      return { ...(result || {}), ok:false, rejected:true, state:this._lastSolve?.state || 'under' };
    }
    if (drag?.state) drag.lastValidValues = this._captureParamValues(drag.state);
    for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();
    return result;
  }

  _setOffsetDistanceValue(c, value) {
    const mag = Math.abs(value);
    c.value = mag;
    if (!c.pairs) return;
    const L = (id, key) => {
      const e = this._lookupAny(id);
      return e ? e[key] : 0;
    };
    for (const p of c.pairs) {
      let sign = p.value != null && p.value < 0 ? -1 : 1;
      if (p.value == null) {
        if (p.kind === 'line') {
          const px=L(p.pointId,'x'), py=L(p.pointId,'y');
          const ax=L(p.l.a,'x'), ay=L(p.l.a,'y'), bx=L(p.l.b,'x'), by=L(p.l.b,'y');
          const dx=bx-ax, dy=by-ay;
          const len = Math.hypot(dx, dy);
          if (len > EPS) sign = (dx*(py-ay) - dy*(px-ax)) < 0 ? -1 : 1;
        } else if (p.kind === 'circle') {
          sign = (L(p.c1,'r') - L(p.c2,'r')) < 0 ? -1 : 1;
        }
      }
      p.value = sign * mag;
    }
  }

  _ensureOffsetPairSigns(sketch) {
    if (!sketch) return;
    for (const c of sketch.constraints) {
      if (c.kind !== 'offsetDistance' || !c.pairs) continue;
      this._setOffsetDistanceValue(c, c.value);
    }
  }

  _offsetLinkedSnapIgnoreIds(sketch, seedIds) {
    const ignore = new Set(seedIds || []);
    let touchesOffset = false;
    for (const c of sketch.constraints) {
      if (c.kind === 'offset' && c.refs().some(id => ignore.has(id))) {
        touchesOffset = true;
        break;
      }
    }
    if (!touchesOffset) return ignore;

    const addEntity = (id) => {
      if (!id) return;
      ignore.add(id);
      const e = this._lookupAny(id);
      if (e && e.children) {
        for (const child of e.children()) ignore.add(child.id);
      }
    };
    const addMany = (ids) => ids.forEach(addEntity);
    let changed = true;
    while (changed) {
      changed = false;
      const before = ignore.size;
      for (const c of sketch.constraints) {
        if (c.kind === 'offset') {
          const sourceRefs = c.offsetKind === 'line'
            ? [c.sourceEntityId, c.l1.a, c.l1.b]
            : [c.sourceEntityId, c.p1];
          const targetRefs = c.offsetKind === 'line'
            ? [c.targetEntityId, c.l2.a, c.l2.b]
            : [c.targetEntityId, c.p2];
          if (sourceRefs.some(id => ignore.has(id)) || targetRefs.some(id => ignore.has(id))) {
            addMany(sourceRefs);
            addMany(targetRefs);
          }
        }
      }
      changed = ignore.size !== before;
    }
    return ignore;
  }

  _dragJointConstraintKinds() {
    return new Set(['coincident', 'arcEndpointCoincident', 'arcEndpointArcEndpointCoincident']);
  }

  _buildConstraintGraph(sketch, options = {}) {
    const skipKinds = options.skipKinds || null;
    const graph = new Map();
    const add = (id) => {
      if (!id) return;
      if (!graph.has(id)) graph.set(id, new Set());
    };
    const link = (a, b) => {
      if (!a || !b || a === b) return;
      add(a); add(b);
      graph.get(a).add(b);
      graph.get(b).add(a);
    };
    for (const e of sketch.entities) {
      add(e.id);
      for (const c of e.children()) {
        add(c.id);
        link(e.id, c.id);
      }
    }
    for (const c of sketch.constraints) {
      const refs = c.refs().filter(Boolean);
      for (const id of refs) add(id);
      if (skipKinds && skipKinds.has(c.kind)) continue;
      for (let i = 0; i < refs.length; i++) {
        for (let j = i + 1; j < refs.length; j++) link(refs[i], refs[j]);
      }
    }
    return graph;
  }

  _buildSolvingGraph(sketch) {
    const graph = new Map();
    const add = (id) => {
      if (!id) return;
      if (!graph.has(id)) graph.set(id, new Set());
    };
    const link = (a, b) => {
      if (!a || !b || a === b) return;
      add(a); add(b);
      graph.get(a).add(b);
      graph.get(b).add(a);
    };
    for (const e of sketch.entities) {
      add(e.id);
      for (const c of e.children()) add(c.id);
    }
    for (const c of sketch.constraints) {
      if (c.driven) continue;
      const refs = c.refs().filter(Boolean);
      for (const id of refs) add(id);
      for (let i = 0; i < refs.length; i++) {
        for (let j = i + 1; j < refs.length; j++) link(refs[i], refs[j]);
      }
    }
    return graph;
  }

  _graphDistances(graph, startIds) {
    const distMap = new Map();
    const q = [];
    for (const id of startIds) {
      distMap.set(id, 0);
