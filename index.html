    this._drawText(ctx, tx, ty, txt, cols.text, 0);
    ctx.restore();

    if (this.lastDimRects) {
      ctx.font = '11px ui-sans-serif, system-ui, -apple-system, "Segoe UI"';
      const w = ctx.measureText(txt).width;
      this.lastDimRects.push({ constraint: c, x: tx - w/2 - 4, y: ty - 9, w: w + 8, h: 18 });
    }
  }
}

/* =============== 7. SNAP ENGINE =============================== */
class SnapEngine {
  constructor() { this.tolPx = 10; }
  find(world, view, sketches, options = {}) {
    if (!sketches || !sketches.length) return null;
    const tol = this.tolPx / view.zoom;
    let best = null;
    // entity attached to the snap is the *thing* the constraint will
    // reference: the Point itself for endpoints, the Line for midpoints,
    // the Circle/Arc for centers and quadrants, null for origin.
    const priority = (kind) => {
      if (kind === 'endpoint') return 5;
      if (kind === 'center') return 4;
      if (kind === 'midpoint' || kind === 'quadrant') return 3;
      if (kind === 'origin') return 2;
      return 1; // on-line / on-circle are useful, but lose to nearby points.
    };
    const consider = (pt, kind, entity) => {
      const d = dist(pt, world);
      if (d > tol) return;
      const p = priority(kind);
      const candidate = { x: pt.x, y: pt.y, kind, entity, _d: d, _p: p };
      if (options.ignore && options.ignore(candidate)) return;
      if (!best || p > best._p || (p === best._p && d < best._d)) {
        best = candidate;
      }
    };
    for (const sketch of sketches) {
      for (const e of sketch.entities) {
        if (e instanceof Line) {
          consider(e.p1, 'endpoint', e.p1);
          consider(e.p2, 'endpoint', e.p2);
          consider({ x:(e.p1.x+e.p2.x)/2, y:(e.p1.y+e.p2.y)/2 }, 'midpoint', e);
          // On-line snap: foot of perpendicular from cursor onto the line
          // segment, only valid when the foot is between the endpoints (so
          // we don't fight the endpoint snaps).
          const dx = e.p2.x - e.p1.x, dy = e.p2.y - e.p1.y;
          const len2 = dx*dx + dy*dy;
          if (len2 > EPS) {
            const t = ((world.x - e.p1.x)*dx + (world.y - e.p1.y)*dy) / len2;
            if (t > 0.05 && t < 0.95) {
              consider({ x: e.p1.x + t*dx, y: e.p1.y + t*dy }, 'on-line', e);
            }
          }
        } else if (e instanceof Circle) {
          consider(e.center, 'center', e);
          consider({ x:e.center.x+e.r, y:e.center.y }, 'quadrant', e);
          consider({ x:e.center.x-e.r, y:e.center.y }, 'quadrant', e);
          consider({ x:e.center.x, y:e.center.y+e.r }, 'quadrant', e);
          consider({ x:e.center.x, y:e.center.y-e.r }, 'quadrant', e);
          // On-circle snap: nearest point on the perimeter.
          const cdx = world.x - e.center.x, cdy = world.y - e.center.y;
          const cd  = Math.hypot(cdx, cdy);
          if (cd > EPS) {
            consider({ x: e.center.x + cdx/cd * e.r, y: e.center.y + cdy/cd * e.r }, 'on-circle', e);
          }
        } else if (e instanceof Arc) {
          e.syncEnds();
          consider(e.center, 'center', e);
          consider(e.start,  'endpoint', e.start);
          consider(e.end,    'endpoint', e.end);
          // On-arc: nearest point on the arc, but only if the angle to the
          // cursor lies within [a0, a1].
          const adx = world.x - e.center.x, ady = world.y - e.center.y;
          const ad  = Math.hypot(adx, ady);
          if (ad > EPS) {
            let theta = Math.atan2(ady, adx);
            let a0 = e.a0, a1 = e.a1;
            while (a1 < a0) a1 += TAU;
            while (theta < a0) theta += TAU;
            if (theta <= a1 + 1e-3) {
              consider({ x: e.center.x + adx/ad * e.r, y: e.center.y + ady/ad * e.r }, 'on-circle', e);
            }
          }
        } else if (e instanceof Point) {
          consider(e, 'endpoint', e);
        }
      }
    }
    consider({ x:0, y:0 }, 'origin', null);
    return best;
  }
}

/* =============== 8. TOOLS ===================================== */
class Tool {
  constructor(app) { this.app = app; }
  activate() {} deactivate() {}
  onPointerDown() {} onPointerMove() {} onPointerUp() {} onKey() {}
  getPreview() { return null; }
}

class SelectTool extends Tool {
  constructor(app) {
    super(app);
    this.dragging = null;
    this.box = null;
  }
  hint() { return 'Click to select. Ctrl-click to add/remove. Drag to move. Click a dimension to edit.'; }
  onPointerDown(world, snap, ev) {
    // Dimension labels first — they sit "on top of" any underlying entity
    // and need their own click vs drag handling.
    const r = this.app.canvas.getBoundingClientRect();
    const sx = ev.clientX - r.left, sy = ev.clientY - r.top;
    const dim = this.app.hitDimAtScreen(sx, sy);
    if (dim) {
      this.dimAction = { constraint: dim, startWorld: world, moved: false };
      return;
    }
    const hit = this.app.hitTestActiveSketch(world);
    const isToggle = ev.ctrlKey || ev.metaKey;
    const isAdd    = ev.shiftKey;
    if (hit) {
      if (isToggle) this.app.setSelected(hit, !hit.selected);
      else if (isAdd) this.app.setSelected(hit, true);
      else if (!hit.selected) { this.app.clearSelection(); this.app.setSelected(hit, true); }
      else this.app.setSelected(hit, true);
      // collect drag points (only those on the active sketch)
      const activeId = this.app.project.activeSketchId;
      const pts = [];
      const seen = new Set();
      for (const s of this.app.project.sketches) {
        if (s.id !== activeId) continue;
        for (const e of s.entities) {
          const walk = (x, inheritSel) => {
            const sel = inheritSel || x.selected;
            if (x instanceof Point && sel && !x.fixed && !seen.has(x)) { seen.add(x); pts.push({ p:x, x:x.x, y:x.y }); }
            for (const c of x.children()) walk(c, sel);
          };
          walk(e, e.selected);
        }
      }
      this.dragging = pts.length ? this.app.beginLocalizedDrag(world, pts, hit) : null;
      this.app.refreshUI();
      this.app.requestRender();
    } else {
      if (!isAdd && !isToggle) this.app.clearSelection();
      this.box = { x0: world.x, y0: world.y, x1: world.x, y1: world.y };
      this.app.requestRender();
    }
  }
  onPointerMove(world, snap, ev) {
    if (this.dimAction) {
      const dx = world.x - this.dimAction.startWorld.x;
      const dy = world.y - this.dimAction.startWorld.y;
      // Treat as a drag once the cursor moves a couple of pixels' worth.
      if (Math.hypot(dx, dy) * this.app.view.zoom > 3) this.dimAction.moved = true;
      if (this.dimAction.moved) {
        this.app.moveDimLabel(this.dimAction.constraint, world);
        this.app.requestRender();
      }
      return;
    }
    if (this.dragging) {
      // If the cursor is over a snap target that is NOT one of the points
      // we're dragging, pull the cursor delta to the snap location so the
      // dragged points latch onto the geometry (line, circle, midpoint,
      // origin, …). The snap is remembered for pointerUp, where it can be
      // promoted into a real constraint.
      let dx = world.x - this.dragging.startWorld.x;
      let dy = world.y - this.dragging.startWorld.y;
      if (snap && snap.dragRecord && !this.app.shouldIgnoreDragSnap(this.dragging, snap)) {
        ({ dx, dy } = this.app._dragDeltaForSnap(this.dragging, snap));
        this.dragging.endSnap = snap;
      } else {
        this.dragging.endSnap = null;
      }
      this.app.solveLocalizedDrag(this.dragging, dx, dy);
      this.app.requestRender();
    } else if (this.box) {
      this.box.x1 = world.x; this.box.y1 = world.y;
      this.app.requestRender();
    } else {
      // Hover is edit affordance, so only the active sketch can light up.
      let changed = false;
      const activeId = this.app.project.activeSketchId;
      for (const s of this.app.project.visibleSketches()) {
        const editable = s.id === activeId;
        for (const e of s.entities) {
          let hov = editable && !!e.hit(world, this.app.view);
          // also hover children if a child is hit
          for (const c of e.children()) if (editable) {
            if (c.hit && c.hit(world, this.app.view)) { hov = true; break; }
          }
          if (e.hover !== hov) { e.hover = hov; changed = true; }
        }
      }
      if (changed) this.app.requestRender();
    }
  }
  onPointerUp(world, snap, ev) {
    if (this.dimAction) {
      if (this.dimAction.moved) {
        // The label position was mutated in-place during pointermove; just
        // commit so the change goes through the undo stack and persists.
        this.app.commit();
      } else {
        // No movement — treat as a click and open the inline editor.
        this.app.editDimValue(this.dimAction.constraint);
      }
      this.dimAction = null;
      return;
    }
    if (this.box) {
      const x0 = Math.min(this.box.x0, this.box.x1);
      const y0 = Math.min(this.box.y0, this.box.y1);
      const x1 = Math.max(this.box.x0, this.box.x1);
      const y1 = Math.max(this.box.y0, this.box.y1);
      for (const s of this.app.activeVisibleSketches()) {
        for (const e of s.entities) {
          const inBox = (p) => p.x >= x0 && p.x <= x1 && p.y >= y0 && p.y <= y1;
          let inside = false;
          if (e instanceof Line)        inside = inBox(e.p1) && inBox(e.p2);
          else if (e instanceof Circle) inside = inBox(e.center);
          else if (e instanceof Arc)    inside = inBox(e.center);
          else if (e instanceof Point)  inside = inBox(e);
          if (inside) this.app.setSelected(e, true);
        }
      }
      this.box = null;
      this.app.refreshUI();
    }
    if (this.dragging) {
      // If the drag ended on a snap target and we were moving exactly one
      // point, promote the snap into a permanent constraint (e.g. drop a
      // point onto a line → PointOnLine).
      const sketch = this.app.activeSketch();
      if (sketch && this.dragging.endSnap) {
        const pt = this.dragging.endSnap.dragPoint || (this.dragging.pts.length === 1 ? this.dragging.pts[0].p : null);
        const sn = this.dragging.endSnap;
        // Skip if we'd be constraining the point to itself.
        if (pt && sn.entity !== pt && !this.app.shouldIgnoreDragSnap(this.dragging, sn)) {
          const c = this.app.snapToConstraint(sn, pt);
          if (c) sketch.constraints.push(c);
        }
      }
      this.dragging = null;
      this.app.commit();
    }
  }
  onKey(ev) {
    if (ev.key === 'Delete' || ev.key === 'Backspace') { this.app.deleteSelection(); ev.preventDefault(); }
    else if (ev.key === 'Escape') this.app.clearSelection();
  }
  getPreview() {
    if (!this.box) return null;
    const v = this.app.view;
    const a = v.worldToScreen({x:this.box.x0, y:this.box.y0});
    const b = v.worldToScreen({x:this.box.x1, y:this.box.y1});
    return { box: { x: Math.min(a.x,b.x), y: Math.min(a.y,b.y), w: Math.abs(a.x-b.x), h: Math.abs(a.y-b.y) } };
  }
}

class LineTool extends Tool {
  constructor(app) { super(app); this.startPt = null; this.cursor = null; }
  hint() { return 'Click to place start, click again for end. Esc to finish.'; }
  activate() { this.startPt = null; }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    const w = snap ? { x: snap.x, y: snap.y } : world;
    if (!this.startPt) {
      const { point, reused } = this.app.makeOrReusePoint(w, snap, sketch);
      this.startPt = point;
      this._pendingStartSnap = reused ? null : snap;
    } else {
      const { point: endPt, reused: endReused } = this.app.makeOrReusePoint(w, snap, sketch);
      const endSnap = endReused ? null : snap;
      const line = new Line(this.startPt, endPt);
      if (this.app.constructionMode) line.construction = true;
      sketch.addEntity(line);
      // Apply pending snap constraints after the line (and its endpoints)
      // are part of the sketch — otherwise the solver lookup won't find them.
      if (this._pendingStartSnap) {
        const cs = this.app.snapToConstraint(this._pendingStartSnap, this.startPt);
        if (cs) sketch.constraints.push(cs);
      }
      if (endSnap) {
        const cs = this.app.snapToConstraint(endSnap, endPt);
        if (cs) sketch.constraints.push(cs);
      }
      this.app.commit();
      // Chain — the end point is now in the sketch, so no pending constraint.
      this.startPt = endPt;
      this._pendingStartSnap = null;
    }
    this.app.requestRender();
  }
  onPointerMove(world, snap) { this.cursor = snap ? { x:snap.x, y:snap.y } : world; this.app.requestRender(); }
  onKey(ev) {
    // First Esc closes the current line chain. Second Esc exits to Select.
    if (ev.key === 'Escape' || ev.key === 'Enter') {
      if (this.startPt) { this.startPt = null; this._pendingStartSnap = null; this.app.requestRender(); }
      else { this.app.setTool('select'); }
    }
  }
  getPreview() {
    if (!this.startPt || !this.cursor) return null;
    return { paths: [[this.startPt, this.cursor]], dashed: this.app.constructionMode };
  }
}

class RectangleTool extends Tool {
  constructor(app) { super(app); this.start = null; this.cursor = null; }
  hint() { return 'Click two corners.'; }
  activate() { this.start = null; }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    const w = snap ? { x: snap.x, y: snap.y } : world;
    if (!this.start) {
      this.start = w;
      this._startSnap = snap;
    } else {
      const startInfo = this.app.makeOrReusePoint(this.start, this._startSnap, sketch);
      const endInfo   = this.app.makeOrReusePoint(w, snap, sketch);
      const a = startInfo.point;
      const c = endInfo.point;
      const x0 = a.x, y0 = a.y, x1 = c.x, y1 = c.y;
      const b = new Point(x1, y0);
      const d = new Point(x0, y1);
      const l1 = new Line(a, b), l2 = new Line(b, c);
      const l3 = new Line(c, d), l4 = new Line(d, a);
      if (this.app.constructionMode) [l1,l2,l3,l4].forEach(l=>l.construction=true);
      sketch.addEntity(l1); sketch.addEntity(l2);
      sketch.addEntity(l3); sketch.addEntity(l4);
      sketch.constraints.push(new HorizontalConstraint(l1.id, a.id, b.id));
      sketch.constraints.push(new HorizontalConstraint(l3.id, c.id, d.id));
      sketch.constraints.push(new VerticalConstraint  (l2.id, b.id, c.id));
      sketch.constraints.push(new VerticalConstraint  (l4.id, d.id, a.id));
      // Apply snap-derived constraints to the diagonal corners.
      if (!startInfo.reused && this._startSnap) {
        const cs = this.app.snapToConstraint(this._startSnap, a);
        if (cs) sketch.constraints.push(cs);
      }
      if (!endInfo.reused && snap) {
        const cs = this.app.snapToConstraint(snap, c);
        if (cs) sketch.constraints.push(cs);
      }
      this.start = null; this._startSnap = null;
      this.app.commit();
    }
    this.app.requestRender();
  }
  onPointerMove(world, snap) { this.cursor = snap ? { x:snap.x, y:snap.y } : world; this.app.requestRender(); }
  onKey(ev) { if (ev.key === 'Escape') { this.start = null; this.app.setTool('select'); } }
  getPreview() {
    if (!this.start || !this.cursor) return null;
    const a = this.start, c = this.cursor;
    return { paths: [[ a, {x:c.x,y:a.y}, c, {x:a.x,y:c.y}, a ]], dashed: this.app.constructionMode };
  }
}

class CircleTool extends Tool {
  constructor(app) { super(app); this.center = null; this.cursor = null; }
  hint() { return 'Click center, then a point on the circle.'; }
  activate() { this.center = null; }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    const w = snap ? { x:snap.x, y:snap.y } : world;
    if (!this.center) {
      const { point, reused } = this.app.makeOrReusePoint(w, snap, sketch);
      this.center = point;
      this._pendingCenterSnap = reused ? null : snap;
    } else {
      const r = dist(this.center, w);
      const c = new Circle(this.center, r);
      if (this.app.constructionMode) c.construction = true;
      sketch.addEntity(c);
      if (this._pendingCenterSnap) {
        const cs = this.app.snapToConstraint(this._pendingCenterSnap, this.center);
        if (cs) sketch.constraints.push(cs);
      }
      this.center = null;
      this._pendingCenterSnap = null;
      this.app.commit();
    }
    this.app.requestRender();
  }
  onPointerMove(world, snap) { this.cursor = snap ? { x:snap.x, y:snap.y } : world; this.app.requestRender(); }
  onKey(ev) { if (ev.key === 'Escape') { this.center = null; this.app.setTool('select'); } }
  getPreview() {
    if (!this.center || !this.cursor) return null;
    return { circles: [{ center: this.center, r: dist(this.center, this.cursor) }] };
  }
}

class HexagonTool extends Tool {
  constructor(app) { super(app); this.center = null; this.cursor = null; }
  hint() { return 'Set sides in Tool Options. Click center, then the midpoint of one edge.'; }
  activate() { this.center = null; this.cursor = null; this._pendingCenterSnap = null; this.app.refreshToolOptions(); }
  deactivate() { this.app.refreshToolOptions(); }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    const w = snap ? { x:snap.x, y:snap.y } : world;
    if (!this.center) {
      const { point, reused } = this.app.makeOrReusePoint(w, snap, sketch);
      this.center = point;
      this._pendingCenterSnap = reused ? null : snap;
    } else {
      const pts = regularPolygonFromCenterEdge(this.center, w, this.app.polygonSides);
      if (pts && pts.length >= 3) {
        const vertices = pts.map(p => new Point(p.x, p.y));
        const lines = [];
        const circle = new Circle(this.center, dist(this.center, vertices[0]));
        circle.construction = true;
        for (let i = 0; i < vertices.length; i++) {
          const l = new Line(vertices[i], vertices[(i + 1) % vertices.length]);
          if (this.app.constructionMode) l.construction = true;
          lines.push(l);
        }
        sketch.addEntity(circle);
        for (const l of lines) sketch.addEntity(l);
        for (const p of vertices) {
          sketch.constraints.push(new PointOnCircleConstraint(p.id, circle.id, circle.center.id));
        }
        for (let i = 1; i < lines.length; i++) {
          const equal = new EqualLengthConstraint(
            { a: lines[0].p1.id, b: lines[0].p2.id },
            { a: lines[i].p1.id, b: lines[i].p2.id }
          );
          equal.driven = true;
          sketch.constraints.push(equal);
        }
        const centralAngle = TAU / vertices.length;
        for (let i = 0; i < vertices.length - 1; i++) {
          sketch.constraints.push(new DirectedAngleConstraint(
            { a: this.center.id, b: vertices[i].id },
            { a: this.center.id, b: vertices[(i + 1) % vertices.length].id },
            centralAngle
          ));
        }
        if (this._pendingCenterSnap) {
          const cs = this.app.snapToConstraint(this._pendingCenterSnap, this.center);
          if (cs) sketch.constraints.push(cs);
        }
        this.app.commit();
      }
      this.center = null;
      this.cursor = null;
      this._pendingCenterSnap = null;
    }
    this.app.requestRender();
  }
  onPointerMove(world, snap) { this.cursor = snap ? { x:snap.x, y:snap.y } : world; this.app.requestRender(); }
  onKey(ev) { if (ev.key === 'Escape') { this.center = null; this._pendingCenterSnap = null; this.app.setTool('select'); } }
  getPreview() {
    if (!this.center || !this.cursor) return null;
    const pts = regularPolygonFromCenterEdge(this.center, this.cursor, this.app.polygonSides);
    if (!pts) return null;
    return {
      paths: [[...pts, pts[0]]],
      circles: [{ center: this.center, r: dist(this.center, pts[0]) }],
      dashed: this.app.constructionMode
    };
  }
}

class ArcTool extends Tool {
  constructor(app) { super(app); this.pts = []; this.cursor = null; }
  hint() { return 'Click start, end, then a third point on the arc.'; }
  activate() { this.pts = []; }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    const w = snap ? { x:snap.x, y:snap.y } : world;
    this.pts.push(w);
    if (this.pts.length === 3) {
      const arc = this._arcFrom3(this.pts[0], this.pts[1], this.pts[2]);
      if (arc) {
        const center = new Point(arc.cx, arc.cy);
        const A = new Arc(center, arc.r, arc.a0, arc.a1);
        if (this.app.constructionMode) A.construction = true;
        sketch.addEntity(A);
        this.app.commit();
      }
      this.pts = [];
    }
    this.app.requestRender();
  }
  onPointerMove(world, snap) { this.cursor = snap ? { x:snap.x, y:snap.y } : world; this.app.requestRender(); }
  onKey(ev) { if (ev.key === 'Escape') { this.pts = []; this.app.setTool('select'); } }
  _arcFrom3(a, b, c) {
    const ax=a.x, ay=a.y, bx=b.x, by=b.y, cx=c.x, cy=c.y;
    const d = 2*(ax*(by-cy) + bx*(cy-ay) + cx*(ay-by));
    if (Math.abs(d) < EPS) return null;
    const ux = ((ax*ax+ay*ay)*(by-cy) + (bx*bx+by*by)*(cy-ay) + (cx*cx+cy*cy)*(ay-by)) / d;
    const uy = ((ax*ax+ay*ay)*(cx-bx) + (bx*bx+by*by)*(ax-cx) + (cx*cx+cy*cy)*(bx-ax)) / d;
    const r  = Math.hypot(ax-ux, ay-uy);
    let a0 = Math.atan2(ay-uy, ax-ux);
    let a1 = Math.atan2(by-uy, bx-ux);
    const ac = Math.atan2(cy-uy, cx-ux);
    let lo = a0, hi = a1; while (hi < lo) hi += TAU;
    let p = ac; while (p < lo) p += TAU;
    if (p > hi) { [lo, hi] = [a1, a0]; while (hi < lo) hi += TAU; }
    return { cx: ux, cy: uy, r, a0: lo, a1: hi };
  }
  getPreview() {
    const draft = [];
    if (this.pts.length === 1 && this.cursor) draft.push([this.pts[0], this.cursor]);
    else if (this.pts.length === 2 && this.cursor) draft.push([this.pts[0], this.pts[1], this.cursor]);
    return { paths: draft };
  }
}

class PointTool extends Tool {
  hint() { return 'Click to place a point.'; }
  onPointerDown(world, snap) {
    const sketch = this.app.activeSketch(); if (!sketch) return;
    // Don't create a duplicate at an active-sketch endpoint we already have.
    if (snap && snap.kind === 'endpoint') {
      const owner = this.app.project.sketchOf(snap.entity);
      if (owner && owner.id === sketch.id) return;
    }
    const w = snap ? { x:snap.x, y:snap.y } : world;
    const p = new Point(w.x, w.y);
    sketch.addEntity(p);
    if (snap) {
      const cs = this.app.snapToConstraint(snap, p);
      if (cs) sketch.constraints.push(cs);
    }
    this.app.commit();
    this.app.requestRender();
  }
  onKey(ev) { if (ev.key === 'Escape') this.app.setTool('select'); }
}

/** Smart Dimension — three-phase state machine, no browser prompts.
 *
 *  PICKING  : user picks entities one at a time. As soon as the pick set
 *             forms a valid dimension combination (one line, one circle,
 *             two points, line + point, two lines, …) we infer a preview
 *             and transition straight into PLACING.
 *  PLACING  : the dimension follows the cursor — perpendicular offset
 *             for distances, leader angle for radius/diameter, arc
 *             radius for angles. Clicking another entity rebuilds the
 *             pick set (changing the dimension type). Clicking on empty
 *             space freezes the placement and enters TYPING.
 *  TYPING   : an inline input is anchored on the dim label, prefilled
 *             with the measured value. Enter / blur commits, Esc cancels.
 *
 *  The committed constraint stores its label placement (`labelOffset` /
 *  `labelAngle` / `labelDist`) so the dim renders in the same spot on
 *  reload.
 */
class SmartDimensionTool extends Tool {
  constructor(app) {
    super(app);
    this.picks = [];
    this.phase = 'picking';   // 'picking' | 'placing' | 'typing'
    this.preview = null;
    this.cursor = null;
    this.inputEl = null;
  }

  hint() {
    if (this.phase === 'typing')  return 'Type a value, Enter to set, Esc to cancel.';
    if (this.phase === 'placing') return 'Click in space to place. Click another entity to change the dimension type. Esc to cancel.';
    return 'Click a line / circle / arc, or two entities, to start a dimension.';
  }

  activate()   { this._reset(); }
  deactivate() { this._cleanup(); }

  _reset() {
    this.picks = [];
    this.phase = 'picking';
    this.preview = null;
    this._removeInput();
  }
  _removeInput() {
    if (this.inputEl) { this.inputEl.remove(); this.inputEl = null; }
  }
  _cleanup() {
    this._removeInput();
    this._reset();
    this.app.requestRender();
  }

  onPointerDown(world, snap, ev) {
    if (this.phase === 'typing') return;          // input owns events while typing
    const hit = this.app.hitTestForDimension(world);
    if (hit) {
      const idx = this.picks.indexOf(hit);
      if (idx >= 0) this.picks.splice(idx, 1);
      else          this.picks.push(hit);
      this._inferPreview();
      this.phase = this.preview ? 'placing' : 'picking';
      // Keep the default offset/angle/dist that _inferPreview just set —
      // calling _updateCursorPlacement here would zero it out (the click
      // point is on the picked feature itself), making the dim invisible.
      // The next pointermove will start tracking the cursor.
    } else {
      if (this.phase === 'placing' && this.preview) {
        this._updateCursorPlacement(world);
        this._enterTypingPhase();
      }
    }
    this.app.requestRender();
  }

  onPointerMove(world, snap, ev) {
    this.cursor = world;
    if (this.phase === 'placing' && this.preview) {
      this._updateCursorPlacement(world);
      this.app.requestRender();
    }
  }

  onKey(ev) {
    if (this.phase === 'typing') return;
    if (ev.key === 'Escape') {
      if (this.picks.length || this.preview) this._cleanup();
      else this.app.setTool('select');
    }
  }

  /** Inspect the current pick set and build a preview parameter object,
   *  preserving any prior offset/angle/dist when the type doesn't change. */
  _inferPreview() {
    const picks = this.picks;
    const points  = picks.filter(p => p instanceof Point);
    const lines   = picks.filter(p => p instanceof Line);
    const circles = picks.filter(p => p instanceof Circle);
    const arcs    = picks.filter(p => p instanceof Arc);
    const view = this.app.view;
    const defOffset   = 14 / view.zoom;
    const defParallel = 0;
    const defAngle    = Math.PI / 6;
    const defDist     = 40 / view.zoom;
    // Preserve the prior placement when the type is compatible — when the
    // user adds another pick to refine the dimension type, we keep the
    // offset/angle they were already steering toward.
    const oldOffset   = this.preview?.offset   ?? defOffset;
    const oldParallel = this.preview?.parallel ?? defParallel;
    const oldAngle    = this.preview?.angle    ?? defAngle;
    const oldDist     = this.preview?.dist     ?? defDist;

    if (picks.length === 1) {
      if (lines.length === 1) {
        const l = lines[0];
        this.preview = { kind:'distance', p1:l.p1, p2:l.p2,
                          value: dist(l.p1, l.p2),
                          offset: oldOffset, parallel: oldParallel };
        return true;
      }
      if (circles.length === 1) {
        const c = circles[0];
        // Default the cursor distance just outside the rim so the dim is
        // visible immediately after the pick (per "arrow appears on click").
        this.preview = { kind:'diameter', circle:c, value: c.r * 2,
                          angle: oldAngle, dist: c.r + defOffset };
        return true;
      }
      if (arcs.length === 1) {
        const a = arcs[0];
        this.preview = { kind:'radius', circle:a, value: a.r,
                          angle: oldAngle, dist: a.r + defOffset };
        return true;
      }
    }

    if (picks.length === 2) {
      if (points.length === 2) {
        this.preview = { kind:'distance', p1:points[0], p2:points[1],
                          value: dist(points[0], points[1]),
                          offset: oldOffset, parallel: oldParallel };
        return true;
      }
      if (lines.length === 2) {
        const [a, b] = lines;
        const sector = angleSectorForCursor(a, b, this.cursor);
        if (!sector) { this.preview = null; return false; }
        this.preview = {
          kind:'angle', l1:a, l2:b,
          value: sector.value, dist: oldDist,
          midAngle: sector.midAngle,
          l1Ref: sector.l1Ref, l2Ref: sector.l2Ref
        };
        return true;
      }
      if (lines.length === 1 && points.length === 1) {
        const l = lines[0], p = points[0];
        const dx = l.p2.x - l.p1.x, dy = l.p2.y - l.p1.y;
        const len = Math.hypot(dx, dy);
        const cur = len < EPS ? 0 : Math.abs(dx*(p.y-l.p1.y) - dy*(p.x-l.p1.x)) / len;
        this.preview = { kind:'pointLineDistance', p:p, line:l, value: cur,
                          offset: oldOffset, parallel: oldParallel };
        return true;
      }
      if ((circles.length + arcs.length) === 2) {
        const all = [...circles, ...arcs];
        this.preview = { kind:'distance', p1:all[0].center, p2:all[1].center,
                          value: dist(all[0].center, all[1].center),
                          offset: oldOffset, parallel: oldParallel };
        return true;
      }
    }

    this.preview = null;
    return false;
  }

  /** Resolve cursor world position into the appropriate placement field.
   *  For distance dims we capture BOTH a perpendicular offset and a parallel
   *  offset along the line direction, so the text rides exactly under the
   *  cursor (which may be past either arrow). For circle dims we capture
   *  the cursor's distance from the center as well as its angle, so the
   *  user picks inside-vs-outside by pulling the cursor in or out. */
  _updateCursorPlacement(world) {
    if (!this.preview) return;
    const p = this.preview;
    if (p.kind === 'distance') {
      const dx = p.p2.x - p.p1.x, dy = p.p2.y - p.p1.y;
      const len = Math.hypot(dx, dy);
      if (len < EPS) return;
      const nx = -dy / len, ny = dx / len;
      const tx =  dx / len, ty =  dy / len;
      const mid = { x: (p.p1.x + p.p2.x)/2, y: (p.p1.y + p.p2.y)/2 };
      const wx = world.x - mid.x, wy = world.y - mid.y;
      p.offset   = wx * nx + wy * ny;
      p.parallel = wx * tx + wy * ty;
    } else if (p.kind === 'pointLineDistance') {
      const dx = p.line.p2.x - p.line.p1.x, dy = p.line.p2.y - p.line.p1.y;
      const len = Math.hypot(dx, dy);
      if (len < EPS) return;
      const t = ((p.p.x - p.line.p1.x)*dx + (p.p.y - p.line.p1.y)*dy) / (len*len);
      const foot = { x: p.line.p1.x + t*dx, y: p.line.p1.y + t*dy };
      const segDx = foot.x - p.p.x, segDy = foot.y - p.p.y;
      const segLen = Math.hypot(segDx, segDy);
      if (segLen < EPS) return;
      const segNx = -segDy / segLen, segNy = segDx / segLen;
      const segTx =  segDx / segLen, segTy =  segDy / segLen;
      const mid = { x: (p.p.x + foot.x)/2, y: (p.p.y + foot.y)/2 };
      const wx = world.x - mid.x, wy = world.y - mid.y;
      p.offset   = wx * segNx + wy * segNy;
      p.parallel = wx * segTx + wy * segTy;
    } else if (p.kind === 'radius' || p.kind === 'diameter') {
      const dx = world.x - p.circle.center.x;
      const dy = world.y - p.circle.center.y;
      const d = Math.hypot(dx, dy);
      if (d > EPS) {
        p.angle = Math.atan2(dy, dx);
        p.dist  = d;
      }
    } else if (p.kind === 'angle') {
      const inter = lineIntersection(p.l1.p1, p.l1.p2, p.l2.p1, p.l2.p2);
      const sector = angleSectorForCursor(p.l1, p.l2, world);
      if (inter) p.dist = Math.max(dist(inter, world), 12 / this.app.view.zoom);
      if (sector) {
        p.value = sector.value;
        p.midAngle = sector.midAngle;
        p.l1Ref = sector.l1Ref;
        p.l2Ref = sector.l2Ref;
      }
    }
  }

  _enterTypingPhase() {
    this.phase = 'typing';
    this._showInput();
  }

  _showInput() {
    if (!this.preview) return;
    const pos = this._labelScreenPos();
    if (!pos) { this._cleanup(); return; }

    const input = document.createElement('input');
    input.type = 'text';
    Object.assign(input.style, {
      position: 'absolute',
      left: pos.x + 'px',
      top:  pos.y + 'px',
      transform: 'translate(-50%, -50%)',
      zIndex: '30',
      padding: '2px 5px',
      border: '1.5px solid #2563a5',
      borderRadius: '3px',
      background: 'white',
      font: '12px ui-sans-serif, system-ui, -apple-system',
      width: '72px',
      textAlign: 'right',
      outline: 'none',
      boxShadow: '0 1px 4px rgba(0,0,0,0.15)'
    });

    const p = this.preview;
    let initial;
    if (p.kind === 'angle')          initial = normalizeAngleValue(p.value) * 180 / Math.PI;
    else                              initial = (p.kind === 'diameter') ? p.value : Math.abs(p.value);
    input.value = Number(initial).toFixed(3);

    document.getElementById('workspace').appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);
    this.inputEl = input;

    const finish = (commit) => {
      if (!this.inputEl) return;
      const raw = this.inputEl.value;
      this.inputEl.removeEventListener('keydown', onKeyDown);
      this.inputEl.removeEventListener('blur', onBlur);
      this._removeInput();
      if (commit) {
        const v = parseFloat(raw);
        this._commit(Number.isFinite(v) ? v : initial);
      }
      this._reset();
      this.app.requestRender();
    };
    const onKeyDown = (e) => {
      if (e.key === 'Enter')      { e.preventDefault(); e.stopPropagation(); finish(true);  }
      else if (e.key === 'Escape'){ e.preventDefault(); e.stopPropagation(); finish(false); }
      else                         { e.stopPropagation(); }
    };
    const onBlur = () => finish(true);
    input.addEventListener('keydown', onKeyDown);
    input.addEventListener('blur',    onBlur);
  }

  _labelScreenPos() {
    const view = this.app.view;
    const p = this.preview;
    if (p.kind === 'distance') {
      const dx = p.p2.x - p.p1.x, dy = p.p2.y - p.p1.y;
      const len = Math.hypot(dx, dy); if (len < EPS) return null;
      const nx = -dy / len, ny = dx / len;
      const tx =  dx / len, ty =  dy / len;
      const par = p.parallel || 0;
      return view.worldToScreen({
        x: (p.p1.x + p.p2.x)/2 + nx * p.offset + tx * par,
        y: (p.p1.y + p.p2.y)/2 + ny * p.offset + ty * par
      });
    }
    if (p.kind === 'pointLineDistance') {
      const dx = p.line.p2.x - p.line.p1.x, dy = p.line.p2.y - p.line.p1.y;
      const len = Math.hypot(dx, dy); if (len < EPS) return null;
      const t = ((p.p.x - p.line.p1.x)*dx + (p.p.y - p.line.p1.y)*dy) / (len*len);
      const foot = { x: p.line.p1.x + t*dx, y: p.line.p1.y + t*dy };
      const segDx = foot.x - p.p.x, segDy = foot.y - p.p.y;
      const segLen = Math.hypot(segDx, segDy) || 1;
      const segNx = -segDy / segLen, segNy = segDx / segLen;
      const segTx =  segDx / segLen, segTy =  segDy / segLen;
      const par = p.parallel || 0;
      return view.worldToScreen({
        x: (p.p.x + foot.x)/2 + segNx * p.offset + segTx * par,
        y: (p.p.y + foot.y)/2 + segNy * p.offset + segTy * par
      });
    }
    if (p.kind === 'radius' || p.kind === 'diameter') {
      const r = p.circle.r;
      const dPos = (p.dist != null) ? p.dist : (r + 14 / view.zoom);
      return view.worldToScreen({
        x: p.circle.center.x + dPos * Math.cos(p.angle),
        y: p.circle.center.y + dPos * Math.sin(p.angle)
      });
    }
    if (p.kind === 'angle') {
      const inter = lineIntersection(p.l1.p1, p.l1.p2, p.l2.p1, p.l2.p2);
      if (!inter) return null;
      const ref1 = p.l1Ref || { a:p.l1.p1.id, b:p.l1.p2.id };
      const ref2 = p.l2Ref || { a:p.l2.p1.id, b:p.l2.p2.id };
      const pts = new Map([
        [p.l1.p1.id, p.l1.p1], [p.l1.p2.id, p.l1.p2],
        [p.l2.p1.id, p.l2.p1], [p.l2.p2.id, p.l2.p2]
      ]);
      if (!pts.get(ref1.a) || !pts.get(ref1.b) || !pts.get(ref2.a) || !pts.get(ref2.b)) return null;
      const arc = angleArcFromPoints(pts.get(ref1.a), pts.get(ref1.b), pts.get(ref2.a), pts.get(ref2.b));
      const mid = arc.midAngle;
      const labelDist = (p.dist ?? (40 / view.zoom)) + 12 / view.zoom;
      return view.worldToScreen({
        x: inter.x + labelDist * Math.cos(mid),
        y: inter.y + labelDist * Math.sin(mid)
      });
    }
    return null;
  }

  _commit(value) {
    const sketch = this.app.activeSketch();
    if (!sketch) return;
    const p = this.preview;
    let made = null;
    if (p.kind === 'distance') {
      made = new DistanceConstraint(p.p1.id, p.p2.id, value);
      made.labelOffset   = p.offset;
      made.labelParallel = p.parallel || 0;
    } else if (p.kind === 'pointLineDistance') {
      made = new PointLineDistanceConstraint(p.p.id, { a: p.line.p1.id, b: p.line.p2.id }, value);
      made.labelOffset   = p.offset;
      made.labelParallel = p.parallel || 0;
    } else if (p.kind === 'radius') {
      made = new RadiusConstraint(p.circle.id, value);
      made.labelAngle = p.angle;
      made.labelDist  = p.dist;
    } else if (p.kind === 'diameter') {
      made = new RadiusConstraint(p.circle.id, value / 2);
      made.labelAngle = p.angle;
      made.labelDist  = p.dist;
      made.isDiameter = true;
    } else if (p.kind === 'angle') {
      made = new AngleConstraint(
        p.l1Ref || { a: p.l1.p1.id, b: p.l1.p2.id },
        p.l2Ref || { a: p.l2.p1.id, b: p.l2.p2.id },
        normalizeAngleValue(value * Math.PI / 180));
      made.labelDist = p.dist;
      made.labelMidAngle = p.midAngle;
    }
    if (made) {
      sketch.constraints.push(made);
      // Run a probe solve. If adding this dimension would over-define the
      // sketch, demote it to a "driven" dimension — informational only,
      // doesn't enforce. SolidWorks asks the user; we just do it silently
      // and render in grey.
      const probe = this.app.solver.solve(sketch, this.app.project.sketches);
      if (probe.state === 'over' || (probe.redundantIds && probe.redundantIds.has(made.id))) {
        made.driven = true;
      }
      this.app.commit();
      this.app.refreshUI();
    }
  }

  getPreview() { return { dimPicks: this.picks, dimPreview: this.preview, dimPhase: this.phase }; }
}

/* =============== 9. AVAILABLE-RELATIONS ENGINE ================ */
function classifySelection(sel) {
  const points  = sel.filter(e => e instanceof Point);
  const lines   = sel.filter(e => e instanceof Line);
  const circles = sel.filter(e => e instanceof Circle);
  const arcs    = sel.filter(e => e instanceof Arc);
  return { points, lines, circles, arcs, total: sel.length };
}

function sameLineRefs(line, ref) {
  if (!line || !ref) return false;
  return (ref.a === line.p1.id && ref.b === line.p2.id) ||
         (ref.a === line.p2.id && ref.b === line.p1.id);
}

function constraintAppliesToSelection(c, sel) {
  if (c.kind === 'directedAngle') return false;              // internal regular-polygon scaffold
  if (c.kind === 'equalLength' && c.driven) return false;    // informational polygon equality marker

  const refs = new Set(c.refs());
  const selectedPoints = new Set(sel.filter(e => e instanceof Point).map(e => e.id));
  const selectedLines = sel.filter(e => e instanceof Line);
  const selectedCurves = sel.filter(e => e instanceof Circle || e instanceof Arc);
  const hasLine = (ref) => selectedLines.some(l => sameLineRefs(l, ref));
  const selectedLineOwnsBothPoints = (line) =>
    selectedPoints.has(line.p1.id) && selectedPoints.has(line.p2.id);

  for (const e of sel) {
    if (e instanceof Point) {
      if (c.kind === 'fix') return c.pointId === e.id;
      if (c.kind === 'coincident') return c.p1 === e.id || c.p2 === e.id;
      if (c.kind === 'distance') return c.p1 === e.id || c.p2 === e.id;
      if (c.kind === 'pointLineDistance') return c.pointId === e.id;
      if (c.kind === 'midpoint') return c.pointId === e.id;
      if (c.kind === 'pointOnLine') return c.pointId === e.id;
      if (c.kind === 'pointOnCircle') return c.pointId === e.id;
      if (c.kind === 'concentric') return c.p1 === e.id || c.p2 === e.id;
      if ((c.kind === 'horizontal' || c.kind === 'vertical') &&
          selectedPoints.has(c.p1) && selectedPoints.has(c.p2)) return true;
    } else if (e instanceof Line) {
      if (refs.has(e.id)) return true;
      if ((c.kind === 'horizontal' || c.kind === 'vertical')) {
        if (c.lineId === e.id) return true;
        continue;
      }
      if (c.kind === 'parallel' || c.kind === 'perpendicular' ||
          c.kind === 'collinear' || c.kind === 'equalLength') {
        if (sameLineRefs(e, c.l1) || sameLineRefs(e, c.l2)) return true;
        continue;
      }
      if (c.kind === 'angle') {
        if (sameLineRefs(e, c.l1) || sameLineRefs(e, c.l2)) return true;
        continue;
      }
      if (c.kind === 'pointOnLine' || c.kind === 'pointLineDistance' || c.kind === 'midpoint') {
        if (sameLineRefs(e, c.l)) return true;
        continue;
      }
      if (c.kind === 'distance' && refs.has(e.p1.id) && refs.has(e.p2.id)) return true;
      if (c.kind === 'fix' && (c.pointId === e.p1.id || c.pointId === e.p2.id)) return true;
      if (c.kind === 'coincident' && (refs.has(e.p1.id) || refs.has(e.p2.id))) return true;
    } else if (e instanceof Circle || e instanceof Arc) {
      if (refs.has(e.id) || refs.has(e.center.id)) return true;
    }
  }

  if ((c.kind === 'parallel' || c.kind === 'perpendicular' ||
       c.kind === 'collinear' || c.kind === 'equalLength' || c.kind === 'angle') &&
      (hasLine(c.l1) || hasLine(c.l2))) return true;
  if ((c.kind === 'pointOnLine' || c.kind === 'pointLineDistance' || c.kind === 'midpoint') &&
      hasLine(c.l)) return true;
  if ((c.kind === 'horizontal' || c.kind === 'vertical')) {
    for (const l of selectedLines) if (c.lineId === l.id || selectedLineOwnsBothPoints(l)) return true;
  }
  if (selectedCurves.length) {
    for (const e of selectedCurves) {
      if (c.kind === 'radius' && c.circleId === e.id) return true;
      if (c.kind === 'equalRadius' && (c.c1 === e.id || c.c2 === e.id)) return true;
      if (c.kind === 'pointOnCircle' && c.circleId === e.id) return true;
      if (c.kind === 'concentric' && (c.p1 === e.center.id || c.p2 === e.center.id)) return true;
      if (c.kind === 'tangent' && (c.circleId === e.id || c.c1 === e.id || c.c2 === e.id)) return true;
    }
  }
  return false;
}

function availableRelations(sel) {
  const { points, lines, circles, arcs, total } = classifySelection(sel);
  const out = [];
  const push = (kind, label) => out.push({ kind, label, glyph: CONSTRAINT_GLYPHS[kind] || '' });

  if (total === 0) return out;

  // Single line: H, V, fix
  if (total === 1 && lines.length === 1) {
    push('horizontal', 'Horizontal');
    push('vertical', 'Vertical');
    push('fix', 'Fix');
    return out;
  }
  // Single circle/arc: fix
  if (total === 1 && (circles.length === 1 || arcs.length === 1)) {
    push('fix', 'Fix');
    return out;
  }
  // Single point: fix
  if (total === 1 && points.length === 1) {
    push('fix', 'Fix');
    return out;
  }
  // ≥2 points only
  if (points.length === total && total >= 2) {
    push('coincident', 'Coincident');
    push('horizontal', 'Horizontal');
    push('vertical', 'Vertical');
    push('fix', 'Fix');
    return out;
  }
  // ≥2 lines only
  if (lines.length === total && lines.length >= 2) {
    push('parallel', 'Parallel');
    push('perpendicular', 'Perpendicular');
    push('collinear', 'Collinear');
    push('equalLength', 'Equal length');
    push('horizontal', 'Horizontal');
    push('vertical', 'Vertical');
    push('fix', 'Fix');
    return out;
  }
  // ≥2 circles/arcs only
  if ((circles.length + arcs.length) === total && (circles.length + arcs.length) >= 2) {
    push('equalRadius', 'Equal radius');
    push('concentric', 'Concentric');
    push('tangent', 'Tangent');
    push('fix', 'Fix');
    return out;
  }
  // 1 line + ≥1 points
  if (lines.length === 1 && points.length >= 1 && circles.length + arcs.length === 0) {
    push('pointOnLine', 'On line');
    if (points.length === 1) push('midpoint', 'Midpoint');
    return out;
  }
  // 1 circle/arc + ≥1 points
  if ((circles.length + arcs.length) === 1 && points.length >= 1 && lines.length === 0) {
    push('pointOnCircle', 'On circle');
    return out;
  }
  // 1 line + 1 circle/arc
  if (lines.length === 1 && (circles.length + arcs.length) === 1 && points.length === 0) {
    push('tangent', 'Tangent');
    return out;
  }
  // mixed fallback
  if (points.length >= 2) push('coincident', 'Coincident');
  if (lines.length >= 2) {
    push('parallel', 'Parallel');
    push('perpendicular', 'Perpendicular');
    push('equalLength', 'Equal length');
  }
  if (circles.length + arcs.length >= 2) push('equalRadius', 'Equal radius');
  push('fix', 'Fix');
  return out;
}

function availableDimensions(sel) {
  const { points, lines, circles, arcs, total } = classifySelection(sel);
  const out = [];
  const push = (kind, label) => out.push({ kind, label, glyph: CONSTRAINT_GLYPHS[kind] || '' });

  if (total === 1 && lines.length === 1)        push('distance', 'Length');
  if (total === 1 && circles.length === 1)    { push('diameter', 'Diameter'); push('radius', 'Radius'); }
  if (total === 1 && arcs.length === 1)         push('radius', 'Radius');
  if (total === 2 && points.length === 2)       push('distance', 'Distance');
  if (total === 2 && lines.length === 2)        push('angle', 'Angle');
  if (total === 2 && lines.length === 1 && points.length === 1)
    push('pointLineDistance', 'Pt → line dist');
  return out;
}

/* =============== 10. APP ====================================== */
class App {
  constructor() {
    this.project = new Project();
    this.project.addSketch('Sketch 1');
    this.view = new View();
    this.canvas = document.getElementById('canvas');
    this.renderer = new Renderer(this.canvas, this.view);
    this.snap = new SnapEngine();
    this.solver = new Solver();
    this.tool = new SelectTool(this);
    this.toolName = 'select';
    this.polygonSides = 6;
    this.gridOn = true; this.snapOn = true; this.constructionMode = false;
    this.lastSnap = null; this.lastWorldCursor = { x:0, y:0 };
    this.selectionOrder = [];
    this.dirty = true;
    this.undoStack = []; this.redoStack = [];

    this._setupCanvasEvents();
    this._setupKeyboard();
    this._setupTopbar();
    this._setupSidebar();
    this._setupModal();
    this._setupResize();
    this.refreshUI();
    this.solveAndRender();
    this._loop();
  }

  /* ---- Sketch helpers ---- */
  activeSketch() { return this.project.active(); }
  visibleSketches() { return this.project.visibleSketches(); }
  activeVisibleSketches() {
    const s = this.activeSketch();
    return (s && s.visible) ? [s] : [];
  }

  makeOrReusePoint(world, snap, sketch) {
    // Endpoint snaps return the snapped Point directly so callers share
    // an existing corner only inside the active sketch. Endpoints from
    // inactive sketches stay reference geometry, so we create a new active
    // point and constrain it to the reference instead of sharing the object.
    if (snap && snap.kind === 'endpoint' && snap.entity instanceof Point) {
      const owner = this.project.sketchOf(snap.entity);
      if (owner && owner.id === sketch.id) return { point: snap.entity, reused: true };
    }
    const wx = snap ? snap.x : world.x;
    const wy = snap ? snap.y : world.y;
    return { point: new Point(wx, wy), reused: false };
  }

  /** Translate a snap result into the constraint that should pin a freshly
   *  created Point to the snapped feature. Returns null if no constraint
   *  applies. The constraint is added by the caller AFTER the new point's
   *  parent entity has been added to the sketch (so the solver lookup can
   *  find the new id). */
  snapToConstraint(snap, point) {
    if (!snap) return null;
    if (snap.kind === 'endpoint' && snap.entity instanceof Point && snap.entity !== point) {
      return new CoincidentConstraint(point.id, snap.entity.id);
    }
    if (snap.kind === 'origin') {
      point.fixed = true;
      return new FixConstraint(point.id, 0, 0);
    }
    if (snap.kind === 'midpoint' && snap.entity instanceof Line) {
      return new MidpointConstraint(point.id, { a: snap.entity.p1.id, b: snap.entity.p2.id });
    }
    if (snap.kind === 'center' && snap.entity && snap.entity.center) {
      return new CoincidentConstraint(point.id, snap.entity.center.id);
    }
    if (snap.kind === 'quadrant' && snap.entity && (snap.entity instanceof Circle || snap.entity instanceof Arc)) {
      return new PointOnCircleConstraint(point.id, snap.entity.id, snap.entity.center.id);
    }
    if (snap.kind === 'on-line' && snap.entity instanceof Line) {
      return new PointOnLineConstraint(point.id, { a: snap.entity.p1.id, b: snap.entity.p2.id });
    }
    if (snap.kind === 'on-circle' && snap.entity && (snap.entity instanceof Circle || snap.entity instanceof Arc)) {
      return new PointOnCircleConstraint(point.id, snap.entity.id, snap.entity.center.id);
    }
    return null;
  }

  /** Hit test that walks ALL visible sketches. Children (points) win
   *  over their parent entities so endpoint dragging works. */
  hitTestAcrossLayers(world) {
    return this.hitTestSketches(world, this.project.visibleSketches());
  }

  hitTestActiveSketch(world) {
    return this.hitTestSketches(world, this.activeVisibleSketches());
  }

  hitTestSketches(world, sketches) {
    const v = this.view;
    // Prefer children (points) first, then entities.
    for (const s of sketches) {
      for (const e of s.entities) {
        for (const c of e.children()) if (c.hit(world, v)) return c;
      }
    }
    for (const s of sketches) {
      for (const e of s.entities) if (e.hit(world, v)) return e;
    }
    return null;
  }

  hitTestForDimension(world) {
    // Smart Dimension picks any visible entity. Whether the constraint
    // can actually be added is checked downstream.
    return this.hitTestAcrossLayers(world);
  }

  /** Snap is only meaningful while you're actively placing or moving
   *  geometry. In plain Select mode (no drag in progress) and while using
   *  Smart Dim (which hit-tests entities, not snap points), we suppress
   *  snap detection so no markers or "endpoint / on-line / on-circle"
   *  hints flash at the cursor. */
  _snapForCurrentTool(world) {
    if (!this.snapOn) return null;
    const drawing = ['line','rectangle','circle','hexagon','arc','point'].includes(this.toolName);
    const dragging = this.toolName === 'select' && this.tool && this.tool.dragging;
    if (!drawing && !dragging) return null;
    if (dragging) return this._snapForDragging(world);
    return this.snap.find(world, this.view, this.visibleSketches());
  }

  _snapForDragging(world) {
    const drag = this.tool?.dragging;
    if (!drag) return null;
    const dx = world.x - drag.startWorld.x;
    const dy = world.y - drag.startWorld.y;
    const draggedSet = new Set(drag.pts.map(r => r.p));
    const handles = drag.snapPts || drag.pts;
    let best = null;
    for (const r of handles) {
      const probe = this._dragPreviewPoint(drag, r, dx, dy);
      const snap = this.snap.find(probe, this.view, this.visibleSketches(), {
        ignore: (candidate) =>
          (candidate.entity && draggedSet.has(candidate.entity)) ||
          this.shouldIgnoreDragSnap(drag, candidate)
      });
      if (!snap) continue;
      const ranked = { ...snap, dragPoint: r.p, dragRecord: r };
      if (!best || ranked._p > best._p || (ranked._p === best._p && ranked._d < best._d)) best = ranked;
    }
    return best;
  }

  /** Hit-test in screen pixels against the rectangles the renderer recorded
   *  for every drawn dimension label. Used to detect click-to-edit /
   *  drag-to-reposition on existing dims. */
  hitDimAtScreen(sx, sy) {
    const rects = this.renderer.lastDimRects || [];
    for (let i = rects.length - 1; i >= 0; i--) {
      const r = rects[i];
      if (sx >= r.x && sx <= r.x + r.w && sy >= r.y && sy <= r.y + r.h) return r.constraint;
    }
    return null;
  }

  /** Move an existing dimension's label based on the cursor world position.
   *  Updates labelOffset / labelAngle / labelDist on the constraint. */
  moveDimLabel(c, world) {
    if (c.kind === 'distance' || c.kind === 'pointLineDistance') {
      let p1, p2;
      if (c.kind === 'distance') {
        p1 = this._lookupAny(c.p1); p2 = this._lookupAny(c.p2);
      } else {
        const pt = this._lookupAny(c.pointId);
        const la = this._lookupAny(c.l.a), lb = this._lookupAny(c.l.b);
        if (!pt || !la || !lb) return;
        const dx = lb.x - la.x, dy = lb.y - la.y;
        const len2 = dx*dx + dy*dy; if (len2 < EPS) return;
        const t = ((pt.x - la.x)*dx + (pt.y - la.y)*dy) / len2;
        p1 = pt; p2 = { x: la.x + t*dx, y: la.y + t*dy };
      }
      if (!p1 || !p2) return;
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const len = Math.hypot(dx, dy); if (len < EPS) return;
      const nx = -dy / len, ny = dx / len;
      const tx =  dx / len, ty =  dy / len;
      const mid = { x: (p1.x + p2.x)/2, y: (p1.y + p2.y)/2 };
      const wx = world.x - mid.x, wy = world.y - mid.y;
      c.labelOffset   = wx * nx + wy * ny;
      c.labelParallel = wx * tx + wy * ty;
    } else if (c.kind === 'radius') {
      const circ = this._lookupAny(c.circleId); if (!circ) return;
      const dx = world.x - circ.center.x, dy = world.y - circ.center.y;
      const d = Math.hypot(dx, dy);
      if (d > EPS) {
        c.labelAngle = Math.atan2(dy, dx);
        c.labelDist  = d;
      }
    } else if (c.kind === 'angle') {
      const a1 = this._lookupAny(c.l1.a), b1 = this._lookupAny(c.l1.b);
      const a2 = this._lookupAny(c.l2.a), b2 = this._lookupAny(c.l2.b);
      if (!a1 || !b1 || !a2 || !b2) return;
      const inter = lineIntersection(a1, b1, a2, b2);
      if (!inter) return;
      const sector = angleSectorForCursor({ p1:a1, p2:b1 }, { p1:a2, p2:b2 }, world);
      c.labelDist = Math.max(dist(inter, world), 12 / this.view.zoom);
      if (sector) {
        c.value = sector.value;
        c.labelMidAngle = sector.midAngle;
        c.l1 = sector.l1Ref;
        c.l2 = sector.l2Ref;
      }
    }
  }

  /** Project-wide id → entity lookup. */
  _lookupAny(id) {
    for (const s of this.project.sketches) {
      for (const e of s.entities) {
        if (e.id === id) return e;
        for (const c of e.children()) if (c.id === id) return c;
      }
    }
    return null;
  }

  /** Open an inline input over a dimension's label so the user can edit
   *  the value (or Esc to leave it untouched). Reuses the SmartDim input
   *  styling. */
  editDimValue(c) {
    const rect = (this.renderer.lastDimRects || []).find(r => r.constraint === c);
    if (!rect) return;
    const cx = rect.x + rect.w / 2, cy = rect.y + rect.h / 2;
    const input = document.createElement('input');
    input.type = 'text';
    Object.assign(input.style, {
      position: 'absolute',
      left: cx + 'px', top: cy + 'px',
      transform: 'translate(-50%, -50%)',
      zIndex: '30', padding: '2px 5px',
      border: '1.5px solid #2563a5', borderRadius: '3px',
      background: 'white', font: '12px ui-sans-serif, system-ui',
      width: '72px', textAlign: 'right', outline: 'none',
      boxShadow: '0 1px 4px rgba(0,0,0,0.15)'
    });
    let initial;
    if (c.kind === 'angle')                       initial = normalizeAngleValue(c.value) * 180 / Math.PI;
    else if (c.kind === 'radius' && c.isDiameter) initial = c.value * 2;
    else                                            initial = c.value;
    input.value = Number(initial).toFixed(3);
    document.getElementById('workspace').appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);

    const finish = (commit) => {
      input.removeEventListener('keydown', onKey);
      input.removeEventListener('blur', onBlur);
      const raw = input.value;
      input.remove();
      if (commit) {
        const v = parseFloat(raw);
        if (Number.isFinite(v)) {
          if (c.kind === 'angle')                       c.value = normalizeAngleValue(v * Math.PI / 180);
          else if (c.kind === 'radius' && c.isDiameter) c.value = v / 2;
          else                                            c.value = v;
          // Editing a driven dim's value makes it driving again — let the
          // solver pick it up unless that re-creates the over-defined state.
          if (c.driven) {
            c.driven = false;
            const probe = this.solver.solve(this.activeSketch(), this.project.sketches);
            if (probe.state === 'over' || (probe.redundantIds && probe.redundantIds.has(c.id))) {
              c.driven = true;
            }
          }
          this.commit();
        }
      }
    };
    const onKey = (e) => {
      if (e.key === 'Enter')  { e.preventDefault(); e.stopPropagation(); finish(true); }
      else if (e.key === 'Escape'){ e.preventDefault(); e.stopPropagation(); finish(false); }
      else                     { e.stopPropagation(); }
    };
    const onBlur = () => finish(true);
    input.addEventListener('keydown', onKey);
    input.addEventListener('blur', onBlur);
  }

  selectedEntitiesAndPoints() {
    // Dedup — a Point shared between two or more entities (e.g. a corner
    // joining several lines) would otherwise appear once per parent.
    const out = [];
    const seen = new Set();
    const add = (x) => { if (!seen.has(x)) { seen.add(x); out.push(x); } };
    const sketch = this.activeSketch();
    if (!sketch) return out;
    const activeItems = new Set();
    for (const e of sketch.entities) {
      activeItems.add(e);
      for (const c of e.children()) activeItems.add(c);
    }
    this.selectionOrder = this.selectionOrder.filter(x => x && x.selected && activeItems.has(x));
    for (const x of this.selectionOrder) add(x);
    for (const e of sketch.entities) {
      if (e.selected) add(e);
      for (const c of e.children()) if (c.selected) add(c);
    }
    return out;
  }

  setSelected(entity, selected) {
    if (!entity) return;
    entity.selected = !!selected;
    const i = this.selectionOrder.indexOf(entity);
    if (selected) {
      if (i < 0) this.selectionOrder.push(entity);
    } else if (i >= 0) {
      this.selectionOrder.splice(i, 1);
    }
  }

  clearSelection() {
    for (const s of this.project.sketches) {
      for (const e of s.entities) {
        e.selected = false;
        for (const c of e.children()) c.selected = false;
      }
    }
    this.selectionOrder = [];
    this.refreshUI();
    this.requestRender();
  }

  deleteSelection() {
    const sketch = this.activeSketch(); if (!sketch) return;
    // Only delete entities that live in the active sketch.
    const toDelete = sketch.entities.filter(e => {
      if (e.selected) return true;
      for (const c of e.children()) if (c.selected) return true;
      return false;
    });
    for (const e of toDelete) sketch.removeEntity(e);
    this.commit();
    this.refreshUI();
  }

  _captureSketchParams(sketch) {
    const rows = [];
    const seen = new Set();
    const walk = (e) => {
      if (seen.has(e)) return;
      seen.add(e);
      for (const c of e.children()) walk(c);
      for (const key of e.paramKeys()) rows.push({ ent:e, id:e.id, key, value:e[key] });
    };
    for (const e of sketch.entities) walk(e);
    return rows;
  }

  _restoreSketchParams(rows) {
    for (const r of rows) r.ent[r.key] = r.value;
  }

  _paramIndexMap(rows) {
    const map = new Map();
    for (let i = 0; i < rows.length; i++) map.set(rows[i].id + ':' + rows[i].key, i);
    return map;
  }

  _captureParamValues(rows) {
    return rows.map(r => r.ent[r.key]);
  }

  _applyParamValues(rows, values) {
    for (let i = 0; i < rows.length; i++) rows[i].ent[rows[i].key] = values[i];
  }

  _buildConstraintGraph(sketch) {
    const graph = new Map();
    const add = (id) => {
      if (!id) return;
      if (!graph.has(id)) graph.set(id, new Set());
    };
    const link = (a, b) => {
      if (!a || !b || a === b) return;
      add(a); add(b);
      graph.get(a).add(b);
      graph.get(b).add(a);
    };
    for (const e of sketch.entities) {
      add(e.id);
      for (const c of e.children()) {
        add(c.id);
        link(e.id, c.id);
      }
    }
    for (const c of sketch.constraints) {
      const refs = c.refs().filter(Boolean);
      for (const id of refs) add(id);
      for (let i = 0; i < refs.length; i++) {
        for (let j = i + 1; j < refs.length; j++) link(refs[i], refs[j]);
      }
    }
    return graph;
  }

  _buildSolvingGraph(sketch) {
    const graph = new Map();
    const add = (id) => {
      if (!id) return;
      if (!graph.has(id)) graph.set(id, new Set());
    };
    const link = (a, b) => {
      if (!a || !b || a === b) return;
      add(a); add(b);
      graph.get(a).add(b);
      graph.get(b).add(a);
    };
    for (const e of sketch.entities) {
      add(e.id);
      for (const c of e.children()) add(c.id);
    }
    for (const c of sketch.constraints) {
      if (c.driven) continue;
      const refs = c.refs().filter(Boolean);
      for (const id of refs) add(id);
      for (let i = 0; i < refs.length; i++) {
        for (let j = i + 1; j < refs.length; j++) link(refs[i], refs[j]);
      }
    }
    return graph;
  }

  _graphDistances(graph, startIds) {
    const distMap = new Map();
    const q = [];
    for (const id of startIds) {
      distMap.set(id, 0);
      q.push(id);
      if (!graph.has(id)) graph.set(id, new Set());
    }
    for (let qi = 0; qi < q.length; qi++) {
      const id = q[qi];
      const d = distMap.get(id);
      for (const nb of (graph.get(id) || [])) {
        if (distMap.has(nb)) continue;
        distMap.set(nb, d + 1);
        q.push(nb);
      }
    }
    return distMap;
  }

  _componentFrom(graph, startId) {
    const component = new Set();
    const q = [startId];
    component.add(startId);
    for (let qi = 0; qi < q.length; qi++) {
      const id = q[qi];
      for (const nb of (graph.get(id) || [])) {
        if (component.has(nb)) continue;
        component.add(nb);
        q.push(nb);
      }
    }
    return component;
  }

  _activeIdsAndPoints(sketch) {
    const ids = new Set();
    const points = new Map();
    const walk = (e) => {
      ids.add(e.id);
      if (e instanceof Point) points.set(e.id, e);
      for (const c of e.children()) walk(c);
    };
    for (const e of sketch.entities) walk(e);
    return { ids, points };
  }

  _componentIsAnchored(sketch, component, activeIds, pointById) {
    for (const id of component) {
      if (!activeIds.has(id)) return true;
      const p = pointById.get(id);
      if (p && p.fixed) return true;
    }
    for (const c of sketch.constraints) {
      if (c.kind === 'fix' && component.has(c.pointId)) return true;
    }
    return false;
  }

  _componentAnchorPoint(sketch, component, activeIds, pointById) {
    const anchors = new Map();
    const addPoint = (p) => { if (p) anchors.set(p.id, p); };
    for (const id of component) {
      if (!activeIds.has(id)) {
        const e = this._lookupAny(id);
        if (e instanceof Point) addPoint(e);
        else return null;
      }
      const p = pointById.get(id);
      if (p && p.fixed) addPoint(p);
    }
    for (const c of sketch.constraints) {
      if (c.kind === 'fix' && component.has(c.pointId)) addPoint(pointById.get(c.pointId) || this._lookupAny(c.pointId));
    }
    return anchors.size === 1 ? [...anchors.values()][0] : null;
  }

  _constraintResidualNorm(constraints) {
    const L = (id, key) => {
      const e = this._lookupAny(id);
      return e ? e[key] : 0;
    };
    let sum = 0;
    for (const c of constraints) {
      for (const r of c.residuals(L)) sum += r * r;
    }
    return Math.sqrt(sum);
  }

  _constraintSystem(rows, constraints) {
    const activeConstraints = constraints.filter(c => !c.driven);
    const L = (id, key) => {
      const e = this._lookupAny(id);
      return e ? e[key] : 0;
    };
    const computeF = () => {
      const f = [];
      for (const c of activeConstraints) for (const r of c.residuals(L)) f.push(r);
      return f;
    };
    const f = computeF();
    const m = f.length, n = rows.length;
    const J = Array.from({ length:m }, () => new Array(n).fill(0));
    for (let j = 0; j < n; j++) {
      const r = rows[j];
      const x0 = r.ent[r.key];
      const step = Math.max(1e-6, Math.abs(x0) * 1e-7);
      r.ent[r.key] = x0 + step;
      const fp = computeF();
      r.ent[r.key] = x0;
      const inv = 1 / step;
      for (let i = 0; i < m; i++) J[i][j] = (fp[i] - f[i]) * inv;
    }
    const residual = Math.sqrt(f.reduce((s, v) => s + v*v, 0));
    return { f, J, residual };
  }

  _applyParamStep(rows, step) {
    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      let v = r.ent[r.key] + step[i];
      if (r.key === 'r') v = Math.max(EPS, v);
      r.ent[r.key] = v;
    }
  }

  _projectConstraintResidual(rows, constraints, passes = 2) {
    for (let pass = 0; pass < passes; pass++) {
      const sys = this._constraintSystem(rows, constraints);
      if (sys.residual < 1e-7 || !sys.J.length) return sys;
      const step = solveLeastSquares(sys.J, sys.f.map(v => -v), 1e-6);
      if (!step) return sys;
      const before = this._captureParamValues(rows);
      this._applyParamStep(rows, step);
      const next = this._constraintSystem(rows, constraints);
      if (next.residual <= sys.residual) continue;
      this._applyParamValues(rows, before);
      return sys;
    }
    return this._constraintSystem(rows, constraints);
  }

  _makeDragIntent(startWorld, pts, hit, rows) {
    const index = this._paramIndexMap(rows);
    const targets = [];
    const pointCoeff = (p, key, coeff = 1) => {
      const idx = index.get(p.id + ':' + key);
      return idx == null ? null : { idx, coeff };
    };
    const addTarget = (coeffs, start, axis, weight) => {
      const clean = coeffs.filter(Boolean);
      if (clean.length) targets.push({ coeffs:clean, start, axis, weight });
    };
    const addPointTargets = (p, weight) => {
      addTarget([pointCoeff(p, 'x')], p.x, 'x', weight);
      addTarget([pointCoeff(p, 'y')], p.y, 'y', weight);
    };
    const addLineHandleTargets = (line, weight) => {
      const dx = line.p2.x - line.p1.x, dy = line.p2.y - line.p1.y;
      const len2 = dx*dx + dy*dy;
      const t = len2 > EPS
        ? clamp(((startWorld.x - line.p1.x)*dx + (startWorld.y - line.p1.y)*dy) / len2, 0, 1)
        : 0.5;
      const a = 1 - t, b = t;
      addTarget([pointCoeff(line.p1, 'x', a), pointCoeff(line.p2, 'x', b)], a*line.p1.x + b*line.p2.x, 'x', weight);
      addTarget([pointCoeff(line.p1, 'y', a), pointCoeff(line.p2, 'y', b)], a*line.p1.y + b*line.p2.y, 'y', weight);
    };

    if (hit instanceof Point) {
      addPointTargets(hit, 400);
    } else if (hit instanceof Line) {
      addLineHandleTargets(hit, 400);
    } else if (pts.length === 1) {
      addPointTargets(pts[0].p, 400);
    } else if (pts.length === 2) {
      const p1 = pts[0].p, p2 = pts[1].p;
      addLineHandleTargets({ p1, p2 }, 400);
    } else if (pts.length > 2) {
      const n = pts.length;
      const cx = pts.reduce((s, r) => s + r.x, 0) / n;
      const cy = pts.reduce((s, r) => s + r.y, 0) / n;
      addTarget(pts.map(r => pointCoeff(r.p, 'x', 1 / n)), cx, 'x', 400);
      addTarget(pts.map(r => pointCoeff(r.p, 'y', 1 / n)), cy, 'y', 400);
      for (const r of pts) addPointTargets(r.p, 0.5);
    }
    return targets.length ? { targets } : null;
  }

  _intentTargetValue(target, dx, dy) {
    return target.start + (target.axis === 'x' ? dx : dy);
  }

  _intentCurrentValue(target, rows) {
    let v = 0;
    for (const c of target.coeffs) v += c.coeff * rows[c.idx].ent[rows[c.idx].key];
    return v;
  }

  _dragParamRegularization(drag, row) {
    const d = drag.distances?.get(row.id);
    if (d === 0) return 0.01;
    if (d === 1) return 0.03;
    if (d === 2) return 0.08;
    if (Number.isFinite(d)) return 0.15 + d * 0.05;
    return 2.0;
  }

  _intentLeastSquares(drag, nullBasis, dx, dy) {
    const rows = drag.state;
    const A = [], b = [];
    for (const target of drag.intent.targets) {
      const row = nullBasis.map(v => target.coeffs.reduce((s, c) => s + c.coeff * v[c.idx], 0));
      const norm = Math.sqrt(row.reduce((s, v) => s + v*v, 0));
      if (norm < 1e-10) continue;
      const w = Math.sqrt(target.weight);
      A.push(row.map(v => v * w));
      b.push((this._intentTargetValue(target, dx, dy) - this._intentCurrentValue(target, rows)) * w);
    }
    for (let i = 0; i < rows.length; i++) {
      const w0 = this._dragParamRegularization(drag, rows[i]);
      if (w0 <= 0) continue;
      const w = Math.sqrt(w0);
      A.push(nullBasis.map(v => v[i] * w));
      b.push((rows[i].value - rows[i].ent[rows[i].key]) * w);
    }
    return { A, b };
  }

  _dragIntentError(drag, dx, dy) {
    let sum = 0, n = 0;
    for (const target of drag.intent.targets) {
      const e = this._intentTargetValue(target, dx, dy) - this._intentCurrentValue(target, drag.state);
      sum += e * e;
      n++;
    }
    return n ? Math.sqrt(sum / n) : 0;
  }

  _beginDofDrag(sketch, state, startWorld, pts, hit, distances) {
    const constraints = sketch.constraints.filter(c => !c.driven);
    const sys = this._constraintSystem(state, constraints);
    if (sys.residual > 1e-4) return null;
    const intent = this._makeDragIntent(startWorld, pts, hit, state);
    if (!intent) return null;
    const rowBasis = rowSpaceBasis(sys.J, 1e-7);
    const nullBasis = nullSpaceBasis(rowBasis, state.length, 1e-7);
    if (!nullBasis.length) {
      return {
        mode:'locked',
        startWorld,
        pts,
        snapPts:pts,
        state,
        distances,
        snapIgnoreIds:new Set(distances.keys())
      };
    }
    let responsive = false;
    for (const target of intent.targets) {
      for (const v of nullBasis) {
        const projected = target.coeffs.reduce((s, c) => s + c.coeff * v[c.idx], 0);
        if (Math.abs(projected) > 1e-7) { responsive = true; break; }
      }
      if (responsive) break;
    }
    if (!responsive) return null;
    return {
      mode:'dof',
      startWorld,
      pts,
      snapPts:pts,
      state,
      constraints,
      intent,
      distances,
      snapIgnoreIds:new Set(distances.keys())
    };
  }

  _solveDofDrag(drag, dx, dy) {
    const sketch = this.activeSketch();
    this._restoreSketchParams(drag.state);
    let bestValues = this._captureParamValues(drag.state);
    let bestError = this._dragIntentError(drag, dx, dy);

    for (let iter = 0; iter < 20; iter++) {
      const sys = this._constraintSystem(drag.state, drag.constraints);
      const rowBasis = rowSpaceBasis(sys.J, 1e-7);
      const nullBasis = nullSpaceBasis(rowBasis, drag.state.length, 1e-7);
      if (!nullBasis.length) break;
      const { A, b } = this._intentLeastSquares(drag, nullBasis, dx, dy);
      if (!A.length) break;
      const z = solveLeastSquares(A, b, 1e-8);
      if (!z) break;
      const step = new Array(drag.state.length).fill(0);
      for (let k = 0; k < nullBasis.length; k++) {
        for (let i = 0; i < step.length; i++) step[i] += nullBasis[k][i] * z[k];
      }
      const maxStep = step.reduce((m, v) => Math.max(m, Math.abs(v)), 0);
      if (maxStep < 1e-7) break;
      this._applyParamStep(drag.state, step);
      this._projectConstraintResidual(drag.state, drag.constraints, 2);
      const err = this._dragIntentError(drag, dx, dy);
      if (err < bestError) {
        bestError = err;
        bestValues = this._captureParamValues(drag.state);
      }
      if (err < 1e-5) break;
    }

    this._applyParamValues(drag.state, bestValues);
    const result = this.solver.solve(sketch, this.project.sketches);
    if (!result.ok && bestValues) this._applyParamValues(drag.state, bestValues);
    for (const e of sketch.entities) if (e instanceof Arc) e.syncEnds();
    return result;
  }

  _applySimilarityToRows(rows, component, anchor, scale, angle) {
    const cs = Math.cos(angle), sn = Math.sin(angle);
    const pointRows = new Map();
    for (const r of rows) {
      if (!component.has(r.id)) continue;
      if (r.ent instanceof Point) {
        if (!pointRows.has(r.ent)) pointRows.set(r.ent, { x:r.ent.x, y:r.ent.y });
        pointRows.get(r.ent)[r.key] = r.value;
      }
    }
    for (const [p, rec] of pointRows) {
      const vx = rec.x - anchor.x, vy = rec.y - anchor.y;
      p.x = anchor.x + scale * (vx*cs - vy*sn);
      p.y = anchor.y + scale * (vx*sn + vy*cs);
    }
    for (const r of rows) {
      if (!component.has(r.id) || r.ent instanceof Point) continue;
      if (r.key === 'r') r.ent[r.key] = Math.max(EPS, r.value * scale);
      else if (r.key === 'a0' || r.key === 'a1') r.ent[r.key] = r.value + angle;
      else r.ent[r.key] = r.value;
    }
  }

  _componentTransformFreedom(sketch, state, component, anchor) {
    const relevant = sketch.constraints.filter(c => !c.driven && c.refs().some(id => component.has(id)));
    const before = this._constraintResidualNorm(relevant);
    const allowed = (scale, angle) => {
      this._applySimilarityToRows(state, component, anchor, scale, angle);
      const after = this._constraintResidualNorm(relevant);
      this._restoreSketchParams(state);
      return after <= Math.max(1e-5, before * 1.05 + 1e-6);
    };
    return {
      rotate: allowed(1, 0.01),
      scale: allowed(1.01, 0)
    };
  }

  beginLocalizedDrag(startWorld, pts, hit = null) {
    const sketch = this.activeSketch();
    const state = this._captureSketchParams(sketch);
    const graph = this._buildConstraintGraph(sketch);
    const startIds = new Set(pts.map(r => r.p.id));
    const distances = this._graphDistances(graph, startIds);

    const { ids: activeIds, points: pointById } = this._activeIdsAndPoints(sketch);
    const components = [];
    const componentKeys = new Set();
    for (const id of startIds) {
      const component = this._componentFrom(graph, id);
      const key = [...component].sort().join('|');
      if (!componentKeys.has(key)) {
        componentKeys.add(key);
        components.push(component);
      }
    }

    if (components.length && components.every(c => !this._componentIsAnchored(sketch, c, activeIds, pointById))) {
      const moveIds = new Set();
      for (const c of components) for (const id of c) moveIds.add(id);
      const rigidPts = [];
      for (const [id, p] of pointById) {
        if (moveIds.has(id)) rigidPts.push({ p, x:p.x, y:p.y });
      }
      if (rigidPts.length) {
        return {
          mode:'rigid',
          startWorld,
          pts:rigidPts,
          snapPts:pts,
          startIds,
          distances,
          snapIgnoreIds:moveIds
        };
      }
    }

    const dofDrag = this._beginDofDrag(sketch, state, startWorld, pts, hit, distances);
    if (dofDrag) return dofDrag;

    const solveGraph = this._buildSolvingGraph(sketch);
    const solveComponents = [];
    const solveComponentKeys = new Set();
    for (const id of startIds) {
      const component = this._componentFrom(solveGraph, id);
      const key = [...component].sort().join('|');
      if (!solveComponentKeys.has(key)) {
        solveComponentKeys.add(key);
        solveComponents.push(component);
      }
    }

    const anchors = solveComponents.map(c => this._componentAnchorPoint(sketch, c, activeIds, pointById));
    if (solveComponents.length && anchors.every(a => a) && new Set(anchors.map(a => a.id)).size === 1) {
      const anchor = anchors[0];
      const moveIds = new Set();
      for (const c of solveComponents) for (const id of c) moveIds.add(id);
      const snapIgnoreIds = new Set(moveIds);
      for (const c of components) for (const id of c) snapIgnoreIds.add(id);
      const rotatePts = [];
      for (const [id, p] of pointById) {
        if (moveIds.has(id) && p !== anchor) rotatePts.push({ p, x:p.x, y:p.y });
      }
      const transformFreedom = this._componentTransformFreedom(sketch, state, moveIds, anchor);
      const handle = dist(startWorld, anchor) > EPS ? { x:startWorld.x, y:startWorld.y } : pts
        .filter(r => r.p !== anchor && dist(r.p, anchor) > EPS)
        .sort((a, b) => dist(a.p, startWorld) - dist(b.p, startWorld))[0] || rotatePts[0];
      if (rotatePts.length && handle && transformFreedom.rotate) {
        const transformParams = state.filter(r => moveIds.has(r.id) && !(r.ent instanceof Point));
        return {
          mode: transformFreedom.scale ? 'similarity' : 'rotate',
          startWorld,
          pts:rotatePts,
          transformParams,
          snapPts:pts.filter(r => r.p !== anchor),
          startIds,
          distances,
          anchor:{ p:anchor, x:anchor.x, y:anchor.y },
          rotateHandle:handle,
          snapIgnoreIds
        };
      }
    }

    const depthSet = new Set([0]);
    for (const r of state) {
      const d = distances.get(r.id);
      if (Number.isFinite(d)) depthSet.add(d);
    }
    const depths = [...depthSet].sort((a, b) => a - b);
    return { startWorld, pts, snapPts:pts, state, startIds, distances, depths, snapIgnoreIds:new Set(distances.keys()) };
  }

  _dragMovableIds(drag, depth) {
    const movable = new Set(drag.startIds);
    for (const [id, d] of drag.distances) {
      if (d <= depth) movable.add(id);
    }
    return movable;
  }

  _dragTempConstraints(state, movableIds, targetById) {
    const extra = [];
    const fixedPoints = new Map();
    for (const r of state) {
      if (movableIds.has(r.id)) continue;
      if (r.ent instanceof Point) {
        if (!fixedPoints.has(r.ent)) fixedPoints.set(r.ent, { p:r.ent, x:r.ent.x, y:r.ent.y });
        fixedPoints.get(r.ent)[r.key] = r.value;
      } else {
        extra.push(new ParamFixConstraint(r.id, r.key, r.value));
      }
    }
    for (const fp of fixedPoints.values()) extra.push(new FixConstraint(fp.p.id, fp.x, fp.y));
    if (targetById) {
      for (const [id, t] of targetById) extra.push(new FixConstraint(id, t.x, t.y));
    }
    return extra;
  }

  _entityAndChildIds(entity) {
    const ids = new Set();
    const walk = (e) => {
      if (!e || ids.has(e.id)) return;
      ids.add(e.id);
      for (const c of e.children()) walk(c);
    };
    walk(entity);
    return ids;
  }

  _solveWithFirstSelectionMoving(sketch, sel, beforeState, beforeGraph) {
    if (!sketch || sel.length < 2) return null;
    const firstIds = this._entityAndChildIds(sel[0]);
    const movableIds = new Set();
    for (const id of firstIds) {
      const component = this._componentFrom(beforeGraph, id);
      for (const cid of component) movableIds.add(cid);
    }
    if (!movableIds.size) return null;

    const extra = this._dragTempConstraints(beforeState, movableIds, null);
    const result = this.solver.solve(sketch, this.project.sketches, extra);
    if (result.ok) return result;

    this._restoreSketchParams(beforeState);
    return result;
  }

  shouldIgnoreDragSnap(drag, snap) {
    if (!drag || !snap) return false;
    if ((drag.mode === 'rotate' || drag.mode === 'similarity' || drag.mode === 'dof') && snap.kind === 'origin') {
      if (drag.anchor && Math.hypot(drag.anchor.x, drag.anchor.y) < EPS) return true;
      const fixedAtOrigin = (drag.state || []).some(r => r.ent instanceof Point && Math.hypot(r.ent.x, r.ent.y) < EPS && r.ent.fixed);
      if (fixedAtOrigin) return true;
    }
    if (!snap.entity || !snap.entity.id) return false;
    return !!(drag.snapIgnoreIds && drag.snapIgnoreIds.has(snap.entity.id));
  }

  _rotationDeltaFromDrag(drag, dx, dy) {
    const h = drag.rotateHandle;
    const a = drag.anchor;
